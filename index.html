  <style>/* ============================================================
   FINANCE OS — DESIGN SYSTEM
   Palette: Deep slate base, warm off-white surfaces,
   precise accent system per data type.
   Typography: Inter (utility) + JetBrains Mono (numbers)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* ── Tokens ─────────────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:           #0f1117;
  --bg-surface:   #171b25;
  --bg-raised:    #1e2330;
  --bg-hover:     #252a38;
  --border:       #2a2f3e;
  --border-light: #323847;

  /* Text */
  --text:         #e8eaf0;
  --text-muted:   #7b8196;
  --text-faint:   #4a5068;

  /* Accents */
  --green:        #2ecc8a;
  --green-dim:    rgba(46,204,138,.12);
  --red:          #f05c5c;
  --red-dim:      rgba(240,92,92,.12);
  --blue:         #4d9cff;
  --blue-dim:     rgba(77,156,255,.12);
  --yellow:       #f0b429;
  --yellow-dim:   rgba(240,180,41,.12);
  --purple:       #a78bfa;
  --purple-dim:   rgba(167,139,250,.12);
  --teal:         #22d3ee;
  --teal-dim:     rgba(34,211,238,.12);

  /* Sidebar */
  --sidebar-w:    220px;
  --sidebar-bg:   #0c0f17;

  /* Misc */
  --radius:       8px;
  --radius-lg:    12px;
  --shadow:       0 2px 12px rgba(0,0,0,.35);
  --transition:   150ms ease;
  --header-h:     56px;
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: "Inter", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: var(--blue); text-decoration: none; }

/* ── App Shell ──────────────────────────────────────────── */
#app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

#app-logo {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: 1.25rem 1rem 1rem;
  border-bottom: 1px solid var(--border);
  min-height: var(--header-h);
}
.logo-icon {
  font-size: 1.4rem;
  color: var(--blue);
  line-height: 1;
}
.logo-text {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .02em;
  text-transform: uppercase;
}

#nav-links {
  list-style: none;
  padding: .75rem 0;
  flex: 1;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .6rem 1rem;
  margin: .1rem .5rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  color: var(--text-muted);
  font-size: .82rem;
  font-weight: 500;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--blue-dim);
  color: var(--blue);
  font-weight: 600;
}
.nav-icon {
  font-size: 1rem;
  width: 1.1rem;
  text-align: center;
  flex-shrink: 0;
}

/* ── Main Content ───────────────────────────────────────── */
main#content {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Page Header ────────────────────────────────────────── */
#page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
  padding: 0 1.5rem;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 1rem;
}

.page-header-left {
  display: flex;
  align-items: center;
  gap: .75rem;
  min-width: 0;
}
.page-title {
  font-size: .95rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.page-header-right {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

.sidebar-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: none;
  border: none;
  padding: 4px;
}
.sidebar-toggle span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text-muted);
  border-radius: 2px;
  transition: var(--transition);
}

.header-select {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .35rem .65rem;
  font-size: .8rem;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}
.header-select:focus { border-color: var(--blue); }

/* ── Page Body ──────────────────────────────────────────── */
#page-body {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
}

/* ── Cards ──────────────────────────────────────────────── */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.card-header h3 {
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
}

/* ── KPI Grid ───────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1rem;
}

.kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  display: flex;
  align-items: flex-start;
  gap: .85rem;
  transition: border-color var(--transition);
}
.kpi-card:hover { border-color: var(--border-light); }
.kpi-card.kpi-green { border-left: 3px solid var(--green); }
.kpi-card.kpi-red   { border-left: 3px solid var(--red); }
.kpi-card.kpi-blue  { border-left: 3px solid var(--blue); }

.kpi-icon {
  font-size: 1.2rem;
  margin-top: .1rem;
  opacity: .7;
}
.kpi-card.kpi-green .kpi-icon { color: var(--green); }
.kpi-card.kpi-red   .kpi-icon { color: var(--red); }
.kpi-card.kpi-blue  .kpi-icon { color: var(--blue); }

.kpi-label {
  font-size: .72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: .25rem;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.kpi-period {
  font-size: .68rem;
  opacity: .7;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.kpi-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -.02em;
}

/* ── Alert Row ──────────────────────────────────────────── */
.alert-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
.alert-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .85rem 1.1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
}
.alert-card.alert-warn { border-left: 3px solid var(--red); }
.alert-card.alert-ok   { border-left: 3px solid var(--green); }
.alert-label { font-size: .82rem; font-weight: 500; color: var(--text); }
.alert-right { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; justify-content: flex-end; }

/* ── Dashboard Grids ────────────────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}

/* ── BU Bars ────────────────────────────────────────────── */
.bu-bars { display: flex; flex-direction: column; gap: .85rem; }
.bu-bar-row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: .6rem; }
.bu-bar-label { font-size: .75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bu-bar-tracks { display: flex; flex-direction: column; gap: 3px; }
.bu-bar-track {
  height: 5px;
  background: var(--bg-raised);
  border-radius: 3px;
  overflow: hidden;
}
.bu-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.fill-revenue { background: var(--green); }
.fill-expense { background: var(--red); }
.bu-bar-net { font-family: "JetBrains Mono", monospace; font-size: .75rem; text-align: right; }
.text-green { color: var(--green); }
.text-red   { color: var(--red); }

.bu-legend { display: flex; gap: 1rem; font-size: .72rem; color: var(--text-muted); margin-top: .5rem; align-items: center; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: .3rem; }
.dot-revenue { background: var(--green); }
.dot-expense { background: var(--red); }

/* ── Aging Bars ─────────────────────────────────────────── */
.aging-bars { display: flex; flex-direction: column; gap: .7rem; }
.aging-row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: .6rem; }
.aging-label { font-size: .75rem; color: var(--text-muted); }
.aging-track { height: 6px; background: var(--bg-raised); border-radius: 3px; overflow: hidden; }
.aging-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.aging-current { background: var(--green); }
.aging-30      { background: var(--yellow); }
.aging-60      { background: #f0883a; }
.aging-90      { background: var(--red); }
.aging-90plus  { background: #b91c1c; }
.aging-amount { font-family: "JetBrains Mono", monospace; font-size: .72rem; text-align: right; color: var(--text-muted); }
.aging-total { margin-top: .75rem; font-size: .8rem; color: var(--text-muted); text-align: right; padding-top: .75rem; border-top: 1px solid var(--border); }

/* ── Tables ─────────────────────────────────────────────── */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: .8rem;
}
.table th {
  text-align: left;
  padding: .55rem .75rem;
  color: var(--text-muted);
  font-weight: 600;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.table td {
  padding: .6rem .75rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--bg-hover); }
.text-right { text-align: right; }
.text-sm { font-size: .75rem; }
.text-muted { color: var(--text-muted); }
.mono { font-family: "JetBrains Mono", monospace; font-size: .8rem; }

/* ── Badges ─────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: .2rem .55rem;
  border-radius: 99px;
  font-size: .7rem;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: .02em;
}
.badge-green  { background: var(--green-dim);  color: var(--green); }
.badge-red    { background: var(--red-dim);    color: var(--red); }
.badge-blue   { background: var(--blue-dim);   color: var(--blue); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray   { background: var(--bg-raised);  color: var(--text-muted); }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .5rem 1rem;
  border-radius: var(--radius);
  font-size: .82rem;
  font-weight: 600;
  border: 1px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.btn-primary:hover { background: #3a8dee; }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn-danger {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.btn-danger:hover { background: #d94f4f; }
.btn-sm { padding: .3rem .65rem; font-size: .75rem; }

/* ── Forms ───────────────────────────────────────────────── */
.form-body { display: flex; flex-direction: column; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: .4rem; }
.form-group label { font-size: .78rem; font-weight: 500; color: var(--text-muted); }
.form-input {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .55rem .75rem;
  font-size: .85rem;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
.form-input:focus { border-color: var(--blue); }
.form-input:disabled { opacity: .5; cursor: not-allowed; }
.form-actions { display: flex; gap: .75rem; }

/* ── Empty States ────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1rem;
  text-align: center;
  gap: 1rem;
}
.empty-icon { font-size: 2.5rem; opacity: .4; }
.empty-state p { color: var(--text-muted); font-size: .85rem; }
.empty-state-sm {
  padding: 1.5rem;
  text-align: center;
  color: var(--text-muted);
  font-size: .8rem;
}

/* ── Coming Soon ─────────────────────────────────────────── */
.coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  gap: 1rem;
}
.coming-icon { font-size: 3rem; opacity: .3; }
.coming-soon h2 { font-size: 1.25rem; font-weight: 600; color: var(--text); }
.coming-soon p { color: var(--text-muted); font-size: .85rem; max-width: 380px; line-height: 1.7; }

/* ── Toast ───────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  padding: .75rem 1.1rem;
  border-radius: var(--radius);
  font-size: .82rem;
  font-weight: 500;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s ease;
  z-index: 999;
  box-shadow: var(--shadow);
}
.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }
.toast-show    { opacity: 1; transform: translateY(0); }

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  max-width: 360px;
  width: 90%;
  box-shadow: var(--shadow);
}
.modal-message { color: var(--text); font-size: .9rem; margin-bottom: 1.25rem; line-height: 1.6; }
.modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }

/* ── Dividers ────────────────────────────────────────────── */
hr { border: none; border-top: 1px solid var(--border); }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .dashboard-grid { grid-template-columns: 1fr; }
  .alert-row { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  #sidebar {
    transform: translateX(-100%);
  }
  #sidebar.open {
    transform: translateX(0);
  }
  main#content {
    margin-left: 0;
  }
  .sidebar-toggle { display: flex; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  #page-body { padding: 1rem; }
  .header-select { font-size: .75rem; padding: .3rem .5rem; }
}

@media (max-width: 400px) {
  .kpi-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════════════
   MODULE SHARED STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Toolbar ─────────────────────────────────────────────── */
.module-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: .75rem;
  gap: 1rem;
}
.toolbar-left, .toolbar-right { display: flex; align-items: center; gap: .5rem; }

/* ── Filter Bar ──────────────────────────────────────────── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  align-items: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .75rem 1rem;
}
.filter-select, .filter-input {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .35rem .65rem;
  font-size: .8rem;
  outline: none;
  transition: border-color var(--transition);
  font-family: inherit;
}
.filter-select:focus, .filter-input:focus { border-color: var(--blue); }
.filter-input[type="date"] { width: 140px; }
.filter-input:not([type="date"]) { width: 180px; }

/* ── Table Footer ────────────────────────────────────────── */
.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .75rem 1rem;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: .5rem;
}
.footer-totals { display: flex; gap: 1.25rem; align-items: center; }
.text-blue   { color: var(--blue); }
.text-purple { color: var(--purple); }

/* ── Row Actions ─────────────────────────────────────────── */
.row-actions { display: flex; gap: .25rem; align-items: center; }
.btn-action {
  background: none;
  border: none;
  padding: .2rem .35rem;
  border-radius: 4px;
  font-size: .85rem;
  cursor: pointer;
  transition: background var(--transition);
  color: var(--text-muted);
}
.btn-action:hover { background: var(--bg-hover); color: var(--text); }
.btn-action.text-green { color: var(--green); }
.btn-action.text-red   { color: var(--red); }

/* ── Form Page ───────────────────────────────────────────── */
.form-page { max-width: 820px; }
.form-page-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
}
.form-page-title { font-size: 1.05rem; font-weight: 600; }

.form-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.form-section {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.form-section:last-of-type { border-bottom: none; }

.form-section-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--blue);
  margin-bottom: 1rem;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}
.form-row.col-2 { grid-template-columns: repeat(2, 1fr); }
.form-row.col-1 { grid-template-columns: 1fr; }

.required { color: var(--red); }

.form-actions-bar {
  display: flex;
  justify-content: flex-end;
  gap: .75rem;
  padding: 1.25rem 1.5rem;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
}

.btn-secondary {
  background: var(--bg-raised);
  color: var(--text);
  border: 1px solid var(--border-light);
}
.btn-secondary:hover { background: var(--bg-hover); }

/* ── Error Box ───────────────────────────────────────────── */
.error-box {
  margin: 0 1.5rem 1rem;
  padding: .85rem 1rem;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  color: var(--red);
  font-size: .82rem;
}
.error-box ul { margin: 0; padding-left: 1.2rem; }
.error-box li { margin-bottom: .2rem; }

/* ── Detail Modal ────────────────────────────────────────── */
.modal-lg { max-width: 560px; width: 95%; }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: .95rem; font-weight: 600; }
.detail-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.detail-table tr { border-bottom: 1px solid var(--border); }
.detail-table tr:last-child { border-bottom: none; }
.detail-label {
  padding: .55rem .5rem;
  color: var(--text-muted);
  font-weight: 500;
  width: 40%;
  vertical-align: top;
}
.detail-value { padding: .55rem .5rem; color: var(--text); }

/* ── Responsive Form ─────────────────────────────────────── */
@media (max-width: 700px) {
  .form-row { grid-template-columns: 1fr; }
  .form-row.col-2 { grid-template-columns: 1fr; }
  .filter-input:not([type="date"]) { width: 140px; }
}

/* ══════════════════════════════════════════════════════════
   RECEIVABLES / PAYABLES MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Aging Summary Bar ───────────────────────────────────── */
.aging-summary {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  flex-wrap: wrap;
}
.aging-summary-item {
  display: flex;
  flex-direction: column;
  gap: .3rem;
  flex: 1;
  min-width: 90px;
}
.aging-summary-label { font-size: .7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.aging-summary-bar-wrap { height: 4px; background: var(--bg-raised); border-radius: 2px; overflow: hidden; }
.aging-summary-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.aging-summary-value { font-family: "JetBrains Mono", monospace; font-size: .78rem; color: var(--text); }
.aging-summary-total {
  display: flex;
  flex-direction: column;
  gap: .2rem;
  align-items: flex-end;
  padding-left: 1rem;
  border-left: 1px solid var(--border);
  min-width: 120px;
}
.aging-summary-total strong { font-family: "JetBrains Mono", monospace; font-size: .95rem; }

/* ── Aging Tag ───────────────────────────────────────────── */
.aging-tag {
  display: inline-block;
  padding: .18rem .5rem;
  border-radius: 99px;
  font-size: .7rem;
  font-weight: 600;
  white-space: nowrap;
}
.aging-tag-green  { background: var(--green-dim);  color: var(--green); }
.aging-tag-yellow { background: var(--yellow-dim); color: var(--yellow); }
.aging-tag-orange { background: rgba(240,136,58,.12); color: #f0883a; }
.aging-tag-red    { background: var(--red-dim);    color: var(--red); }
.aging-tag-gray   { background: var(--bg-raised);  color: var(--text-faint); }

/* ── Progress Bar ────────────────────────────────────────── */
.rcv-progress { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
.rcv-progress-header { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: .5rem; color: var(--text-muted); }
.progress-track { height: 8px; background: var(--bg-raised); border-radius: 4px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s ease; }

/* ── Detail Grid ─────────────────────────────────────────── */
.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.detail-item { display: flex; flex-direction: column; gap: .25rem; }
.detail-item-label { font-size: .7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.detail-item-value { font-size: .85rem; color: var(--text); }
.detail-section-title {
  padding: .75rem 1.25rem .4rem;
  font-size: .72rem;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ── Collection Info ─────────────────────────────────────── */
.collection-info {
  display: flex;
  gap: 1rem;
  padding: .85rem 1.25rem;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.col-info-item { display: flex; flex-direction: column; gap: .2rem; flex: 1; }
.col-info-item span:first-child { font-size: .7rem; }
.col-info-item span:last-child  { font-family: "JetBrains Mono", monospace; font-size: .85rem; font-weight: 500; }

/* ── Modal Sizes ─────────────────────────────────────────── */
.modal-md { max-width: 480px; width: 95%; }
.modal-xl { max-width: 680px; width: 95%; max-height: 85vh; overflow-y: auto; }

/* ── Form Hint ───────────────────────────────────────────── */
.form-hint { font-size: .72rem; color: var(--text-muted); margin-top: .25rem; }

/* ── Text Center ─────────────────────────────────────────── */
.text-center { text-align: center; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 700px) {
  .detail-grid { grid-template-columns: repeat(2, 1fr); }
  .aging-summary { gap: .6rem; }
  .aging-summary-item { min-width: 70px; }
}

/* ══════════════════════════════════════════════════════════
   PAYABLES MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.ceo-advance-banner {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1rem;
  background: var(--yellow-dim);
  border: 1px solid var(--yellow);
  border-radius: var(--radius);
  margin-bottom: .5rem;
  flex-wrap: wrap;
}

.row-ceo td { background: rgba(240,180,41,.04); }

.info-box {
  padding: .75rem 1rem;
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-radius: var(--radius);
  color: var(--text);
  font-size: .82rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}

/* ══════════════════════════════════════════════════════════
   TREASURY MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Account Summary Grid ────────────────────────────────── */
.treasury-summary {
  display: flex;
  gap: 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  align-items: center;
  flex-wrap: wrap;
}
.treasury-acct-grid {
  display: flex;
  gap: .6rem;
  flex-wrap: wrap;
  flex: 1;
}
.treasury-acct-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .6rem .85rem;
  min-width: 130px;
}
.treasury-acct-name { font-size: .78rem; font-weight: 600; color: var(--text); }
.treasury-acct-type { font-size: .68rem; color: var(--text-muted); margin-bottom: .2rem; }
.treasury-acct-bal  { font-family: "JetBrains Mono", monospace; font-size: .85rem; color: var(--blue); }

.treasury-period-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .2rem;
  padding-left: 1rem;
  border-left: 1px solid var(--border);
  min-width: 140px;
}
.treasury-stat-val {
  font-family: "JetBrains Mono", monospace;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}

/* ── Transfer Flow (table) ───────────────────────────────── */
.transfer-flow {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
.transfer-acct {
  font-size: .8rem;
  padding: .18rem .5rem;
  border-radius: 4px;
}
.transfer-acct.src { background: var(--red-dim);  color: var(--red); }
.transfer-acct.dst { background: var(--green-dim); color: var(--green); }
.transfer-arrow { color: var(--text-muted); font-size: .9rem; }

/* ── Transfer Form Visual ────────────────────────────────── */
.transfer-visual {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: center;
  margin-bottom: .75rem;
}
.transfer-side { display: flex; flex-direction: column; gap: .5rem; }
.transfer-side-label { font-size: .72rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.transfer-select-lg { font-size: .85rem; padding: .65rem .85rem; }
.transfer-arrow-big {
  font-size: 1.5rem;
  color: var(--blue);
  text-align: center;
  opacity: .7;
}

/* ── Integrity Alert ─────────────────────────────────────── */
.integrity-alert {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1rem;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  color: var(--red);
  font-size: .82rem;
  margin-top: .75rem;
}

/* ── Transfer Flow Detail (modal) ────────────────────────── */
.transfer-flow-detail {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: .75rem;
  align-items: center;
  padding: 1rem;
  background: var(--bg-raised);
  border-radius: var(--radius);
  margin-bottom: .5rem;
}
.tfd-side { text-align: center; }
.tfd-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.tfd-acct  { font-size: .9rem; font-weight: 600; color: var(--text); }
.tfd-entity { margin-top: .15rem; }
.tfd-arrow { text-align: center; }
.tfd-amount { font-family: "JetBrains Mono", monospace; font-size: .85rem; color: var(--blue); margin-bottom: .3rem; }
.tfd-arrow-line { color: var(--text-muted); font-size: .8rem; letter-spacing: .1em; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 640px) {
  .transfer-visual { grid-template-columns: 1fr; }
  .transfer-arrow-big { transform: rotate(90deg); }
  .treasury-period-stat { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: .75rem; align-items: flex-start; }
}

/* ══════════════════════════════════════════════════════════
   REPORTS MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Layout ──────────────────────────────────────────────── */
.reports-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 1rem;
  min-height: calc(100vh - var(--header-h) - 3rem);
}
.reports-sidebar {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .5rem;
  height: fit-content;
  position: sticky;
  top: calc(var(--header-h) + 1.5rem);
}
.report-menu-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .55rem .75rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
  user-select: none;
}
.report-menu-item:hover { background: var(--bg-hover); color: var(--text); }
.report-menu-item.active { background: var(--blue-dim); color: var(--blue); font-weight: 600; }
.report-menu-icon { font-size: .9rem; width: 1rem; text-align: center; flex-shrink: 0; }

.reports-content {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

/* ── Report Header ───────────────────────────────────────── */
.report-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}
.report-title    { font-size: 1rem; font-weight: 700; color: var(--text); }
.report-subtitle { font-size: .78rem; color: var(--text-muted); margin-top: .2rem; }

/* ── Report Body ─────────────────────────────────────────── */
.report-body { padding: 1.25rem 1.5rem; }

.report-section-head {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--blue);
  padding: .5rem 0 .4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: .4rem;
}

.report-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .45rem 0;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
}
.report-row:last-child { border-bottom: none; }
.report-row-label { color: var(--text); flex: 1; }
.report-row-value { font-family: "JetBrains Mono", monospace; font-size: .82rem; text-align: right; min-width: 140px; }

.report-subtotal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .6rem 0;
  border-top: 2px solid var(--border-light);
  margin-top: .25rem;
  font-size: .85rem;
}

.report-net {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .85rem 1rem;
  border-radius: var(--radius);
  margin-top: 1rem;
  font-size: .9rem;
}
.net-profit { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.net-loss   { background: var(--red-dim);   border: 1px solid var(--red);   color: var(--red); }

.report-empty-row {
  padding: 1.5rem 0;
  color: var(--text-muted);
  font-size: .82rem;
  text-align: center;
}

/* ── COA Code Tag ────────────────────────────────────────── */
.coa-code {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: .7rem;
  background: var(--bg-raised);
  color: var(--text-muted);
  padding: .1rem .35rem;
  border-radius: 3px;
  margin-right: .5rem;
}

/* ── Balance Sheet Layout ────────────────────────────────── */
.bs-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
}
.bs-column {}
.bs-subcategory {
  font-size: .7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  padding: .5rem 0 .25rem;
}

/* ── Balance Check ───────────────────────────────────────── */
.balance-check {
  padding: .5rem 1.5rem;
  font-size: .78rem;
  font-weight: 500;
}
.balance-check.ok   { color: var(--green); }
.balance-check.warn { color: var(--red); }

/* ── BU Mini Bar ─────────────────────────────────────────── */
.bu-mini-bar  { height: 4px; background: var(--bg-raised); border-radius: 2px; overflow: hidden; margin-bottom: 2px; }
.bu-mini-fill { height: 100%; border-radius: 2px; }

/* ── Aging Group Header ──────────────────────────────────── */
.aging-group-header td {
  background: var(--bg-raised);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  padding: .4rem .75rem !important;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .reports-layout { grid-template-columns: 1fr; }
  .reports-sidebar { position: static; display: flex; flex-wrap: wrap; gap: .25rem; }
  .report-menu-item { font-size: .75rem; padding: .4rem .6rem; }
  .bs-layout { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════════════
   MASTER DATA MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Layout ──────────────────────────────────────────────── */
.masters-layout { display: flex; flex-direction: column; gap: 1rem; }

.masters-tabs {
  display: flex;
  gap: .35rem;
  flex-wrap: wrap;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .5rem;
}
.master-tab {
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .45rem .85rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
  user-select: none;
  white-space: nowrap;
}
.master-tab:hover  { background: var(--bg-hover); color: var(--text); }
.master-tab.active { background: var(--blue-dim); color: var(--blue); font-weight: 600; }

.masters-content {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

/* ── Master Header ───────────────────────────────────────── */
.master-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.master-title { font-size: .9rem; font-weight: 600; }

.master-filter-row {
  padding: .65rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
}

/* ── COA Grouped View ────────────────────────────────────── */
.coa-group { border-bottom: 1px solid var(--border); }
.coa-group:last-child { border-bottom: none; }
.coa-group-header {
  padding: .55rem 1.25rem;
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--blue);
  background: var(--bg-raised);
  display: flex;
  align-items: center;
  gap: .5rem;
}
.coa-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .55rem 1.25rem;
  border-bottom: 1px solid var(--border);
  font-size: .82rem;
}
.coa-row:last-child { border-bottom: none; }
.coa-row:hover { background: var(--bg-hover); }
.coa-row-code { font-family: "JetBrains Mono", monospace; font-size: .75rem; background: var(--bg-raised); color: var(--text-muted); padding: .15rem .4rem; border-radius: 3px; flex-shrink: 0; }
.coa-row-name { flex: 1; font-weight: 500; }
.coa-row-sub  { width: 130px; flex-shrink: 0; }
.coa-row-bal  { width: 60px; flex-shrink: 0; }

/* ── Counter Account Tag ─────────────────────────────────── */
.counter-acct-tag {
  display: inline-block;
  background: var(--purple-dim);
  color: var(--purple);
  font-size: .72rem;
  padding: .15rem .45rem;
  border-radius: 4px;
  font-weight: 500;
}
.text-faint { color: var(--text-faint); }

/* ══════════════════════════════════════════════════════════
   LIABILITY PAYMENT MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.lp-summary {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  gap: 1rem;
  margin-bottom: .75rem;
}
.lp-summary-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
}
.lp-summary-card.info { border-left: 3px solid var(--blue); }
.lp-summary-label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
.lp-summary-val   { font-family: "JetBrains Mono", monospace; font-size: 1.1rem; font-weight: 500; color: var(--red); }
.lp-summary-info  { font-size: .78rem; color: var(--text-muted); line-height: 1.6; }

.lp-accounting-box {
  background: var(--green-dim);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  padding: .85rem 1.1rem;
  margin-bottom: 1rem;
}
.lp-accounting-title { font-size: .78rem; font-weight: 600; color: var(--green); margin-bottom: .5rem; }
.lp-accounting-entry { display: flex; flex-direction: column; gap: .3rem; }
.entry-row { display: flex; align-items: center; gap: .6rem; font-size: .8rem; color: var(--text); }
.entry-dr  { font-weight: 700; color: var(--blue);   width: 50px; }
.entry-cr  { font-weight: 700; color: var(--red);    width: 50px; }

.lp-account-visual {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: center;
  margin-bottom: .5rem;
}
.lp-av-side  { display: flex; flex-direction: column; gap: .5rem; }
.lp-av-label { font-size: .72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.lp-av-arrow { text-align: center; font-size: 1.3rem; color: var(--red); line-height: 1; }
.lp-av-arrow small { display: block; font-size: .65rem; color: var(--text-muted); }

.lp-flow { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
.lp-account { font-size: .75rem; padding: .15rem .45rem; border-radius: 4px; }
.lp-account.liability { background: var(--red-dim);   color: var(--red); }
.lp-account.cash      { background: var(--blue-dim);  color: var(--blue); }
.lp-arrow { color: var(--text-muted); font-size: .85rem; }

@media (max-width: 700px) {
  .lp-summary      { grid-template-columns: 1fr; }
  .lp-account-visual { grid-template-columns: 1fr; }
  .lp-av-arrow     { transform: rotate(90deg); }
}

/* ══════════════════════════════════════════════════════════
   CASH FLOW REPORT STYLES
   ══════════════════════════════════════════════════════════ */

.cf-method-note {
  padding: .65rem 1rem;
  background: var(--bg-raised);
  border-radius: var(--radius);
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
.cf-subgroup {
  margin: .5rem 0 .75rem 1rem;
  border-left: 2px solid var(--border);
  padding-left: .85rem;
}
.cf-subgroup-label {
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);

  padding: .35rem 0;
  font-size: .78rem;

  border-top: 1px solid var(--border);
  margin-top: .25rem;

.compare-table { font-size: .8rem; }
.compare-table th { white-space: nowrap; }

/* Previous period column — slightly dimmed */
.cf-prev { opacity: .7; }

/* Sub-headers */
.compare-subhead td {
  background: var(--blue-dim);
  color: var(--blue);
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: .45rem .75rem !important;
}
.compare-subcathead td {
  background: var(--bg-raised);
  color: var(--text-muted);
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: .3rem .75rem .3rem 1.5rem !important;
}

/* Subtotal rows */
.compare-subtotal td {
  background: var(--bg-surface);
  border-top: 2px solid var(--border-light) !important;
  border-bottom: 2px solid var(--border-light) !important;
  padding: .55rem .75rem !important;
}

/* Net profit/loss row */
.compare-net td {
  padding: .75rem !important;
  font-size: .88rem;
}
.compare-net.net-positive td { background: var(--green-dim); color: var(--green); }
.compare-net.net-negative td { background: var(--red-dim);   color: var(--red); }

  border: 1px solid var(--border);

  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1.1rem;

  border-color: var(--green);
  color: var(--green);

.integrity-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1.1rem;
  background: var(--yellow-dim);
  border-bottom: 1px solid var(--border);
  color: var(--yellow);
  font-size: .82rem;

.integrity-label { font-weight: 600; }

.integrity-list { padding: .5rem; display: flex; flex-direction: column; gap: .35rem; }

.integrity-item {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .65rem .85rem;
  border-radius: var(--radius);
  font-size: .8rem;

.integrity-error   { background: var(--red-dim);    border-left: 3px solid var(--red); }

.integrity-item-icon  { font-size: 1rem; flex-shrink: 0; margin-top: .1rem; }
.integrity-item-label { font-weight: 600; color: var(--text); margin-bottom: .2rem; }
.integrity-item-detail { color: var(--text-muted); line-height: 1.5; font-size: .76rem; }
.integrity-item-ids   { color: var(--text-faint); font-size: .7rem; font-family: "JetBrains Mono", monospace; margin-top: .2rem; }

  border-bottom: 1px solid rgba(240,92,92,.2);

.bs-diag-list li { font-size: .78rem; color: var(--text-muted); margin-bottom: .25rem; line-height: 1.5; }
.bs-diag-list li strong { color: var(--red); }

.bs-diag-actions {
  display: flex;
  gap: .5rem;
  padding: .65rem 1rem;
  flex-wrap: wrap;

  margin-left: .5rem;

  border-radius: 3px;
  border: 1px solid var(--border);
  transition: color var(--transition), border-color var(--transition);
  user-select: none;
}
.dir-override-toggle:hover { color: var(--yellow); border-color: var(--yellow); }

.dir-warning {
  margin-top: .4rem;
  padding: .45rem .65rem;

  border: 1px solid var(--yellow);
  border-radius: var(--radius);
  font-size: .74rem;
  color: var(--text);

  opacity: 1;
  cursor: default;
  background: var(--bg-raised);

  border: 2px solid var(--blue);

  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;

const DB = (() => {

  const KEYS = {
    entities:          "fos_entities",
    business_units:    "fos_business_units",
    activities:        "fos_activities",
    coa:               "fos_coa",
    accounts:          "fos_accounts",
    counterparties:    "fos_counterparties",
    transaction_types: "fos_transaction_types",
    transactions:      "fos_transactions",
    receivables:       "fos_receivables",
    collections:       "fos_collections",
    payables:          "fos_payables",
    payments:          "fos_payments",
    treasury:          "fos_treasury",
    settings:          "fos_settings"
  };

  function _get(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  }
  function _set(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
  function _del(key, filterFn) {
    const list = _get(key);
    _set(key, list.filter(filterFn));
  }
  function _getObj(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) return {};
      return parsed || {};
    } catch { return {}; }
  }

  // ── Init ──────────────────────────────────────────────────
  function init() {
    if (_get(KEYS.entities).length === 0) {
      _set(KEYS.entities,          SEED_DATA.entities);
      _set(KEYS.business_units,    SEED_DATA.business_units);
      _set(KEYS.activities,        SEED_DATA.activities);
      _set(KEYS.coa,               SEED_DATA.coa);
      _set(KEYS.accounts,          SEED_DATA.accounts);
      _set(KEYS.counterparties,    SEED_DATA.counterparties);
      _set(KEYS.transaction_types, SEED_DATA.transaction_types);
    }
    if (!localStorage.getItem(KEYS.settings)) {
      localStorage.setItem(KEYS.settings, JSON.stringify({
        system_name: "Finance OS", base_currency: "IDR",
        fiscal_year_start: "01",
        go_live_date: new Date().toISOString().split("T")[0],
        default_entity: "ALL"
      }));
    }
  }

  // ── Settings ──────────────────────────────────────────────
  const Settings = {
    get: () => {
      try {
        const raw = localStorage.getItem(KEYS.settings);
        if (!raw) return { system_name:"Finance OS", base_currency:"IDR", go_live_date: new Date().toISOString().split("T")[0], default_entity:"ALL" };
        const p = JSON.parse(raw);
        return (p && !Array.isArray(p)) ? p : { system_name:"Finance OS", base_currency:"IDR", default_entity:"ALL" };
      } catch { return { system_name:"Finance OS", base_currency:"IDR", default_entity:"ALL" }; }
    },
    set: (data) => localStorage.setItem(KEYS.settings, JSON.stringify(data))
  };

  // ── Master: Entities ──────────────────────────────────────
  const Entities = {
    all:    () => _get(KEYS.entities),
    active: () => _get(KEYS.entities).filter(e => e.status === "Active"),
    byId:   (id) => _get(KEYS.entities).find(e => e.entity_id === id),
    save: (record) => {
      const list = _get(KEYS.entities);
      const idx = list.findIndex(e => e.entity_id === record.entity_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.entities, list);
    },
    delete: (id) => {
      // Safety: check if any BU, Account, or Transaction references this entity
      const hasBU   = _get(KEYS.business_units).some(b => b.entity_id === id);
      const hasAcct = _get(KEYS.accounts).some(a => a.entity_id === id);
      const hasTxn  = _get(KEYS.transactions).some(t => t.entity_id === id);
      if (hasBU || hasAcct || hasTxn) return { error: 'Entity tidak dapat dihapus karena masih digunakan oleh BU, Akun, atau Transaksi.' };
      _del(KEYS.entities, e => e.entity_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Business Units ────────────────────────────────
  const BU = {
    all:      () => _get(KEYS.business_units),
    active:   () => _get(KEYS.business_units).filter(b => b.status === "Active"),
    byEntity: (entity_id) => _get(KEYS.business_units).filter(b => b.entity_id === entity_id && b.status === "Active"),
    byId:     (id) => _get(KEYS.business_units).find(b => b.bu_id === id),
    save: (record) => {
      const list = _get(KEYS.business_units);
      const idx = list.findIndex(b => b.bu_id === record.bu_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.business_units, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.bu_id === id);
      const hasAct = _get(KEYS.activities).some(a => a.bu_id === id);
      if (hasTxn || hasAct) return { error: 'BU tidak dapat dihapus karena masih digunakan oleh Activity atau Transaksi.' };
      _del(KEYS.business_units, b => b.bu_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Activities ────────────────────────────────────
  const Activities = {
    all:   () => _get(KEYS.activities),
    byBU:  (bu_id) => _get(KEYS.activities).filter(a => a.bu_id === bu_id && a.status === "Active"),
    byId:  (id) => _get(KEYS.activities).find(a => a.activity_id === id),
    save: (record) => {
      const list = _get(KEYS.activities);
      const idx = list.findIndex(a => a.activity_id === record.activity_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.activities, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.activity_id === id);
      if (hasTxn) return { error: 'Activity tidak dapat dihapus karena masih digunakan oleh Transaksi.' };
      _del(KEYS.activities, a => a.activity_id !== id);
      return { ok: true };
    }
  };

  // ── Master: COA ───────────────────────────────────────────
  const COA = {
    all:        () => _get(KEYS.coa),
    active:     () => _get(KEYS.coa).filter(c => c.status === "Active"),
    byCode:     (code) => _get(KEYS.coa).find(c => c.coa_code === code),
    byCategory: (cat) => _get(KEYS.coa).filter(c => c.coa_category === cat && c.status === "Active"),
    save: (record) => {
      const list = _get(KEYS.coa);
      const idx = list.findIndex(c => c.coa_code === record.coa_code);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.coa, list);
    },
    delete: (code) => {
      const hasTxn  = _get(KEYS.transactions).some(t => t.coa_code === code);
      const hasAcct = _get(KEYS.accounts).some(a => a.coa_code === code);
      if (hasTxn || hasAcct) return { error: 'COA tidak dapat dihapus karena masih digunakan oleh Akun atau Transaksi.' };
      _del(KEYS.coa, c => c.coa_code !== code);
      return { ok: true };
    }
  };

  // ── Master: Accounts ──────────────────────────────────────
  const Accounts = {
    all:          () => _get(KEYS.accounts),
    active:       () => _get(KEYS.accounts).filter(a => a.status === "Active"),
    byEntity:     (entity_id) => _get(KEYS.accounts).filter(a => a.entity_id === entity_id && a.status === "Active"),
    byId:         (id) => _get(KEYS.accounts).find(a => a.account_id === id),
    cashAccounts: () => _get(KEYS.accounts).filter(a => ["Bank","E-Wallet","Platform"].includes(a.account_type) && a.status === "Active"),
    save: (record) => {
      const list = _get(KEYS.accounts);
      const idx = list.findIndex(a => a.account_id === record.account_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.accounts, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.account_id === id);
      const hasTry = _get(KEYS.treasury).some(t => t.account_id === id);
      if (hasTxn || hasTry) return { error: 'Akun tidak dapat dihapus karena masih digunakan oleh Transaksi atau Treasury.' };
      _del(KEYS.accounts, a => a.account_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Counterparties ────────────────────────────────
  const Counterparties = {
    all:    () => _get(KEYS.counterparties),
    active: () => _get(KEYS.counterparties).filter(c => c.status === "Active"),
    byId:   (id) => _get(KEYS.counterparties).find(c => c.cp_id === id),
    save: (record) => {
      const list = _get(KEYS.counterparties);
      const idx = list.findIndex(c => c.cp_id === record.cp_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.counterparties, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.cp_id === id);
      const hasRcv = _get(KEYS.receivables).some(r => r.cp_id === id);
      const hasPay = _get(KEYS.payables).some(p => p.cp_id === id);
      if (hasTxn || hasRcv || hasPay) return { error: 'Counterparty tidak dapat dihapus karena masih digunakan oleh Transaksi, Piutang, atau Utang.' };
      _del(KEYS.counterparties, c => c.cp_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Transaction Types ─────────────────────────────
  const TxnTypes = {
    all:  () => _get(KEYS.transaction_types),
    byId: (id) => _get(KEYS.transaction_types).find(t => t.type_id === id)
  };

  // ── T1: Transaction Ledger ────────────────────────────────
  const Transactions = {
    all:    () => _get(KEYS.transactions),
    posted: () => _get(KEYS.transactions).filter(t => t.status === "Posted"),
    byEntity: (entity_id) => _get(KEYS.transactions).filter(t => t.entity_id === entity_id && t.status === "Posted"),
    byPeriod: (period) => _get(KEYS.transactions).filter(t => t.period === period && t.status === "Posted"),
    byEntityPeriod: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => t.status === "Posted");
      if (entity_id !== "ALL") return txns.filter(t => t.entity_id === entity_id && t.period === period);
      return txns.filter(t => t.period === period);
    },
    byId:   (id) => _get(KEYS.transactions).find(t => t.txn_id === id),
    recent: (n = 10) => {
      const posted = _get(KEYS.transactions).filter(t => t.status === "Posted");
      return posted.sort((a,b) => b.txn_date.localeCompare(a.txn_date)).slice(0, n);
    },
    save: (record) => {
      const list = _get(KEYS.transactions);
      const idx = list.findIndex(t => t.txn_id === record.txn_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.transactions, list);
    },
    void: (txn_id, reason) => {
      const list = _get(KEYS.transactions);
      const idx = list.findIndex(t => t.txn_id === txn_id);
      if (idx >= 0) { list[idx].status = "Voided"; list[idx].void_reason = reason; }
      _set(KEYS.transactions, list);
    },
    delete: (txn_id) => {
      const t = _get(KEYS.transactions).find(x => x.txn_id === txn_id);
      if (!t) return { error: 'Transaksi tidak ditemukan.' };
      if (t.status === 'Posted') return { error: 'Transaksi Posted tidak dapat dihapus. Gunakan Void terlebih dahulu.' };
      _del(KEYS.transactions, x => x.txn_id !== txn_id);
      return { ok: true };
    }
  };

  // ── T2: Receivable Headers ────────────────────────────────
  const Receivables = {
    all:  () => _get(KEYS.receivables),
    open: () => _get(KEYS.receivables).filter(r => ["Open","Partial","Overdue"].includes(r.status)),
    byId: (id) => _get(KEYS.receivables).find(r => r.rcv_id === id),
    save: (record) => {
      const list = _get(KEYS.receivables);
      const idx = list.findIndex(r => r.rcv_id === record.rcv_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.receivables, list);
      _refreshReceivableStatus(record.rcv_id);
    },
    delete: (rcv_id) => {
      const hasCols = _get(KEYS.collections).some(c => c.rcv_id === rcv_id);
      if (hasCols) return { error: 'Piutang tidak dapat dihapus karena sudah ada pembayaran yang tercatat. Gunakan Write Off.' };
      _del(KEYS.receivables, r => r.rcv_id !== rcv_id);
      // Also remove linked ledger entries
      _del(KEYS.transactions, t => t.reference_id !== rcv_id);
      return { ok: true };
    },
    computeOutstanding: (rcv_id) => {
      const rcv = _get(KEYS.receivables).find(r => r.rcv_id === rcv_id);
      if (!rcv) return 0;
      const cols = _get(KEYS.collections).filter(c => c.rcv_id === rcv_id);
      return rcv.original_amount - cols.reduce((s, c) => s + c.amount, 0);
    }
  };

  function _refreshReceivableStatus(rcv_id) {
    const list = _get(KEYS.receivables);
    const idx = list.findIndex(r => r.rcv_id === rcv_id);
    if (idx < 0) return;
    const cols = _get(KEYS.collections).filter(c => c.rcv_id === rcv_id);
    const collected = cols.reduce((s, c) => s + c.amount, 0);
    list[idx].collected_amount = collected;
    list[idx].outstanding_balance = list[idx].original_amount - collected;
    const today = new Date().toISOString().split("T")[0];
    if (collected >= list[idx].original_amount) list[idx].status = "Closed";
    else if (collected > 0) list[idx].status = list[idx].due_date < today ? "Overdue" : "Partial";
    else list[idx].status = list[idx].due_date < today ? "Overdue" : "Open";
    _set(KEYS.receivables, list);
  }

  // ── T3: Collections ───────────────────────────────────────
  const Collections = {
    all:           () => _get(KEYS.collections),
    byReceivable:  (rcv_id) => _get(KEYS.collections).filter(c => c.rcv_id === rcv_id),
    save: (record) => {
      const list = _get(KEYS.collections);
      list.push(record);
      _set(KEYS.collections, list);
      _refreshReceivableStatus(record.rcv_id);
    },
    delete: (col_id) => {
      const col = _get(KEYS.collections).find(c => c.col_id === col_id);
      if (!col) return { error: 'Collection tidak ditemukan.' };
      _del(KEYS.collections, c => c.col_id !== col_id);
      // Remove linked ledger entry
      if (col.txn_id) _del(KEYS.transactions, t => t.txn_id !== col.txn_id);
      _refreshReceivableStatus(col.rcv_id);
      return { ok: true };
    }
  };

  // ── T4: Payable Headers ───────────────────────────────────
  const Payables = {
    all:  () => _get(KEYS.payables),
    open: () => _get(KEYS.payables).filter(p => ["Open","Partial","Overdue"].includes(p.status)),
    byId: (id) => _get(KEYS.payables).find(p => p.pay_id === id),
    save: (record) => {
      const list = _get(KEYS.payables);
      const idx = list.findIndex(p => p.pay_id === record.pay_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.payables, list);
      _refreshPayableStatus(record.pay_id);
    },
    delete: (pay_id) => {
      const hasPmts = _get(KEYS.payments).some(p => p.pay_id === pay_id);
      if (hasPmts) return { error: 'Utang tidak dapat dihapus karena sudah ada pembayaran yang tercatat.' };
      _del(KEYS.payables, p => p.pay_id !== pay_id);
      _del(KEYS.transactions, t => t.reference_id !== pay_id);
      return { ok: true };
    }
  };

  function _refreshPayableStatus(pay_id) {
    const list = _get(KEYS.payables);
    const idx = list.findIndex(p => p.pay_id === pay_id);
    if (idx < 0) return;
    const pmts = _get(KEYS.payments).filter(p => p.pay_id === pay_id);
    const paid = pmts.reduce((s, p) => s + p.amount, 0);
    list[idx].paid_amount = paid;
    list[idx].outstanding_balance = list[idx].original_amount - paid;
    const today = new Date().toISOString().split("T")[0];
    if (paid >= list[idx].original_amount) list[idx].status = "Closed";
    else if (paid > 0) list[idx].status = list[idx].due_date < today ? "Overdue" : "Partial";
    else list[idx].status = list[idx].due_date < today ? "Overdue" : "Open";
    _set(KEYS.payables, list);
  }

  // ── T5: Payments ──────────────────────────────────────────
  const Payments = {
    all:       () => _get(KEYS.payments),
    byPayable: (pay_id) => _get(KEYS.payments).filter(p => p.pay_id === pay_id),
    save: (record) => {
      const list = _get(KEYS.payments);
      list.push(record);
      _set(KEYS.payments, list);
      _refreshPayableStatus(record.pay_id);
    },
    delete: (pmt_id) => {
      const pmt = _get(KEYS.payments).find(p => p.pmt_id === pmt_id);
      if (!pmt) return { error: 'Payment tidak ditemukan.' };
      _del(KEYS.payments, p => p.pmt_id !== pmt_id);
      if (pmt.txn_id) _del(KEYS.transactions, t => t.txn_id !== pmt.txn_id);
      _refreshPayableStatus(pmt.pay_id);
      return { ok: true };
    }
  };

  // ── T6: Treasury ──────────────────────────────────────────
  const Treasury = {
    all:   () => _get(KEYS.treasury),
    byRef: (ref) => _get(KEYS.treasury).filter(t => t.try_ref === ref),
    save: (record) => {
      const list = _get(KEYS.treasury);
      list.push(record);
      _set(KEYS.treasury, list);
    },
    delete: (try_ref) => {
      const legs = _get(KEYS.treasury).filter(l => l.try_ref === try_ref);
      if (legs.length === 0) return { error: 'Treasury movement tidak ditemukan.' };
      // Remove both legs and linked transactions
      _del(KEYS.treasury, l => l.try_ref !== try_ref);
      legs.forEach(function(l){ if (l.txn_id) _del(KEYS.transactions, t => t.txn_id !== l.txn_id); });
      // Also remove intercompany entries linked to this ref
      _del(KEYS.transactions, t => t.reference_id !== try_ref);
      return { ok: true };
    }
  };

  // ── Reporting Queries ─────────────────────────────────────
  const Reports = {
    cashPosition: (entity_id) => {
      const cashAccts = Accounts.cashAccounts().filter(a => entity_id === "ALL" || a.entity_id === entity_id);
      const txns = _get(KEYS.transactions).filter(t => t.status === "Posted");
      let total = cashAccts.reduce((s, a) => s + (a.opening_balance || 0), 0);
      txns.forEach(t => {
        const acct = cashAccts.find(a => a.account_id === t.account_id);
        if (!acct) return;
        const coa = COA.byCode(t.coa_code);
        if (!coa || coa.coa_category !== "Asset") return;
        total += t.direction === "Debit" ? t.amount : -t.amount;
      });
      return total;
    },
    pl: (entity_id, period) => {
      const txns = entity_id === "ALL"
        ? _get(KEYS.transactions).filter(t => t.status === "Posted" && t.period === period)
        : _get(KEYS.transactions).filter(t => t.status === "Posted" && t.entity_id === entity_id && t.period === period);
      let revenue = 0, expense = 0;
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!coa) return;
        if (coa.coa_category === "Revenue") revenue += t.direction === "Credit" ? t.amount : -t.amount;
        if (coa.coa_category === "Expense") expense += t.direction === "Debit"  ? t.amount : -t.amount;
      });
      return { revenue, expense, net: revenue - expense };
    },
    plDetail: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => {
        if (t.status !== "Posted" || t.period !== period) return false;
        if (entity_id !== "ALL" && t.entity_id !== entity_id) return false;
        const coa = COA.byCode(t.coa_code);
        return coa && (coa.coa_category === "Revenue" || coa.coa_category === "Expense");
      });
      const grouped = {};
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!grouped[t.coa_code]) grouped[t.coa_code] = { coa_code: t.coa_code, coa_name: coa.coa_name, category: coa.coa_category, total: 0 };
        grouped[t.coa_code].total += t.direction === "Debit" ? t.amount : -t.amount;
        if (coa.coa_category === "Revenue") grouped[t.coa_code].total = Math.abs(grouped[t.coa_code].total);
      });
      return Object.values(grouped);
    },
    buProfitability: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => {
        if (t.status !== "Posted" || t.period !== period) return false;
        if (entity_id !== "ALL" && t.entity_id !== entity_id) return false;
        const coa = COA.byCode(t.coa_code);
        return coa && (coa.coa_category === "Revenue" || coa.coa_category === "Expense");
      });
      const grouped = {};
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!grouped[t.bu_id]) grouped[t.bu_id] = { bu_id: t.bu_id, revenue: 0, expense: 0 };
        if (coa.coa_category === "Revenue") grouped[t.bu_id].revenue += t.amount;
        else grouped[t.bu_id].expense += t.amount;
      });
      return Object.values(grouped).map(b => ({ ...b, net: b.revenue - b.expense, bu_name: BU.byId(b.bu_id)?.bu_name || b.bu_id }));
    },
    arAging: (entity_id) => {
      const today = new Date();
      const rcvs  = _get(KEYS.receivables).filter(r => ["Open","Partial","Overdue"].includes(r.status) && (entity_id === "ALL" || r.entity_id === entity_id));
      const buckets = { current:0, d1_30:0, d31_60:0, d61_90:0, d90plus:0 };
      rcvs.forEach(r => {
        const days = Math.floor((today - new Date(r.due_date)) / 86400000);
        const bal  = r.outstanding_balance;
        if (days<=0) buckets.current+=bal; else if (days<=30) buckets.d1_30+=bal;
        else if (days<=60) buckets.d31_60+=bal; else if (days<=90) buckets.d61_90+=bal;
        else buckets.d90plus+=bal;
      });
      return buckets;
    },
    apAging: (entity_id) => {
      const today = new Date();
      const pays  = _get(KEYS.payables).filter(p => ["Open","Partial","Overdue"].includes(p.status) && (entity_id === "ALL" || p.entity_id === entity_id));
      const buckets = { current:0, d1_30:0, d31_60:0, d61_90:0, d90plus:0 };
      pays.forEach(p => {
        const days = Math.floor((today - new Date(p.due_date)) / 86400000);
        const bal  = p.outstanding_balance;
        if (days<=0) buckets.current+=bal; else if (days<=30) buckets.d1_30+=bal;
        else if (days<=60) buckets.d31_60+=bal; else if (days<=90) buckets.d61_90+=bal;
        else buckets.d90plus+=bal;
      });
      return buckets;
    },
    balanceSheet: (entity_id) => {
      const txns = _get(KEYS.transactions).filter(t => t.status === "Posted" && (entity_id === "ALL" || t.entity_id === entity_id));
      const balances = {};
      txns.forEach(t => {
        if (!balances[t.coa_code]) balances[t.coa_code] = 0;
        balances[t.coa_code] += t.direction === "Debit" ? t.amount : -t.amount;
      });
      return COA.all().filter(c => ["Asset","Liability","Equity"].includes(c.coa_category))
        .map(c => ({ ...c, balance: balances[c.coa_code] || 0 }));
    }
  };

  // ── Export / Import ───────────────────────────────────────
  const DataIO = {
    exportAll: () => {
      const data = {};
      Object.entries(KEYS).forEach(([k, v]) => { data[k] = JSON.parse(localStorage.getItem(v) || "[]"); });
      return JSON.stringify(data, null, 2);
    },
    importAll: (jsonStr) => {
      const data = JSON.parse(jsonStr);
      Object.entries(KEYS).forEach(([k, v]) => { if (data[k]) localStorage.setItem(v, JSON.stringify(data[k])); });
    }
  };

  return { init, Settings, Entities, BU, Activities, COA, Accounts, Counterparties, TxnTypes, Transactions, Receivables, Collections, Payables, Payments, Treasury, Reports, DataIO };

})();

// FINANCE OS — UTILITIES (utils.js)
// ============================================================

const Utils = (() => {

  // ── Currency Formatting ───────────────────────────────────
  function formatIDR(amount) {
    if (isNaN(amount)) return "Rp 0";
    return "Rp " + Math.abs(amount).toLocaleString("id-ID");
  }

  function formatIDRCompact(amount) {
    const abs = Math.abs(amount);
    if (abs >= 1_000_000_000) return "Rp " + (abs / 1_000_000_000).toFixed(1) + "M";
    if (abs >= 1_000_000)     return "Rp " + (abs / 1_000_000).toFixed(1) + "jt";
    if (abs >= 1_000)         return "Rp " + (abs / 1_000).toFixed(0) + "rb";
    return "Rp " + abs;
  }

  // ── Date Utilities ────────────────────────────────────────
  function today() {
    return new Date().toISOString().split("T")[0];
  }

  function currentPeriod() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
  }

  function toPeriod(dateStr) {
    if (!dateStr) return currentPeriod();
    return dateStr.substring(0, 7);
  }

  function formatDate(dateStr) {
    if (!dateStr) return "—";
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
  }

  function periodLabel(period) {
    if (!period) return "—";
    const [y, m] = period.split("-");
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    return `${months[parseInt(m) - 1]} ${y}`;
  }

  function agingDays(dueDateStr) {
    const due = new Date(dueDateStr);
    const today = new Date();
    return Math.floor((today - due) / 86400000);
  }

  function agingBucket(dueDateStr) {
    const days = agingDays(dueDateStr);
    if (days <= 0)  return "Current";
    if (days <= 30) return "1–30 hari";
    if (days <= 60) return "31–60 hari";
    if (days <= 90) return "61–90 hari";
    return ">90 hari";
  }

  // ── ID Generators ─────────────────────────────────────────
  function _datePart() {
    return today().replace(/-/g, "");
  }

  function _seq(list, prefix) {
    const todayStr = _datePart();
    const todayItems = list.filter(i => {
      const id = i.txn_id || i.rcv_id || i.pay_id || i.col_id || i.pmt_id || i.try_leg_id || "";
      return id.includes(todayStr);
    });
    return String(todayItems.length + 1).padStart(3, "0");
  }

  function newTxnId(txnDate) {
    const list = DB.Transactions.all();
    // Use txn_date for the date part, not today
    const datePart = txnDate ? txnDate.replace(/-/g, '') : _datePart();
    // Sequence based on same-date txns
    const sameDate = list.filter(function(i){
      return (i.txn_id || '').includes(datePart);
    });
    const seq = String(sameDate.length + 1).padStart(3, '0');
    return 'TXN-' + datePart + '-' + seq;
  }

  function newRcvId() {
    const list = DB.Receivables.all();
    const seq = String(list.length + 1).padStart(3, "0");
    return `RCV-${_datePart()}-${seq}`;
  }

  function newPayId() {
    const list = DB.Payables.all();
    const seq = String(list.length + 1).padStart(3, "0");
    return `PAY-${_datePart()}-${seq}`;
  }

  function newColId() {
    const list = DB.Collections.all();
    const seq = String(list.length + 1).padStart(3, "0");
    return `COL-${_datePart()}-${seq}`;
  }

  function newPmtId() {
    const list = DB.Payments.all();
    const seq = String(list.length + 1).padStart(3, "0");
    return `PMT-${_datePart()}-${seq}`;
  }

  function newTryRef() {
    const list = DB.Treasury.all();
    const seq = String(Math.floor(list.length / 2) + 1).padStart(3, "0");
    return `TRY-${_datePart()}-${seq}`;
  }

  function newEntityId() {
    const list = DB.Entities.all();
    return `E${String(list.length + 1).padStart(2, "0")}`;
  }

  function newBUId(entity_id) {
    const list = DB.BU.all().filter(b => b.entity_id === entity_id);
    return `BU-${entity_id}-${String(list.length + 1).padStart(2, "0")}`;
  }

  function newActivityId(bu_id) {
    const list = DB.Activities.all().filter(a => a.bu_id === bu_id);
    return `ACT-${bu_id}-${String(list.length + 1).padStart(2, "0")}`;
  }

  function newCpId() {
    const list = DB.Counterparties.all();
    return `CP-${String(list.length + 1).padStart(3, "0")}`;
  }

  function newAccountId() {
    const list = DB.Accounts.all();
    return `ACC-${String(list.length + 1).padStart(2, "0")}`;
  }

  // ── Validation ────────────────────────────────────────────
  function required(val, label) {
    if (!val || String(val).trim() === "") return `${label} wajib diisi`;
    return null;
  }

  function positiveNumber(val, label) {
    if (isNaN(val) || Number(val) <= 0) return `${label} harus lebih dari 0`;
    return null;
  }

  function validateTxn(form) {
    const errors = [];
    const checks = [
      required(form.entity_id,   "Entity"),
      required(form.bu_id,       "Business Unit"),
      required(form.account_id,  "Account"),
      required(form.coa_code,    "COA"),
      required(form.type_id,     "Transaction Type"),
      required(form.txn_date,    "Tanggal"),
      required(form.description, "Deskripsi"),
      required(form.direction,   "Direction"),
      positiveNumber(form.amount,"Jumlah")
    ];
    checks.forEach(e => { if (e) errors.push(e); });
    return errors;
  }

  // ── DOM Helpers ───────────────────────────────────────────
  function el(id) { return document.getElementById(id); }

  function statusBadge(status) {
    const map = {
      "Active":   "badge-green",
      "Inactive": "badge-gray",
      "Posted":   "badge-green",
      "Draft":    "badge-yellow",
      "Voided":   "badge-red",
      "Open":     "badge-blue",
      "Partial":  "badge-yellow",
      "Closed":   "badge-green",
      "Overdue":  "badge-red",
      "Written Off": "badge-gray"
    };
    return `<span class="badge ${map[status] || "badge-gray"}">${status}</span>`;
  }

  function directionBadge(dir) {
    return `<span class="badge ${dir === "Debit" ? "badge-blue" : "badge-purple"}">${dir}</span>`;
  }

  function emptyState(message, actionLabel, actionFn) {
    return `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <p>${message}</p>
      ${actionLabel ? `<button class="btn btn-primary" onclick="${actionFn}">${actionLabel}</button>` : ""}
    </div>`;
  }

  function toast(message, type = "success") {
    const t = document.createElement("div");
    t.className = `toast toast-${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.classList.add("toast-show"), 10);
    setTimeout(() => { t.classList.remove("toast-show"); setTimeout(() => t.remove(), 300); }, 3000);
  }

  function confirm(message, onConfirm) {
    const modal = document.createElement("div");
    modal.className = "modal-overlay";
    modal.innerHTML = `
      <div class="modal">
        <p class="modal-message">${message}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Batal</button>
          <button class="btn btn-danger" id="modal-confirm">Konfirmasi</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector("#modal-cancel").onclick = () => modal.remove();
    modal.querySelector("#modal-confirm").onclick = () => { onConfirm(); modal.remove(); };
  }

  // ── CSV Export ────────────────────────────────────────────
  function exportCSV(headers, rows, filename) {
    const csv = [headers.join(","), ...rows.map(r => r.map(v => `"${v ?? ""}"`).join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }

  // ── Period List (last 12 months) ──────────────────────────
  function last12Periods() {
    const periods = [];
    const d = new Date();
    for (let i = 0; i < 12; i++) {
      periods.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
      d.setMonth(d.getMonth() - 1);
    }
    return periods;
  }

  return {
    formatIDR, formatIDRCompact, today, currentPeriod, toPeriod, formatDate,
    periodLabel, agingDays, agingBucket,
    newTxnId, newRcvId, newPayId, newColId, newPmtId, newTryRef,
    newEntityId, newBUId, newActivityId, newCpId, newAccountId,
    required, positiveNumber, validateTxn,
    el, statusBadge, directionBadge, emptyState, toast, confirm, exportCSV, last12Periods
  };

})();
