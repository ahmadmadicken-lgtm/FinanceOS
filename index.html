  // ── Reporting Queries ─────────────────────────────────────
  const Reports = {
    cashPosition: (entity_id) => {
      var cashAccts = Accounts.cashAccounts().filter(function(a){
        return entity_id === "ALL" || a.entity_id === entity_id;
      });
      var txns = _get(KEYS.transactions).filter(function(t){ return t.status === "Posted"; });

      // Start from account opening_balance (legacy) OR from COA opening balance
      var total = 0;

      // Cash COA codes
      var cashCOAs = ['101','102','103'];

      cashCOAs.forEach(function(coaCode) {
        var entities = entity_id === "ALL"
          ? _get(KEYS.entities).map(function(e){ return e.entity_id; })
          : [entity_id];

        entities.forEach(function(eid) {
          var ob = _get(KEYS.coa_balances).find(function(b){
            return b.entity_id === eid && b.coa_code === coaCode;
          });
          if (ob) {
            // Use COA opening balance + transactions on/after as_of_date
            total += ob.balance;
            txns.filter(function(t){
              return t.entity_id === eid &&
                t.coa_code === coaCode &&
                t.txn_date >= ob.as_of_date &&
                cashAccts.find(function(a){ return a.account_id === t.account_id; });
            }).forEach(function(t){
              total += t.direction === "Debit" ? t.amount : -t.amount;
            });
          }
        });
      });

      // Fallback: if no COA opening balances, use legacy account opening_balance
      var hasAnyOB = _get(KEYS.coa_balances).some(function(b){
        return entity_id === "ALL" || b.entity_id === entity_id;
      });
      if (!hasAnyOB) {
        total = cashAccts.reduce(function(s,a){ return s + (a.opening_balance || 0); }, 0);
        txns.forEach(function(t) {
          var acct = cashAccts.find(function(a){ return a.account_id === t.account_id; });
          if (!acct) return;
          var coa = COA.byCode(t.coa_code);
          if (!coa || coa.coa_category !== "Asset") return;
          total += t.direction === "Debit" ? t.amount : -t.amount;
        });
      }

      return total;
    },
    pl: (entity_id, period) => {
      const txns = entity_id === "ALL"
        ? _get(KEYS.transactions).filter(t => t.status === "Posted" && t.period === period)
        : _get(KEYS.transactions).filter(t => t.status === "Posted" && t.entity_id === entity_id && t.period === period);
      let revenue = 0, expense = 0;
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!coa) return;
        if (coa.coa_category === "Revenue") revenue += t.direction === "Credit" ? t.amount : -t.amount;
        if (coa.coa_category === "Expense") expense += t.direction === "Debit"  ? t.amount : -t.amount;
      });
      return { revenue, expense, net: revenue - expense };
    },
    plDetail: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => {
        if (t.status !== "Posted" || t.period !== period) return false;
        if (entity_id !== "ALL" && t.entity_id !== entity_id) return false;
        const coa = COA.byCode(t.coa_code);
        return coa && (coa.coa_category === "Revenue" || coa.coa_category === "Expense");
      });
      const grouped = {};
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!grouped[t.coa_code]) grouped[t.coa_code] = { coa_code: t.coa_code, coa_name: coa.coa_name, category: coa.coa_category, total: 0 };
        grouped[t.coa_code].total += t.direction === "Debit" ? t.amount : -t.amount;
        if (coa.coa_category === "Revenue") grouped[t.coa_code].total = Math.abs(grouped[t.coa_code].total);
      });
      return Object.values(grouped);
    },
    buProfitability: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => {
        if (t.status !== "Posted" || t.period !== period) return false;
        if (entity_id !== "ALL" && t.entity_id !== entity_id) return false;
        const coa = COA.byCode(t.coa_code);
        return coa && (coa.coa_category === "Revenue" || coa.coa_category === "Expense");
      });
      const grouped = {};
      txns.forEach(t => {
        const coa = COA.byCode(t.coa_code);
        if (!grouped[t.bu_id]) grouped[t.bu_id] = { bu_id: t.bu_id, revenue: 0, expense: 0 };
        if (coa.coa_category === "Revenue") grouped[t.bu_id].revenue += t.amount;
        else grouped[t.bu_id].expense += t.amount;
      });
      return Object.values(grouped).map(b => ({ ...b, net: b.revenue - b.expense, bu_name: BU.byId(b.bu_id)?.bu_name || b.bu_id }));
    },
    arAging: (entity_id) => {
      const today = new Date();
      const rcvs  = _get(KEYS.receivables).filter(r => ["Open","Partial","Overdue"].includes(r.status) && (entity_id === "ALL" || r.entity_id === entity_id));
      const buckets = { current:0, d1_30:0, d31_60:0, d61_90:0, d90plus:0 };
      rcvs.forEach(r => {
        const days = Math.floor((today - new Date(r.due_date)) / 86400000);
        const bal  = r.outstanding_balance;
        if (days<=0) buckets.current+=bal; else if (days<=30) buckets.d1_30+=bal;
        else if (days<=60) buckets.d31_60+=bal; else if (days<=90) buckets.d61_90+=bal;
        else buckets.d90plus+=bal;
      });
      return buckets;
    },
    apAging: (entity_id) => {
      const today = new Date();
      const pays  = _get(KEYS.payables).filter(p => ["Open","Partial","Overdue"].includes(p.status) && (entity_id === "ALL" || p.entity_id === entity_id));
      const buckets = { current:0, d1_30:0, d31_60:0, d61_90:0, d90plus:0 };
      pays.forEach(p => {
        const days = Math.floor((today - new Date(p.due_date)) / 86400000);
        const bal  = p.outstanding_balance;
        if (days<=0) buckets.current+=bal; else if (days<=30) buckets.d1_30+=bal;
        else if (days<=60) buckets.d31_60+=bal; else if (days<=90) buckets.d61_90+=bal;
        else buckets.d90plus+=bal;
      });
      return buckets;
    },
    balanceSheet: (entity_id) => {
      var allTxns = _get(KEYS.transactions).filter(function(t){
        return t.status === "Posted" && (entity_id === "ALL" || t.entity_id === entity_id);
      });

      // Get all entities in scope
      var entities = entity_id === "ALL"
        ? _get(KEYS.entities).map(function(e){ return e.entity_id; })
        : [entity_id];

      var balances = {};

      entities.forEach(function(eid) {
        // Get opening balances for this entity
        var obs = _get(KEYS.coa_balances).filter(function(b){ return b.entity_id === eid; });
        var obMap = {};
        obs.forEach(function(ob){ obMap[ob.coa_code] = ob; });

        // For each COA with an opening balance, start from OB + transactions >= as_of_date
        obs.forEach(function(ob) {
          if (!balances[ob.coa_code]) balances[ob.coa_code] = 0;
          balances[ob.coa_code] += ob.balance;
        });

        // Add transactions
        allTxns.filter(function(t){ return t.entity_id === eid; }).forEach(function(t) {
          // If there's an OB for this COA, only count transactions on/after as_of_date
          var ob = obMap[t.coa_code];
          if (ob && t.txn_date < ob.as_of_date) return; // skip pre-OB transactions

          if (!balances[t.coa_code]) balances[t.coa_code] = 0;
          balances[t.coa_code] += t.direction === "Debit" ? t.amount : -t.amount;
        });
      });

      return COA.all().filter(function(c){ return ["Asset","Liability","Equity"].includes(c.coa_category); })
        .map(function(c){ return Object.assign({}, c, { balance: balances[c.coa_code] || 0 }); });
    }
  };

  // ══════════════════════════════════════════════════════════
  // DEBT REGISTER
  // ══════════════════════════════════════════════════════════
  const DebtRegister = {
    all:      () => _get(KEYS.debt_register),
    active:   () => _get(KEYS.debt_register).filter(function(d){ return d.status === 'Active' || d.status === 'Overdue'; }),
    byId:     (id) => _get(KEYS.debt_register).find(function(d){ return d.debt_id === id; }),
    byAccount:(account_id) => _get(KEYS.debt_register).filter(function(d){ return d.account_id === account_id; }),
    byEntity: (entity_id) => _get(KEYS.debt_register).filter(function(d){ return d.entity_id === entity_id; }),

    save: function(debt) {
      var list = _get(KEYS.debt_register);
      var idx  = list.findIndex(function(d){ return d.debt_id === debt.debt_id; });
      if (idx >= 0) list[idx] = debt; else list.push(debt);
      _set(KEYS.debt_register, list);
    },

    delete: function(debt_id) {
      // Only allow if no payments recorded
      var hasPmt = _get(KEYS.debt_payments).some(function(p){ return p.debt_id === debt_id; });
      if (hasPmt) return { error: 'Tidak bisa hapus — sudah ada pembayaran tercatat.' };
      _del(KEYS.debt_register, function(d){ return d.debt_id !== debt_id; });
      // Also delete schedule
      var schedules = _get(KEYS.debt_schedule).filter(function(s){ return s.debt_id !== debt_id; });
      _set(KEYS.debt_schedule, schedules);
      return { ok: true };
    },

    // Recalculate outstanding from payments
    recalcOutstanding: function(debt_id) {
      var debt = DebtRegister.byId(debt_id);
      if (!debt) return;
      var pmts = _get(KEYS.debt_payments).filter(function(p){ return p.debt_id === debt_id; });
      var totalPrincipalPaid = pmts.reduce(function(s, p){ return s + (p.allocated_principal || 0); }, 0);
      debt.outstanding_principal = debt.original_amount - totalPrincipalPaid;
      // Update available credit for revolving
      if (debt.credit_limit && debt.credit_limit_type === 'Full_Revolving') {
        debt.available_credit = debt.credit_limit - debt.outstanding_principal;
      } else if (debt.credit_limit && debt.credit_limit_type === 'Principal_Only') {
        debt.available_credit = debt.credit_limit - debt.outstanding_principal;
      }
      // Update next due date from schedule
      var upcoming = _get(KEYS.debt_schedule)
        .filter(function(s){ return s.debt_id === debt_id && (s.status === 'Scheduled' || s.status === 'Overdue'); })
        .sort(function(a, b){ return a.due_date.localeCompare(b.due_date); });
      if (upcoming.length > 0) debt.next_due_date = upcoming[0].due_date;
      else if (debt.outstanding_principal <= 0) debt.status = 'Settled';
      DebtRegister.save(debt);
    },

    // Update available credit when CC payment detected from Transactions module
    updateAvailableCredit: function(account_id, payment_amount, is_full_revolving) {
      var debts = DebtRegister.byAccount(account_id).filter(function(d){
        return d.status === 'Active' && d.credit_limit;
      });
      debts.forEach(function(debt) {
        if (debt.credit_limit_type === 'Full_Revolving') {
          debt.available_credit = Math.min(debt.credit_limit, (debt.available_credit || 0) + payment_amount);
        }
        DebtRegister.save(debt);
      });
    },

    // Summary for dashboard
    summary: function(entity_id) {
      var list = entity_id && entity_id !== 'ALL'
        ? DebtRegister.byEntity(entity_id)
        : DebtRegister.all();
      var active = list.filter(function(d){ return ['Active','Overdue'].includes(d.status); });
      return {
        total_outstanding:   active.reduce(function(s,d){ return s + (d.outstanding_principal || 0); }, 0),
        total_credit_limit:  active.reduce(function(s,d){ return s + (d.credit_limit || 0); }, 0),
        total_available:     active.reduce(function(s,d){ return s + (d.available_credit || 0); }, 0),
        count_active:        active.length,
        count_overdue:       active.filter(function(d){ return d.status === 'Overdue'; }).length
      };
    }
  };

  // ══════════════════════════════════════════════════════════
  // DEBT SCHEDULE
  // ══════════════════════════════════════════════════════════
  const DebtSchedule = {
    all:        () => _get(KEYS.debt_schedule),
    byDebt:     (debt_id) => _get(KEYS.debt_schedule).filter(function(s){ return s.debt_id === debt_id; }),
    byId:       (id) => _get(KEYS.debt_schedule).find(function(s){ return s.schedule_id === id; }),

    // Upcoming due dates across all debts
    upcoming:   function(days) {
      var today  = new Date();
      var future = new Date();
      future.setDate(future.getDate() + (days || 30));
      var todayStr  = today.toISOString().split('T')[0];
      var futureStr = future.toISOString().split('T')[0];
      return _get(KEYS.debt_schedule)
        .filter(function(s){
          return s.status === 'Scheduled' &&
            s.due_date >= todayStr &&
            s.due_date <= futureStr;
        })
        .sort(function(a,b){ return a.due_date.localeCompare(b.due_date); });
    },

    // Overdue schedules
    overdue: function() {
      var today = new Date().toISOString().split('T')[0];
      return _get(KEYS.debt_schedule)
        .filter(function(s){ return s.status === 'Scheduled' && s.due_date < today; });
    },

    save: function(schedule) {
      var list = _get(KEYS.debt_schedule);
      var idx  = list.findIndex(function(s){ return s.schedule_id === schedule.schedule_id; });
      if (idx >= 0) list[idx] = schedule; else list.push(schedule);
      _set(KEYS.debt_schedule, list);
    },

    saveMany: function(schedules) {
      var list = _get(KEYS.debt_schedule);
      schedules.forEach(function(s) {
        var idx = list.findIndex(function(x){ return x.schedule_id === s.schedule_id; });
        if (idx >= 0) list[idx] = s; else list.push(s);
      });
      _set(KEYS.debt_schedule, list);
    },

    markPaid: function(schedule_id, payment_date, amount_paid, txn_id) {
      var list = _get(KEYS.debt_schedule);
      var idx  = list.findIndex(function(s){ return s.schedule_id === schedule_id; });
      if (idx >= 0) {
        list[idx].status       = 'Paid';
        list[idx].payment_date = payment_date;
        list[idx].amount_paid  = amount_paid;
        list[idx].txn_id       = txn_id || null;
      }
      _set(KEYS.debt_schedule, list);
    },

    // Generate schedule from debt record
    generate: function(debt) {
      var schedules = [];
      var outstanding = debt.outstanding_principal;
      var dueDate = new Date(debt.next_due_date);
      var n = debt.remaining_installments || debt.tenor_months || 1;
      var rate = (debt.interest_rate || 0) / 100 / 12;

      for (var i = 1; i <= n; i++) {
        var principal = 0, interest = 0, adminFee = 0;
        var schedId = 'SCH-' + debt.debt_id + '-' + String(i).padStart(3,'0');
        var dueDateStr = dueDate.toISOString().split('T')[0];

        if (debt.billing_method === 'Bundled_Unknown') {
          // Total cicilan = monthly_installment, tidak dipisah
          principal = debt.monthly_installment || 0;
          interest  = 0;
        } else if (debt.interest_type === 'Flat') {
          principal = Math.round((debt.original_amount || outstanding) / (debt.tenor_months || n));
          interest  = Math.round(outstanding * rate);
        } else if (debt.interest_type === 'Effective') {
          // Anuitas: PMT formula
          if (rate > 0) {
            var pmt   = outstanding * (rate * Math.pow(1+rate, n-i+1)) / (Math.pow(1+rate, n-i+1) - 1);
            interest  = Math.round(outstanding * rate);
            principal = Math.round(pmt - interest);
          } else {
            principal = Math.round(outstanding / (n - i + 1));
          }
        } else {
          // None / no interest
          principal = Math.round(outstanding / (n - i + 1));
        }

        // Admin fee only on first installment (if conversion)
        adminFee = (i === 1 && debt.is_conversion) ? (debt.admin_fee || 0) : 0;

        outstanding = Math.max(0, outstanding - principal);

        schedules.push({
          schedule_id:      schedId,
          debt_id:          debt.debt_id,
          installment_no:   i,
          due_date:         dueDateStr,
          principal:        principal,
          interest:         interest,
          admin_fee:        adminFee,
          penalty_fee:      0,
          total_installment: principal + interest + adminFee,
          status:           'Scheduled',
          payment_date:     null,
          amount_paid:      null,
          outstanding_after: outstanding,
          txn_id:           null
        });

        // Next month
        dueDate.setMonth(dueDate.getMonth() + 1);
      }
      return schedules;
    }
  };

    // Principal paid YTD

      var prefix = String(year || new Date().getFullYear());
      return _get(KEYS.debt_payments)
        .filter(function(p){ return p.payment_date && p.payment_date.startsWith(prefix); })
        .reduce(function(s, p){ return s + (p.allocated_principal || 0); }, 0);
    }
  };


  // ══════════════════════════════════════════════════════════
  // EVENT CATALOG (Sprint 1 Rule Engine)
  // ══════════════════════════════════════════════════════════
  const EventCatalog = {
    all:      function() { return _get(KEYS.event_catalog); },
    active:   function() { return _get(KEYS.event_catalog).filter(function(e){ return e.status === 'Active'; }); },
    byId:     function(id) { return _get(KEYS.event_catalog).find(function(e){ return e.event_id === id; }); },
    byDomain: function(domain) { return _get(KEYS.event_catalog).filter(function(e){ return e.domain === domain && e.status === 'Active'; }); },
    system:   function() { return _get(KEYS.event_catalog).filter(function(e){ return e.event_category === 'System' && e.status === 'Active'; }); },

    save: function(event) {
      var list = _get(KEYS.event_catalog);
      var idx  = list.findIndex(function(e){ return e.event_id === event.event_id; });
      if (idx >= 0) list[idx] = event; else list.push(event);
      _set(KEYS.event_catalog, list);
    },

    // ADR-007: Events are never deleted, only deactivated
    deactivate: function(event_id, replaced_by_id) {
      var list = _get(KEYS.event_catalog);
      var idx  = list.findIndex(function(e){ return e.event_id === event_id; });
      if (idx < 0) return { error: 'Event tidak ditemukan.' };
      // Check if system event — system events cannot be deactivated by user
      if (list[idx].event_category === 'System') return { error: 'System Event tidak dapat dinonaktifkan.' };
      list[idx].status = 'Inactive';
      list[idx].replaced_by_event_id = replaced_by_id || null;
      _set(KEYS.event_catalog, list);
      return { ok: true };
    },

    // Lookup rules for an event
    getRules: function(event_id) {
      return EventRules.active(event_id);
    }
  };

  // ══════════════════════════════════════════════════════════
  // EVENT RULES (Sprint 1 Rule Engine)
  // ══════════════════════════════════════════════════════════
  const EventRules = {
    all:    function() { return _get(KEYS.event_rules); },
    byId:   function(id) { return _get(KEYS.event_rules).find(function(r){ return r.rule_id === id; }); },
    byEvent:function(event_id) { return _get(KEYS.event_rules).filter(function(r){ return r.event_id === event_id; }); },

    // Get currently active rule for an event (respects effective_date)
    active: function(event_id) {
      var today = new Date().toISOString().split('T')[0];
      var rules = _get(KEYS.event_rules)
        .filter(function(r) {
          return r.event_id === event_id &&
            r.effective_date <= today &&
            (!r.expiry_date || r.expiry_date > today);
        })
        .sort(function(a, b) { return b.effective_date.localeCompare(a.effective_date); });
      return rules[0] || null;
    },

    save: function(rule) {
      var list = _get(KEYS.event_rules);
      var idx  = list.findIndex(function(r){ return r.rule_id === rule.rule_id; });
      if (idx >= 0) list[idx] = rule; else list.push(rule);
      _set(KEYS.event_rules, list);
    }
  };

  // ══════════════════════════════════════════════════════════
  // RULE ENGINE — Core derivation logic
  // ══════════════════════════════════════════════════════════
  const RuleEngine = {

    // Derive accounting treatment from a Business Event
    // Returns: { coa_code, direction, cf_class, validation_rules, snapshot }
    derive: function(event_id, context) {
      var event = EventCatalog.byId(event_id);
      if (!event) return { error: 'Business Event tidak ditemukan: ' + event_id };

      var rule = EventRules.active(event_id);
      if (!rule) return { error: 'Tidak ada rule aktif untuk event: ' + event.event_name };

      // Resolve COA — use account's COA if rule says 'from_account'
      var coa = rule.default_coa;
      if (coa === 'from_account' && context && context.account_id) {
        var acct = Accounts.byId(context.account_id);
        if (acct) coa = acct.coa_code;
      }

      // Snapshot of rules at transaction time (ADR-008)
      var snapshot = {
        event_id:       event_id,
        event_name:     event.event_name,
        rule_id:        rule.rule_id,
        effective_date: rule.effective_date,
        default_coa:    rule.default_coa,
        direction:      rule.direction,
        cf_class:       rule.cf_class,
        override_min:   rule.override_minimum_level
      };

      return {
        event_id:          event_id,
        event_name:        event.event_name,
        internal_type_id:  event.internal_type_id,
        coa_code:          coa,
        direction:         rule.direction,
        cf_class:          rule.cf_class,
        account_filter:    rule.account_type_filter || [],
        counterparty_req:  rule.counterparty_required || false,
        override_min:      rule.override_minimum_level || 1,
        validation:        rule.validation_rules || {},
        snapshot:          snapshot,
        error:             null
      };
    },

    // Validate a transaction against event rules
    // Returns: { valid: bool, errors: [], warnings: [], override_required: int }
    validate: function(event_id, formData) {
      var result = { valid: true, errors: [], warnings: [], override_required: 1 };
      var event  = EventCatalog.byId(event_id);
      var rule   = EventRules.active(event_id);
      if (!event || !rule) {
        result.valid = false;
        result.errors.push('Event atau Rule tidak ditemukan');
        return result;
      }

      var v = rule.validation_rules || {};

      // Amount validation
      if (!formData.amount || formData.amount <= 0) {
        result.errors.push('Jumlah harus lebih dari 0');
        result.valid = false;
      }
      if (v.max_amount && formData.amount > v.max_amount) {
        result.warnings.push('Jumlah melebihi batas wajar (' + Utils.formatIDR(v.max_amount) + '). Konfirmasi diperlukan.');
        result.override_required = Math.max(result.override_required, 2);
      }

      // Account type validation
      if (rule.account_type_filter && rule.account_type_filter.length > 0 && formData.account_id) {
        var acct = Accounts.byId(formData.account_id);
        if (acct && !rule.account_type_filter.includes(acct.account_type)) {
          result.warnings.push('Rekening yang dipilih (' + acct.account_type + ') tidak umum untuk event ini. Rekening yang disarankan: ' + rule.account_type_filter.join(', '));
          result.override_required = Math.max(result.override_required, 2);
        }
      }

      // Counterparty validation
      if (rule.counterparty_required && !formData.cp_id) {
        result.errors.push('Counterparty wajib diisi untuk event ini');
        result.valid = false;
      }

      // Date validation — no future date beyond 7 days
      if (formData.txn_date) {
        var txnDate = new Date(formData.txn_date);
        var today   = new Date();
        var diffDays = Math.floor((txnDate - today) / 86400000);
        if (diffDays > 7) {
          result.warnings.push('Tanggal lebih dari 7 hari ke depan. Pastikan ini benar.');
          result.override_required = Math.max(result.override_required, 2);
        }
        // Forced override for very old backdated data (> 2 years)
        if (diffDays < -730) {
          result.warnings.push('Transaksi lebih dari 2 tahun yang lalu. Gunakan Forced Override untuk migrasi data historis.');
          result.override_required = Math.max(result.override_required, 3);
        }
      }

      return result;
    },

    // Get cf_class best-effort for legacy transactions (ADR-005)
    legacyCfClass: function(type_id) {
      var map = {
        'TXN-01': 'Operating',   // Revenue
        'TXN-02': 'Operating',   // Expense
        'TXN-03': 'Operating',   // Receivable
        'TXN-04': 'Operating',   // Payable
        'TXN-05': 'Operating',   // CEO Advance
        'TXN-06': 'Treasury',    // Internal Transfer
        'TXN-07': 'Financing',   // Equity Movement
        'TXN-08': 'Financing',   // Liability Payment
        'TXN-09': 'Operating'    // CC Transaction
      };
      return map[type_id] || 'Operating';
    }
  };


  // ══════════════════════════════════════════════════════════
  // COA BALANCES — Opening Balance per COA per Entity
  // Sprint 2
  // ══════════════════════════════════════════════════════════
  const COABalances = {
    all:       function() { return _get(KEYS.coa_balances); },
    byEntity:  function(entity_id) {
      return _get(KEYS.coa_balances).filter(function(b){ return b.entity_id === entity_id; });
    },
    byCOA:     function(entity_id, coa_code) {
      return _get(KEYS.coa_balances).find(function(b){
        return b.entity_id === entity_id && b.coa_code === coa_code;
      });
    },
    byId:      function(ob_id) {
      return _get(KEYS.coa_balances).find(function(b){ return b.ob_id === ob_id; });
    },

    save: function(ob) {
      var list = _get(KEYS.coa_balances);
      var idx  = list.findIndex(function(b){ return b.ob_id === ob.ob_id; });
      if (idx >= 0) list[idx] = ob; else list.push(ob);
      _set(KEYS.coa_balances, list);
    },

    delete: function(ob_id) {
      _del(KEYS.coa_balances, function(b){ return b.ob_id !== ob_id; });
      return { ok: true };
    },

    // Get opening balance value for a COA+Entity
    // Returns { balance, as_of_date } or null
    get: function(entity_id, coa_code) {
      var ob = COABalances.byCOA(entity_id, coa_code);
      if (!ob) return null;
      return { balance: ob.balance, as_of_date: ob.as_of_date };
    },

    // Get the earliest as_of_date across all OBs for an entity
    // Used as the "start of system" date
    goLiveDate: function(entity_id) {
      var obs = COABalances.byEntity(entity_id);
      if (obs.length === 0) return null;
      return obs.reduce(function(min, ob){
        return ob.as_of_date < min ? ob.as_of_date : min;
      }, obs[0].as_of_date);
    }
  };


  // ══════════════════════════════════════════════════════════
  // OPERATIONAL CLASSIFICATION (Sprint 5)
  // Optional management metadata per transaction
  // ══════════════════════════════════════════════════════════
  const OpClasses = {
    all:       function() { return _get(KEYS.op_classes); },
    active:    function() { return _get(KEYS.op_classes).filter(function(c){ return c.status === 'Active'; }); },
    byId:      function(id) { return _get(KEYS.op_classes).find(function(c){ return c.class_id === id; }); },
    byDomain:  function(domain) {
      return _get(KEYS.op_classes).filter(function(c){ return c.domain === domain && c.status === 'Active'; });
    },
    forEvent:  function(event_id) {
      var evt = EventCatalog.byId(event_id);
      if (!evt) return _get(KEYS.op_classes).filter(function(c){ return c.status === 'Active'; });
      return _get(KEYS.op_classes).filter(function(c){
        return c.status === 'Active' && (c.domain === evt.domain || !c.domain);
      });
    },
    save: function(cls) {
      var list = _get(KEYS.op_classes);
      var idx  = list.findIndex(function(c){ return c.class_id === cls.class_id; });
      if (idx >= 0) list[idx] = cls; else list.push(cls);
      _set(KEYS.op_classes, list);
    },
    delete: function(class_id) {
      // Check if used in transactions
      var inUse = _get(KEYS.transactions).some(function(t){ return t.op_classification === class_id; });
      if (inUse) return { error: 'Tidak bisa hapus — sudah digunakan di transaksi.' };
      _del(KEYS.op_classes, function(c){ return c.class_id !== class_id; });
      return { ok: true };
    }
  };


  // ══════════════════════════════════════════════════════════
  // RECONCILIATIONS (Sprint 7)
  // ══════════════════════════════════════════════════════════
  const Reconciliations = {
    all:      function() { return _get(KEYS.reconciliations); },
    byId:     function(id) { return _get(KEYS.reconciliations).find(function(r){ return r.rec_id === id; }); },
    byAccount:function(account_id) { return _get(KEYS.reconciliations).filter(function(r){ return r.account_id === account_id; }); },
    active:   function() { return _get(KEYS.reconciliations).filter(function(r){ return r.status === 'Open'; }); },

    save: function(rec) {
      var list = _get(KEYS.reconciliations);
      var idx  = list.findIndex(function(r){ return r.rec_id === rec.rec_id; });
      if (idx >= 0) list[idx] = rec; else list.push(rec);
      _set(KEYS.reconciliations, list);
    },

    // Get unreconciled transactions for an account up to a statement date
    unreconciled: function(account_id, statement_date) {
      return _get(KEYS.transactions).filter(function(t) {
        return t.account_id === account_id &&
          t.status === 'Posted' &&
          t.txn_date <= statement_date &&
          !t.reconciled;
      }).sort(function(a,b){ return a.txn_date.localeCompare(b.txn_date); });
    },

    // Mark transactions as reconciled
    markReconciled: function(txn_ids, rec_id) {
      var txns = _get(KEYS.transactions);
      txns.forEach(function(t) {
        if (txn_ids.includes(t.txn_id)) {
          t.reconciled = true;
          t.rec_id = rec_id;
        }
      });
      _set(KEYS.transactions, txns);
    }
  };

  // ══════════════════════════════════════════════════════════
  // FIXED ASSETS (Sprint 7)
  // ══════════════════════════════════════════════════════════
  const FixedAssets = {
    all:    function() { return _get(KEYS.fixed_assets); },
    active: function() { return _get(KEYS.fixed_assets).filter(function(a){ return a.status === 'Active'; }); },
    byId:   function(id) { return _get(KEYS.fixed_assets).find(function(a){ return a.asset_id === id; }); },

    save: function(asset) {
      var list = _get(KEYS.fixed_assets);
      var idx  = list.findIndex(function(a){ return a.asset_id === asset.asset_id; });
      if (idx >= 0) list[idx] = asset; else list.push(asset);
      _set(KEYS.fixed_assets, list);
    },

    // Calculate depreciation for a period
    depreciation: function(asset, period) {
      if (asset.depreciation_method === 'None') return 0;
      if (asset.depreciation_method === 'Straight_Line') {
        var monthly = (asset.acquisition_cost - (asset.residual_value||0)) / (asset.useful_life_months||1);
        // Check if period is within asset life
        var acqPeriod = asset.acquisition_date ? asset.acquisition_date.substring(0,7) : null;
        if (!acqPeriod || period < acqPeriod) return 0;
        var endPeriod = asset.end_date ? asset.end_date.substring(0,7) : null;
        if (endPeriod && period > endPeriod) return 0;
        return Math.round(monthly);
      }
      return 0;
    },

    // Get book value as of today
    bookValue: function(asset) {
      var today  = new Date().toISOString().split('T')[0];
      var acq    = asset.acquisition_date || today;
      var months = Math.max(0, Math.floor((new Date(today) - new Date(acq)) / (30.44 * 86400000)));
      var depTotal = FixedAssets.depreciation(asset, '') * Math.min(months, asset.useful_life_months||0);
      return Math.max(asset.residual_value||0, asset.acquisition_cost - depTotal);
    },

    // Summary for Balance Sheet
    summary: function(entity_id) {
      var assets = entity_id && entity_id !== 'ALL'
        ? _get(KEYS.fixed_assets).filter(function(a){ return a.entity_id === entity_id; })
        : _get(KEYS.fixed_assets);
      var active = assets.filter(function(a){ return a.status === 'Active'; });
      return {
        count:           active.length,
        total_cost:      active.reduce(function(s,a){ return s+a.acquisition_cost; }, 0),
        total_book_val:  active.reduce(function(s,a){ return s+FixedAssets.bookValue(a); }, 0),
        total_accum_dep: active.reduce(function(s,a){ return s+(a.acquisition_cost-FixedAssets.bookValue(a)); }, 0)
      };
    }
  };


  // ══════════════════════════════════════════════════════════
  // DEBT OBLIGATIONS — Credit Obligation layer
  // Sits between Facility (fos_debt_register) and Schedule
  // ══════════════════════════════════════════════════════════
  const DebtObligations = {
    all:        function() { return _get(KEYS.debt_obligations); },
    byId:       function(id) { return _get(KEYS.debt_obligations).find(function(o){ return o.obligation_id === id; }); },
    byFacility: function(debt_id) {
      return _get(KEYS.debt_obligations)
        .filter(function(o){ return o.debt_id === debt_id; })
        .sort(function(a,b){ return (a.created_at||'').localeCompare(b.created_at||''); });
    },
    active: function(debt_id) {
      return DebtObligations.byFacility(debt_id)
        .filter(function(o){ return o.status !== 'Settled'; });
    },

    save: function(ob) {
      var list = _get(KEYS.debt_obligations);
      var idx  = list.findIndex(function(o){ return o.obligation_id === ob.obligation_id; });
      if (idx >= 0) list[idx] = ob; else list.push(ob);
      _set(KEYS.debt_obligations, list);
    },

    // Total outstanding across all obligations for a facility
    totalOutstanding: function(debt_id) {
      return DebtObligations.byFacility(debt_id)
        .filter(function(o){ return o.status !== 'Settled'; })
        .reduce(function(s,o){ return s + (o.outstanding_principal||0); }, 0);
    },

    // Available credit = facility limit - total obligations outstanding
    availableCredit: function(debt_id) {
      var facility = DebtRegister.byId(debt_id);
      if (!facility || !facility.credit_limit) return null;
      return Math.max(0, facility.credit_limit - DebtObligations.totalOutstanding(debt_id));
    },

    // Monthly obligation = sum of all active monthly installments
    monthlyTotal: function(debt_id) {
      return DebtObligations.active(debt_id)
        .reduce(function(s,o){ return s + (o.monthly_installment||0); }, 0);
    },

    // ── Auto-migration: create one obligation per existing facility ──
    // Called once on init if obligations table is empty but register has data
    autoMigrate: function() {
      var existing = _get(KEYS.debt_obligations);
      var facilities = _get(KEYS.debt_register);
      if (facilities.length === 0) return 0;

      // Find facilities that don't have an obligation yet
      var migratedIds = existing.map(function(o){ return o.debt_id; });
      var toMigrate   = facilities.filter(function(f){ return migratedIds.indexOf(f.debt_id) < 0; });
      if (toMigrate.length === 0) return 0;

      var count = 0;
      toMigrate.forEach(function(f) {
        // Determine obligation type from facility category
        var obType = f.debt_category === 'Revolving' ? 'Installment' : 'Installment';
        if (f.debt_category === 'Revolving' && !f.monthly_installment) obType = 'Revolving';

        var ob = {
          obligation_id:        'OBL-' + f.debt_id + '-1',
          debt_id:              f.debt_id,
          entity_id:            f.entity_id,
          bu_id:                f.bu_id,
          obligation_type:      obType,  // 'Installment' | 'Revolving'
          description:          f.description,
          original_amount:      f.original_amount || f.outstanding_principal || 0,
          outstanding_principal:f.outstanding_principal || 0,
          interest_rate:        f.interest_rate || 0,
          interest_type:        f.interest_type || 'None',
          billing_method:       f.billing_method || 'Bundled_Unknown',
          monthly_installment:  f.monthly_installment || 0,
          tenor_months:         f.tenor_months || null,
          remaining_installments:f.remaining_installments || 0,
          start_date:           f.start_date || f.created_at || null,
          next_due_date:        f.next_due_date || null,
          status:               f.status || 'Active',
          is_opening_balance:   f.is_opening_balance || false,
          migrated_from:        f.debt_id,  // audit trail
          created_at:           f.created_at || new Date().toISOString().split('T')[0],
          notes:                'Auto-migrated from facility record'
        };
        DebtObligations.save(ob);
        count++;
      });
      return count;
    }
  };

  return { init, Settings, Entities, BU, Activities, COA, Accounts, Counterparties, TxnTypes, Transactions, Receivables, Collections, Payables, Payments, Treasury, Reports, DataIO, DebtRegister, DebtSchedule, DebtPayments, EventCatalog, EventRules, RuleEngine, COABalances, OpClasses, Reconciliations, FixedAssets, DebtObligations };

})();

// ============================================================
// FINANCE OS — UTILITIES (utils.js)
// ============================================================

const Utils = (() => {

  // ── Currency Formatting ───────────────────────────────────
  function formatIDR(amount) {
    if (isNaN(amount)) return "Rp 0";
    return "Rp " + Math.abs(amount).toLocaleString("id-ID");
  }

  function formatIDRCompact(amount) {
    const abs = Math.abs(amount);
    if (abs >= 1_000_000_000) return "Rp " + (abs / 1_000_000_000).toFixed(1) + "M";
    if (abs >= 1_000_000)     return "Rp " + (abs / 1_000_000).toFixed(1) + "jt";
    if (abs >= 1_000)         return "Rp " + (abs / 1_000).toFixed(0) + "rb";
    return "Rp " + abs;
  }

  // ── Date Utilities ────────────────────────────────────────
  function today() {
    return new Date().toISOString().split("T")[0];
  }

  function currentPeriod() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
  }

  function toPeriod(dateStr) {
    if (!dateStr) return currentPeriod();
    return dateStr.substring(0, 7);
  }

  function formatDate(dateStr) {
    if (!dateStr) return "—";
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
  }

  function periodLabel(period) {
    if (!period) return "—";
    const [y, m] = period.split("-");
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    return `${months[parseInt(m) - 1]} ${y}`;
  }

  function agingDays(dueDateStr) {
    const due = new Date(dueDateStr);
    const today = new Date();
    return Math.floor((today - due) / 86400000);
  }

  function agingBucket(dueDateStr) {
    const days = agingDays(dueDateStr);
    if (days <= 0)  return "Current";
    if (days <= 30) return "1–30 hari";
    if (days <= 60) return "31–60 hari";
    if (days <= 90) return "61–90 hari";
    return ">90 hari";
  }

  // ── ID Generators ─────────────────────────────────────────
  function _datePart() {
    return today().replace(/-/g, "");
  }

  function _seq(list, prefix) {
    const todayStr = _datePart();
    const todayItems = list.filter(i => {
      const id = i.txn_id || i.rcv_id || i.pay_id || i.col_id || i.pmt_id || i.try_leg_id || "";
      return id.includes(todayStr);
    });
    return String(todayItems.length + 1).padStart(3, "0");
  }

  function newTxnId(txnDate) {
    const list = DB.Transactions.all();
    // Use txn_date for the date part, not today
    const datePart = txnDate ? txnDate.replace(/-/g, '') : _datePart();
    // Sequence based on same-date txns
    const sameDate = list.filter(function(i){
      return (i.txn_id || '').includes(datePart);
    });
    const seq = String(sameDate.length + 1).padStart(3, '0');
    return 'TXN-' + datePart + '-' + seq;
  }

  function newRcvId() {
    const list = DB.Receivables.all();
    const seq = String(list.length + 1).padStart(3, "0");

  // Sprint 36 — Operational Language Layer (context-sensitive)
  // Semantic mapping is based on Business Event domain, not Direction alone
  function cashFlowLabel(direction, coa_code, event_id, from_account, to_account, cf_class, type_id) {
    // Resolve event domain if event_id provided
    var domain = null;
    if (event_id && typeof DB !== 'undefined' && DB.EventCatalog) {
      var evt = DB.EventCatalog.byId(event_id);
      if (evt) domain = evt.domain;
    }

    // Treasury domain — internal transfer, no external cash movement
    if (domain === 'Treasury') return 'Transfer';

    // Also detect Treasury by TXN type if no event
    // (for legacy transactions without event_id)

    // Revenue domain
    if (domain === 'Revenue') return 'Cash In';

    // Expense domain
    if (domain === 'Expense') return 'Cash Out';

    // Debt domain — direction is the authoritative signal for Liability COA
    // Event_id is a hint, but direction + COA is the ground truth
    if (domain === 'Debt') {
      // For ALL Debt events: if COA is Liability (2xx), trust the direction
      // Credit on Liability = liability increases = received money = Cash In
      // Debit on Liability = liability decreases = paid money = Cash Out
      if (coa_code) {
        var coaNumD = parseInt(coa_code);
        if (coaNumD >= 200 && coaNumD < 300) {
          if (direction === 'Credit') return 'Cash In';
          if (direction === 'Debit')  return 'Cash Out';
        }
        // For Cash/Bank COA (1xx) in Debt domain: Debit = Cash In, Credit = Cash Out
        if (coaNumD >= 100 && coaNumD < 200) {
          if (direction === 'Debit')  return 'Cash In';
          if (direction === 'Credit') return 'Cash Out';
        }
      }
      // Fallback to event-based if no COA match
      if (event_id === 'EVT-D03') return 'Cash In';
      if (event_id === 'EVT-D01') return 'Cash Out';
      if (event_id === 'EVT-D02') return 'Cash Out';
      if (event_id === 'EVT-D04') return 'Cash Out';
      // Fallback within Debt domain: use COA account type
      // Cash/Bank account COA (1xx): Debit = money in, Credit = money out
      // Liability COA (2xx): Debit = paying off debt (cash out), Credit = taking on debt (cash in)
      if (coa_code) {
        var coaNum = parseInt(coa_code);
        if (coaNum >= 200 && coaNum < 300) {
          // Liability COA
          if (direction === 'Debit')  return 'Cash Out'; // reducing liability = paying
          if (direction === 'Credit') return 'Cash In';  // increasing liability = receiving
        }
        if (coaNum >= 100 && coaNum < 200) {
          // Asset/Cash COA
          if (direction === 'Debit')  return 'Cash In';  // cash received
          if (direction === 'Credit') return 'Cash Out'; // cash paid out
        }
      }
      // Last resort within Debt domain
      if (direction === 'Debit')  return 'Cash Out'; // most debt debits are payments
      if (direction === 'Credit') return 'Cash In';
    }

    // Receivable domain
    if (domain === 'Receivable') {
      if (event_id === 'EVT-P01' || event_id === 'EVT-P02') {
        // EVT-P01: Catat Piutang/Invoice (Debit = piutang naik)
        // EVT-P02: Catat Uang Muka/Pinjaman Pribadi
        if (direction === 'Debit')  return 'Cash Out'; // giving advance / recording receivable
        if (direction === 'Credit') return 'Cash In';  // collecting receivable
      }
      // Fallback: Credit = collection (Cash In), Debit = new receivable (Cash Out)
      if (direction === 'Debit')  return 'Cash Out';
      if (direction === 'Credit') return 'Cash In';
    }

    // Equity domain
    if (domain === 'Equity') {
      if (direction === 'Debit')  return 'Penarikan';
      if (direction === 'Credit') return 'Setoran';
    }

    // Fallback: check cf_class (from Rule Engine or legacyCfClass backfill)
    if (cf_class === 'Treasury') return 'Transfer';
    // Fallback: check TXN type for legacy transactions
    if (type_id === 'TXN-06') return 'Transfer';
    // Fallback: check COA category for legacy transactions without event_id
    if (coa_code && typeof DB !== 'undefined' && DB.COA) {
      var coa = DB.COA.byCode(coa_code);
      if (coa) {
        if (coa.coa_category === 'Revenue') {
          if (direction === 'Credit') return 'Cash In';
          if (direction === 'Debit')  return 'Cash Out'; // revenue refund
        }
        if (coa.coa_category === 'Expense') {
          if (direction === 'Debit')  return 'Cash Out';
          if (direction === 'Credit') return 'Cash In';  // expense refund
        }
        if (coa.coa_category === 'Liability') {
          // Paying off liability = cash goes out
          if (direction === 'Debit')  return 'Cash Out';
          // Taking on liability = cash comes in (loan received)
          if (direction === 'Credit') return 'Cash In';
        }
        if (coa.coa_category === 'Asset') {
          var sub = coa.coa_subcategory || '';
          if (sub === 'Kas & Bank') {
            // Cash/Bank: Debit = money received, Credit = money sent out
            if (direction === 'Debit')  return 'Cash In';
            if (direction === 'Credit') return 'Cash Out';
          } else if (sub === 'Piutang' || sub === 'Uang Muka Pemilik') {
            // Receivable/CEO Advance:
            // Debit = creating receivable (cash going out or advance given)
            // Credit = collecting receivable (cash coming IN to us)
            if (direction === 'Debit')  return 'Cash Out';
            if (direction === 'Credit') return 'Cash In';
          } else {
            // Other assets (inventory, fixed assets, prepaid):
            // Debit = acquiring = cash going out
            // Credit = disposing/consuming = cash coming in (unusual)
            if (direction === 'Debit')  return 'Cash Out';
            if (direction === 'Credit') return 'Cash In';
          }
        }
      }
    }
    // Final fallback — direction only (unknown COA/event context)
    if (direction === 'Debit')  return 'Cash In';
    if (direction === 'Credit') return 'Cash Out';
    return direction || '—';
  }

  function cashFlowBadge(direction, coa_code, event_id, from_account, to_account, cf_class, type_id) {
    var label = cashFlowLabel(direction, coa_code, event_id, from_account, to_account, cf_class, type_id);

    // Treasury — special badge with from→to context
    if (label === 'Transfer') {
      var ctx = '';
      if (from_account || to_account) {
        var fromAcct = from_account ? (typeof DB !== 'undefined' ? DB.Accounts.byId(from_account) : null) : null;
        var toAcct   = to_account   ? (typeof DB !== 'undefined' ? DB.Accounts.byId(to_account)   : null) : null;
        var fromName = fromAcct ? fromAcct.account_name : (from_account||'');
        var toName   = toAcct   ? toAcct.account_name   : (to_account||'');
        if (fromName && toName) {
          ctx = '<div class="badge-subtext">' + fromName + ' &#8594; ' + toName + '</div>';
        }
      }
      return '<span class="badge badge-purple">&#8646; Transfer</span>' + ctx;
    }

    if (label === 'Cash In')           return '<span class="badge badge-green">&#8599; Cash In</span>';
    if (label === 'Cash Out')          return '<span class="badge badge-red">&#8600; Cash Out</span>';
    if (label === 'Catat Piutang')     return '<span class="badge badge-blue">&#8635; Piutang</span>';
    if (label === 'Terima Pelunasan')  return '<span class="badge badge-green">&#10003; Pelunasan</span>';
    if (label === 'Setoran')           return '<span class="badge badge-green">&#8679; Setoran</span>';
    if (label === 'Penarikan')         return '<span class="badge badge-orange">&#8681; Penarikan</span>';
    return '<span class="badge badge-gray">' + label + '</span>';
  }

  function emptyState(message, actionLabel, actionFn) {
    return `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <p>${message}</p>
      ${actionLabel ? `<button class="btn btn-primary" onclick="${actionFn}">${actionLabel}</button>` : ""}
    </div>`;
  }

  function toast(message, type = "success") {
    const t = document.createElement("div");
    t.className = `toast toast-${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.classList.add("toast-show"), 10);
    setTimeout(() => { t.classList.remove("toast-show"); setTimeout(() => t.remove(), 300); }, 3000);
  }

  function confirm(message, onConfirm) {
    const modal = document.createElement("div");
    modal.className = "modal-overlay";
    modal.innerHTML = `
      <div class="modal">
        <p class="modal-message">${message}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Batal</button>
          <button class="btn btn-danger" id="modal-confirm">Konfirmasi</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector("#modal-cancel").onclick = () => modal.remove();
    modal.querySelector("#modal-confirm").onclick = () => { onConfirm(); modal.remove(); };
  }

  // ── CSV Export ────────────────────────────────────────────
  function exportCSV(headers, rows, filename) {
    const csv = [headers.join(","), ...rows.map(r => r.map(v => `"${v ?? ""}"`).join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }

  // ── Period List (last 12 months) ──────────────────────────
  function last12Periods() {
    const periods = [];
    const d = new Date();
    for (let i = 0; i < 12; i++) {
      periods.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
      d.setMonth(d.getMonth() - 1);
    }
    return periods;
  }

  return {
    formatIDR, formatIDRCompact, today, currentPeriod, toPeriod, formatDate,
    periodLabel, agingDays, agingBucket,
    newTxnId, newRcvId, newPayId, newColId, newPmtId, newTryRef,
    newEntityId, newBUId, newActivityId, newCpId, newAccountId,
    required, positiveNumber, validateTxn,
    el, statusBadge, directionBadge, cashFlowLabel, cashFlowBadge, emptyState, toast, confirm, exportCSV, last12Periods
  };

})();

  // ── Auto sync cycle: push then pull ──────────────────────────
  async function _autoSyncCycle() {

      // Prevents race condition where pull overwrites unsaved local edits
      if (_pendingPush) {
        for (var lsKey in TABLE_MAP) {
          try { await pushAll(lsKey); } catch(e) { /* continue */ }
        }
        _pendingPush = false;

  // ── API Helper ──────────────────────────────────────────────
  async function _api(method, table, body) {
    var url = SUPABASE_URL + '/rest/v1/' + table;
    var opts = { method: method, headers: HEADERS };
    if (body) opts.body = JSON.stringify(body);
    var res = await fetch(url, opts);
    if (!res.ok) {
      var err = await res.text();
      throw new Error('Supabase ' + method + ' ' + table + ': ' + err);
    }
    var text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // ── Push single record ──────────────────────────────────────
  async function pushRecord(lsKey, record) {
    var map = TABLE_MAP[lsKey];
    if (!map) return;

    var idKey = map.idKey;
    var id    = record[idKey];
    if (!id) return;

    await _api('POST', map.table + '?on_conflict=' + idKey, [{
      [idKey]:     id,
      data:        record,
      updated_at:  new Date().toISOString()
    }]);
  }

  // ── Push all records from a localStorage key ────────────────
  async function pushAll(lsKey) {
    var map = TABLE_MAP[lsKey];
    if (!map) return;

    var raw     = localStorage.getItem(lsKey);
    if (!raw) return;
    var records = JSON.parse(raw);
    if (!Array.isArray(records) || records.length === 0) return;

    var idKey = map.idKey;
    var rows  = records.map(function(r) {
      return { [idKey]: r[idKey], data: r, updated_at: new Date().toISOString() };
    });

    // Batch upsert in chunks of 100
    for (var i = 0; i < rows.length; i += 100) {
      var chunk = rows.slice(i, i + 100);
      await _api('POST', map.table + '?on_conflict=' + idKey, chunk);
    }
  }

  // ── Push master data to fos_settings ───────────────────────
  async function pushSettings() {
    var rows = SETTINGS_KEYS.map(function(key) {
      var val = localStorage.getItem(key);
      return {
        key:        key,
        data:       val ? JSON.parse(val) : null,
        updated_at: new Date().toISOString()
      };
    }).filter(function(r) { return r.data !== null; });

    if (rows.length === 0) return;
    await _api('POST', 'fos_settings?on_conflict=key', rows);
  }

  // ── Pull all data from Supabase → localStorage ──────────────

      try {
        var rows = await _api('GET', map.table + '?select=data&order=updated_at.asc', null);
        if (rows && rows.length > 0) {
          var records = rows.map(function(r) { return r.data; });
          localStorage.setItem(lsKey, JSON.stringify(records));
        }
      } catch(e) {
        console.warn('[SupabaseSync] Pull failed for', lsKey, ':', e.message);

    try {
      var settings = await _api('GET', 'fos_settings?select=key,data', null);
      if (settings && settings.length > 0) {
        settings.forEach(function(s) {
          if (s.data !== null) {
            localStorage.setItem(s.key, JSON.stringify(s.data));

      console.warn('[SupabaseSync] Pull settings failed:', e.message);

      for (var lsKey in TABLE_MAP) {
        try {
          await pushAll(lsKey);

          failed++;

      await pushSettings();
      _showSyncStatus('synced');
      var msg = 'Sync berhasil — ' + pushed + ' tabel';
      if (failed > 0) msg += ', ' + failed + ' gagal';
      Utils.toast(msg);

      Utils.toast('Sync gagal: ' + e.message, 'error');

  function queueSync(lsKey, record) {

    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(function() {
      _processSyncQueue();
    }, 1500); // wait 1.5s after last change before syncing
  }

  async function _processSyncQueue() {
    if (!_online || _syncing || _syncQueue.length === 0) return;
    _syncing = true;
    _showSyncStatus('syncing');

    var batch = _syncQueue.splice(0);
    try {
      for (var i = 0; i < batch.length; i++) {
        await pushRecord(batch[i].lsKey, batch[i].record);
      }
      // Also sync settings on any change
      await pushSettings();
      _showSyncStatus('synced');
    } catch(e) {
      console.error('[SupabaseSync] Queue sync failed:', e);
      _showSyncStatus('error');
      // Re-queue failed items
      _syncQueue.unshift.apply(_syncQueue, batch);
    }
    _syncing = false;
  }

  // ── UI: Sync status indicator ────────────────────────────────
  function _showSyncStatus(status) {
    var el = document.getElementById('sync-status');
    if (!el) {
      el = document.createElement('div');
      el.id = 'sync-status';
      el.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9000;' +
        'font-size:.7rem;padding:.3rem .7rem;border-radius:12px;font-weight:600;' +
        'transition:all .3s;pointer-events:none';
      document.body.appendChild(el);
    }

    var states = {
      synced:  { text: '● Synced',      bg: 'var(--green)',  color: '#fff' },
      syncing: { text: '↻ Syncing…',    bg: 'var(--blue)',   color: '#fff' },
      offline: { text: '● Offline',     bg: 'var(--yellow)', color: '#000' },
      error:   { text: '● Sync Error',  bg: 'var(--red)',    color: '#fff' },
      partial: { text: '⚠ Partial Sync',bg: 'var(--yellow)', color: '#000' }
    };

    var s = states[status] || states.offline;
    el.textContent = s.text;
    el.style.background = s.bg;
    el.style.color = s.color;

    // Auto-hide synced status after 3s
    if (status === 'synced') {
      setTimeout(function() {
        if (el) el.style.opacity = '0';
        setTimeout(function() { if (el) el.style.opacity = '1'; }, 5000);
      }, 3000);
    } else {
      el.style.opacity = '1';
    }
  }

  function _showOfflineIndicator() {
    _showSyncStatus('offline');
    var toast = document.createElement('div');
    toast.className = 'offline-toast';
    toast.textContent = '📵 Offline — data tetap tersimpan lokal';
    toast.style.display = 'block';
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
  }

  // ── Public: Manual sync trigger ─────────────────────────────
  async function manualSync() {
    if (!_online) {
      Utils.toast('Tidak ada koneksi internet', 'error');
      return;
    }
    await pushAllToSupabase();
  }

  async function manualPull() {
    if (!_online) {
      Utils.toast('Tidak ada koneksi internet', 'error');
      return;
    }
    _showSyncStatus('syncing');
    try {
      await pullFromSupabase();
      _showSyncStatus('synced');
      Utils.toast('Data berhasil ditarik dari Supabase — refresh halaman');
      setTimeout(function() { window.location.reload(); }, 1500);
    } catch(e) {
      _showSyncStatus('error');
      Utils.toast('Pull gagal: ' + e.message, 'error');
    }
  }

  // ── Queue bulk sync for entire localStorage key ────────────
  var _bulkQueue = new Set();
  var _bulkTimer = null;

  function queueBulkSync(lsKey) {
    _pendingPush = true;  // Mark that we have unsaved local changes
    _bulkQueue.add(lsKey);
    clearTimeout(_bulkTimer);
    _bulkTimer = setTimeout(async function() {
      if (!_online) return;
      _showSyncStatus('syncing');
      try {
        for (var key of _bulkQueue) {
          await pushAll(key);
        }
        await pushSettings();
        _bulkQueue.clear();
        _pendingPush = false;  // All pushed
        _showSyncStatus('synced');
      } catch(e) {
        console.error('[SupabaseSync] Bulk sync failed:', e);
        _showSyncStatus('error');
      }
    }, 2000);
  }

  // ── Sync health check ────────────────────────────────────────
  async function checkSyncHealth() {
    if (!_online) return { ok: false, reason: 'Offline' };
    try {
      // Quick check: count rows in fos_transactions on Supabase
      var remote = await _api('GET', 'fos_transactions?select=txn_id&limit=1', null);
      var local  = JSON.parse(localStorage.getItem('fos_transactions') || '[]');
      var remoteDebt = await _api('GET', 'fos_debt_register?select=debt_id&limit=1', null);
      var localDebt  = JSON.parse(localStorage.getItem('fos_debt_register') || '[]');
      return {
        ok: true,
        transactions: { local: local.length, remote_has_data: remote && remote.length > 0 },
        debt_register: { local: localDebt.length, remote_has_data: remoteDebt && remoteDebt.length > 0 }
      };
    } catch(e) {
      return { ok: false, reason: e.message };
    }
  }

  async function pushNow(lsKey) {
    await pushAll(lsKey);
    _pendingPush = false;
  }

  return {
    init,
    queueSync,
    queueBulkSync,
    pushRecord,
    pushAll,
    pushAllToSupabase,
    pullFromSupabase,
    manualSync,
    manualPull,
    checkSyncHealth
  , pushNow
  };

})();

const Dashboard = (() => {

  // ── Debt Alert Card ──────────────────────────────────────
  function _debtAlert(summary, overdueCount) {
    if (summary.count_active === 0) return '';
    var cls = overdueCount > 0 ? 'alert-card alert-warn' : 'alert-card alert-ok';
    var icon = overdueCount > 0 ? '&#9888;' : '&#9673;';

      ? overdueCount + ' angsuran overdue'
      : summary.count_active + ' fasilitas aktif';
    return '<div class="' + cls + '" data-nav="debt" style="cursor:pointer">' +
      '<div class="alert-label">Fasilitas Utang</div>' +

      '<div class="alert-value">' + Utils.formatIDR(summary.total_outstanding) + '</div>' +
      '<div class="alert-sub">' + msg + '</div>' +
    '</div>';
  }

  // ── Data Integrity Check ─────────────────────────────────
  function _integrityCheck(entity, period) {
    var issues = [];
    var txns = DB.Transactions.all().filter(function(t) {
      if (t.status !== 'Posted') return false;
      if (entity !== 'ALL' && t.entity_id !== entity) return false;
      return true;
    });

    // Rule 1: Revenue should be Credit, Expense should be Debit
    var directionMismatches = txns.filter(function(t) {
      // Skip transactions already reviewed via Direction Review Tool
      if (t.direction_reviewed) return false;
      var coa = DB.COA.byCode(t.coa_code);
      if (!coa) return false;
      // Skip Treasury transactions — direction is intentional
      if (t.type_id === 'TXN-06' || t.cf_class === 'Treasury') return false;
      // Skip transactions with override (user confirmed direction intentionally)
      if (t.override_level >= 2) return false;
      if (coa.coa_category === 'Revenue' && t.direction === 'Debit')  return true;
      if (coa.coa_category === 'Expense' && t.direction === 'Credit') return true;
      return false;
    });
    if (directionMismatches.length > 0) {
      issues.push({
        type: 'warning',
        icon: '⇅',
        label: 'Arah Transaksi Tidak Konsisten',
        detail: directionMismatches.length + ' transaksi memiliki Direction yang tidak sesuai COA (Revenue seharusnya Credit, Expense seharusnya Debit)',
        ids: directionMismatches.slice(0,3).map(function(t){ return t.txn_id; }),
        route: 'transactions'
      });
    }

    // Rule 2: Transactions with missing or unknown COA
    var missingCOA = txns.filter(function(t) {
      return !t.coa_code || !DB.COA.byCode(t.coa_code);
    });
    if (missingCOA.length > 0) {
      issues.push({
        type: 'error',
        icon: '⊘',
        label: 'COA Tidak Ditemukan',
        detail: missingCOA.length + ' transaksi memiliki COA yang tidak ada di master data. Laporan mungkin tidak akurat.',
        ids: missingCOA.slice(0,3).map(function(t){ return t.txn_id; }),
        route: 'transactions'
      });
    }

    // Rule 3: Treasury without paired leg
    var treasury = DB.Treasury.all();
    var tryRefs  = {};
    treasury.forEach(function(l) {
      if (!tryRefs[l.try_ref]) tryRefs[l.try_ref] = [];
      tryRefs[l.try_ref].push(l.leg);
    });
    var unpairedTreasury = Object.keys(tryRefs).filter(function(ref) {
      return tryRefs[ref].length !== 2 ||
        !tryRefs[ref].includes('Source') ||
        !tryRefs[ref].includes('Destination');
    });
    if (unpairedTreasury.length > 0) {
      issues.push({
        type: 'error',
        icon: '⟳',
        label: 'Treasury Movement Tidak Lengkap',
        detail: unpairedTreasury.length + ' treasury movement hanya memiliki satu leg. Balance Sheet mungkin tidak seimbang.',
        ids: unpairedTreasury.slice(0,3),
        route: 'treasury'
      });
    }

    // Rule 4: Draft transactions older than 7 days
    var today = Utils.today();
    var oldDrafts = txns.filter(function(t) {
      if (t.status !== 'Draft') return false;
      var diff = Math.floor((new Date(today) - new Date(t.entry_date)) / 86400000);
      return diff > 7;
    });
    if (oldDrafts.length > 0) {
      issues.push({
        type: 'warning',
        icon: '📋',
        label: 'Draft Lama Belum Diposting',
        detail: oldDrafts.length + ' transaksi Draft sudah lebih dari 7 hari. Pastikan sudah diposting atau dihapus.',
        ids: [],
        route: 'transactions'
      });
    }

    // Rule 5: Unallocated costs in General BU
    var generalBUs = DB.BU.all().filter(function(b){ return b.bu_type === 'General'; });
    var generalBUIds = generalBUs.map(function(b){ return b.bu_id; });
    var unallocated = txns.filter(function(t) {
      if (t.period !== period) return false;
      var coa = DB.COA.byCode(t.coa_code);
      return coa && coa.coa_category === 'Expense' && generalBUIds.includes(t.bu_id);
    });
    var unallocatedTotal = unallocated.reduce(function(s,t){ return s + t.amount; }, 0);
    if (unallocatedTotal > 0) {
      issues.push({
        type: 'info',
        icon: '◈',
        label: 'Beban Tidak Teralokasi ke BU',
        detail: 'Beban sebesar ' + Utils.formatIDR(unallocatedTotal) + ' berada di General BU dan tidak terlihat di BU Profitability. Pertimbangkan untuk mengalokasikan ke BU spesifik.',
        ids: [],
        route: 'reports'
      });
    }

    // Rule 6: Transactions without Business Event (post Sprint 1 go-live)
    var goLive = DB.Settings.get().go_live_date || null;
    if (goLive) {
      var noEvent = txns.filter(function(t) {
        return t.status === 'Posted' &&
          t.txn_date >= goLive &&
          !t.event_id &&
          (period === 'ALL' || t.period === period);
      });
      if (noEvent.length > 0) {
        issues.push({
          type: 'info',
          icon: '◎',
          label: 'Transaksi Tanpa Business Event',
          detail: noEvent.length + ' transaksi diinput tanpa memilih Business Event. Pertimbangkan untuk mengupdate agar laporan per Event lebih akurat.',
          ids: noEvent.slice(0,3).map(function(t){ return t.txn_id; }),
          route: 'transactions'
        });
      }
    }

    // Rule 7: Locked period violation attempts
    var lockedPeriods = DB.Settings.lockedPeriods().map(function(p){ return p.period; });
    if (lockedPeriods.length > 0) {
      var lockedTxns = txns.filter(function(t){
        return lockedPeriods.includes(t.period) && t.override_level !== 3;
      });
      if (lockedTxns.length > 0) {
        issues.push({
          type: 'warning',
          icon: '&#128274;',
          label: 'Transaksi di Periode Terkunci',
          detail: lockedTxns.length + ' transaksi berada di periode yang sudah dikunci tanpa Forced Override. Periksa apakah ini disengaja.',
          ids: lockedTxns.slice(0,3).map(function(t){ return t.txn_id; }),
          route: 'transactions'
        });
      }
    }

    return issues;
  }

  function _integrityPanel(issues) {
    if (issues.length === 0) {
      return '<div class="integrity-panel integrity-ok">' +
        '<span class="integrity-icon">&#10003;</span>' +
        '<span class="integrity-label">Data Integrity: Semua pemeriksaan passed</span>' +
      '</div>';
    }
    return '<div class="integrity-panel integrity-issues">' +
      '<div class="integrity-header">' +
        '<span class="integrity-icon">&#9888;</span>' +
        '<span class="integrity-label">Data Integrity Check — ' + issues.length + ' isu ditemukan</span>' +
      '</div>' +
      '<div class="integrity-list">' +
        issues.map(function(issue) {
          var cls = issue.type === 'error' ? 'integrity-error' :

  function _kpi(label, amount, colorClass, icon, period) {

    return '<div class="kpi-card ' + colorClass + '">' +

        '<span class="text-muted text-sm">Total: ' + Utils.formatIDRCompact(totalAmt) + '</span>' +
      '</div>' +
    '</div>';

  function _recentCard(recent) {
    let inner = '';
    if (recent.length === 0) {
      inner = '<div class="empty-state-sm">Belum ada transaksi</div>';
    } else {
      const rows = recent.map(function(t) {

      '<div class="card-header">' +

  function _buCard(buData, period) {

    if (!buData || buData.length === 0) {
      inner = '<div class="empty-state-sm">Belum ada data periode ini</div>';
    } else {
      const max = Math.max.apply(null, buData.map(function(b){ return Math.max(b.revenue, b.expense); }).concat([1]));
      const bars = buData.map(function(b) {
        const rPct = (b.revenue / max * 100).toFixed(1);
        const ePct = (b.expense / max * 100).toFixed(1);
        const netClass = b.net >= 0 ? 'text-green' : 'text-red';
        return '<div class="bu-bar-row">' +
          '<div class="bu-bar-label">' + b.bu_name + '</div>' +
          '<div class="bu-bar-tracks">' +
            '<div class="bu-bar-track"><div class="bu-bar-fill fill-revenue" style="width:' + rPct + '%"></div></div>' +
            '<div class="bu-bar-track"><div class="bu-bar-fill fill-expense" style="width:' + ePct + '%"></div></div>' +
          '</div>' +
          '<div class="bu-bar-net ' + netClass + '">' + Utils.formatIDRCompact(b.net) + '</div>' +
        '</div>';
      }).join('');
      inner = '<div class="bu-bars">' + bars +
        '<div class="bu-legend">' +
          '<span class="legend-dot dot-revenue"></span> Pendapatan ' +
          '<span class="legend-dot dot-expense"></span> Beban' +
        '</div></div>';
    }
    return '<div class="card">' +
      '<div class="card-header"><h3>Profitabilitas BU — ' + Utils.periodLabel(period) + '</h3></div>' +
      inner + '</div>';
  }

  function _agingCard(title, aging, route) {
    const total = (aging.current||0) + (aging.d1_30||0) + (aging.d31_60||0) + (aging.d61_90||0) + (aging.d90plus||0);
    const buckets = [
      { label: 'Current',    key: 'current', cls: 'aging-current' },
      { label: '1–30 hari',  key: 'd1_30',   cls: 'aging-30'     },
      { label: '31–60 hari', key: 'd31_60',  cls: 'aging-60'     },
      { label: '61–90 hari', key: 'd61_90',  cls: 'aging-90'     },
      { label: '>90 hari',   key: 'd90plus', cls: 'aging-90plus' }
    ];
    let inner = '';
    if (total === 0) {
      inner = '<div class="empty-state-sm">Tidak ada saldo terbuka</div>';
    } else {
      const rows = buckets.map(function(b) {
        const pct = total > 0 ? ((aging[b.key]||0) / total * 100).toFixed(1) : 0;
        return '<div class="aging-row">' +
          '<div class="aging-label">' + b.label + '</div>' +
          '<div class="aging-track"><div class="aging-fill ' + b.cls + '" style="width:' + pct + '%"></div></div>' +
          '<div class="aging-amount">' + Utils.formatIDRCompact(aging[b.key]||0) + '</div>' +
        '</div>';
      }).join('');
      inner = '<div class="aging-bars">' + rows + '</div>' +
        '<div class="aging-total">Total: <strong>' + Utils.formatIDR(total) + '</strong></div>';
    }
    return '<div class="card">' +
      '<div class="card-header">' +
        '<h3>' + title + '</h3>' +
        '<button class="btn btn-ghost btn-sm" onclick="App.navigate(\'' + route + '\')">Detail →</button>' +
      '</div>' + inner + '</div>';
  }

  return { render };

})();

    var wrap = document.getElementById('txn-table-wrap');

      if (!btn) return;

      if (btn.classList.contains('txn-view')) viewDetail(id);

  function _getFiltered() {
    let txns = DB.Transactions.all();
    if (_filters.entity  !== 'ALL') txns = txns.filter(function(t){ return t.entity_id  === _filters.entity; });
    if (_filters.type    !== 'ALL') txns = txns.filter(function(t){ return t.type_id    === _filters.type; });
    if (_filters.account !== 'ALL') txns = txns.filter(function(t){ return t.account_id === _filters.account; });
    if (_filters.status  !== 'ALL') txns = txns.filter(function(t){ return t.status     === _filters.status; });
    if (_filters.period)   txns = txns.filter(function(t){ return t.period === _filters.period; });
    if (_filters.dateFrom) txns = txns.filter(function(t){ return t.txn_date >= _filters.dateFrom; });
    if (_filters.dateTo)   txns = txns.filter(function(t){ return t.txn_date <= _filters.dateTo; });
    if (_filters.search) {
      const q = _filters.search.toLowerCase();
      txns = txns.filter(function(t){ return (t.description||'').toLowerCase().includes(q) || t.txn_id.toLowerCase().includes(q); });
    }
    return txns.sort(function(a,b){ return b.txn_date.localeCompare(a.txn_date); });
