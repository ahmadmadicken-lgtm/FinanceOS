  function _processFile(file) {
    var status = document.getElementById('import-status');
    status.innerHTML = '<div class="import-parsing"><span class="spinner"></span> Membaca file...</div>';

    // Check size
    if (file.size > 5 * 1024 * 1024) {
      status.innerHTML = '<div class="error-box">File terlalu besar. Maks 5MB.</div>';
      return;
    }

    var ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'csv') {
      _parseCSV(file);
    } else if (ext === 'xlsx') {
      _parseXLSX(file);
    } else {
      status.innerHTML = '<div class="error-box">Format tidak didukung. Gunakan .xlsx atau .csv.</div>';
    }
  }

  // ── Parse XLSX (using SheetJS via CDN) ────────────────────
  function _parseXLSX(file) {
    // Load SheetJS dynamically if not available
    if (typeof XLSX === 'undefined') {
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = function() { _readXLSX(file); };
      script.onerror = function() {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Gagal memuat library Excel. Periksa koneksi internet.</div>';
      };
      document.head.appendChild(script);
    } else {
      _readXLSX(file);
    }
  }

  function _readXLSX(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data    = new Uint8Array(e.target.result);
        var wb      = XLSX.read(data, { type: 'array', cellDates: true });

        // Try sheet "Transaksi" first, then first sheet
        var sheetName = wb.SheetNames.includes('Transaksi') ? 'Transaksi' : wb.SheetNames[0];
        var ws        = wb.Sheets[sheetName];
        var json      = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (json.length === 0) {
          document.getElementById('import-status').innerHTML =
            '<div class="error-box">Sheet "' + sheetName + '" kosong atau tidak ada data.</div>';
          return;
        }

        _rows = json;
        document.getElementById('import-status').innerHTML =
          '<div class="import-success">&#10003; File dibaca: <strong>' + json.length + ' baris</strong> dari sheet "' + sheetName + '"</div>';

        _mapRows();
      } catch(err) {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Error membaca Excel: ' + err.message + '</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ── Parse CSV ─────────────────────────────────────────────
  function _parseCSV(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var lines   = e.target.result.split('\n').filter(function(l){ return l.trim(); });
        var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,''); });
        var json    = lines.slice(1).map(function(line) {
          var vals = line.split(',');
          var obj  = {};
          headers.forEach(function(h, i) { obj[h] = (vals[i] || '').trim().replace(/"/g,''); });
          return obj;
        });

        _rows = json;
        document.getElementById('import-status').innerHTML =
          '<div class="import-success">&#10003; CSV dibaca: <strong>' + json.length + ' baris</strong></div>';
        _mapRows();
      } catch(err) {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Error membaca CSV: ' + err.message + '</div>';
      }
    };
    reader.readAsText(file);
  }

  // ── Map Rows ───────────────────────────────────────────────
  function _mapRows() {
    // Get activities from DB for matching
    var allActs = DB.Activities.all();
    var allBUs  = DB.BU.all();
    var entity  = DB.Entities.byId('E01'); // JO

    function _findActivity(categoryStr) {
      if (!categoryStr) return null;
      var hint = CAT_ACTIVITY[categoryStr] || categoryStr;
      // Try exact match by name
      var found = allActs.find(function(a){
        return a.activity_name.toLowerCase() === hint.toLowerCase();
      });
      if (!found) {
        // Partial match
        found = allActs.find(function(a){
          return hint.toLowerCase().includes(a.activity_name.toLowerCase()) ||
                 a.activity_name.toLowerCase().includes(hint.toLowerCase());
        });
      }
      return found ? found.activity_id : null;
    }

    function _findBU(activityId) {
      if (!activityId) {
        // Default to JO Operational BU
        var bu = allBUs.find(function(b){ return b.entity_id === 'E01'; });
        return bu ? bu.bu_id : null;
      }
      var act = DB.Activities.byId(activityId);
      return act ? act.bu_id : null;
    }

    function _parseDate(val) {
      if (!val) return Utils.today();
      // SheetJS returns Date objects when cellDates: true
      if (val instanceof Date) {
        var y = val.getFullYear();
        var m = String(val.getMonth()+1).padStart(2,'0');
        var d = String(val.getDate()).padStart(2,'0');
        return y + '-' + m + '-' + d;
      }
      // String date
      var str = String(val).trim();
      if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
      // Try parse
      var dt = new Date(str);
      if (!isNaN(dt)) {
        return dt.getFullYear() + '-' +
          String(dt.getMonth()+1).padStart(2,'0') + '-' +
          String(dt.getDate()).padStart(2,'0');
      }
      return Utils.today();
    }

    function _getMapping(row) {
      var subcat = String(row['SubCategory'] || '').trim();
      var cat    = String(row['Category']    || '').trim();
      var entity = String(row['Entity']      || '').trim();
      var cashIn  = parseFloat(row['Cash In']  || 0) || 0;
      var cashOut = parseFloat(row['Cash Out'] || 0) || 0;

      // Amount and direction
      var amount    = cashIn > 0 ? cashIn : cashOut;
      var direction = cashIn > 0 ? 'Debit' : 'Credit';

      // Account
      var accountId = ENTITY_MAP[entity] || 'ACC-01';

      // COA and Type from SubCategory
      var mapping = SUBCAT_COA[subcat] || null;
      var coa     = mapping ? mapping.coa : (direction === 'Debit' ? '401' : '531');
      var typeId  = mapping ? mapping.type : (direction === 'Debit' ? 'TXN-01' : 'TXN-02');

      // Activity
      var activityId = _findActivity(cat);
      var buId       = _findBU(activityId);

      // Flag for review if uncertain
      var needsReview = !mapping || !activityId;

      return {
        txn_date:    _parseDate(row['Date']),
        description: String(row['Description'] || '').trim(),
        amount:      amount,
        direction:   direction,
        account_id:  accountId,
        coa_code:    coa,
        type_id:     typeId,
        activity_id: activityId,
        bu_id:       buId || (allBUs.find(function(b){ return b.entity_id==='E01'; }) || {}).bu_id || '',
        entity_id:   'E01',
        // Original values for display
        _orig_entity:  entity,
        _orig_subcat:  subcat,
        _orig_cat:     cat,
        _orig_cashin:  cashIn,
        _orig_cashout: cashOut,
        _needs_review: needsReview,
        _selected:     true
      };
    }

    _mapped = _rows.map(function(row, i) {
      var m = _getMapping(row);
      m._idx = i;
      return m;
    });

    // Filter out empty rows
    _mapped = _mapped.filter(function(m){ return m.amount > 0 && m.description; });

    // Duplicate detection — check against existing transactions
    var existing = DB.Transactions.all();
    _mapped.forEach(function(m) {
      var isDup = existing.some(function(t) {
        return t.txn_date === m.txn_date &&
          Math.abs(t.amount - m.amount) < 1 &&
          t.description && m.description &&
          t.description.trim().toLowerCase() === m.description.trim().toLowerCase();
      });
      if (isDup) {
        m._is_duplicate = true;
        m._selected = false; // deselect duplicates by default
        m._needs_review = true;
      } else {
        m._is_duplicate = false;
      }
    });

    var dupCount = _mapped.filter(function(m){ return m._is_duplicate; }).length;
    if (dupCount > 0) {
      document.getElementById('import-status').innerHTML +=
        '<div style="margin-top:.35rem;padding:.45rem .75rem;background:var(--yellow-dim);border:1px solid var(--yellow);border-radius:var(--radius);font-size:.78rem;color:var(--yellow)">' +
          '&#9888; ' + dupCount + ' baris kemungkinan duplikat (tanggal + jumlah + deskripsi sama dengan transaksi existing). Baris ini di-deselect secara default.' +
        '</div>';
    }

    _page = 0;
    _renderPreview();
  }

  // ── Preview Table ──────────────────────────────────────────
  function _renderPreview() {
    var area      = document.getElementById('import-preview-area');

    var selected  = _mapped.filter(function(m){ return m._selected; }).length;
    var needsRev  = _mapped.filter(function(m){ return m._needs_review && !m._is_duplicate; }).length;
    var dupCount  = _mapped.filter(function(m){ return m._is_duplicate; }).length;
    var pageCount = Math.ceil(total / PAGE_SIZE);
    var start     = _page * PAGE_SIZE;
    var pageRows  = _mapped.slice(start, start + PAGE_SIZE);

    var allCOAs = DB.COA.active();
    var allTypes = DB.TxnTypes.all();
    var allActs  = DB.Activities.all();
    var allAccts = DB.Accounts.active();

    function _optsCOA(selected) {
      return allCOAs.map(function(c){
        return '<option value="' + c.coa_code + '"' + (c.coa_code===selected?' selected':'') + '>' +
          c.coa_code + ' ' + c.coa_name + '</option>';
      }).join('');
    }
    function _optsType(selected) {
      return allTypes.map(function(t){
        return '<option value="' + t.type_id + '"' + (t.type_id===selected?' selected':'') + '>' +
          t.type_name + '</option>';
      }).join('');
    }
    function _optsAct(selected) {
      return '<option value="">— Tidak ada —</option>' +
        allActs.map(function(a){
          return '<option value="' + a.activity_id + '"' + (a.activity_id===selected?' selected':'') + '>' +
            a.activity_name + '</option>';
        }).join('');
    }
    function _optsAcct(selected) {
      return allAccts.map(function(a){
        return '<option value="' + a.account_id + '"' + (a.account_id===selected?' selected':'') + '>' +
          a.account_name + '</option>';
      }).join('');
    }

    var rows = pageRows.map(function(m) {
      var i   = m._idx;
      var cls = m._needs_review ? 'import-row-review' : '';
      var chk = m._selected ? 'checked' : '';
      return '<tr class="' + cls + '">' +
        '<td><input type="checkbox" class="imp-chk" data-idx="' + i + '" ' + chk + '></td>' +
        '<td class="text-sm mono">' + m.txn_date + '</td>' +
        '<td class="text-sm" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + m.description + '">' + m.description + '</td>' +
        '<td class="text-right mono text-sm">' + Utils.formatIDR(m.amount) + '</td>' +
        '<td>' + Utils.directionBadge(m.direction) + '</td>' +
        // Account
        '<td><select class="form-input form-input-xs imp-acct" data-idx="' + i + '">' + _optsAcct(m.account_id) + '</select></td>' +
        // COA
        '<td><select class="form-input form-input-xs imp-coa" data-idx="' + i + '">' + _optsCOA(m.coa_code) + '</select></td>' +
        // Type
        '<td><select class="form-input form-input-xs imp-type" data-idx="' + i + '">' + _optsType(m.type_id) + '</select></td>' +
        // Activity
        '<td><select class="form-input form-input-xs imp-act" data-idx="' + i + '">' + _optsAct(m.activity_id) + '</select></td>' +
        // Original
        '<td class="text-xs text-muted">' + m._orig_subcat + '</td>' +
        '<td class="text-xs text-muted">' + m._orig_cat + '</td>' +
        (m._is_duplicate
          ? '<td><span class="badge badge-red">Duplikat</span></td>'
          : m._needs_review
            ? '<td><span class="badge badge-yellow">Review</span></td>'
            : '<td><span class="badge badge-green">OK</span></td>') +
      '</tr>';
    }).join('');

    area.innerHTML =
      // Summary bar
      '<div class="import-summary-bar">' +
        '<div class="import-summary-stats">' +
          '<span><strong>' + total + '</strong> baris total</span>' +
          '<span><strong class="text-green">' + selected + '</strong> akan diimport</span>' +
          (needsRev > 0 ? '<span><strong class="text-yellow">' + needsRev + '</strong> perlu review</span>' : '') +
          (dupCount > 0 ? '<span><strong class="text-red">' + dupCount + '</strong> duplikat</span>' : '') +
        '</div>' +
        '<div class="import-summary-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectAll(true)">Pilih Semua</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectAll(false)">Hapus Semua</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectReview()">Pilih yang Perlu Review</button>' +
        '</div>' +
      '</div>' +

      // Table
      '<div style="overflow-x:auto;margin-top:.5rem">' +
        '<table class="table import-table">' +
          '<thead><tr>' +
            '<th style="width:30px"><input type="checkbox" id="imp-chk-all" onchange="ImportModule.toggleAll(this.checked)"></th>' +
            '<th>Tanggal</th><th>Deskripsi</th><th class="text-right">Jumlah</th><th>Dir</th>' +
            '<th>Akun</th><th>COA</th><th>Tipe</th><th>Activity</th>' +
            '<th>SubCat Asli</th><th>Category Asli</th><th>Status</th>' +
          '</tr></thead>' +
          '<tbody id="import-tbody">' + rows + '</tbody>' +
        '</table>' +
      '</div>' +

      // Pagination
      (pageCount > 1 ?
        '<div class="import-pagination">' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.prevPage()" ' + (_page===0?'disabled':'') + '>&#8592; Prev</button>' +
          '<span class="text-sm text-muted">Halaman ' + (_page+1) + ' / ' + pageCount + '</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.nextPage()" ' + (_page>=pageCount-1?'disabled':'') + '>Next &#8594;</button>' +
        '</div>'
      : '') +

      // Import button
      '<div class="import-action-bar">' +
        '<button class="btn btn-ghost" onclick="ImportModule.render()">&#8592; Upload Ulang</button>' +
        '<button class="btn btn-primary" onclick="ImportModule.confirmImport()">' +
          '&#10003; Import ' + selected + ' Transaksi' +
        '</button>' +
      '</div>';

    // Bind change events
    _bindPreviewEvents();
  }

  function _bindPreviewEvents() {
    var tbody = document.getElementById('import-tbody');
    if (!tbody) return;

    // Checkbox changes
    tbody.querySelectorAll('.imp-chk').forEach(function(chk) {
      chk.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row._selected = this.checked;
        _updateSummaryBar();
      };
    });

    // COA changes
    tbody.querySelectorAll('.imp-coa').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) { row.coa_code = this.value; row._needs_review = false; }
      };
    });

    // Type changes
    tbody.querySelectorAll('.imp-type').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.type_id = this.value;
      };
    });

    // Activity changes
    tbody.querySelectorAll('.imp-act').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.activity_id = this.value || null;
      };
    });

    // Account changes
    tbody.querySelectorAll('.imp-acct').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.account_id = this.value;
      };
    });
  }

  function _updateSummaryBar() {
    var selected = _mapped.filter(function(m){ return m._selected; }).length;
    var btn = document.querySelector('.import-action-bar .btn-primary');
    if (btn) btn.textContent = '✓ Import ' + selected + ' Transaksi';
    var statEl = document.querySelector('.import-summary-stats span:nth-child(2)');
    if (statEl) statEl.innerHTML = '<strong class="text-green">' + selected + '</strong> akan diimport';
  }

  // ── Select Helpers ─────────────────────────────────────────
  function selectAll(val) {
    _mapped.forEach(function(m){ m._selected = val; });
    _renderPreview();
  }

  function selectReview() {
    _mapped.forEach(function(m){ m._selected = m._needs_review; });
    _renderPreview();
  }

  function toggleAll(checked) {
    var pageRows = _mapped.slice(_page*PAGE_SIZE, _page*PAGE_SIZE+PAGE_SIZE);
    pageRows.forEach(function(m){ m._selected = checked; });
    _updateSummaryBar();
  }

  // ── Pagination ────────────────────────────────────────────
  function prevPage() {
    if (_page > 0) { _page--; _renderPreview(); }
  }
  function nextPage() {
    if ((_page+1)*PAGE_SIZE < _mapped.length) { _page++; _renderPreview(); }
  }

  // ── Confirm Import ────────────────────────────────────────
  function confirmImport() {
    var toImport = _mapped.filter(function(m){ return m._selected; });
    if (toImport.length === 0) {
      Utils.toast('Tidak ada baris yang dipilih', 'error');
      return;
    }

    // Show confirmation modal
    var modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML =
      '<div class="modal">' +
        '<h3 style="margin-bottom:.75rem">Konfirmasi Import</h3>' +
        '<p class="text-muted text-sm" style="margin-bottom:1rem;line-height:1.6">' +
          'Akan mengimport <strong>' + toImport.length + ' transaksi</strong> ke ledger. ' +
          'Transaksi akan langsung berstatus <strong>Posted</strong>. ' +
          'Tindakan ini tidak dapat di-undo secara massal (hanya bisa hapus satu per satu).' +
        '</p>' +
        '<div class="info-box" style="margin-bottom:1rem">' +
          '&#9432; Pastikan sudah me-review semua baris yang berwarna kuning (perlu review).' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-ghost" onclick="this.closest(\'.modal-overlay\').remove()">Batal</button>' +
          '<button class="btn btn-primary" id="do-import-btn">Import ' + toImport.length + ' Transaksi</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);

    document.getElementById('do-import-btn').onclick = function() {
      modal.remove();
      _doImport(toImport);
    };
  }

  function _doImport(rows) {
    var success = 0, failed = 0, errors = [];

    rows.forEach(function(m) {
      try {
        var txnId = Utils.newTxnId(m.txn_date);
        DB.Transactions.save({
          txn_id:             txnId,
          txn_date:           m.txn_date,
          entry_date:         Utils.today(),
          entity_id:          m.entity_id || 'E01',
          bu_id:              m.bu_id     || '',
          activity_id:        m.activity_id || null,
          account_id:         m.account_id,
          counter_account_id: null,
          coa_code:           m.coa_code,
          type_id:            m.type_id,
          cp_id:              null,
          amount:             m.amount,
          direction:          m.direction,
          description:        m.description,
          reference_id:       'IMPORT-' + Utils.today(),
          status:             'Posted',
          void_reason:        null,
          created_by:         'Import',
          period:             Utils.toPeriod(m.txn_date)
        });
        success++;
      } catch(e) {
        failed++;
        errors.push(m.description + ': ' + e.message);
      }
    });

    // Show result
    var area = document.getElementById('import-preview-area');
    area.innerHTML =
      '<div class="import-result ' + (failed===0?'import-result-ok':'import-result-partial') + '">' +
        '<div class="import-result-icon">' + (failed===0?'&#10003;':'&#9888;') + '</div>' +
        '<div class="import-result-body">' +
          '<div class="import-result-title">' +
            (failed===0 ? 'Import Berhasil!' : 'Import Selesai dengan ' + failed + ' Error') +
          '</div>' +
          '<div class="import-result-detail">' +
            '<strong>' + success + '</strong> transaksi berhasil diimport' +
            (failed > 0 ? ', <strong>' + failed + '</strong> gagal' : '') +
          '</div>' +
          (errors.length > 0 ?
            '<div class="import-result-errors"><strong>Error:</strong><br>' + errors.slice(0,5).join('<br>') + '</div>'
          : '') +
          '<div class="import-result-actions">' +
            '<button class="btn btn-ghost" onclick="ImportModule.render()">Import File Lain</button>' +
            '<button class="btn btn-primary" onclick="App.navigate(\'transactions\')">Lihat Transaksi</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('import-status').innerHTML = '';
    Utils.toast('Import selesai: ' + success + ' transaksi');
  }

  // ── Download Template CSV ─────────────────────────────────
  function downloadTemplate() {
    var headers = ['date','description','cash_in','cash_out','entity','subcategory','category'];
    var sample  = [
      ['2026-01-01','Contoh penerimaan WFA','1100000','','BCA JO','Participant Loan','WFA2025'],
      ['2026-01-02','Contoh biaya operasional','','183148','Petty Cash','Utilities','2. Operational']
    ];
    Utils.exportCSV(headers, sample, 'template-import-finance-os.csv');
    Utils.toast('Template CSV didownload');
  }

  return {
    render, onFileSelect,
    selectAll, selectReview, toggleAll,
    prevPage, nextPage,
    confirmImport, downloadTemplate
  };

})();

const Reports = (() => {

  let _activeReport = 'pl';

    { id: 'pl_compare',   label: 'P&L Komparatif',          icon: '⇌' },
    { id: 'bs',           label: 'Neraca (Balance Sheet)',   icon: '⊟' },
    { id: 'cf',           label: 'Arus Kas (Cash Flow)',     icon: '⇅' },
    { id: 'ar_aging',     label: 'Aging Piutang',            icon: '↓' },
    { id: 'ap_aging',     label: 'Aging Utang',              icon: '↑' },
    { id: 'bu_profit',    label: 'Profitabilitas BU',        icon: '◈' },
    { id: 'act_profit',   label: 'Profitabilitas Activity',  icon: '⬡' },

    { id: 'debt_outstanding', label: 'Posisi Utang',         icon: '◎' },

  // ── Entry Point ───────────────────────────────────────────
  function render() {
    const body = document.getElementById('page-body');
    body.innerHTML =
      '<div class="reports-layout">' +
        '<div class="reports-sidebar">' +
          REPORT_MENU.map(function(r){

        '</div>' +
        '<div class="reports-content" id="report-content">' +
          _renderReport(_activeReport) +
        '</div>' +
      '</div>';
  }

  function switchReport(id) {
    _activeReport = id;
    // Update menu active state
    document.querySelectorAll('.report-menu-item').forEach(function(el){
      el.classList.toggle('active', el.textContent.trim().includes(REPORT_MENU.find(function(r){ return r.id===id; }).label));
    });
    document.getElementById('report-content').innerHTML = _renderReport(id);
  }

  function _renderReport(id) {
    const entity = App.getEntity();
    const period = App.getPeriod();
    switch(id) {
      case 'pl':        return _buildPL(entity, period);
      case 'bs':        return _buildBS(entity);
      case 'cf':        return _buildCF(entity, period);
      case 'ar_aging':  return _buildARaging(entity);
      case 'ap_aging':  return _buildAPaging(entity);
      case 'bu_profit': return _buildBUProfit(entity, period);
      case 'pl_compare': return _buildPLCompare(entity, period);
      case 'act_profit':return _buildActProfit(entity, period);
      case 'treasury':          return _buildTreasurySummary(entity, period);
      case 'debt_outstanding':  return _buildDebtOutstanding(entity);
      case 'debt_projection':   return _buildDebtProjection(entity);

  // ── Report Header ─────────────────────────────────────────
  function _reportHeader(title, subtitle, exportFn) {
    return '<div class="report-header">' +
      '<div>' +
        '<h2 class="report-title">' + title + '</h2>' +
        '<div class="report-subtitle">' + subtitle + '</div>' +

      '<button class="btn btn-ghost btn-sm" onclick="' + exportFn + '">Export CSV</button>' +
    '</div>';

  // ══════════════════════════════════════════════════════════
  // 1. PROFIT & LOSS

  // ── Drill-down: bind click on drillable rows ─────────────
  function _bindDrilldown(body) {
    if (!body) return;
    body.querySelectorAll('.report-row-drillable').forEach(function(row) {
      row.style.cursor = 'pointer';

  function _showDrilldown(coa_code, entity, period) {
    var coa  = DB.COA.byCode(coa_code);
    var txns = DB.Transactions.all().filter(function(t) {
      return t.status === 'Posted' &&

  }

  function _buildPL(entity, period) {
    const txns = DB.Transactions.all().filter(function(t){
      if (t.status !== 'Posted') return false;
      if (t.period !== period)   return false;
      if (entity !== 'ALL' && t.entity_id !== entity) return false;
      const coa = DB.COA.byCode(t.coa_code);
      return coa && (coa.coa_category === 'Revenue' || coa.coa_category === 'Expense');
    });

    // Group by COA
    const grouped = {};
    txns.forEach(function(t){
      const coa = DB.COA.byCode(t.coa_code);
      if (!coa) return;
      if (!grouped[t.coa_code]) grouped[t.coa_code] = { coa_code: t.coa_code, coa_name: coa.coa_name, category: coa.coa_category, subcategory: coa.coa_subcategory, total: 0 };
      if (coa.coa_category === 'Revenue') grouped[t.coa_code].total += (t.direction==='Credit' ? t.amount : -t.amount);
      else grouped[t.coa_code].total += (t.direction==='Debit' ? t.amount : -t.amount);
    });

    const revenues = Object.values(grouped).filter(function(g){ return g.category==='Revenue'; });
    const expenses = Object.values(grouped).filter(function(g){ return g.category==='Expense'; });
    const totalRev = revenues.reduce(function(s,g){ return s+g.total; }, 0);
    const totalExp = expenses.reduce(function(s,g){ return s+g.total; }, 0);
    const netProfit = totalRev - totalExp;

    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    return _reportHeader('Laporan Laba Rugi', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportPL()') +
      '<div class="report-body">' +

      // Revenue section — grouped by subcategory
      '<div class="report-section-head">PENDAPATAN USAHA</div>' +
      (revenues.filter(function(r){ return r.subcategory === 'Pendapatan Usaha'; }).length === 0
        ? '<div class="report-empty-row">Tidak ada pendapatan operasional</div>'
        : revenues.filter(function(r){ return r.subcategory === 'Pendapatan Usaha'; }).map(function(r){
            return '<div class="report-row">' +
              '<div class="report-row-label"><span class="coa-code">' + r.coa_code + '</span>' + r.coa_name + '</div>' +
              '<div class="report-row-value text-green">' + Utils.formatIDR(r.total) + '</div>' +
            '</div>';
          }).join('')
      ) +
      (revenues.filter(function(r){ return r.subcategory === 'Pendapatan Non-Usaha'; }).length > 0
        ? '<div class="report-section-head" style="margin-top:.75rem">PENDAPATAN NON-USAHA</div>' +
          revenues.filter(function(r){ return r.subcategory === 'Pendapatan Non-Usaha'; }).map(function(r){
            return '<div class="report-row">' +
              '<div class="report-row-label"><span class="coa-code">' + r.coa_code + '</span>' + r.coa_name + '</div>' +
              '<div class="report-row-value text-green">' + Utils.formatIDR(r.total) + '</div>' +
            '</div>';
          }).join('')
        : ''
      ) +
      '<div class="report-subtotal">' +
        '<div class="report-row-label"><strong>Total Pendapatan</strong></div>' +
        '<div class="report-row-value"><strong class="text-green">' + Utils.formatIDR(totalRev) + '</strong></div>' +
      '</div>' +

      // Expense section — SAK EMKM: HPP → Laba Kotor → Opex → Laba Bersih
      (function(){
        var hpp   = expenses.filter(function(e){ return e.subcategory === 'Harga Pokok Pendapatan'; });
        var opex  = expenses.filter(function(e){ return e.subcategory !== 'Harga Pokok Pendapatan'; });
        var totalHPP = hpp.reduce(function(s,e){ return s+e.total; }, 0);
        var labaKotor = totalRev - totalHPP;

        // HPP Section
        var hppHTML = hpp.length > 0
          ? '<div class="report-section-head" style="margin-top:1.25rem">HARGA POKOK PENDAPATAN (HPP)</div>' +
            hpp.map(function(e){
              return '<div class="report-row">' +
                '<div class="report-row-label"><span class="coa-code">' + e.coa_code + '</span>' + e.coa_name + '</div>' +
                '<div class="report-row-value text-red">' + Utils.formatIDR(e.total) + '</div>' +
              '</div>';
            }).join('') +
            '<div class="report-subtotal">' +
              '<div class="report-row-label"><strong>Total HPP</strong></div>' +
              '<div class="report-row-value"><strong class="text-red">' + Utils.formatIDR(totalHPP) + '</strong></div>' +
            '</div>'
          : '';

        // Laba Kotor line
        var labaKotorHTML =
          '<div class="report-net ' + (labaKotor>=0?'net-profit':'net-loss') + '" style="margin:1rem 0">' +
            '<div class="report-row-label"><strong>LABA KOTOR</strong><br>' +
              '<small style="font-weight:400;opacity:.7">Pendapatan &minus; HPP</small>' +
            '</div>' +
            '<div class="report-row-value"><strong>' + Utils.formatIDR(labaKotor) + '</strong></div>' +
          '</div>';

        // Opex grouped by subcategory
        var opexSubcats = [];
        opex.forEach(function(e){ if (!opexSubcats.includes(e.subcategory)) opexSubcats.push(e.subcategory); });
        var totalOpex = opex.reduce(function(s,e){ return s+e.total; }, 0);

        var opexHTML = opex.length > 0
          ? '<div class="report-section-head">BEBAN OPERASIONAL</div>' +
            opexSubcats.map(function(sub){
              var items = opex.filter(function(e){ return e.subcategory === sub; });
              return '<div class="cf-subgroup">' +
                '<div class="cf-subgroup-label">' + sub + '</div>' +
                items.map(function(e){
                  return '<div class="report-row report-row-drillable" data-coa="' + e.coa_code + '" data-entity="' + entity + '" data-period="' + period + '">' +
                    '<div class="report-row-label"><span class="coa-code">' + e.coa_code + '</span>' + e.coa_name + '</div>' +
                    '<div class="report-row-value text-red">' + Utils.formatIDR(e.total) +
                      ' <span class="drill-icon" title="Lihat transaksi">&#8599;</span>' +
                    '</div>' +
                  '</div>';

              '</div>';
            }).join('') +
            '<div class="report-subtotal">' +
              '<div class="report-row-label"><strong>Total Beban Operasional</strong></div>' +
              '<div class="report-row-value"><strong class="text-red">' + Utils.formatIDR(totalOpex) + '</strong></div>' +
            '</div>'
          : '';

        return hppHTML + (hpp.length > 0 ? labaKotorHTML : '') + opexHTML;
      })() +
      '<div class="report-subtotal">' +
        '<div class="report-row-label"><strong>Total Beban</strong></div>' +
        '<div class="report-row-value"><strong class="text-red">' + Utils.formatIDR(totalExp) + '</strong></div>' +
      '</div>' +

      // Net profit
      '<div class="report-net ' + (netProfit>=0?'net-profit':'net-loss') + '">' +
        '<div class="report-row-label"><strong>' + (netProfit>=0?'LABA BERSIH':'RUGI BERSIH') + '</strong></div>' +
        '<div class="report-row-value"><strong>' + Utils.formatIDR(Math.abs(netProfit)) + '</strong></div>' +
      '</div>' +

      '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // 1b. P&L KOMPARATIF — periode ini vs periode sebelumnya
  // ══════════════════════════════════════════════════════════
  function _buildPLCompare(entity, period) {
    var entityName = entity === 'ALL' ? 'Semua Entity' : (DB.Entities.byId(entity) || {entity_name: entity}).entity_name;

    // Calculate previous period
    var parts  = period.split('-');
    var yr     = parseInt(parts[0]);
    var mo     = parseInt(parts[1]);
    mo--;
    if (mo < 1) { mo = 12; yr--; }
    var prevPeriod = yr + '-' + String(mo).padStart(2, '0');

    // Helper: get grouped P&L data for a period
    function _getPLData(p) {
      var txns = DB.Transactions.all().filter(function(t) {
        if (t.status !== 'Posted' || t.period !== p) return false;
        if (entity !== 'ALL' && t.entity_id !== entity) return false;
        var coa = DB.COA.byCode(t.coa_code);
        return coa && (coa.coa_category === 'Revenue' || coa.coa_category === 'Expense');
      });
      var grouped = {};
      txns.forEach(function(t) {
        var coa = DB.COA.byCode(t.coa_code);
        if (!coa) return;
        if (!grouped[t.coa_code]) grouped[t.coa_code] = {
          coa_code: t.coa_code, coa_name: coa.coa_name,
          category: coa.coa_category, subcategory: coa.coa_subcategory || '', total: 0
        };
        if (coa.coa_category === 'Revenue') grouped[t.coa_code].total += (t.direction === 'Credit' ? t.amount : -t.amount);
        else grouped[t.coa_code].total += (t.direction === 'Debit' ? t.amount : -t.amount);
      });
      return Object.values(grouped);
    }

    var curData  = _getPLData(period);
    var prevData = _getPLData(prevPeriod);

    // Merge all COA codes from both periods
    var allCodes = {};
    curData.forEach(function(d)  { allCodes[d.coa_code] = d; });
    prevData.forEach(function(d) { if (!allCodes[d.coa_code]) allCodes[d.coa_code] = { coa_code: d.coa_code, coa_name: d.coa_name, category: d.category, subcategory: d.subcategory, total: 0 }; });

    // Build comparison rows
    function _getTotal(data, code) {
      var found = data.find(function(d) { return d.coa_code === code; });
      return found ? found.total : 0;
    }

    function _changeClass(change) {
      return change > 0 ? 'text-green' : change < 0 ? 'text-red' : 'text-muted';
    }

    function _changePct(cur, prev) {
      if (prev === 0 && cur === 0) return '—';
      if (prev === 0) return '<span class="text-green">baru</span>';
      var pct = ((cur - prev) / Math.abs(prev) * 100).toFixed(1);
      return '<span class="' + _changeClass(cur - prev) + '">' + (cur > prev ? '+' : '') + pct + '%</span>';
    }

    var revenues = Object.values(allCodes).filter(function(d) { return d.category === 'Revenue'; });
    var expenses = Object.values(allCodes).filter(function(d) { return d.category === 'Expense'; });

    var curRev  = curData.filter(function(d)  { return d.category === 'Revenue'; }).reduce(function(s,d){ return s+d.total; }, 0);
    var prevRev = prevData.filter(function(d) { return d.category === 'Revenue'; }).reduce(function(s,d){ return s+d.total; }, 0);
    var curExp  = curData.filter(function(d)  { return d.category === 'Expense'; }).reduce(function(s,d){ return s+d.total; }, 0);
    var prevExp = prevData.filter(function(d) { return d.category === 'Expense'; }).reduce(function(s,d){ return s+d.total; }, 0);
    var curNet  = curRev  - curExp;
    var prevNet = prevRev - prevExp;

    function _compRow(item) {
      var cur  = _getTotal(curData,  item.coa_code);
      var prev = _getTotal(prevData, item.coa_code);
      var diff = cur - prev;
      return '<tr>' +
        '<td><span class="coa-code">' + item.coa_code + '</span>' + item.coa_name + '</td>' +
        '<td class="text-right mono ' + (item.category==='Revenue'?'text-green':'text-red') + '">' + Utils.formatIDR(cur) + '</td>' +
        '<td class="text-right mono ' + (item.category==='Revenue'?'text-green':'text-red') + ' cf-prev">' + Utils.formatIDR(prev) + '</td>' +
        '<td class="text-right mono ' + _changeClass(diff) + '">' + (diff !== 0 ? (diff > 0 ? '+' : '') + Utils.formatIDR(diff) : '—') + '</td>' +
        '<td class="text-right">' + _changePct(cur, prev) + '</td>' +
      '</tr>';
    }

    function _subHead(label) {
      return '<tr class="compare-subhead"><td colspan="5">' + label + '</td></tr>';
    }

    function _subtotalRow(label, cur, prev, isProfit) {
      var diff = cur - prev;
      var cls  = isProfit ? (cur >= 0 ? 'text-green' : 'text-red') : (cur > 0 ? 'text-red' : 'text-green');
      return '<tr class="compare-subtotal">' +
        '<td><strong>' + label + '</strong></td>' +
        '<td class="text-right mono ' + cls + '"><strong>' + Utils.formatIDR(cur)  + '</strong></td>' +
        '<td class="text-right mono ' + cls + ' cf-prev"><strong>' + Utils.formatIDR(prev) + '</strong></td>' +
        '<td class="text-right mono ' + _changeClass(diff) + '"><strong>' + (diff !== 0 ? (diff>0?'+':'') + Utils.formatIDR(diff) : '—') + '</strong></td>' +
        '<td class="text-right"><strong>' + _changePct(cur, prev) + '</strong></td>' +
      '</tr>';
    }

    // Group expenses by subcategory
    var expSubcats = [];
    expenses.forEach(function(e) {
      if (!expSubcats.includes(e.subcategory)) expSubcats.push(e.subcategory);
    });

    return _reportHeader(
      'P&L Komparatif',
      entityName + ' — ' + Utils.periodLabel(period) + ' vs ' + Utils.periodLabel(prevPeriod),
      'Reports.exportPLCompare()'
    ) +
    '<div class="report-body">' +
    '<div class="cf-method-note">' +
      '<strong>' + Utils.periodLabel(period) + '</strong> dibandingkan dengan ' +
      '<strong>' + Utils.periodLabel(prevPeriod) + '</strong>' +
    '</div>' +

    '<div style="overflow-x:auto">' +
    '<table class="table compare-table">' +
      '<thead><tr>' +
        '<th>Akun</th>' +
        '<th class="text-right">' + Utils.periodLabel(period) + '</th>' +
        '<th class="text-right cf-prev">' + Utils.periodLabel(prevPeriod) + '</th>' +
        '<th class="text-right">Selisih</th>' +
        '<th class="text-right">%</th>' +
      '</tr></thead>' +
      '<tbody>' +

      // Revenue rows
      _subHead('PENDAPATAN') +
      revenues.map(function(r) { return _compRow(r); }).join('') +
      _subtotalRow('Total Pendapatan', curRev, prevRev, true) +

      // Expense rows grouped by subcategory
      _subHead('BEBAN') +
      expSubcats.map(function(sub) {
        var items = expenses.filter(function(e) { return e.subcategory === sub; });
        return '<tr class="compare-subcathead"><td colspan="5">' + sub + '</td></tr>' +
          items.map(function(e) { return _compRow(e); }).join('');
      }).join('') +
      _subtotalRow('Total Beban', curExp, prevExp, false) +

      // Net profit
      '<tr class="compare-net ' + (curNet >= 0 ? 'net-positive' : 'net-negative') + '">' +
        '<td><strong>LABA / (RUGI) BERSIH</strong></td>' +
        '<td class="text-right mono"><strong>' + Utils.formatIDR(curNet) + '</strong></td>' +
        '<td class="text-right mono cf-prev"><strong>' + Utils.formatIDR(prevNet) + '</strong></td>' +
        '<td class="text-right mono ' + _changeClass(curNet - prevNet) + '"><strong>' + (curNet !== prevNet ? (curNet>prevNet?'+':'') + Utils.formatIDR(curNet - prevNet) : '—') + '</strong></td>' +
        '<td class="text-right"><strong>' + _changePct(curNet, prevNet) + '</strong></td>' +
      '</tr>' +

      '</tbody>' +
    '</table>' +
    '</div>' + // overflow-x
    '</div>';  // report-body
  }

  // ══════════════════════════════════════════════════════════
  // 2. BALANCE SHEET
  // ══════════════════════════════════════════════════════════
  function _buildBS(entity) {
    const bsData = DB.Reports.balanceSheet(entity);
    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    const assets      = bsData.filter(function(c){ return c.coa_category==='Asset'; });
    const liabilities = bsData.filter(function(c){ return c.coa_category==='Liability'; });
    const equity      = bsData.filter(function(c){ return c.coa_category==='Equity'; });

    const totalAssets = assets.reduce(function(s,c){ return s+c.balance; }, 0);
    const totalLiab   = liabilities.reduce(function(s,c){ return s+c.balance; }, 0);
    const totalEquity = equity.reduce(function(s,c){ return s+c.balance; }, 0);

    const today = new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });

    // ── Diagnostic ────────────────────────────────────────
    const diff       = totalAssets - (totalLiab + totalEquity);
    const absDiff    = Math.abs(diff);
    const balanced   = absDiff < 1;

    // Find periods to diagnose imbalance
    var diagnosticHTML = '';
    if (!balanced) {
      // Find which COA categories contribute most to imbalance
      var assetSum  = assets.reduce(function(s,c){ return s + c.balance; }, 0);
      var liabSum   = liabilities.reduce(function(s,c){ return s + c.balance; }, 0);
      var equitySum = equity.reduce(function(s,c){ return s + c.balance; }, 0);

      // Find transactions without a COA match
      var allTxns    = DB.Transactions.all().filter(function(t){
        return t.status === 'Posted' && (entity === 'ALL' || t.entity_id === entity);
      });
      var missingCOA = allTxns.filter(function(t){ return !DB.COA.byCode(t.coa_code); });
      var oneSidedTxns = allTxns.filter(function(t){
        // Treasury should have 2 entries per ref — single entries create imbalance
        return t.type_id === 'TXN-06';
      });

      // Check for treasury imbalance
      var tryRefs = {};
      DB.Treasury.all().forEach(function(l){
        if (!tryRefs[l.try_ref]) tryRefs[l.try_ref] = 0;
        tryRefs[l.try_ref]++;
      });
      var unpairedCount = Object.values(tryRefs).filter(function(c){ return c !== 2; }).length;

      diagnosticHTML =
        '<div class="bs-diagnostic">' +
          '<div class="bs-diag-title">&#9888; Analisis Ketidakseimbangan</div>' +
          '<div class="bs-diag-grid">' +

            '<div class="bs-diag-item">' +
              '<div class="bs-diag-label">Selisih</div>' +
              '<div class="bs-diag-val text-red">' + Utils.formatIDR(absDiff) + '</div>' +
              '<div class="bs-diag-desc">' + (diff > 0 ? 'Aset lebih besar dari Kewajiban + Ekuitas' : 'Kewajiban + Ekuitas lebih besar dari Aset') + '</div>' +
            '</div>' +

            '<div class="bs-diag-item">' +
              '<div class="bs-diag-label">Total Aset</div>' +
              '<div class="bs-diag-val text-blue">' + Utils.formatIDR(assetSum) + '</div>' +
            '</div>' +

            '<div class="bs-diag-item">' +
              '<div class="bs-diag-label">Total Kewajiban + Ekuitas</div>' +
              '<div class="bs-diag-val">' + Utils.formatIDR(liabSum + equitySum) + '</div>' +
            '</div>' +

          '</div>' +

          '<div class="bs-diag-causes">' +
            '<div class="bs-diag-causes-title">Kemungkinan Penyebab:</div>' +
            '<ul class="bs-diag-list">' +
              (missingCOA.length > 0
                ? '<li><strong>' + missingCOA.length + ' transaksi</strong> memiliki COA yang tidak ada di master — transaksi ini tidak masuk ke Neraca</li>'
                : '') +
              (unpairedCount > 0
                ? '<li><strong>' + unpairedCount + ' Treasury movement</strong> tidak berpasangan — satu leg hilang menyebabkan nilai ganda</li>'
                : '') +
              '<li>Transaksi Equity Movement (modal masuk/keluar) belum dicatat</li>' +
              '<li>Opening balance akun belum diinput dengan benar</li>' +
              '<li>Transaksi dengan Direction yang salah (Revenue di-Debit atau Expense di-Credit)</li>' +
            '</ul>' +
          '</div>' +

          '<div class="bs-diag-actions">' +
            '<button class="btn btn-ghost btn-sm" onclick="App.navigate(\'transactions\')">&#8594; Cek Transaksi</button>' +
            '<button class="btn btn-ghost btn-sm" onclick="App.navigate(\'treasury\')">&#8594; Cek Treasury</button>' +
            '<button class="btn btn-ghost btn-sm" onclick="App.navigate(\'masters\')">&#8594; Cek Master COA</button>' +
          '</div>' +
        '</div>';
    }

    return _reportHeader('Neraca (Balance Sheet)', entityName + ' — per ' + today, 'Reports.exportBS()') +
      (balanced
        ? '<div class="balance-check ok">&#10003; Neraca seimbang — Aset = Kewajiban + Ekuitas = ' + Utils.formatIDR(totalAssets) + '</div>'
        : '<div class="balance-check warn">&#9888; Neraca tidak seimbang — selisih ' + Utils.formatIDR(absDiff) + '</div>' + diagnosticHTML
      ) +
      '<div class="report-body bs-layout">' +

      // Assets column — SAK EMKM: Aset Lancar then Aset Tidak Lancar
      '<div class="bs-column">' +
        '<div class="report-section-head">ASET</div>' +
        '<div class="bs-liquidity-head">Aset Lancar</div>' +
        _bsSection(assets, 'Kas & Bank') +
        _bsSection(assets, 'Piutang') +
        _bsSection(assets, 'Uang Muka Pemilik') +
        _bsSection(assets, 'Biaya Dibayar Dimuka') +
        _bsSection(assets, 'Persediaan') +
        '<div class="bs-liquidity-head">Aset Tidak Lancar</div>' +
        _bsSection(assets, 'Aset Tetap') +
        '<div class="report-subtotal">' +
          '<div class="report-row-label"><strong>Total Aset</strong></div>' +
          '<div class="report-row-value"><strong class="text-blue">' + Utils.formatIDR(totalAssets) + '</strong></div>' +
        '</div>' +
      '</div>' +

      // Liabilities + Equity column
      '<div class="bs-column">' +
        '<div class="report-section-head">KEWAJIBAN</div>' +
        '<div class="bs-liquidity-head">Kewajiban Jangka Pendek</div>' +
        _bsSection(liabilities, 'Fasilitas Kredit') +
        _bsSection(liabilities, 'Utang Usaha') +
        _bsSection(liabilities, 'Antarperusahaan') +
        _bsSection(liabilities, 'Uang Muka Diterima') +
        _bsSection(liabilities, 'Liabilitas Akrual') +
        '<div class="bs-liquidity-head">Kewajiban Jangka Panjang</div>' +
        _bsSection(liabilities, 'Utang Pinjaman') +
        '<div class="report-subtotal">' +
          '<div class="report-row-label"><strong>Total Kewajiban</strong></div>' +
          '<div class="report-row-value"><strong class="text-red">' + Utils.formatIDR(totalLiab) + '</strong></div>' +
        '</div>' +
        '<div class="report-section-head" style="margin-top:1rem">EKUITAS</div>' +
        equity.map(function(c){ return _bsRow(c); }).join('') +
        '<div class="report-subtotal">' +
          '<div class="report-row-label"><strong>Total Ekuitas</strong></div>' +
          '<div class="report-row-value"><strong class="text-green">' + Utils.formatIDR(totalEquity) + '</strong></div>' +
        '</div>' +
        '<div class="report-net ' + (balanced?'net-profit':'net-loss') + '">' +
          '<div class="report-row-label"><strong>Total Kewajiban + Ekuitas</strong></div>' +
          '<div class="report-row-value"><strong>' + Utils.formatIDR(totalLiab + totalEquity) + '</strong></div>' +
        '</div>' +
      '</div>' +

      '</div>';
  }

  function _bsSection(items, subcategory) {
    const filtered = items.filter(function(c){ return c.coa_subcategory === subcategory && Math.abs(c.balance) > 0; });
    if (filtered.length === 0) return '';
    return '<div class="bs-subcategory">' + subcategory + '</div>' +
      filtered.map(function(c){ return _bsRow(c); }).join('');
  }

  function _bsRow(c) {
    return '<div class="report-row">' +
      '<div class="report-row-label"><span class="coa-code">' + c.coa_code + '</span>' + c.coa_name + '</div>' +
      '<div class="report-row-value">' + Utils.formatIDR(c.balance) + '</div>' +
    '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // 3. CASH FLOW — Metode Langsung (Direct Method)
  // Klasifikasi per SAK EMKM:
  // ── Cash Flow: Sprint 3 Enhancement ─────────────────────────
  // Priority: cf_class field (Sprint 1 Rule Engine) → TXN type fallback
  // cf_class values: Operating | Financing | Investing | Treasury | Excluded
  // Investing: asset purchases (future — classified via cf_class override)
  // ══════════════════════════════════════════════════════════
  function _resolveCfClass(t) {
    // Priority 1: explicit cf_class from Rule Engine (Sprint 1)
    if (t.cf_class && t.cf_class !== '') return t.cf_class;
    // Priority 2: legacyCfClass fallback
    return DB.RuleEngine.legacyCfClass(t.type_id);
  }

  function _buildCF(entity, period) {
    const allTxns = DB.Transactions.all().filter(function(t){
      if (t.status !== 'Posted' || t.period !== period) return false;
      if (entity !== 'ALL' && t.entity_id !== entity) return false;
      return true;
    });

    const cashAcctIds = DB.Accounts.cashAccounts()
      .filter(function(a){ return entity === 'ALL' || a.entity_id === entity; })
      .map(function(a){ return a.account_id; });

    // Only transactions that touch a cash/bank account
    const cashTxns = allTxns.filter(function(t){
      return cashAcctIds.includes(t.account_id);
    });

    // Count transactions using cf_class vs legacy fallback
    var cfClassCount  = cashTxns.filter(function(t){ return t.cf_class && t.cf_class !== ''; }).length;
    var legacyCount   = cashTxns.length - cfClassCount;

    var operating = 0, financing = 0, investing = 0, treasury_flow = 0;
    var op_rows = [], inv_rows = [], excl_rows = [];

    // Group financing and operating by Event Domain for richer reporting
    var fin_groups = {
      loan:     { label: 'Pinjaman & Pelunasan',                  rows: [], total: 0 },
      equity:   { label: 'Pergerakan Ekuitas',                    rows: [], total: 0 },
      rcv_pay:  { label: 'Piutang & Utang',                       rows: [], total: 0 },
      liab_pay: { label: 'Pembayaran Fasilitas Kredit & Cicilan',  rows: [], total: 0 }
    };

    var op_groups = {
      revenue:  { label: 'Penerimaan Pendapatan Usaha',   rows: [], total: 0 },
      expense:  { label: 'Pengeluaran Operasional',        rows: [], total: 0 },
      other:    { label: 'Operasional Lainnya',            rows: [], total: 0 }
    };

    cashTxns.forEach(function(t){
      var coa     = DB.COA.byCode(t.coa_code);
      if (!coa) return;
      var cfClass = _resolveCfClass(t);
      var amt     = t.direction === 'Debit' ? t.amount : -t.amount;

      switch(cfClass) {

        case 'Treasury':
          treasury_flow += amt;
          excl_rows.push({ label: t.description, amount: amt, type: t.type_id });
          break;

        case 'Excluded':
          excl_rows.push({ label: t.description, amount: amt, type: t.type_id });
          break;

        case 'Operating':
          operating += amt;
          if (coa.coa_category === 'Revenue') {
            op_groups.revenue.total += amt;
            op_groups.revenue.rows.push({ label: t.description, coa: coa.coa_name, amount: amt, event: t.event_id });
          } else if (coa.coa_category === 'Expense') {
            op_groups.expense.total += amt;
            op_groups.expense.rows.push({ label: t.description, coa: coa.coa_name, amount: amt, event: t.event_id });
          } else {
            op_groups.other.total += amt;
            op_groups.other.rows.push({ label: t.description, coa: coa.coa_name, amount: amt, event: t.event_id });
          }
          break;

        case 'Investing':
          investing += amt;
          inv_rows.push({ label: t.description, coa: coa.coa_name, amount: amt });
          break;

        case 'Financing':
          financing += amt;
          // Sub-group by TXN type for detail
          if (t.type_id === 'TXN-04') {
            fin_groups.loan.total += amt;
            fin_groups.loan.rows.push({ label: t.description, amount: amt });
          } else if (t.type_id === 'TXN-03' || t.type_id === 'TXN-05') {
            fin_groups.rcv_pay.total += amt;
            fin_groups.rcv_pay.rows.push({ label: t.description + (t.type_id==='TXN-05'?' [CEO Advance]':''), amount: amt });
          } else if (t.type_id === 'TXN-07') {
            fin_groups.equity.total += amt;
            fin_groups.equity.rows.push({ label: t.description, amount: amt });
          } else if (t.type_id === 'TXN-08' || t.type_id === 'TXN-09') {
            fin_groups.liab_pay.total += amt;
            fin_groups.liab_pay.rows.push({ label: t.description, amount: amt });
          } else {
            fin_groups.rcv_pay.total += amt;
            fin_groups.rcv_pay.rows.push({ label: t.description, amount: amt });
          }
          break;

        default:
          // Unknown cf_class — classify by COA category as last resort
          if (coa.coa_category === 'Revenue' || coa.coa_category === 'Expense') {
            operating += amt;
            op_groups.other.total += amt;
            op_groups.other.rows.push({ label: t.description + ' [' + t.type_id + ']', coa: coa.coa_name, amount: amt });
          } else {
            financing += amt;
            fin_groups.rcv_pay.total += amt;
            fin_groups.rcv_pay.rows.push({ label: t.description + ' [' + t.type_id + ']', amount: amt });
          }
      }
    });

    var net = operating + financing + investing;
    var entityName = entity === 'ALL' ? 'Semua Entity' : (DB.Entities.byId(entity) || {entity_name: entity}).entity_name;

    function _cfRow(r) {
      return '<div class="report-row">' +
        '<div class="report-row-label">' + r.label +
          (r.coa ? ' <span class="coa-code">' + r.coa + '</span>' : '') +
          (r.event ? ' <span class="text-xs text-faint">[' + r.event + ']</span>' : '') +
        '</div>' +
        '<div class="report-row-value ' + (r.amount >= 0 ? 'text-green' : 'text-red') + '">' + Utils.formatIDR(r.amount) + '</div>' +
      '</div>';
    }

    function _cfGroup(group) {
      if (group.rows.length === 0) return '';
      return '<div class="cf-subgroup">' +
        '<div class="cf-subgroup-label">' + group.label + '</div>' +
        group.rows.map(function(r){ return _cfRow(r); }).join('') +
        '<div class="cf-subgroup-total">' +
          '<span>' + group.label + '</span>' +
          '<span class="mono ' + (group.total >= 0 ? 'text-green' : 'text-red') + '">' + Utils.formatIDR(group.total) + '</span>' +
        '</div>' +
      '</div>';
    }

    var hasFinancing = Object.values(fin_groups).some(function(g){ return g.rows.length > 0; });
    var hasInvesting = inv_rows.length > 0;

    // cf_class coverage indicator
    var coverageNote = legacyCount > 0
      ? '<div class="cf-method-note" style="color:var(--yellow);margin-top:.4rem">' +
          '&#9432; ' + cfClassCount + ' transaksi menggunakan cf_class Rule Engine, ' +
          legacyCount + ' transaksi menggunakan klasifikasi legacy.' +
        '</div>'
      : (cfClassCount > 0
          ? '<div class="cf-method-note" style="color:var(--green);margin-top:.4rem">&#10003; Semua ' + cfClassCount + ' transaksi menggunakan cf_class Rule Engine.</div>'
          : '');

    return _reportHeader(
      'Laporan Arus Kas',
      entityName + ' — ' + Utils.periodLabel(period) + ' (Metode Langsung)',
      'Reports.exportCF()'
    ) +

    '<div class="report-body">' +

    // ── Methodology note ──────────────────────────────────
    '<div class="cf-method-note">' +
      '<strong>Sumber klasifikasi:</strong> ' +
      '<span class="badge badge-green">cf_class</span> Rule Engine (Sprint 1) &nbsp;|&nbsp; ' +
      '<span class="badge badge-gray">Legacy</span> TXN type fallback' +
    '</div>' +
    coverageNote +

    // ── A. OPERATING ──────────────────────────────────────
    '<div class="report-section-head">A. AKTIVITAS OPERASI</div>' +
    (operating === 0 && Object.values(op_groups).every(function(g){ return g.rows.length===0; })
      ? '<div class="report-empty-row">Tidak ada arus kas operasi periode ini</div>'
      : Object.keys(op_groups).map(function(key) {
          var g = op_groups[key];
          if (g.rows.length === 0) return '';
          return '<div class="cf-subgroup">' +
            '<div class="cf-subgroup-label">' + g.label + '</div>' +
            g.rows.map(function(r){ return _cfRow(r); }).join('') +
          '</div>';
        }).join('')
    ) +
    '<div class="report-subtotal">' +
      '<div class="report-row-label"><strong>Net Arus Kas Operasi</strong></div>' +
      '<div class="report-row-value"><strong class="' + (operating >= 0 ? 'text-green' : 'text-red') + '">' + Utils.formatIDR(operating) + '</strong></div>' +
    '</div>' +

    // ── B. FINANCING ──────────────────────────────────────
    '<div class="report-section-head" style="margin-top:1.25rem">B. AKTIVITAS PENDANAAN</div>' +
    (!hasFinancing
      ? '<div class="report-empty-row">Tidak ada arus kas pendanaan periode ini</div>'
      : Object.values(fin_groups).map(function(g){ return _cfGroup(g); }).join('')
    ) +
    '<div class="report-subtotal">' +
      '<div class="report-row-label"><strong>Net Arus Kas Pendanaan</strong></div>' +
      '<div class="report-row-value"><strong class="' + (financing >= 0 ? 'text-green' : 'text-red') + '">' + Utils.formatIDR(financing) + '</strong></div>' +
    '</div>' +

    // ── C. INVESTING ──────────────────────────────────────
    '<div class="report-section-head" style="margin-top:1.25rem">C. AKTIVITAS INVESTASI</div>' +
    (!hasInvesting
      ? '<div class="report-empty-row text-muted">Belum ada transaksi investasi. ' +
          'Untuk mencatat pembelian/penjualan aset, gunakan cf_class = Investing saat input transaksi.</div>'
      : inv_rows.map(function(r){ return _cfRow(r); }).join('')
    ) +
    '<div class="report-subtotal">' +
      '<div class="report-row-label"><strong>Net Arus Kas Investasi</strong></div>' +
      '<div class="report-row-value"><strong class="' + (investing >= 0 ? 'text-green' : 'text-red') + '">' + Utils.formatIDR(investing) + '</strong></div>' +
    '</div>' +

    // ── D. TREASURY EXCLUDED ──────────────────────────────
    (excl_rows.length > 0
      ? '<div class="report-section-head" style="margin-top:1.25rem;color:var(--text-muted)">D. TREASURY (DIKECUALIKAN)</div>' +
        '<div class="report-empty-row text-muted">Transfer internal antar rekening tidak mempengaruhi net kas. Total pergerakan: ' + Utils.formatIDR(Math.abs(treasury_flow)) + '</div>'
      : ''
    ) +

    // ── NET ───────────────────────────────────────────────
    '<div class="report-net ' + (net >= 0 ? 'net-profit' : 'net-loss') + '" style="margin-top:1rem">' +
      '<div class="report-row-label"><strong>KENAIKAN / (PENURUNAN) KAS BERSIH</strong><br><small style="font-weight:400;opacity:.7">A + B + C</small></div>' +
      '<div class="report-row-value"><strong>' + Utils.formatIDR(net) + '</strong></div>' +
    '</div>' +

    '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // 4 & 5. AR / AP AGING
  // ══════════════════════════════════════════════════════════
  function _buildARaging(entity) {
    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

  function _agingTable(items, type) {
    if (items.length === 0) return '<div class="report-empty-row">Tidak ada saldo terbuka</div>';

    const buckets = { current:[], d1_30:[], d31_60:[], d61_90:[], d90plus:[] };
    items.forEach(function(item){
      const days = Utils.agingDays(item.due_date);
      const bal  = item.outstanding_balance;
      if (days<=0)       buckets.current.push(item);
      else if (days<=30) buckets.d1_30.push(item);
      else if (days<=60) buckets.d31_60.push(item);
      else if (days<=90) buckets.d61_90.push(item);
      else               buckets.d90plus.push(item);
    });

    const bktDef = [
      { key:'current', label:'Current',    cls:'text-green'  },
      { key:'d1_30',   label:'1–30 hari',  cls:'text-yellow' },
      { key:'d31_60',  label:'31–60 hari', cls:''            },
      { key:'d61_90',  label:'61–90 hari', cls:'text-red'    },
      { key:'d90plus', label:'>90 hari',   cls:'text-red'    }
    ];

    const cpLabel = type==='rcv' ? 'Debitur' : 'Kreditur';
    const idKey   = type==='rcv' ? 'rcv_id' : 'pay_id';

    let html = '<table class="table"><thead><tr><th>ID</th><th>' + cpLabel + '</th><th>Entity</th>' +
      '<th class="text-right">Jumlah Awal</th><th class="text-right">Outstanding</th>' +
      '<th>Jatuh Tempo</th><th>Bucket</th></tr></thead><tbody>';

    let grandTotal = 0;
    bktDef.forEach(function(b){
      if (buckets[b.key].length === 0) return;
      html += '<tr class="aging-group-header"><td colspan="7">' + b.label + ' <span class="badge badge-gray">' + buckets[b.key].length + '</span></td></tr>';
      buckets[b.key].forEach(function(item){
        const cp  = DB.Counterparties.byId(item.cp_id);
        const ent = DB.Entities.byId(item.entity_id);
        grandTotal += item.outstanding_balance;
        html += '<tr>' +
          '<td class="text-sm mono text-muted">' + item[idKey] + '</td>' +
          '<td>' + (cp ? cp.cp_name : item.cp_id) + '</td>' +
          '<td class="text-sm">' + (ent ? ent.entity_name : item.entity_id) + '</td>' +
          '<td class="text-right mono">' + Utils.formatIDR(item.original_amount) + '</td>' +
          '<td class="text-right mono">' + Utils.formatIDR(item.outstanding_balance) + '</td>' +
          '<td class="text-sm">' + Utils.formatDate(item.due_date) + '</td>' +
          '<td><span class="' + b.cls + ' text-sm">' + b.label + '</span></td>' +
        '</tr>';
      });
    });

    html += '</tbody></table>';
    html += '<div class="report-subtotal"><div class="report-row-label"><strong>Total Outstanding</strong></div><div class="report-row-value"><strong class="text-red">' + Utils.formatIDR(grandTotal) + '</strong></div></div>';
    return html;
  }

  // ══════════════════════════════════════════════════════════
  // 6. BU PROFITABILITY
  // ══════════════════════════════════════════════════════════
  function _buildBUProfit(entity, period) {
    const buData  = DB.Reports.buProfitability(entity, period);
    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    if (buData.length === 0) {
      return _reportHeader('Profitabilitas Business Unit', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportBUProfit()') +
        '<div class="report-body"><div class="report-empty-row">Belum ada data periode ini</div></div>';
    }

    const maxAbs = Math.max.apply(null, buData.map(function(b){ return Math.max(b.revenue, b.expense); }).concat([1]));

    return _reportHeader('Profitabilitas Business Unit', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportBUProfit()') +
      '<div class="report-body">' +
      '<table class="table">' +
        '<thead><tr><th>Business Unit</th><th class="text-right">Pendapatan</th><th class="text-right">Beban</th><th class="text-right">Laba Bersih</th><th>Margin</th><th style="width:160px">Visual</th></tr></thead>' +
        '<tbody>' +
        buData.map(function(b){
          const margin = b.revenue > 0 ? (b.net / b.revenue * 100).toFixed(1) : 0;
          const rPct   = (b.revenue / maxAbs * 100).toFixed(1);
          const ePct   = (b.expense / maxAbs * 100).toFixed(1);
          return '<tr>' +
            '<td><strong>' + b.bu_name + '</strong></td>' +
            '<td class="text-right mono text-green">' + Utils.formatIDR(b.revenue) + '</td>' +
            '<td class="text-right mono text-red">'   + Utils.formatIDR(b.expense) + '</td>' +
            '<td class="text-right mono ' + (b.net>=0?'text-green':'text-red') + '"><strong>' + Utils.formatIDR(b.net) + '</strong></td>' +
            '<td class="text-sm ' + (parseFloat(margin)>=0?'text-green':'text-red') + '">' + margin + '%</td>' +
            '<td>' +
              '<div class="bu-mini-bar"><div class="bu-mini-fill fill-revenue" style="width:' + rPct + '%"></div></div>' +
              '<div class="bu-mini-bar"><div class="bu-mini-fill fill-expense" style="width:' + ePct + '%"></div></div>' +
            '</td>' +
          '</tr>';
        }).join('') +
        '</tbody>' +
      '</table>' +
      '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // 7. ACTIVITY PROFITABILITY
  // ══════════════════════════════════════════════════════════
  function _buildActProfit(entity, period) {
    const txns = DB.Transactions.all().filter(function(t){
      if (t.status!=='Posted' || t.period!==period) return false;
      if (entity!=='ALL' && t.entity_id!==entity) return false;
      if (!t.activity_id) return false;
      const coa = DB.COA.byCode(t.coa_code);
      return coa && (coa.coa_category==='Revenue' || coa.coa_category==='Expense');
    });

    const grouped = {};
    txns.forEach(function(t){
      const coa = DB.COA.byCode(t.coa_code);
      if (!grouped[t.activity_id]) grouped[t.activity_id] = { revenue:0, expense:0 };
      if (coa.coa_category==='Revenue') grouped[t.activity_id].revenue += t.amount;
      else grouped[t.activity_id].expense += t.amount;
    });

    const rows = Object.entries(grouped).map(function(e){
      const act = DB.Activities.byId(e[0]);
      return { activity_name: act ? act.activity_name : e[0], ...e[1], net: e[1].revenue - e[1].expense };
    });

    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    if (rows.length === 0) {
      return _reportHeader('Profitabilitas Activity', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportActProfit()') +
        '<div class="report-body"><div class="report-empty-row">Belum ada transaksi dengan Activity tag periode ini</div></div>';
    }

    return _reportHeader('Profitabilitas Activity', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportActProfit()') +
      '<div class="report-body">' +
      '<table class="table">' +
        '<thead><tr><th>Activity</th><th class="text-right">Pendapatan</th><th class="text-right">Beban</th><th class="text-right">Laba Bersih</th><th>Margin</th></tr></thead>' +
        '<tbody>' +
        rows.map(function(r){
          const margin = r.revenue > 0 ? (r.net / r.revenue * 100).toFixed(1) : 0;
          return '<tr>' +
            '<td><strong>' + r.activity_name + '</strong></td>' +
            '<td class="text-right mono text-green">' + Utils.formatIDR(r.revenue) + '</td>' +
            '<td class="text-right mono text-red">'   + Utils.formatIDR(r.expense) + '</td>' +
            '<td class="text-right mono ' + (r.net>=0?'text-green':'text-red') + '"><strong>' + Utils.formatIDR(r.net) + '</strong></td>' +
            '<td class="text-sm ' + (parseFloat(margin)>=0?'text-green':'text-red') + '">' + margin + '%</td>' +
          '</tr>';
        }).join('') +
        '</tbody>' +
      '</table>' +
      '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // 8. TREASURY SUMMARY
  // ══════════════════════════════════════════════════════════
  function _buildTreasurySummary(entity, period) {
    const entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    // ── Source 1: DB.Treasury (from Treasury module) ──────────
    const legs = DB.Treasury.all().filter(function(l){
      return Utils.toPeriod(l.try_date) === period &&
        (entity === 'ALL' || l.entity_id === entity);
    });
    const refs = [...new Set(legs.map(function(l){ return l.try_ref; }))];

    const treasuryRows = refs.map(function(ref){
      const refLegs = legs.filter(function(l){ return l.try_ref===ref; });
      const src = refLegs.find(function(l){ return l.leg==='Source'; });
      const dst = refLegs.find(function(l){ return l.leg==='Destination'; });
      const srcAcct = src ? DB.Accounts.byId(src.account_id) : null;
      const dstAcct = dst ? DB.Accounts.byId(dst.account_id) : null;
      return {
        ref:      ref,
        date:     src ? src.try_date : '',
        fromAcct: srcAcct ? srcAcct.account_name : '—',
        toAcct:   dstAcct ? dstAcct.account_name : '—',
        amount:   src ? src.amount : 0,
        notes:    src && src.notes ? src.notes : '—',
        source:   'Treasury Module'
      };
    });

    // ── Source 2: Transactions with TXN-06 (from Transaksi module) ──
    const txnTreasury = DB.Transactions.all().filter(function(t){
      return t.type_id === 'TXN-06' &&
        t.status === 'Posted' &&
        t.period === period &&
        (entity === 'ALL' || t.entity_id === entity);
    });

    // Group by reference_id or pair by date+amount+description
    const txnRows = txnTreasury.map(function(t){
      const acct    = DB.Accounts.byId(t.account_id);
      const counter = t.counter_account_id ? DB.Accounts.byId(t.counter_account_id) : null;
      return {
        ref:      t.txn_id,
        date:     t.txn_date,
        fromAcct: t.direction === 'Credit' ? (acct ? acct.account_name : t.account_id) : (counter ? counter.account_name : '—'),
        toAcct:   t.direction === 'Debit'  ? (acct ? acct.account_name : t.account_id) : (counter ? counter.account_name : '—'),
        amount:   t.amount,
        notes:    t.description || '—',
        source:   'Transaksi'
      };
    });

    const allRows = treasuryRows.concat(txnRows);

    if (allRows.length === 0) {
      return _reportHeader('Ringkasan Treasury', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportTreasury()') +
        '<div class="report-body"><div class="report-empty-row">Tidak ada pergerakan treasury periode ini</div></div>';
    }

    const totalMoved = allRows.reduce(function(s,r){ return s + r.amount; }, 0);

    return _reportHeader('Ringkasan Treasury', entityName + ' — ' + Utils.periodLabel(period), 'Reports.exportTreasury()') +
      '<div class="report-body">' +
      (txnRows.length > 0
        ? '<div class="info-box" style="margin-bottom:.75rem;font-size:.76rem">&#9432; ' + txnRows.length + ' pergerakan dari modul Transaksi (TXN-06) dan ' + treasuryRows.length + ' dari modul Treasury ditampilkan.</div>'
        : '') +
      '<div style="overflow-x:auto">' +
      '<table class="table">' +
        '<thead><tr>' +
          '<th>Referensi</th><th>Tanggal</th><th>Dari</th><th>Ke</th>' +
          '<th class="text-right">Jumlah</th><th>Catatan</th><th>Sumber</th>' +
        '</tr></thead>' +
        '<tbody>' +
        allRows.map(function(r){
          return '<tr>' +
            '<td class="mono text-sm text-muted">' + r.ref + '</td>' +
            '<td class="text-sm">' + Utils.formatDate(r.date) + '</td>' +
            '<td class="text-sm">' + r.fromAcct + '</td>' +
            '<td class="text-sm">' + r.toAcct + '</td>' +
            '<td class="text-right mono">' + Utils.formatIDR(r.amount) + '</td>' +
            '<td class="text-sm text-muted">' + r.notes + '</td>' +
            '<td><span class="badge ' + (r.source==='Treasury Module' ? 'badge-blue' : 'badge-green') + '">' + r.source + '</span></td>' +
          '</tr>';
        }).join('') +
        '</tbody>' +
      '</table>' +
      '</div>' +
      '<div class="report-subtotal">' +
        '<div class="report-row-label"><strong>Total Dana Digerakkan</strong></div>' +
        '<div class="report-row-value"><strong>' + Utils.formatIDR(totalMoved) + '</strong></div>' +
      '</div>' +
      '</div>';
  }

  function exportPLCompare() {
    var entity = App.getEntity(), period = App.getPeriod();
    var parts = period.split('-');
    var yr = parseInt(parts[0]), mo = parseInt(parts[1]);
    mo--; if (mo < 1) { mo = 12; yr--; }
    var prevPeriod = yr + '-' + String(mo).padStart(2, '0');

    function _getPLData(p) {
      var txns = DB.Transactions.all().filter(function(t) {
        if (t.status !== 'Posted' || t.period !== p) return false;
        if (entity !== 'ALL' && t.entity_id !== entity) return false;
        var coa = DB.COA.byCode(t.coa_code);
        return coa && (coa.coa_category === 'Revenue' || coa.coa_category === 'Expense');
      });
      var grouped = {};
      txns.forEach(function(t) {
        var coa = DB.COA.byCode(t.coa_code);
        if (!coa) return;
        if (!grouped[t.coa_code]) grouped[t.coa_code] = { coa_code: t.coa_code, coa_name: coa.coa_name, category: coa.coa_category, total: 0 };
        if (coa.coa_category === 'Revenue') grouped[t.coa_code].total += (t.direction === 'Credit' ? t.amount : -t.amount);
        else grouped[t.coa_code].total += (t.direction === 'Debit' ? t.amount : -t.amount);
      });
      return Object.values(grouped);
    }

    var curData = _getPLData(period), prevData = _getPLData(prevPeriod);
    var allCodes = {};
    curData.forEach(function(d)  { allCodes[d.coa_code] = d; });
    prevData.forEach(function(d) { if (!allCodes[d.coa_code]) allCodes[d.coa_code] = d; });

    Utils.exportCSV(
      ['COA Code', 'Nama', 'Kategori', Utils.periodLabel(period), Utils.periodLabel(prevPeriod), 'Selisih', '%'],
      Object.values(allCodes).map(function(d) {
        var cur  = (curData.find(function(x)  { return x.coa_code === d.coa_code; }) || {total:0}).total;
        var prev = (prevData.find(function(x) { return x.coa_code === d.coa_code; }) || {total:0}).total;
        var pct  = prev === 0 ? 'N/A' : ((cur-prev)/Math.abs(prev)*100).toFixed(1) + '%';
        return [d.coa_code, d.coa_name, d.category, cur, prev, cur-prev, pct];
      }),
      'PL-Compare-' + period + '-vs-' + prevPeriod + '.csv'
    );
    Utils.toast('Export P&L Komparatif berhasil');
  }

  // ══════════════════════════════════════════════════════════
  // DEBT OUTSTANDING REPORT
  // Posisi utang per fasilitas — snapshot hari ini
  // ══════════════════════════════════════════════════════════
  function _buildDebtOutstanding(entity) {
    var entityName = entity === 'ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;
    var today = Utils.today();

    var debts = entity === 'ALL'
      ? DB.DebtRegister.all()
      : DB.DebtRegister.byEntity(entity);

    var active  = debts.filter(function(d){ return ['Active','Overdue'].includes(d.status); });
    var settled = debts.filter(function(d){ return d.status === 'Settled'; });

    if (debts.length === 0) {
      return _reportHeader('Posisi Utang', entityName + ' — per ' + Utils.formatDate(today), 'Reports.exportDebtOutstanding()') +
        '<div class="report-body"><div class="report-empty-row">Tidak ada fasilitas utang yang tercatat.</div></div>';
    }

    // Group by category
    var categories = ['Revolving','Installment','Supplier'];
    var totalOutstanding = active.reduce(function(s,d){ return s+(d.outstanding_principal||0); }, 0);
    var totalLimit       = active.reduce(function(s,d){ return s+(d.credit_limit||0); }, 0);
    var totalAvailable   = active.reduce(function(s,d){ return s+(d.available_credit||0); }, 0);

    function _debtRow(d) {
      var acct = DB.Accounts.byId(d.account_id);
      var cp   = d.cp_id ? DB.Counterparties.byId(d.cp_id) : null;
      var overdue = d.next_due_date && d.next_due_date < today;
      var pct  = d.original_amount > 0
        ? Math.round((d.outstanding_principal||0) / d.original_amount * 100)
        : 0;
      return '<tr' + (overdue ? ' class="debt-row-overdue"' : '') + '>' +
        '<td class="mono text-sm text-muted">' + d.debt_id + '</td>' +
        '<td>' +
          '<div class="text-sm">' + d.description + '</div>' +
          '<div class="text-xs text-muted">' + (acct?acct.account_name:'') + (cp?' · '+cp.cp_name:'') + '</div>' +
        '</td>' +
        '<td class="text-sm">' + (d.debt_type||'—') + '</td>' +
        '<td class="text-right mono text-sm">' + Utils.formatIDR(d.original_amount||0) + '</td>' +
        '<td class="text-right mono text-sm text-red">' + Utils.formatIDR(d.outstanding_principal||0) + '</td>' +
        '<td class="text-right mono text-sm text-muted">' + (d.credit_limit?Utils.formatIDR(d.credit_limit):'—') + '</td>' +
        '<td class="text-right mono text-sm text-green">' + (d.available_credit!=null?Utils.formatIDR(d.available_credit):'—') + '</td>' +
        '<td class="text-sm">' + (d.interest_rate?(d.interest_rate+'%'):'—') + '</td>' +
        '<td class="text-sm ' + (overdue?'text-red':'') + '">' + (d.next_due_date?Utils.formatDate(d.next_due_date):'—') + '</td>' +
        '<td>' +
          '<div class="debt-prog-bar-wrap">' +
            '<div class="debt-prog-bar" style="width:'+pct+'%"></div>' +
          '</div>' +
          '<div class="text-xs text-muted text-center">' + pct + '%</div>' +
        '</td>' +
      '</tr>';
    }

    var rows = '';
    categories.forEach(function(cat) {
      var group = active.filter(function(d){ return d.debt_category === cat; });
      if (group.length === 0) return;
      var groupTotal = group.reduce(function(s,d){ return s+(d.outstanding_principal||0); }, 0);
      rows += '<tr class="compare-subhead"><td colspan="10">' + cat + ' — ' + Utils.formatIDR(groupTotal) + '</td></tr>';
      rows += group.map(_debtRow).join('');
    });
