  // ══════════════════════════════════════════════════════════
  // DEBT PROJECTION REPORT
  // Proyeksi kewajiban cicilan 3 bulan ke depan
  // ══════════════════════════════════════════════════════════
  function _buildDebtProjection(entity) {
    var entityName = entity === 'ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;
    var today = new Date();

    // Build 3-month buckets
    var buckets = [];
    for (var m = 0; m < 3; m++) {
      var d = new Date(today.getFullYear(), today.getMonth() + m, 1);
      var period = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      buckets.push({ period: period, label: Utils.periodLabel(period), schedules: [], total: 0 });
    }

    // Get all scheduled (unpaid) installments
    var allSchedules = DB.DebtSchedule.all().filter(function(s){
      return s.status === 'Scheduled' || s.status === 'Overdue';
    });

    allSchedules.forEach(function(s) {
      if (!s.due_date) return;
      var debt = DB.DebtRegister.byId(s.debt_id);
      if (!debt) return;
      if (entity !== 'ALL' && debt.entity_id !== entity) return;
      if (!['Active','Overdue'].includes(debt.status)) return;

      var sPeriod = s.due_date.substring(0, 7);
      var bucket  = buckets.find(function(b){ return b.period === sPeriod; });
      if (bucket) {
        bucket.schedules.push({ schedule: s, debt: debt });
        bucket.total += (s.total_installment || 0);
      }
    });

    var grandTotal = buckets.reduce(function(s,b){ return s+b.total; }, 0);
    var maxTotal   = Math.max.apply(null, buckets.map(function(b){ return b.total; })) || 1;

    return _reportHeader('Proyeksi Cicilan', entityName + ' — 3 Bulan ke Depan', 'Reports.exportDebtProjection()') +
      '<div class="report-body">' +

      // Grand total
      '<div class="cf-method-note">' +
        'Total kewajiban 3 bulan ke depan: <strong>' + Utils.formatIDR(grandTotal) + '</strong>' +
      '</div>' +

      // Bar chart
      '<div class="debt-proj-bars">' +
      buckets.map(function(b) {
        var pct = Math.round(b.total / maxTotal * 100);
        return '<div class="debt-proj-bar-item">' +
          '<div class="debt-proj-bar-label">' + b.label + '</div>' +
          '<div class="debt-proj-bar-wrap">' +
            '<div class="debt-proj-bar-fill" style="height:' + pct + '%"></div>' +
          '</div>' +
          '<div class="debt-proj-bar-val">' + Utils.formatIDR(b.total) + '</div>' +
          '<div class="debt-proj-bar-count text-muted">' + b.schedules.length + ' angsuran</div>' +
        '</div>';
      }).join('') +
      '</div>' +

      // Detail per bucket
      buckets.map(function(b) {
        if (b.schedules.length === 0) return '';
        return '<div style="margin-top:1rem">' +
          '<div class="report-section-head">' + b.label + ' — ' + Utils.formatIDR(b.total) + '</div>' +
          '<div style="overflow-x:auto"><table class="table debt-table">' +
            '<thead><tr>' +
              '<th>Fasilitas</th><th>Angsuran ke-</th><th>Due Date</th>' +
              '<th class="text-right">Pokok</th><th class="text-right">Bunga</th>' +
              '<th class="text-right">Total</th><th>Status</th>' +
            '</tr></thead>' +
            '<tbody>' +
            b.schedules.map(function(item) {
              var s = item.schedule;
              var d = item.debt;
              var isOverdue = s.due_date < Utils.today();
              return '<tr' + (isOverdue?' class="debt-row-overdue"':'') + '>' +
                '<td class="text-sm">' + d.description + '</td>' +
                '<td class="text-sm text-muted">' + s.installment_no + '</td>' +
                '<td class="text-sm' + (isOverdue?' text-red':'') + '">' + Utils.formatDate(s.due_date) + '</td>' +
                '<td class="text-right mono text-sm">' + Utils.formatIDR(s.principal||0) + '</td>' +
                '<td class="text-right mono text-sm text-red">' + Utils.formatIDR(s.interest||0) + '</td>' +
                '<td class="text-right mono text-sm font-medium">' + Utils.formatIDR(s.total_installment||0) + '</td>' +
                '<td>' + (isOverdue
                  ? '<span class="badge badge-red">Overdue</span>'
                  : '<span class="badge badge-blue">Terjadwal</span>') +
                '</td>' +
              '</tr>';
            }).join('') +
            '</tbody>' +
            '<tfoot><tr>' +
              '<td colspan="3" class="text-muted text-sm">Subtotal ' + b.label + '</td>' +
              '<td class="text-right mono text-sm">' + Utils.formatIDR(b.schedules.reduce(function(s,i){return s+(i.schedule.principal||0);},0)) + '</td>' +
              '<td class="text-right mono text-sm text-red">' + Utils.formatIDR(b.schedules.reduce(function(s,i){return s+(i.schedule.interest||0);},0)) + '</td>' +
              '<td class="text-right mono text-sm"><strong>' + Utils.formatIDR(b.total) + '</strong></td>' +
              '<td></td>' +
            '</tr></tfoot>' +
          '</table></div>' +
        '</div>';
      }).join('') +

      '</div>';
  }

  // ── Sprint 4: Laporan per Business Event ─────────────────
  function _buildEventReport(entity, period) {
    var entityName = entity==='ALL' ? 'Semua Entity' : (DB.Entities.byId(entity)||{entity_name:entity}).entity_name;

    var txns = DB.Transactions.all().filter(function(t) {
      return t.status === 'Posted' && t.period === period &&
        (entity === 'ALL' || t.entity_id === entity) &&
        t.event_id;
    });

    if (txns.length === 0) {
      return _reportHeader('Laporan per Business Event', entityName + ' — ' + Utils.periodLabel(period), '') +
        '<div class="report-body"><div class="report-empty-row">Tidak ada transaksi dengan Business Event pada periode ini. ' +
        'Transaksi yang diinput melalui Event Picker (Sprint 1) akan muncul di sini.</div></div>';
    }

    // Group by event_id
    var eventGroups = {};
    txns.forEach(function(t) {
      if (!eventGroups[t.event_id]) {
        var evt = DB.EventCatalog.byId(t.event_id);
        eventGroups[t.event_id] = {
          event_id:   t.event_id,
          event_name: evt ? evt.event_name : t.event_id,
          domain:     evt ? evt.domain : '—',
          process:    evt ? evt.process : '—',
          cf_class:   t.cf_class || '—',
          txns:       [],
          total:      0,
          count:      0
        };
      }
      var amt = t.direction === 'Debit' ? t.amount : -t.amount;
      eventGroups[t.event_id].txns.push(t);
      eventGroups[t.event_id].total += amt;
      eventGroups[t.event_id].count++;
    });

    var groups = Object.values(eventGroups).sort(function(a,b){
      return b.total - a.total;
    });

    // Group by domain for display
    var domains = {};
    groups.forEach(function(g) {
      if (!domains[g.domain]) domains[g.domain] = [];
      domains[g.domain].push(g);
    });

    var totalAll = groups.reduce(function(s,g){ return s+g.total; }, 0);

    return _reportHeader('Laporan per Business Event', entityName + ' — ' + Utils.periodLabel(period), '') +
      '<div class="report-body">' +

      '<div class="cf-method-note">' +
        groups.length + ' Business Events digunakan · ' + txns.length + ' transaksi total' +
      '</div>' +

      Object.keys(domains).map(function(domain) {
        return '<div style="margin-bottom:1rem">' +
          '<div class="report-section-head">' + domain + '</div>' +
          '<table class="table" style="font-size:.8rem">' +
            '<thead><tr>' +
              '<th>Event</th><th>Process</th><th>cf_class</th>' +
              '<th class="text-right">Transaksi</th><th class="text-right">Net Amount</th>' +
            '</tr></thead>' +
            '<tbody>' +
            domains[domain].map(function(g) {
              return '<tr class="report-row-drillable" data-event-drill="' + g.event_id + '">' +
                '<td><strong class="text-sm">' + g.event_name + '</strong></td>' +
                '<td class="text-muted text-sm">' + g.process + '</td>' +
                '<td><span class="badge badge-blue">' + g.cf_class + '</span></td>' +
                '<td class="text-right text-sm">' + g.count + '</td>' +
                '<td class="text-right mono text-sm ' + (g.total>=0?'text-green':'text-red') + '">' +
                  (g.total>=0?'+':'') + Utils.formatIDR(g.total) +
                  ' <span class="drill-icon" title="Lihat detail">&#8599;</span>' +
                '</td>' +
              '</tr>';
            }).join('') +
            '</tbody>' +
          '</table>' +
        '</div>';
      }).join('') +

      '<div class="report-subtotal">' +
        '<div class="report-row-label"><strong>Total Net</strong></div>' +
        '<div class="report-row-value"><strong class="' + (totalAll>=0?'text-green':'text-red') + '">' +
          (totalAll>=0?'+':'') + Utils.formatIDR(totalAll) + '</strong></div>' +
      '</div>' +

    '</div>';
  }

  function exportDebtOutstanding() {
    var entity = App.getEntity();
    var debts  = entity === 'ALL' ? DB.DebtRegister.active() : DB.DebtRegister.byEntity(entity).filter(function(d){ return ['Active','Overdue'].includes(d.status); });
    Utils.exportCSV(
      ['ID','Deskripsi','Kategori','Tipe','Awal','Outstanding','Limit','Available','Rate','Jatuh Tempo','Status'],
      debts.map(function(d){
        return [d.debt_id, d.description, d.debt_category, d.debt_type||'',
          d.original_amount||0, d.outstanding_principal||0, d.credit_limit||'',
          d.available_credit||'', d.interest_rate||0, d.next_due_date||'', d.status];
      }),
      'posisi-utang-' + Utils.today() + '.csv'
    );
    Utils.toast('Export Posisi Utang berhasil');
  }

  function exportDebtProjection() {
    var entity  = App.getEntity();
    var scheds  = DB.DebtSchedule.all().filter(function(s){ return s.status === 'Scheduled' || s.status === 'Overdue'; });
    var rows    = scheds.map(function(s) {
      var d = DB.DebtRegister.byId(s.debt_id);
      if (!d) return null;
      if (entity !== 'ALL' && d.entity_id !== entity) return null;
      return [s.schedule_id, d.description, s.installment_no, s.due_date,
        s.principal||0, s.interest||0, s.total_installment||0, s.status];
    }).filter(Boolean);
    Utils.exportCSV(
      ['Schedule ID','Fasilitas','Angsuran ke-','Due Date','Pokok','Bunga','Total','Status'],
      rows,
      'proyeksi-cicilan-' + Utils.today() + '.csv'
    );
    Utils.toast('Export Proyeksi Cicilan berhasil');
  }

  return {
    render, switchReport,
    exportPL, exportPLCompare, exportBS, exportCF,
    exportDebtOutstanding, exportDebtProjection,
    exportARaging, exportAPaging,
    exportBUProfit, exportActProfit, exportTreasury
  };

})();

  // ══════════════════════════════════════════════════════════
  function _showModal(title, fields, onSave) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    const fieldsHTML = fields.map(function(f){
      let input = '';
      if (f.type==='select') {
        const opts = (f.options||[]).map(function(o){
          const val   = typeof o==='object' ? o.val   : o;
          const label = typeof o==='object' ? o.label : o;
          return '<option value="'+val+'" '+(f.value===val?'selected':'')+'>'+label+'</option>';
        }).join('');
        input = '<select class="form-input" id="mf-'+f.id+'"><option value="">— Pilih —</option>'+opts+'</select>';
      } else {
        input = '<input class="form-input" type="'+f.type+'" id="mf-'+f.id+'" placeholder="'+(f.placeholder||'')+'" value="'+(f.value!==undefined?f.value:'')+'">';
      }
      return '<div class="form-group">'+
        '<label>'+f.label+'</label>'+input+
        (f.hint?'<small class="form-hint">'+f.hint+'</small>':'')+
      '</div>';
    }).join('');

    modal.innerHTML =
      '<div class="modal modal-md">' +
        '<div class="modal-header">' +
          '<h3>'+title+'</h3>' +
          '<button class="btn btn-ghost btn-sm" onclick="this.closest(\'.modal-overlay\').remove()">✕</button>' +
        '</div>' +
        '<div class="form-body" style="padding:1.25rem">' +
          fieldsHTML +
          '<div id="mf-errors" class="error-box" style="display:none;margin-top:.75rem"></div>' +
        '</div>' +
        '<div class="modal-actions" style="padding:0 1.25rem 1.25rem">' +
          '<button class="btn btn-ghost" onclick="this.closest(\'.modal-overlay\').remove()">Batal</button>' +
          '<button class="btn btn-primary" id="mf-save-btn">Simpan</button>' +
        '</div>' +
      '</div>';

    document.body.appendChild(modal);
    modal.onclick = function(e){ if(e.target===modal) modal.remove(); };

    modal.querySelector('#mf-save-btn').onclick = function() {
      const vals = {};
      fields.forEach(function(f){
        const el = document.getElementById('mf-'+f.id);
        vals[f.id] = el ? el.value : '';
      });
      const result = onSave(vals);
      if (result && result.length > 0) {
        const errBox = document.getElementById('mf-errors');
        errBox.style.display = 'block';
        errBox.innerHTML = '<ul>'+result.map(function(e){ return '<li>'+e+'</li>'; }).join('')+'</ul>';
        return;
      }
      modal.remove();
      Utils.toast('Data berhasil disimpan');
      _refreshContent();
    };
  }

  // ── Opening Balance per COA (Sprint 2) ───────────────────
  var _obFormEntity = null;

  function _renderOpeningBalance() {
    var entities = DB.Entities.active();
    var selEnt   = _obFormEntity || (entities[0] ? entities[0].entity_id : null);
    var bsCOAs   = DB.COA.all().filter(function(c){
      return ['Asset','Liability','Equity'].includes(c.coa_category) && c.status === 'Active';
    });
    var entObs = selEnt ? DB.COABalances.byEntity(selEnt) : [];
    var obMap  = {};
    entObs.forEach(function(ob){ obMap[ob.coa_code] = ob; });

    var totalAsset  = entObs.filter(function(ob){ var c=DB.COA.byCode(ob.coa_code); return c&&c.coa_category==='Asset'; }).reduce(function(s,ob){return s+ob.balance;},0);
    var totalLiab   = entObs.filter(function(ob){ var c=DB.COA.byCode(ob.coa_code); return c&&c.coa_category==='Liability'; }).reduce(function(s,ob){return s+ob.balance;},0);
    var totalEquity = entObs.filter(function(ob){ var c=DB.COA.byCode(ob.coa_code); return c&&c.coa_category==='Equity'; }).reduce(function(s,ob){return s+ob.balance;},0);
    var balanced    = Math.abs(totalAsset-(totalLiab+totalEquity)) < 1;

    return '<div class="master-section">' +
      '<div class="master-section-header">' +
        '<h3>Opening Balance per COA</h3>' +
        '<div class="text-muted text-sm" style="margin-top:.3rem">Posisi awal neraca per COA per Entity. Memerlukan Forced Override Level 3 — pastikan nilai sudah diverifikasi.</div>' +
      '</div>' +
      '<div class="form-row" style="margin-bottom:1rem">' +
        '<div class="form-group">' +
          '<label>Entity</label>' +
          '<select class="form-input" id="ob-entity-sel" onchange="Masters.onOBEntityChange()">' +
            entities.map(function(e){ return '<option value="'+e.entity_id+'"'+(e.entity_id===selEnt?' selected':'')+'>'+e.entity_name+'</option>'; }).join('') +
          '</select>' +
        '</div>' +
        (entObs.length>0 ? '<div class="form-group" style="align-self:flex-end"><div class="'+(balanced?'balance-check ok':'balance-check warn')+'">'+(balanced?'&#10003; Opening Balance seimbang':'&#9888; Tidak seimbang — selisih '+Utils.formatIDR(Math.abs(totalAsset-(totalLiab+totalEquity))))+'</div></div>' : '') +
      '</div>' +
      '<div style="overflow-x:auto"><table class="table" style="font-size:.8rem">' +
        '<thead><tr><th>COA</th><th>Nama</th><th>Kategori</th><th class="text-right">Opening Balance</th><th>As of Date</th><th>Catatan</th><th>Aksi</th></tr></thead>' +
        '<tbody>' +
        (function(){
          var rows='';
          ['Asset','Liability','Equity'].forEach(function(cat){
            rows+='<tr class="compare-subhead"><td colspan="7">'+cat.toUpperCase()+'</td></tr>';
            bsCOAs.filter(function(c){return c.coa_category===cat;}).forEach(function(coa){
              var ob=obMap[coa.coa_code];
              if(ob){
                rows+='<tr><td class="mono text-sm text-muted">'+coa.coa_code+'</td><td class="text-sm">'+coa.coa_name+'</td><td><span class="badge badge-blue">'+cat+'</span></td>'+

  function _bindOBEvents() {
    var mc = document.getElementById('master-content');
    if (!mc) return;
    mc.onclick = function(e) {
      var addBtn = e.target.closest('[data-ob-add]');
      var editBtn= e.target.closest('[data-ob-edit]');
      var delBtn = e.target.closest('[data-ob-del]');
      if (addBtn) _showOBForm(addBtn.getAttribute('data-ob-add'), addBtn.getAttribute('data-ob-entity'), null);
      if (editBtn) { var ob=DB.COABalances.byId(editBtn.getAttribute('data-ob-edit')); if(ob) _showOBForm(ob.coa_code,ob.entity_id,ob); }
      if (delBtn) {
        Utils.confirm('Hapus Opening Balance ini?', function(){
          DB.COABalances.delete(delBtn.getAttribute('data-ob-del'));
          mc.innerHTML = _renderOpeningBalance(); _bindOBEvents();
        });
      }
    };
  }

  function _showOBForm(coa_code, entity_id, existing) {
    var coa  = DB.COA.byCode(coa_code);
    var ent  = DB.Entities.byId(entity_id);
    var area = document.getElementById('ob-form-area');
    if (!area) return;
    area.innerHTML =
      '<div class="ob-form-panel">' +
        '<div class="ob-form-title">'+(existing?'Edit':'Tambah')+' Opening Balance — '+coa_code+' '+(coa?coa.coa_name:'')+' ('+(ent?ent.entity_name:entity_id)+')</div>' +
        '<div class="override-warning override-forced">&#9940; Forced Override Level 3 — Mempengaruhi seluruh Balance Sheet. Pastikan nilai sudah diverifikasi.</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Nilai Opening Balance (Rp) <span class="required">*</span></label>' +
            '<input class="form-input" type="number" id="ob-balance" value="'+(existing?existing.balance:'')+'" placeholder="0">' +
            '<small class="form-hint">Normal balance '+(coa?coa.normal_balance:'')+' — masukkan nilai positif</small></div>' +
          '<div class="form-group"><label>As of Date <span class="required">*</span></label>' +
            '<input class="form-input" type="date" id="ob-date" value="'+(existing?existing.as_of_date:Utils.today())+'">' +
            '<small class="form-hint">Tanggal posisi awal ini berlaku</small></div>' +
        '</div>' +
        '<div class="form-group"><label>Catatan / Sumber Data <span class="required">*</span></label>' +
          '<input class="form-input" id="ob-notes" value="'+(existing?(existing.notes||''):'')+'" placeholder="Contoh: Saldo buku bank per 31 Des 2025, Laporan keuangan audited, dll">' +
          '<small class="form-hint">Wajib diisi — audit trail untuk Forced Override</small></div>' +
        '<div id="ob-form-errors" class="error-box" style="display:none"></div>' +
        '<div class="form-actions-bar">' +
          '<button class="btn btn-ghost" id="ob-cancel-btn">Batal</button>' +
          '<button class="btn btn-primary" id="ob-save-btn">Simpan Opening Balance</button>' +
        '</div>' +
      '</div>';
    document.getElementById('ob-cancel-btn').onclick = function(){ area.innerHTML=''; };
    document.getElementById('ob-save-btn').onclick   = function(){ _saveOB(coa_code, entity_id, existing?existing.ob_id:null); };
    area.scrollIntoView({behavior:'smooth'});
  }

  function _saveOB(coa_code, entity_id, existing_ob_id) {
    var balance = parseFloat((document.getElementById('ob-balance')||{}).value)||0;
    var date    = (document.getElementById('ob-date')  ||{}).value||'';
    var notes   = (document.getElementById('ob-notes') ||{}).value||'';
    var errBox  = document.getElementById('ob-form-errors');
    var errors  = [];
    if (!date)  errors.push('As of Date wajib diisi');
    if (!notes) errors.push('Catatan/sumber data wajib diisi (Forced Override)');
    if (balance < 0) errors.push('Nilai tidak boleh negatif');
    if (errors.length>0) { if(errBox){errBox.style.display='block';errBox.innerHTML='<ul>'+errors.map(function(e){return '<li>'+e+'</li>';}).join('')+'</ul>';} return; }
    if (errBox) errBox.style.display='none';
    var coa = DB.COA.byCode(coa_code);
    DB.COABalances.save({
      ob_id:          existing_ob_id||('OB-'+entity_id+'-'+coa_code+'-'+Date.now()),
      entity_id:      entity_id,
      coa_code:       coa_code,
      as_of_date:     date,
      balance:        balance,
      normal_balance: coa?coa.normal_balance:'Debit',
      notes:          notes,
      created_at:     Utils.today(),
      created_by:     'User',
      override_level: 3
    });
    Utils.toast('Opening Balance disimpan');
    var mc = document.getElementById('master-content');
    if (mc) { mc.innerHTML = _renderOpeningBalance(); _bindOBEvents(); }
  }

  // ── Operational Classification CRUD ─────────────────────
  function _renderOpClass() {
    var classes = DB.OpClasses ? DB.OpClasses.all() : [];
    var domains = {};
    classes.forEach(function(c){
      var d = c.domain || 'Lainnya';
      if (!domains[d]) domains[d] = [];
      domains[d].push(c);
    });

    return '<div class="master-section">' +
      '<div class="master-section-header">' +
        '<h3>Klasifikasi Operasional</h3>' +
        '<div class="text-muted text-sm" style="margin-top:.3rem">' +
          'Metadata manajemen opsional per transaksi. Tidak mempengaruhi akuntansi. ' +
          'Digunakan untuk analisis profitabilitas dan laporan operasional per kategori biaya/pendapatan.' +
        '</div>' +
      '</div>' +
      '<div class="master-header-row">' +
        '<button class="btn btn-primary btn-sm" id="op-class-add-btn">+ Tambah Klasifikasi</button>' +
      '</div>' +
      '<div id="op-class-form-area"></div>' +
      Object.keys(domains).map(function(domain) {
        return '<div style="margin-bottom:1rem">' +
          '<div class="report-section-head">' + domain + '</div>' +
          '<table class="table" style="font-size:.8rem">' +
            '<thead><tr><th>ID</th><th>Nama</th><th>Deskripsi</th><th>Status</th><th>Aksi</th></tr></thead>' +
            '<tbody>' +
            domains[domain].map(function(c) {
              return '<tr>' +
                '<td class="mono text-sm text-muted">' + c.class_id + '</td>' +
                '<td class="text-sm font-medium">' + c.name + '</td>' +
                '<td class="text-xs text-muted">' + (c.description||'—') + '</td>' +
                '<td><span class="badge '+(c.status==='Active'?'badge-green':'badge-gray')+'">'+c.status+'</span></td>' +
                '<td><div class="row-actions">' +
                  '<button class="btn-action" data-opc-edit="'+c.class_id+'" title="Edit">&#9998;</button>' +
                  '<button class="btn-action text-red" data-opc-del="'+c.class_id+'" title="Hapus">&#128465;</button>' +
                '</div></td>' +
              '</tr>';
            }).join('') +
            '</tbody>' +
          '</table>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  function _bindOpClassEvents() {
    var mc = document.getElementById('master-content');
    if (!mc) return;
    var addBtn = mc.querySelector('#op-class-add-btn');
    if (addBtn) addBtn.onclick = function(){ _showOpClassForm(null); };
    mc.querySelectorAll('[data-opc-edit]').forEach(function(btn){
      btn.onclick = function(){
        var cls = DB.OpClasses.byId(btn.getAttribute('data-opc-edit'));
        if (cls) _showOpClassForm(cls);
      };
    });
    mc.querySelectorAll('[data-opc-del]').forEach(function(btn){
      btn.onclick = function(){
        var result = DB.OpClasses.delete(btn.getAttribute('data-opc-del'));
        if (result && result.error) { Utils.toast(result.error, 'error'); return; }
        Utils.toast('Klasifikasi dihapus');
        mc.innerHTML = _renderOpClass(); _bindOpClassEvents();
      };
    });
  }

  function _showOpClassForm(existing) {
    var area = document.getElementById('op-class-form-area');
    if (!area) return;
    var domains = ['Revenue','Expense','Treasury','Debt','Receivable','Equity'];
    area.innerHTML =
      '<div class="ob-form-panel" style="margin-bottom:1rem">' +
        '<div class="ob-form-title">'+(existing?'Edit':'Tambah')+' Klasifikasi Operasional</div>' +

          '<div class="form-group"><label>Nama <span class="required">*</span></label>' +
            '<input class="form-input" id="opc-name" value="'+(existing?existing.name:'')+'" placeholder="Nama klasifikasi"></div>' +
          '<div class="form-group"><label>Domain</label>' +
            '<select class="form-input" id="opc-domain">' +
              '<option value="">— Semua Domain —</option>' +
              domains.map(function(d){ return '<option value="'+d+'"'+(existing&&existing.domain===d?' selected':'')+'>'+d+'</option>'; }).join('') +
            '</select></div>' +
        '</div>' +
        '<div class="form-group"><label>Deskripsi</label>' +
          '<input class="form-input" id="opc-desc" value="'+(existing?(existing.description||''):'')+'" placeholder="Penjelasan singkat"></div>' +
        '<div class="form-actions-bar">' +
          '<button class="btn btn-ghost" id="opc-cancel">Batal</button>' +
          '<button class="btn btn-primary" id="opc-save">Simpan</button>' +
        '</div>' +
      '</div>';

    document.getElementById('opc-cancel').onclick = function(){ area.innerHTML=''; };
    document.getElementById('opc-save').onclick   = function(){
      var name = (document.getElementById('opc-name')||{}).value||'';
      if (!name) { Utils.toast('Nama wajib diisi','error'); return; }
      var domain = (document.getElementById('opc-domain')||{}).value||null;
      var desc   = (document.getElementById('opc-desc')||{}).value||'';
      var id     = existing ? existing.class_id : 'OPC-' + Date.now();
      DB.OpClasses.save({ class_id:id, domain:domain||null, name:name, description:desc, status:'Active' });
      Utils.toast('Klasifikasi disimpan');
      var mc = document.getElementById('master-content');
      if (mc) { mc.innerHTML = _renderOpClass(); _bindOpClassEvents(); }
    };
  }

  return {
    render, switchTab, onOBEntityChange,
    addEntity, editEntity, toggleEntity, deleteEntity,
    addBU, editBU, toggleBU, deleteBU, filterBU,
    addActivity, editActivity, toggleActivity, deleteActivity,
    addCOA, editCOA, toggleCOA, deleteCOA,
    addAccount, editAccount, toggleAccount, deleteAccount,
    addCounterparty, editCounterparty, toggleCounterparty, deleteCounterparty
  };

})();

  // ── Migrate TXN IDs to use txn_date ──────────────────────
  function _doMigrateTxnIds() {
    var txns = DB.Transactions.all();
    if (txns.length === 0) { Utils.toast('Tidak ada transaksi untuk dimigrasi'); return; }
    var sorted = txns.slice().sort(function(a,b){ return (a.txn_date||'').localeCompare(b.txn_date||''); });
    var dateCounts = {};
    var idMap = {};
    sorted.forEach(function(t) {
      var dp = (t.txn_date||Utils.today()).replace(/-/g,'');
      dateCounts[dp] = (dateCounts[dp]||0)+1;
      var seq = String(dateCounts[dp]).padStart(3,'0');
      idMap[t.txn_id] = 'TXN-'+dp+'-'+seq;
    });
    var newTxns = txns.map(function(t){ return Object.assign({},t,{txn_id:idMap[t.txn_id]||t.txn_id}); });
    localStorage.setItem('fos_transactions', JSON.stringify(newTxns));
    var cols = JSON.parse(localStorage.getItem('fos_collections')||'[]');
    var newCols = cols.map(function(c){ return Object.assign({},c,{txn_id:idMap[c.txn_id]||c.txn_id}); });
    localStorage.setItem('fos_collections', JSON.stringify(newCols));
    var pmts = JSON.parse(localStorage.getItem('fos_payments')||'[]');
    var newPmts = pmts.map(function(p){ return Object.assign({},p,{txn_id:idMap[p.txn_id]||p.txn_id}); });
    localStorage.setItem('fos_payments', JSON.stringify(newPmts));
    var trys = JSON.parse(localStorage.getItem('fos_treasury')||'[]');
    var newTrys = trys.map(function(l){ return Object.assign({},l,{txn_id:idMap[l.txn_id]||l.txn_id}); });
    localStorage.setItem('fos_treasury', JSON.stringify(newTrys));
    var count = Object.keys(idMap).length;
    Utils.toast(count+' TXN ID berhasil dimigrasi');
    var summary = document.getElementById('migration-summary');
    if (summary) { summary.style.display='block'; summary.textContent='Migrasi selesai: '+count+' transaksi.'; }
  }

  // ── Bulk Event Assignment ────────────────────────────────
  function _mapEventId(t) {
    // Priority 1: cf_class = Treasury
    if (t.cf_class === 'Treasury' || t.type_id === 'TXN-06') return 'EVT-T01';

    // Priority 2: type_id based mapping
    if (t.type_id === 'TXN-05') return 'EVT-Q01'; // CEO Advance
    if (t.type_id === 'TXN-07') return 'EVT-Q01'; // Equity Movement

    if (t.type_id === 'TXN-09') return 'EVT-D01'; // CC Transaction = Belanja CC

    if (t.type_id === 'TXN-08') {
      // Liability payment - distinguish CC vs installment
      var coa_num = parseInt(t.coa_code);
      if (coa_num === 201 || coa_num === 202) return 'EVT-D02'; // CC/BNPL payment
      return 'EVT-D04'; // Installment payment
    }

    if (t.type_id === 'TXN-03') return 'EVT-P01'; // Receivable

    if (t.type_id === 'TXN-04') return 'EVT-D02'; // Payable payment

    // Priority 3: cf_class = Financing
    if (t.cf_class === 'Financing') {
      if (t.direction === 'Credit') return 'EVT-D03'; // Loan drawdown
      if (t.direction === 'Debit') {
        var coaN = parseInt(t.coa_code);
        if (coaN >= 200 && coaN < 300) return 'EVT-D04'; // Bayar cicilan
        return 'EVT-D03'; // Fallback
      }
    }

    // Priority 4: COA-based for Revenue and Expense
    if (t.type_id === 'TXN-01' || t.cf_class === 'Operating') {
      var cNum = parseInt(t.coa_code);
      if (cNum >= 400 && cNum < 500) {
        // Revenue COA - use most generic revenue event
        return 'EVT-R01';
      }
      if (cNum >= 500 && cNum < 600) {
        // Expense COA - distinguish financial vs operational
        if (cNum === 541 || cNum === 542 || cNum === 543) return 'EVT-E03'; // Beban keuangan
        return 'EVT-E01'; // Operational expense
      }
    }

    if (t.type_id === 'TXN-02') {
      var cNum2 = parseInt(t.coa_code);
      if (cNum2 === 541 || cNum2 === 542 || cNum2 === 543) return 'EVT-E03';
      if (cNum2 >= 400 && cNum2 < 500) return 'EVT-R04'; // Revenue via expense type (unusual)
      return 'EVT-E02'; // General expense
    }

    // Cannot determine
    return null;
  }

  function previewBulkEvent() {
    var area = document.getElementById('bulk-event-area');
    if (!area) return;

    var txns = DB.Transactions.all().filter(function(t){
      return !t.event_id && t.status === 'Posted';
    });

    if (txns.length === 0) {
      area.innerHTML = '<div class="info-box">&#10003; Semua transaksi sudah punya Business Event.</div>';
      return;
    }

    // Build mapping preview
    var groups = {};
    var cannotMap = [];

    txns.forEach(function(t) {
      var evtId = _mapEventId(t);
      if (!evtId) {
        cannotMap.push(t);
        return;
      }
      if (!groups[evtId]) groups[evtId] = [];
      groups[evtId].push(t);
    });

    var evtCatalog = DB.EventCatalog.all();
    var evtMap = {};
    evtCatalog.forEach(function(e){ evtMap[e.event_id] = e; });

    var totalMappable = Object.keys(groups).reduce(function(s,k){ return s+groups[k].length; }, 0);

    area.innerHTML =
      '<div class="card" style="margin-bottom:.75rem">' +

          '<span class="text-green">&#10003; Bisa di-assign otomatis: <strong>' + totalMappable + '</strong></span>' +
          (cannotMap.length > 0 ? '<span class="text-yellow">&#9888; Perlu review manual: <strong>' + cannotMap.length + '</strong></span>' : '') +

          '<tbody>' +
          Object.keys(groups).map(function(evtId) {
            var evt  = evtMap[evtId];
            var grp  = groups[evtId];
            var sample = grp.slice(0,2).map(function(t){ return t.description||t.txn_id; }).join(', ');
            return '<tr>' +
              '<td class="text-sm font-medium">' + (evt?evt.event_name:evtId) + '</td>' +
              '<td><span class="badge badge-blue">' + (evt?evt.domain:'—') + '</span></td>' +
              '<td class="text-right text-sm">' + grp.length + '</td>' +
              '<td class="text-xs text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">' + sample + '</td>' +
            '</tr>';
          }).join('') +
          (cannotMap.length > 0
            ? '<tr style="background:var(--yellow-dim)"><td class="text-sm text-yellow">Tidak bisa di-mapping otomatis</td><td>—</td><td class="text-right text-sm text-yellow">' + cannotMap.length + '</td><td class="text-xs text-muted">' + cannotMap.slice(0,2).map(function(t){return t.description||t.txn_id;}).join(', ') + '</td></tr>'
            : '') +
          '</tbody>' +
        '</table>' +
        '<div class="form-actions-bar" style="margin-top:.75rem">' +
          '<button class="btn btn-ghost" id="bulk-cancel-btn">Batal</button>' +
          '<button class="btn btn-primary" id="bulk-exec-btn">&#9670; Eksekusi Assignment (' + totalMappable + ' transaksi)</button>' +
        '</div>' +
      '</div>';

    // Bind buttons
    var cancelBtn2 = document.getElementById('bulk-cancel-btn');
    if (cancelBtn2) cancelBtn2.onclick = function(){ document.getElementById('bulk-event-area').innerHTML=''; };
    var execBtn = document.getElementById('bulk-exec-btn');
    if (execBtn) execBtn.onclick = function(){ _executeBulkEvent(groups); };
  }

  function _executeBulkEvent(groups) {
    var total = 0;
    Object.keys(groups).forEach(function(evtId) {
      groups[evtId].forEach(function(t) {
        // Get rule for this event
        var result = DB.RuleEngine.derive(evtId, {
          account_id: t.account_id,
          coa_code:   t.coa_code,
          direction:  t.direction
        });
        DB.Transactions.save(Object.assign({}, t, {
          event_id:       evtId,
          cf_class:       result && result.cf_class ? result.cf_class : t.cf_class,
          override_level: t.override_level || 1,
          rule_snapshot:  result ? result.snapshot : null
        }));
        total++;
      });
    });

    Utils.toast(total + ' transaksi berhasil di-assign Business Event. Sync ke Supabase dalam 1.5 detik.');
    document.getElementById('bulk-event-area').innerHTML =
      '<div class="info-box" style="color:var(--green);border-color:var(--green)">' +
        '&#10003; ' + total + ' transaksi berhasil di-assign. Data akan tersinkron ke Supabase.' +
      '</div>';
  }

  function _renderStorageIndicator() {
    var block = document.getElementById('storage-indicator-block');
    if (!block) return;

    // Count records
    var txnCount   = DB.Transactions.all().length;
    var rcvCount   = DB.Receivables.all().length;
    var payCount   = DB.Payables.all().length;
    var debtCount  = DB.DebtRegister.all().length;
    var schedCount = DB.DebtSchedule.all().length;
    var totalRec   = txnCount + rcvCount + payCount + debtCount + schedCount;

    // Estimate localStorage usage
    var lsUsed = 0;
    try {
      for (var k in localStorage) {
        if (localStorage.hasOwnProperty(k) && k.startsWith('fos_')) {
          lsUsed += (localStorage.getItem(k)||'').length * 2; // bytes (UTF-16)
        }
      }
    } catch(e) {}
    var lsUsedKB = Math.round(lsUsed / 1024);
    var lsLimitKB = 5120; // 5MB conservative estimate
    var lsPct = Math.min(100, Math.round(lsUsedKB / lsLimitKB * 100));

    // Status
    var status = lsPct < 50 ? 'ok' : lsPct < 75 ? 'warn' : 'danger';
    var statusLabel = lsPct < 50 ? '&#10003; Aman' : lsPct < 75 ? '&#9888; Perhatikan' : '&#9940; Segera Migrasi';
    var statusColor = lsPct < 50 ? 'var(--green)' : lsPct < 75 ? 'var(--yellow)' : 'var(--red)';

    block.innerHTML =
      '<div style="background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1.1rem">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">' +
          '<div style="font-size:.82rem;font-weight:600">&#128202; Storage Status</div>' +
          '<div style="font-size:.75rem;color:' + statusColor + ';font-weight:600">' + statusLabel + '</div>' +
        '</div>' +

        // Progress bar
        '<div style="background:var(--bg-surface);border-radius:4px;height:8px;overflow:hidden;margin-bottom:.6rem">' +
          '<div style="height:100%;width:' + lsPct + '%;background:' + statusColor + ';border-radius:4px;transition:width .3s"></div>' +
        '</div>' +

        // Stats grid
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;font-size:.75rem">' +
          '<div>' +
            '<div style="color:var(--text-muted);text-transform:uppercase;font-size:.65rem;letter-spacing:.04em">Transaksi</div>' +
            '<div style="font-weight:600;font-family:monospace">' + txnCount.toLocaleString() + '</div>' +
            _txnBar(txnCount, 5000) +
          '</div>' +
          '<div>' +
            '<div style="color:var(--text-muted);text-transform:uppercase;font-size:.65rem;letter-spacing:.04em">Piutang</div>' +
            '<div style="font-weight:600;font-family:monospace">' + rcvCount.toLocaleString() + '</div>' +
          '</div>' +
          '<div>' +
            '<div style="color:var(--text-muted);text-transform:uppercase;font-size:.65rem;letter-spacing:.04em">Jadwal Cicilan</div>' +
            '<div style="font-weight:600;font-family:monospace">' + schedCount.toLocaleString() + '</div>' +
          '</div>' +
          '<div>' +
            '<div style="color:var(--text-muted);text-transform:uppercase;font-size:.65rem;letter-spacing:.04em">Total Records</div>' +
            '<div style="font-weight:600;font-family:monospace">' + totalRec.toLocaleString() + '</div>' +
          '</div>' +
        '</div>' +

        // Storage usage
        '<div style="margin-top:.6rem;font-size:.75rem;color:var(--text-muted)">' +
          'Storage digunakan: <strong>' + lsUsedKB.toLocaleString() + ' KB</strong> dari ~' + (lsLimitKB/1024).toFixed(0) + ' MB (' + lsPct + '%)' +
          (txnCount > 3000 ? ' &nbsp;|&nbsp; <span style="color:var(--yellow)">&#9888; Transaksi mendekati batas. Pertimbangkan migrasi ke Supabase-first.</span>' : '') +
          (txnCount > 4500 ? ' &nbsp;|&nbsp; <span style="color:var(--red)">&#9940; Segera hubungi untuk migrasi storage.</span>' : '') +
        '</div>' +
      '</div>';
  }

  function _txnBar(count, limit) {
    var pct = Math.min(100, Math.round(count/limit*100));
    var color = pct<60?'var(--green)':pct<85?'var(--yellow)':'var(--red)';
    return '<div style="background:var(--bg-surface);border-radius:2px;height:3px;overflow:hidden;margin-top:.2rem">' +
      '<div style="height:100%;width:'+pct+'%;background:'+color+'"></div>' +
    '</div>';
  }

  async function checkSync() {
    var el = document.getElementById('sync-health-result');
    if (el) el.innerHTML = '<span class="text-muted">&#9679; Mengecek...</span>';
    if (typeof SupabaseSync === 'undefined') {
      if (el) el.innerHTML = '<span class="text-red">Supabase tidak tersedia</span>';
      return;
    }
    var result = await SupabaseSync.checkSyncHealth();
    if (!el) return;
    if (!result.ok) {
      el.innerHTML = '<span class="text-red">&#9888; ' + result.reason + '</span>';
      return;
    }
    el.innerHTML =
      '<span class="text-green">&#10003; Terhubung ke Supabase</span><br>' +
      '<span class="text-muted">Transaksi lokal: ' + result.transactions.local + ' baris' +
        (result.transactions.remote_has_data ? ' · Remote: ada data' : ' · Remote: kosong') + '</span><br>' +
      '<span class="text-muted">Debt Register lokal: ' + result.debt_register.local + ' fasilitas' +
        (result.debt_register.remote_has_data ? ' · Remote: ada data' : ' · Remote: kosong') + '</span>';
  }

  return { render, save, exportData, importData, migrateTxnIds, checkSync, lockPeriod, unlockPeriod, loadDirectionReview, flipDirection, markReviewed, previewBulkEvent };
})();

            '<select class="form-input" id="rec-account-sel" onchange="Reconciliation.onAccountChange()">' +
              '<option value="">— Pilih Rekening —</option>' +
              accounts.map(function(a){
                return '<option value="' + a.account_id + '">' + a.account_name + ' (' + a.account_type + ')</option>';
              }).join('') +
            '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Tanggal Saldo Rekening</label>' +
            '<input class="form-input" type="date" id="rec-stmt-date" value="' + Utils.today() + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Saldo di Rekening Bank (Rp)</label>' +
            '<input class="form-input" type="number" id="rec-stmt-balance" placeholder="0">' +
            '<small class="form-hint">Saldo sesuai mutasi rekening / e-wallet</small>' +
          '</div>' +
          '<div class="form-group" style="align-self:flex-end">' +
            '<button class="btn btn-primary" onclick="Reconciliation.loadTransactions()">Muat Transaksi</button>' +
          '</div>' +
        '</div>' +

        '<div id="rec-history">' + _renderHistory(entity) + '</div>' +
        '<div id="rec-work-area"></div>' +
      '</div>';
  }

  function _renderHistory(entity) {
    var recs = DB.Reconciliations.all()
      .filter(function(r){ return entity==='ALL' || r.entity_id===entity; })
      .sort(function(a,b){ return b.created_at.localeCompare(a.created_at); })
      .slice(0,5);
    if (recs.length === 0) return '';
    return '<div class="card" style="margin-bottom:.75rem">' +
      '<div class="card-header"><div class="card-title">Riwayat Rekonsiliasi Terakhir</div></div>' +
      '<table class="table" style="font-size:.8rem">' +
        '<thead><tr><th>Rekening</th><th>Tgl Statement</th><th>Saldo Statement</th><th>Saldo Sistem</th><th>Selisih</th><th>Status</th></tr></thead>' +
        '<tbody>' +
        recs.map(function(r) {
          var acct = DB.Accounts.byId(r.account_id);
          var diff = r.statement_balance - r.system_balance;
          return '<tr>' +
            '<td class="text-sm">' + (acct?acct.account_name:r.account_id) + '</td>' +
            '<td class="text-sm">' + Utils.formatDate(r.statement_date) + '</td>' +
            '<td class="text-right mono text-sm">' + Utils.formatIDR(r.statement_balance) + '</td>' +
            '<td class="text-right mono text-sm">' + Utils.formatIDR(r.system_balance) + '</td>' +
            '<td class="text-right mono text-sm ' + (Math.abs(diff)<1?'text-green':'text-red') + '">' + Utils.formatIDR(diff) + '</td>' +
            '<td><span class="badge ' + (r.status==='Reconciled'?'badge-green':'badge-yellow') + '">' + r.status + '</span></td>' +
          '</tr>';
        }).join('') +
        '</tbody>' +
      '</table>' +
    '</div>';
  }

  function onAccountChange() {
    _selectedAccountId = (document.getElementById('rec-account-sel')||{}).value || null;
  }

  function loadTransactions() {
    var accountId  = (document.getElementById('rec-account-sel')||{}).value || '';
    var stmtDate   = (document.getElementById('rec-stmt-date')||{}).value || '';
    var stmtBalance= parseFloat((document.getElementById('rec-stmt-balance')||{}).value)||0;
    var area       = document.getElementById('rec-work-area');

    if (!accountId || !stmtDate) { Utils.toast('Pilih rekening dan tanggal statement', 'error'); return; }

    var txns     = DB.Reconciliations.unreconciled(accountId, stmtDate);
    var acct     = DB.Accounts.byId(accountId);
    var sysTotal = txns.reduce(function(s,t){ return s + (t.direction==='Debit'?t.amount:-t.amount); }, 0);
    var diff     = stmtBalance - sysTotal;

    area.innerHTML =
      '<div class="card">' +
        '<div class="card-header">' +
          '<div class="card-title">Rekonsiliasi: ' + (acct?acct.account_name:'') + ' — ' + Utils.formatDate(stmtDate) + '</div>' +
        '</div>' +

        // Balance summary
        '<div class="rec-balance-row">' +
          '<div class="rec-bal-item">' +
            '<div class="rec-bal-label">Saldo di Rekening Bank</div>' +
            '<div class="rec-bal-val">' + Utils.formatIDR(stmtBalance) + '</div>' +
          '</div>' +
          '<div class="rec-bal-item">' +
            '<div class="rec-bal-label">Saldo di Sistem</div>' +
            '<div class="rec-bal-val">' + Utils.formatIDR(sysTotal) + '</div>' +
          '</div>' +
          '<div class="rec-bal-item ' + (Math.abs(diff)<1?'rec-bal-ok':'rec-bal-diff') + '">' +
            '<div class="rec-bal-label">Selisih</div>' +
            '<div class="rec-bal-val">' + Utils.formatIDR(diff) + '</div>' +
          '</div>' +
        '</div>' +

        // Transaction list with checkboxes
        (txns.length === 0
          ? '<div class="debt-empty">Tidak ada transaksi yang belum direkonsiliasi untuk rekening ini.</div>'
          : '<div style="overflow-x:auto"><table class="table" style="font-size:.8rem">' +
              '<thead><tr>' +
                '<th><input type="checkbox" id="rec-chk-all" onchange="Reconciliation.toggleAll(this.checked)"></th>' +
                '<th>Tanggal</th><th>Deskripsi</th><th>Event</th>' +
                '<th class="text-right">Debit</th><th class="text-right">Kredit</th>' +
              '</tr></thead>' +
              '<tbody>' +
              txns.map(function(t) {
                var evt = t.event_id ? DB.EventCatalog.byId(t.event_id) : null;
                return '<tr>' +
                  '<td><input type="checkbox" class="rec-txn-chk" data-txn-id="' + t.txn_id + '" checked></td>' +
                  '<td class="text-sm">' + Utils.formatDate(t.txn_date) + '</td>' +
                  '<td class="text-sm">' + (t.description||'—') + '</td>' +
                  '<td class="text-xs">' + (evt?'<span class="badge badge-blue">'+evt.event_name+'</span>':t.type_id) + '</td>' +
                  '<td class="text-right mono text-sm">' + (t.direction==='Debit'?Utils.formatIDR(t.amount):'—') + '</td>' +
                  '<td class="text-right mono text-sm">' + (t.direction==='Credit'?Utils.formatIDR(t.amount):'—') + '</td>' +
                '</tr>';
              }).join('') +
              '</tbody></table></div>'
        ) +

        '<div id="rec-errors" class="error-box" style="display:none"></div>' +
        '<div class="form-actions-bar" style="margin-top:.75rem">' +
          '<button class="btn btn-ghost" onclick="Reconciliation.render()">Batal</button>' +
          '<button class="btn btn-primary" ' +
            'data-account="' + accountId + '" data-date="' + stmtDate + '" data-balance="' + stmtBalance + '" ' +
            'id="rec-save-btn">&#10003; Simpan Rekonsiliasi</button>' +
        '</div>' +
      '</div>';

    document.getElementById('rec-save-btn').onclick = function() {
      saveReconciliation(accountId, stmtDate, stmtBalance, sysTotal);
    };
  }

  function toggleAll(checked) {
    document.querySelectorAll('.rec-txn-chk').forEach(function(c){ c.checked = checked; });
  }

  function saveReconciliation(accountId, stmtDate, stmtBalance, sysTotal) {
    var selectedTxnIds = [];
    document.querySelectorAll('.rec-txn-chk:checked').forEach(function(c){
      selectedTxnIds.push(c.getAttribute('data-txn-id'));
    });

    var recId = 'REC-' + accountId + '-' + stmtDate.replace(/-/g,'');
    var entity = DB.Accounts.byId(accountId);
    var diff   = stmtBalance - sysTotal;
    var status = Math.abs(diff) < 1 ? 'Reconciled' : 'Partial';

    DB.Reconciliations.save({
      rec_id:            recId,
      account_id:        accountId,
      entity_id:         entity ? entity.entity_id : null,
      statement_date:    stmtDate,
      statement_balance: stmtBalance,
      system_balance:    sysTotal,
      difference:        diff,
      matched_txn_ids:   selectedTxnIds,
      status:            status,
      created_at:        Utils.today(),
      notes:             null
    });

    DB.Reconciliations.markReconciled(selectedTxnIds, recId);
    Utils.toast('Rekonsiliasi disimpan — ' + selectedTxnIds.length + ' transaksi dicocokkan. Status: ' + status);
    render();
  }

  return { render, onAccountChange, loadTransactions, toggleAll };

})();

          '<div class="form-group"><label>Entity <span class="required">*</span></label>' +
            '<select class="form-input" id="fa-entity">' +
              entities.map(function(e){ return '<option value="'+e.entity_id+'"'+(existing&&existing.entity_id===e.entity_id?' selected':'')+'>'+e.entity_name+'</option>'; }).join('') +
            '</select></div>' +
          '<div class="form-group"><label>Kategori</label>' +
            '<select class="form-input" id="fa-category">' +
              ['Peralatan','Kendaraan','Furnitur','Bangunan','Teknologi','Lainnya'].map(function(c){
                return '<option value="'+c+'"'+(existing&&existing.category===c?' selected':'')+'>'+c+'</option>';
              }).join('') +
            '</select></div>' +
        '</div>' +

          '<div class="form-group"><label>Tanggal Perolehan <span class="required">*</span></label>' +
            '<input class="form-input" type="date" id="fa-date" value="'+(existing?existing.acquisition_date:Utils.today())+'"></div>' +

          '<div class="form-group"><label>Nilai Residu (Rp)</label>' +
            '<input class="form-input" type="number" id="fa-residual" value="'+(existing?(existing.residual_value||0):0)+'" placeholder="0"></div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Metode Penyusutan</label>' +
            '<select class="form-input" id="fa-method">' +
              '<option value="Straight_Line"'+(existing&&existing.depreciation_method==='Straight_Line'?' selected':'')+'>Garis Lurus (Straight Line)</option>' +

            '</select></div>' +
          '<div class="form-group"><label>Masa Manfaat (bulan)</label>' +
            '<input class="form-input" type="number" id="fa-life" value="'+(existing?(existing.useful_life_months||0):60)+'" placeholder="60"></div>' +
          '<div class="form-group"><label>Nomor Referensi</label>' +
            '<input class="form-input" id="fa-ref" value="'+(existing?(existing.reference_no||''):'')+'" placeholder="Nomor faktur, BPKB, dll"></div>' +
        '</div>' +
        '<div id="fa-errors" class="error-box" style="display:none"></div>' +
        '<div class="form-actions-bar">' +
          '<button class="btn btn-ghost" onclick="FixedAssetsModule.render()">Batal</button>' +
          '<button class="btn btn-primary" id="fa-save-btn">Simpan Aset</button>' +
        '</div>' +
      '</div>';

    document.getElementById('fa-save-btn').onclick = function() { _saveAsset(existing); };
    area.scrollIntoView({behavior:'smooth'});
  }

  function _saveAsset(existing) {
    var name    = (document.getElementById('fa-name')    ||{}).value||'';
    var entity  = (document.getElementById('fa-entity')  ||{}).value||'';
    var cat     = (document.getElementById('fa-category')||{}).value||'';
    var date    = (document.getElementById('fa-date')    ||{}).value||'';
    var cost    = parseFloat((document.getElementById('fa-cost')    ||{}).value)||0;
    var residual= parseFloat((document.getElementById('fa-residual')||{}).value)||0;
    var method  = (document.getElementById('fa-method')  ||{}).value||'Straight_Line';
    var life    = parseInt((document.getElementById('fa-life')      ||{}).value)||60;
    var ref     = (document.getElementById('fa-ref')     ||{}).value||'';
    var errBox  = document.getElementById('fa-errors');

    var errors = [];
    if (!name)          errors.push('Nama aset wajib diisi');
    if (!entity)        errors.push('Entity wajib dipilih');
    if (!date)          errors.push('Tanggal perolehan wajib diisi');
    if (!cost || cost<=0) errors.push('Nilai perolehan harus lebih dari 0');

    if (errors.length>0) { if(errBox){errBox.style.display='block';errBox.innerHTML='<ul>'+errors.map(function(e){return '<li>'+e+'</li>';}).join('')+'</ul>';} return; }
    if (errBox) errBox.style.display='none';

    var assetId = existing ? existing.asset_id : 'FA-' + entity + '-' + Date.now();
    DB.FixedAssets.save({
      asset_id:            assetId,
      entity_id:           entity,
      asset_name:          name,
      category:            cat,
      acquisition_date:    date,
      acquisition_cost:    cost,
      residual_value:      residual,
      depreciation_method: method,
      useful_life_months:  life,
      reference_no:        ref||null,
      status:              'Active',
      created_at:          Utils.today()
    });

    // Auto-create ledger entry for asset acquisition
    if (!existing) {
      var entAccts = DB.Accounts.byEntity(entity).filter(function(a){ return a.account_type==='Bank'; });
      if (entAccts.length > 0) {
        DB.Transactions.save({
          txn_id:      Utils.newTxnId(date),
          txn_date:    date,
          entry_date:  Utils.today(),
          entity_id:   entity,
          bu_id:       DB.BU.byEntity(entity)[0] ? DB.BU.byEntity(entity)[0].bu_id : '',
          activity_id: null,
          account_id:  entAccts[0].account_id,
          coa_code:    '151',
          type_id:     'TXN-02',
          cp_id:       null,
          amount:      cost,
          direction:   'Debit',
          description: 'Perolehan aset: ' + name,
          reference_id:assetId,
          status:      'Posted',
          void_reason: null,
          created_by:  'User',
          period:      Utils.toPeriod(date),
          cf_class:    'Investing',
          event_id:    null,
          override_level: 1
        });
      }
    }

    Utils.toast('Aset berhasil disimpan');
    render();
  }

  return { render, showNew, showEdit };

})();

const DebtPayoff = (() => {

  var _method    = 'avalanche'; // 'avalanche' or 'snowball'
  var _extraPay  = 0;

  function render() {
    var body   = document.getElementById('page-body');
    var entity = App.getEntity();
    var debts  = (entity && entity !== 'ALL'
      ? DB.DebtRegister.byEntity(entity)
      : DB.DebtRegister.all()
    ).filter(function(d){
      return ['Active','Overdue'].includes(d.status) &&
        d.debt_category !== 'Revolving' &&
        d.outstanding_principal > 0;
    });

    var totalOutstanding  = debts.reduce(function(s,d){ return s+(d.outstanding_principal||0); }, 0);
    var totalMinMonthly   = debts.reduce(function(s,d){ return s+(d.monthly_installment||0); }, 0);

    body.innerHTML =
      '<div class="debt-page">' +

      '<div class="debt-header">' +
        '<h2>Debt Payoff Planner</h2>' +
        '<p class="text-muted text-sm" style="margin-top:.25rem">' +
          'Rencanakan strategi pelunasan utang dengan metode Snowball atau Avalanche.' +
        '</p>' +
      '</div>' +

      // ── Method selector + extra payment ──────────────────
      '<div class="payoff-controls">' +
        '<div class="payoff-method-toggle">' +
          '<button class="payoff-method-btn ' + (_method==='avalanche'?'active':'') + '" ' +
            'id="btn-avalanche" onclick="DebtPayoff.setMethod(\'avalanche\')">'+
            '<div class="payoff-method-name">&#9650; Avalanche</div>' +
            '<div class="payoff-method-desc">Bunga tertinggi dulu — hemat total bunga</div>' +
          '</button>' +
          '<button class="payoff-method-btn ' + (_method==='snowball'?'active':'') + '" ' +
            'id="btn-snowball" onclick="DebtPayoff.setMethod(\'snowball\')">'+
            '<div class="payoff-method-name">&#10052; Snowball</div>' +
            '<div class="payoff-method-desc">Saldo terkecil dulu — motivasi lebih tinggi</div>' +
          '</button>' +
        '</div>' +
        '<div class="payoff-extra-input">' +
          '<label class="text-sm font-medium">Extra Pembayaran per Bulan (Rp)</label>' +
          '<input class="form-input" type="number" id="payoff-extra" value="' + _extraPay + '" ' +
            'placeholder="0" oninput="DebtPayoff.setExtra(this.value)">' +
          '<small class="form-hint">Di luar cicilan minimum. Semakin besar, semakin cepat lunas.</small>' +
        '</div>' +
      '</div>' +

      (debts.length === 0
        ? '<div class="card"><div class="debt-empty" style="padding:2rem">' +
            '<div style="font-size:2rem;margin-bottom:.5rem">&#10003;</div>' +
            '<p>Tidak ada utang cicilan aktif. Semua sudah lunas atau hanya revolving.</p>' +
          '</div></div>'
        : _renderPlan(debts, totalOutstanding, totalMinMonthly)
      ) +

      '</div>';
  }

  function _renderPlan(debts, totalOutstanding, totalMinMonthly) {
    var plan     = _calculatePlan(debts, _method, _extraPay);
    var planBase = _calculatePlan(debts, _method, 0);

    var saving = planBase.totalInterest - plan.totalInterest;
    var monthsSaved = planBase.totalMonths - plan.totalMonths;

    return '<div class="payoff-summary-grid">' +
      _summaryCard('Total Utang', Utils.formatIDR(totalOutstanding), '') +
      _summaryCard('Cicilan Minimum', Utils.formatIDR(totalMinMonthly) + '/bln', '') +
      _summaryCard('Lunas Dalam', plan.totalMonths + ' bulan', 'text-blue') +
      _summaryCard('Total Bunga', Utils.formatIDR(plan.totalInterest), 'text-red') +
      (saving > 0
        ? _summaryCard('Hemat vs tanpa extra', Utils.formatIDR(saving) + ' · ' + monthsSaved + ' bln lebih cepat', 'text-green')
        : '') +
    '</div>' +

    // ── Payoff Order ──────────────────────────────────────
    '<div class="card" style="margin-top:.75rem">' +
      '<div class="card-header">' +
        '<div class="card-title">Urutan Pelunasan — Metode ' + (_method==='avalanche'?'Avalanche':'Snowball') + '</div>' +
      '</div>' +
      '<table class="table" style="font-size:.8rem">' +
        '<thead><tr>' +
          '<th>Urutan</th><th>Fasilitas</th><th>Alasan Prioritas</th>' +

  function _summaryCard(label, value, cls) {
    return '<div class="payoff-summary-card">' +
      '<div class="payoff-summary-label">' + label + '</div>' +
      '<div class="payoff-summary-val ' + cls + '">' + value + '</div>' +
    '</div>';
  }

  function _monthsToDate(monthsFromNow) {
    var d = new Date();
    d.setMonth(d.getMonth() + monthsFromNow);
    return Utils.periodLabel(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }

  // ── Core calculation engine ───────────────────────────────
  function _calculatePlan(debts, method, extraPay) {
    // Sort by method
    var sorted = debts.slice().sort(function(a, b) {
      if (method === 'avalanche') {
        // Highest interest rate first; tie-break: highest outstanding
        var rateDiff = (b.interest_rate||0) - (a.interest_rate||0);
        return rateDiff !== 0 ? rateDiff : (b.outstanding_principal - a.outstanding_principal);
      } else {
        // Snowball: lowest outstanding first; tie-break: highest rate
        var balDiff = (a.outstanding_principal||0) - (b.outstanding_principal||0);
        return balDiff !== 0 ? balDiff : ((b.interest_rate||0) - (a.interest_rate||0));
      }
    });

    // Build reason labels
    var order = sorted.map(function(d, i) {
      var reason = method === 'avalanche'
        ? (i === 0 ? 'Bunga tertinggi (' + (d.interest_rate||0) + '%)' : 'Bunga ' + (d.interest_rate||0) + '%')
        : (i === 0 ? 'Saldo terkecil (' + Utils.formatIDR(d.outstanding_principal) + ')' : 'Saldo ' + Utils.formatIDR(d.outstanding_principal));
      return { debt: d, reason: reason, payoffMonth: 0 };
    });

    // Simulate month by month
    var balances = {};
    sorted.forEach(function(d) { balances[d.debt_id] = d.outstanding_principal || 0; });

    var schedule       = [];
    var month          = 0;
    var totalInterest  = 0;
    var totalPayment   = 0;
    var maxMonths      = 360; // 30 year cap

    var now = new Date();

    while (month < maxMonths) {
      month++;
      var active = sorted.filter(function(d){ return balances[d.debt_id] > 0; });
      if (active.length === 0) break;

      var d = new Date(now.getFullYear(), now.getMonth() + month, 1);
      var period = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');

      var rowPrincipal  = 0;
      var rowInterest   = 0;
      var rowPayment    = 0;
      var debtsPaidOff  = [];

      // Pay minimum on all debts
      active.forEach(function(debt) {
        var bal      = balances[debt.debt_id];
        var monthlyRate = (debt.interest_rate||0) / 100 / 12;
        var interest = Math.round(bal * monthlyRate);
        var minPay   = Math.min(debt.monthly_installment || (bal + interest), bal + interest);
        var principal= Math.max(0, Math.min(bal, minPay - interest));

        balances[debt.debt_id] -= principal;
        rowPrincipal += principal;
        rowInterest  += interest;
        rowPayment   += minPay;
      });

      // Apply extra payment to focus debt (first in sorted order with balance)
      var remaining = extraPay;
      for (var i = 0; i < sorted.length && remaining > 0; i++) {
        var bal = balances[sorted[i].debt_id];
        if (bal <= 0) continue;
        var extra = Math.min(remaining, bal);
        balances[sorted[i].debt_id] -= extra;
        rowPrincipal += extra;
        rowPayment   += extra;
        remaining    -= extra;
      }

      // Check who got paid off this month
      order.forEach(function(item) {
        if (balances[item.debt.debt_id] <= 0 && item.payoffMonth === 0) {
          item.payoffMonth = month;
          debtsPaidOff.push(item.debt.description.split(' ')[0]);
        }
      });

      var remainingTotal = Object.values(balances).reduce(function(s,b){ return s+Math.max(0,b); }, 0);

      totalInterest += rowInterest;
      totalPayment  += rowPayment;

      schedule.push({
        month:        month,
        period:       period,
        totalPayment: rowPayment,
        totalPrincipal:rowPrincipal,
        totalInterest: rowInterest,
        remainingTotal:remainingTotal,
        debtsPaidOff:  debtsPaidOff
      });
    }

    return {
      order:         order,
      schedule:      schedule,
      totalMonths:   month,
      totalInterest: totalInterest,
      totalPayment:  totalPayment
    };
  }

  function setMethod(method) {
    _method = method;
    render();
  }

  function setExtra(val) {
    _extraPay = parseFloat(val) || 0;
    render();
  }

  return { render, setMethod, setExtra };

})();

  function _renderCompare() {
    var budgets = _getBudgets(_entity, _period);

        '<p>Belum ada anggaran untuk periode ini.</p>' +
        '<button class="btn btn-primary" onclick="BudgetModule.switchView(\'input\')">+ Input Anggaran</button>' +
      '</div></div>';
    }

    var budgetMap = {};
    budgets.forEach(function(b){ budgetMap[b.coa_code] = b.budget_amount; });

    // Get actuals from transactions
    var actualMap = {};
    DB.Transactions.all().filter(function(t){
      return t.status==='Posted' && t.period===_period &&
        (_entity==='ALL' || t.entity_id===_entity);
    }).forEach(function(t) {
      if (!actualMap[t.coa_code]) actualMap[t.coa_code] = 0;
      actualMap[t.coa_code] += t.direction==='Debit' ? t.amount : -t.amount;
    });

    // All COAs that have either budget or actual
    var allCOAs = DB.COA.all().filter(function(c){
      return (c.coa_category==='Revenue' || c.coa_category==='Expense') &&
        (budgetMap[c.coa_code] || actualMap[c.coa_code]);
    });

    function _row(coa) {
      var budget = budgetMap[coa.coa_code] || 0;
      var actual = Math.abs(actualMap[coa.coa_code] || 0);
      var diff   = coa.coa_category==='Revenue' ? (actual-budget) : (budget-actual);
      var pct    = budget>0 ? Math.round(actual/budget*100) : null;
      var status = budget===0 ? '' : pct>=100 ? 'over' : pct>=80 ? 'warn' : 'ok';

      return '<tr>' +
        '<td class="mono text-sm text-muted">' + coa.coa_code + '</td>' +
        '<td class="text-sm">' + coa.coa_name + '</td>' +
        '<td class="text-right mono text-sm">' + (budget>0?Utils.formatIDR(budget):'—') + '</td>' +
        '<td class="text-right mono text-sm">' + (actual>0?Utils.formatIDR(actual):'—') + '</td>' +
        '<td class="text-right mono text-sm ' + (diff>=0?'text-green':'text-red') + '">' +
          (budget>0?(diff>=0?'+':'')+Utils.formatIDR(diff):'—') +
        '</td>' +
        '<td>' +
          (pct!==null
            ? '<div class="budget-bar-wrap">' +
                '<div class="budget-bar-fill budget-bar-'+status+'" style="width:'+Math.min(pct,100)+'%"></div>' +
              '</div>' +
              '<div class="text-xs text-center">' + pct + '%</div>'
            : '') +
        '</td>' +
      '</tr>';

    var expCOAs = allCOAs.filter(function(c){ return c.coa_category==='Expense'; });

    var totalRevBudget = revCOAs.reduce(function(s,c){ return s+(budgetMap[c.coa_code]||0); },0);
    var totalRevActual = revCOAs.reduce(function(s,c){ return s+Math.abs(actualMap[c.coa_code]||0); },0);
    var totalExpBudget = expCOAs.reduce(function(s,c){ return s+(budgetMap[c.coa_code]||0); },0);
    var totalExpActual = expCOAs.reduce(function(s,c){ return s+Math.abs(actualMap[c.coa_code]||0); },0);
    var netBudget = totalRevBudget - totalExpBudget;
    var netActual = totalRevActual - totalExpActual;

          '<div class="budget-net-val ' + (netActual>=netBudget?'text-green':'text-red') + '">' + Utils.formatIDR(netActual) + '</div>' +
        '</div>' +
        '<div class="budget-net-item">' +
          '<div class="budget-net-label">Selisih</div>' +
          '<div class="budget-net-val ' + (netActual-netBudget>=0?'text-green':'text-red') + '">' +
            (netActual-netBudget>=0?'+':'') + Utils.formatIDR(netActual-netBudget) +
          '</div>' +
        '</div>' +

        '<thead><tr>' +

          '<th class="text-right">Budget</th>' +

          '<th style="min-width:100px">Realisasi</th>' +

          '<td class="text-right mono text-sm">' + Utils.formatIDR(totalRevActual) + '</td>' +
          '<td class="text-right mono text-sm ' + (totalRevActual>=totalRevBudget?'text-green':'text-red') + '">' +

  function saveAll() {
    var inputs = document.querySelectorAll('.budget-input');

          period:       _period,

  function copyPrevious() {
    var parts  = _period.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1]);
    if (m === 1) { y--; m=12; } else { m--; }
    var prevPeriod = y + '-' + String(m).padStart(2,'0');
    var prev = _getBudgets(_entity, prevPeriod);
    if (prev.length === 0) {
      Utils.toast('Tidak ada anggaran di bulan sebelumnya (' + Utils.periodLabel(prevPeriod) + ')', 'error');
      return;
    }
    // Copy to current period
    var copied = prev.map(function(b) {
      return Object.assign({}, b, {
        budget_id: 'BDG-' + _entity + '-' + _period + '-' + b.coa_code,
        period:    _period,
        created_at:Utils.today()
      });
    });
    _saveBudgets(_entity, _period, copied);
    Utils.toast('Anggaran disalin dari ' + Utils.periodLabel(prevPeriod) + ' — ' + copied.length + ' item');
    render();
  }

  function exportBVA() {
    var budgets   = _getBudgets(_entity, _period);
    var budgetMap = {};
    budgets.forEach(function(b){ budgetMap[b.coa_code] = b.budget_amount; });
    var actualMap = {};
    DB.Transactions.all().filter(function(t){
      return t.status==='Posted' && t.period===_period &&
        (_entity==='ALL'||t.entity_id===_entity);
    }).forEach(function(t){
      if (!actualMap[t.coa_code]) actualMap[t.coa_code] = 0;
      actualMap[t.coa_code] += t.direction==='Debit' ? t.amount : -t.amount;
    });

    var allCOAs = DB.COA.all().filter(function(c){
      return (c.coa_category==='Revenue'||c.coa_category==='Expense') &&
        (budgetMap[c.coa_code]||actualMap[c.coa_code]);
    });

    Utils.exportCSV(
      ['COA','Nama','Kategori','Budget','Aktual','Selisih','Pct'],
      allCOAs.map(function(c){
        var b = budgetMap[c.coa_code]||0;
        var a = Math.abs(actualMap[c.coa_code]||0);
        var d = c.coa_category==='Revenue' ? a-b : b-a;
        var pct = b>0 ? Math.round(a/b*100) : null;
        return [c.coa_code, c.coa_name, c.coa_category, b, a, d, pct!=null?pct+'%':'—'];
      }),
      'budget-vs-aktual-' + _period + '.csv'
    );
  }

  function switchView(v) { _view=v; render(); }
  function onPeriodChange() {
    _period = (document.getElementById('budget-period-sel')||{}).value || _period;
    render();
  }

  function _getAvailablePeriods() {
    var now   = new Date();
    var periods = [];
    for (var i = -3; i <= 6; i++) {
      var d = new Date(now.getFullYear(), now.getMonth()+i, 1);
      periods.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
    }
    return periods;
  }

  return { render, switchView, onPeriodChange, saveAll, copyPrevious, exportBVA };

})();
