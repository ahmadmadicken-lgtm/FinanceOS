  <style>/* ============================================================
   FINANCE OS — DESIGN SYSTEM
   Palette: Deep slate base, warm off-white surfaces,
   precise accent system per data type.
   Typography: Inter (utility) + JetBrains Mono (numbers)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* ── Tokens ─────────────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:           #0f1117;
  --bg-surface:   #171b25;
  --bg-raised:    #1e2330;
  --bg-hover:     #252a38;
  --border:       #2a2f3e;
  --border-light: #323847;

  /* Text */
  --text:         #e8eaf0;
  --text-muted:   #7b8196;
  --text-faint:   #4a5068;

  /* Accents */
  --green:        #2ecc8a;
  --green-dim:    rgba(46,204,138,.12);
  --red:          #f05c5c;
  --red-dim:      rgba(240,92,92,.12);
  --blue:         #4d9cff;
  --blue-dim:     rgba(77,156,255,.12);
  --yellow:       #f0b429;
  --yellow-dim:   rgba(240,180,41,.12);
  --purple:       #a78bfa;
  --purple-dim:   rgba(167,139,250,.12);
  --teal:         #22d3ee;
  --teal-dim:     rgba(34,211,238,.12);

  /* Sidebar */
  --sidebar-w:    220px;
  --sidebar-bg:   #0c0f17;

  /* Misc */
  --radius:       8px;
  --radius-lg:    12px;
  --shadow:       0 2px 12px rgba(0,0,0,.35);
  --transition:   150ms ease;
  --header-h:     56px;
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: "Inter", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: var(--blue); text-decoration: none; }

/* ── App Shell ──────────────────────────────────────────── */
#app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

#app-logo {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: 1.25rem 1rem 1rem;
  border-bottom: 1px solid var(--border);
  min-height: var(--header-h);
}
.logo-icon {
  font-size: 1.4rem;
  color: var(--blue);
  line-height: 1;
}
.logo-text {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .02em;
  text-transform: uppercase;
}

#nav-links {
  list-style: none;
  padding: .75rem 0;
  flex: 1;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .6rem 1rem;
  margin: .1rem .5rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  color: var(--text-muted);
  font-size: .82rem;
  font-weight: 500;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--blue-dim);
  color: var(--blue);
  font-weight: 600;
}
.nav-icon {
  font-size: 1rem;
  width: 1.1rem;
  text-align: center;
  flex-shrink: 0;
}

/* ── Main Content ───────────────────────────────────────── */
main#content {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Page Header ────────────────────────────────────────── */
#page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
  padding: 0 1.5rem;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 1rem;
}

.page-header-left {
  display: flex;
  align-items: center;
  gap: .75rem;
  min-width: 0;
}
.page-title {
  font-size: .95rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.page-header-right {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

.sidebar-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: none;
  border: none;
  padding: 4px;
}
.sidebar-toggle span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text-muted);
  border-radius: 2px;
  transition: var(--transition);
}

.header-select {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .35rem .65rem;
  font-size: .8rem;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}
.header-select:focus { border-color: var(--blue); }

/* ── Page Body ──────────────────────────────────────────── */
#page-body {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
}

/* ── Cards ──────────────────────────────────────────────── */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.card-header h3 {
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
}

/* ── KPI Grid ───────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1rem;
}

.kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  display: flex;
  align-items: flex-start;
  gap: .85rem;
  transition: border-color var(--transition);
}
.kpi-card:hover { border-color: var(--border-light); }
.kpi-card.kpi-green { border-left: 3px solid var(--green); }
.kpi-card.kpi-red   { border-left: 3px solid var(--red); }
.kpi-card.kpi-blue  { border-left: 3px solid var(--blue); }

.kpi-icon {
  font-size: 1.2rem;
  margin-top: .1rem;
  opacity: .7;
}
.kpi-card.kpi-green .kpi-icon { color: var(--green); }
.kpi-card.kpi-red   .kpi-icon { color: var(--red); }
.kpi-card.kpi-blue  .kpi-icon { color: var(--blue); }

.kpi-label {
  font-size: .72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: .25rem;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.kpi-period {
  font-size: .68rem;
  opacity: .7;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.kpi-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -.02em;
}

/* ── Alert Row ──────────────────────────────────────────── */
.alert-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
.alert-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .85rem 1.1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
}
.alert-card.alert-warn { border-left: 3px solid var(--red); }
.alert-card.alert-ok   { border-left: 3px solid var(--green); }
.alert-label { font-size: .82rem; font-weight: 500; color: var(--text); }
.alert-right { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; justify-content: flex-end; }

/* ── Dashboard Grids ────────────────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}

/* ── BU Bars ────────────────────────────────────────────── */
.bu-bars { display: flex; flex-direction: column; gap: .85rem; }
.bu-bar-row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: .6rem; }
.bu-bar-label { font-size: .75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bu-bar-tracks { display: flex; flex-direction: column; gap: 3px; }
.bu-bar-track {
  height: 5px;
  background: var(--bg-raised);
  border-radius: 3px;
  overflow: hidden;
}
.bu-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.fill-revenue { background: var(--green); }
.fill-expense { background: var(--red); }
.bu-bar-net { font-family: "JetBrains Mono", monospace; font-size: .75rem; text-align: right; }
.text-green { color: var(--green); }
.text-red   { color: var(--red); }

.bu-legend { display: flex; gap: 1rem; font-size: .72rem; color: var(--text-muted); margin-top: .5rem; align-items: center; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: .3rem; }
.dot-revenue { background: var(--green); }
.dot-expense { background: var(--red); }

/* ── Aging Bars ─────────────────────────────────────────── */
.aging-bars { display: flex; flex-direction: column; gap: .7rem; }
.aging-row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: .6rem; }
.aging-label { font-size: .75rem; color: var(--text-muted); }
.aging-track { height: 6px; background: var(--bg-raised); border-radius: 3px; overflow: hidden; }
.aging-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.aging-current { background: var(--green); }
.aging-30      { background: var(--yellow); }
.aging-60      { background: #f0883a; }
.aging-90      { background: var(--red); }
.aging-90plus  { background: #b91c1c; }
.aging-amount { font-family: "JetBrains Mono", monospace; font-size: .72rem; text-align: right; color: var(--text-muted); }
.aging-total { margin-top: .75rem; font-size: .8rem; color: var(--text-muted); text-align: right; padding-top: .75rem; border-top: 1px solid var(--border); }

/* ── Tables ─────────────────────────────────────────────── */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: .8rem;
}
.table th {
  text-align: left;
  padding: .55rem .75rem;
  color: var(--text-muted);
  font-weight: 600;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.table td {
  padding: .6rem .75rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--bg-hover); }
.text-right { text-align: right; }
.text-sm { font-size: .75rem; }
.text-muted { color: var(--text-muted); }
.mono { font-family: "JetBrains Mono", monospace; font-size: .8rem; }

/* ── Badges ─────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: .2rem .55rem;
  border-radius: 99px;
  font-size: .7rem;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: .02em;
}
.badge-green  { background: var(--green-dim);  color: var(--green); }
.badge-red    { background: var(--red-dim);    color: var(--red); }
.badge-blue   { background: var(--blue-dim);   color: var(--blue); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray   { background: var(--bg-raised);  color: var(--text-muted); }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .5rem 1rem;
  border-radius: var(--radius);
  font-size: .82rem;
  font-weight: 600;
  border: 1px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.btn-primary:hover { background: #3a8dee; }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn-danger {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.btn-danger:hover { background: #d94f4f; }
.btn-sm { padding: .3rem .65rem; font-size: .75rem; }

/* ── Forms ───────────────────────────────────────────────── */
.form-body { display: flex; flex-direction: column; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: .4rem; }
.form-group label { font-size: .78rem; font-weight: 500; color: var(--text-muted); }
.form-input {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .55rem .75rem;
  font-size: .85rem;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
.form-input:focus { border-color: var(--blue); }
.form-input:disabled { opacity: .5; cursor: not-allowed; }
.form-actions { display: flex; gap: .75rem; }

/* ── Empty States ────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1rem;
  text-align: center;
  gap: 1rem;
}
.empty-icon { font-size: 2.5rem; opacity: .4; }
.empty-state p { color: var(--text-muted); font-size: .85rem; }
.empty-state-sm {
  padding: 1.5rem;
  text-align: center;
  color: var(--text-muted);
  font-size: .8rem;
}

/* ── Coming Soon ─────────────────────────────────────────── */
.coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  gap: 1rem;
}
.coming-icon { font-size: 3rem; opacity: .3; }
.coming-soon h2 { font-size: 1.25rem; font-weight: 600; color: var(--text); }
.coming-soon p { color: var(--text-muted); font-size: .85rem; max-width: 380px; line-height: 1.7; }

/* ── Toast ───────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  padding: .75rem 1.1rem;
  border-radius: var(--radius);
  font-size: .82rem;
  font-weight: 500;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s ease;
  z-index: 999;
  box-shadow: var(--shadow);
}
.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }
.toast-show    { opacity: 1; transform: translateY(0); }

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  max-width: 360px;
  width: 90%;
  box-shadow: var(--shadow);
}
.modal-message { color: var(--text); font-size: .9rem; margin-bottom: 1.25rem; line-height: 1.6; }
.modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }

/* ── Dividers ────────────────────────────────────────────── */
hr { border: none; border-top: 1px solid var(--border); }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .dashboard-grid { grid-template-columns: 1fr; }
  .alert-row { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  #sidebar {
    transform: translateX(-100%);
  }
  #sidebar.open {
    transform: translateX(0);
  }
  main#content {
    margin-left: 0;
  }
  .sidebar-toggle { display: flex; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  #page-body { padding: 1rem; }
  .header-select { font-size: .75rem; padding: .3rem .5rem; }
}

@media (max-width: 400px) {
  .kpi-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════════════
   MODULE SHARED STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Toolbar ─────────────────────────────────────────────── */
.module-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: .75rem;
  gap: 1rem;
}
.toolbar-left, .toolbar-right { display: flex; align-items: center; gap: .5rem; }

/* ── Filter Bar ──────────────────────────────────────────── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  align-items: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .75rem 1rem;
}
.filter-select, .filter-input {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: .35rem .65rem;
  font-size: .8rem;
  outline: none;
  transition: border-color var(--transition);
  font-family: inherit;
}
.filter-select:focus, .filter-input:focus { border-color: var(--blue); }
.filter-input[type="date"] { width: 140px; }
.filter-input:not([type="date"]) { width: 180px; }

/* ── Table Footer ────────────────────────────────────────── */
.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .75rem 1rem;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: .5rem;
}
.footer-totals { display: flex; gap: 1.25rem; align-items: center; }
.text-blue   { color: var(--blue); }
.text-purple { color: var(--purple); }

/* ── Row Actions ─────────────────────────────────────────── */
.row-actions { display: flex; gap: .25rem; align-items: center; }
.btn-action {
  background: none;
  border: none;
  padding: .2rem .35rem;
  border-radius: 4px;
  font-size: .85rem;
  cursor: pointer;
  transition: background var(--transition);
  color: var(--text-muted);
}
.btn-action:hover { background: var(--bg-hover); color: var(--text); }
.btn-action.text-green { color: var(--green); }
.btn-action.text-red   { color: var(--red); }

/* ── Form Page ───────────────────────────────────────────── */
.form-page { max-width: 820px; }
.form-page-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
}
.form-page-title { font-size: 1.05rem; font-weight: 600; }

.form-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.form-section {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.form-section:last-of-type { border-bottom: none; }

.form-section-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--blue);
  margin-bottom: 1rem;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}
.form-row.col-2 { grid-template-columns: repeat(2, 1fr); }
.form-row.col-1 { grid-template-columns: 1fr; }

.required { color: var(--red); }

.form-actions-bar {
  display: flex;
  justify-content: flex-end;
  gap: .75rem;
  padding: 1.25rem 1.5rem;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
}

.btn-secondary {
  background: var(--bg-raised);
  color: var(--text);
  border: 1px solid var(--border-light);
}
.btn-secondary:hover { background: var(--bg-hover); }

/* ── Error Box ───────────────────────────────────────────── */
.error-box {
  margin: 0 1.5rem 1rem;
  padding: .85rem 1rem;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  color: var(--red);
  font-size: .82rem;
}
.error-box ul { margin: 0; padding-left: 1.2rem; }
.error-box li { margin-bottom: .2rem; }

/* ── Detail Modal ────────────────────────────────────────── */
.modal-lg { max-width: 560px; width: 95%; }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: .95rem; font-weight: 600; }
.detail-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.detail-table tr { border-bottom: 1px solid var(--border); }
.detail-table tr:last-child { border-bottom: none; }
.detail-label {
  padding: .55rem .5rem;
  color: var(--text-muted);
  font-weight: 500;
  width: 40%;
  vertical-align: top;
}
.detail-value { padding: .55rem .5rem; color: var(--text); }

/* ── Responsive Form ─────────────────────────────────────── */
@media (max-width: 700px) {
  .form-row { grid-template-columns: 1fr; }
  .form-row.col-2 { grid-template-columns: 1fr; }
  .filter-input:not([type="date"]) { width: 140px; }
}

/* ══════════════════════════════════════════════════════════
   RECEIVABLES / PAYABLES MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Aging Summary Bar ───────────────────────────────────── */
.aging-summary {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  flex-wrap: wrap;
}
.aging-summary-item {
  display: flex;
  flex-direction: column;
  gap: .3rem;
  flex: 1;
  min-width: 90px;
}
.aging-summary-label { font-size: .7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.aging-summary-bar-wrap { height: 4px; background: var(--bg-raised); border-radius: 2px; overflow: hidden; }
.aging-summary-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.aging-summary-value { font-family: "JetBrains Mono", monospace; font-size: .78rem; color: var(--text); }
.aging-summary-total {
  display: flex;
  flex-direction: column;
  gap: .2rem;
  align-items: flex-end;
  padding-left: 1rem;
  border-left: 1px solid var(--border);
  min-width: 120px;
}
.aging-summary-total strong { font-family: "JetBrains Mono", monospace; font-size: .95rem; }

/* ── Aging Tag ───────────────────────────────────────────── */
.aging-tag {
  display: inline-block;
  padding: .18rem .5rem;
  border-radius: 99px;
  font-size: .7rem;
  font-weight: 600;
  white-space: nowrap;
}
.aging-tag-green  { background: var(--green-dim);  color: var(--green); }
.aging-tag-yellow { background: var(--yellow-dim); color: var(--yellow); }
.aging-tag-orange { background: rgba(240,136,58,.12); color: #f0883a; }
.aging-tag-red    { background: var(--red-dim);    color: var(--red); }
.aging-tag-gray   { background: var(--bg-raised);  color: var(--text-faint); }

/* ── Progress Bar ────────────────────────────────────────── */
.rcv-progress { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
.rcv-progress-header { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: .5rem; color: var(--text-muted); }
.progress-track { height: 8px; background: var(--bg-raised); border-radius: 4px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s ease; }

/* ── Detail Grid ─────────────────────────────────────────── */
.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.detail-item { display: flex; flex-direction: column; gap: .25rem; }
.detail-item-label { font-size: .7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.detail-item-value { font-size: .85rem; color: var(--text); }
.detail-section-title {
  padding: .75rem 1.25rem .4rem;
  font-size: .72rem;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ── Collection Info ─────────────────────────────────────── */
.collection-info {
  display: flex;
  gap: 1rem;
  padding: .85rem 1.25rem;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.col-info-item { display: flex; flex-direction: column; gap: .2rem; flex: 1; }
.col-info-item span:first-child { font-size: .7rem; }
.col-info-item span:last-child  { font-family: "JetBrains Mono", monospace; font-size: .85rem; font-weight: 500; }

/* ── Modal Sizes ─────────────────────────────────────────── */
.modal-md { max-width: 480px; width: 95%; }
.modal-xl { max-width: 680px; width: 95%; max-height: 85vh; overflow-y: auto; }

/* ── Form Hint ───────────────────────────────────────────── */
.form-hint { font-size: .72rem; color: var(--text-muted); margin-top: .25rem; }

/* ── Text Center ─────────────────────────────────────────── */
.text-center { text-align: center; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 700px) {
  .detail-grid { grid-template-columns: repeat(2, 1fr); }
  .aging-summary { gap: .6rem; }
  .aging-summary-item { min-width: 70px; }
}

/* ══════════════════════════════════════════════════════════
   PAYABLES MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.ceo-advance-banner {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1rem;
  background: var(--yellow-dim);
  border: 1px solid var(--yellow);
  border-radius: var(--radius);
  margin-bottom: .5rem;
  flex-wrap: wrap;
}

.row-ceo td { background: rgba(240,180,41,.04); }

.info-box {
  padding: .75rem 1rem;
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-radius: var(--radius);
  color: var(--text);
  font-size: .82rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}

/* ══════════════════════════════════════════════════════════
   TREASURY MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Account Summary Grid ────────────────────────────────── */
.treasury-summary {
  display: flex;
  gap: 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  align-items: center;
  flex-wrap: wrap;
}
.treasury-acct-grid {
  display: flex;
  gap: .6rem;
  flex-wrap: wrap;
  flex: 1;
}
.treasury-acct-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .6rem .85rem;
  min-width: 130px;
}
.treasury-acct-name { font-size: .78rem; font-weight: 600; color: var(--text); }
.treasury-acct-type { font-size: .68rem; color: var(--text-muted); margin-bottom: .2rem; }
.treasury-acct-bal  { font-family: "JetBrains Mono", monospace; font-size: .85rem; color: var(--blue); }

.treasury-period-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .2rem;
  padding-left: 1rem;
  border-left: 1px solid var(--border);
  min-width: 140px;
}
.treasury-stat-val {
  font-family: "JetBrains Mono", monospace;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}

/* ── Transfer Flow (table) ───────────────────────────────── */
.transfer-flow {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
.transfer-acct {
  font-size: .8rem;
  padding: .18rem .5rem;
  border-radius: 4px;
}
.transfer-acct.src { background: var(--red-dim);  color: var(--red); }
.transfer-acct.dst { background: var(--green-dim); color: var(--green); }
.transfer-arrow { color: var(--text-muted); font-size: .9rem; }

/* ── Transfer Form Visual ────────────────────────────────── */
.transfer-visual {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: center;
  margin-bottom: .75rem;
}
.transfer-side { display: flex; flex-direction: column; gap: .5rem; }
.transfer-side-label { font-size: .72rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.transfer-select-lg { font-size: .85rem; padding: .65rem .85rem; }
.transfer-arrow-big {
  font-size: 1.5rem;
  color: var(--blue);
  text-align: center;
  opacity: .7;
}

/* ── Integrity Alert ─────────────────────────────────────── */
.integrity-alert {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1rem;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  color: var(--red);
  font-size: .82rem;
  margin-top: .75rem;
}

/* ── Transfer Flow Detail (modal) ────────────────────────── */
.transfer-flow-detail {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: .75rem;
  align-items: center;
  padding: 1rem;
  background: var(--bg-raised);
  border-radius: var(--radius);
  margin-bottom: .5rem;
}
.tfd-side { text-align: center; }
.tfd-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.tfd-acct  { font-size: .9rem; font-weight: 600; color: var(--text); }
.tfd-entity { margin-top: .15rem; }
.tfd-arrow { text-align: center; }
.tfd-amount { font-family: "JetBrains Mono", monospace; font-size: .85rem; color: var(--blue); margin-bottom: .3rem; }
.tfd-arrow-line { color: var(--text-muted); font-size: .8rem; letter-spacing: .1em; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 640px) {
  .transfer-visual { grid-template-columns: 1fr; }
  .transfer-arrow-big { transform: rotate(90deg); }
  .treasury-period-stat { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: .75rem; align-items: flex-start; }
}

/* ══════════════════════════════════════════════════════════
   REPORTS MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Layout ──────────────────────────────────────────────── */
.reports-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 1rem;
  min-height: calc(100vh - var(--header-h) - 3rem);
}
.reports-sidebar {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .5rem;
  height: fit-content;
  position: sticky;
  top: calc(var(--header-h) + 1.5rem);
}
.report-menu-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .55rem .75rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
  user-select: none;
}
.report-menu-item:hover { background: var(--bg-hover); color: var(--text); }
.report-menu-item.active { background: var(--blue-dim); color: var(--blue); font-weight: 600; }
.report-menu-icon { font-size: .9rem; width: 1rem; text-align: center; flex-shrink: 0; }

.reports-content {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

/* ── Report Header ───────────────────────────────────────── */
.report-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}
.report-title    { font-size: 1rem; font-weight: 700; color: var(--text); }
.report-subtitle { font-size: .78rem; color: var(--text-muted); margin-top: .2rem; }

/* ── Report Body ─────────────────────────────────────────── */
.report-body { padding: 1.25rem 1.5rem; }

.report-section-head {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--blue);
  padding: .5rem 0 .4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: .4rem;
}

.report-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .45rem 0;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
}
.report-row:last-child { border-bottom: none; }
.report-row-label { color: var(--text); flex: 1; }
.report-row-value { font-family: "JetBrains Mono", monospace; font-size: .82rem; text-align: right; min-width: 140px; }

.report-subtotal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .6rem 0;
  border-top: 2px solid var(--border-light);
  margin-top: .25rem;
  font-size: .85rem;
}

.report-net {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .85rem 1rem;
  border-radius: var(--radius);
  margin-top: 1rem;
  font-size: .9rem;
}
.net-profit { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.net-loss   { background: var(--red-dim);   border: 1px solid var(--red);   color: var(--red); }

.report-empty-row {
  padding: 1.5rem 0;
  color: var(--text-muted);
  font-size: .82rem;
  text-align: center;
}

/* ── COA Code Tag ────────────────────────────────────────── */
.coa-code {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: .7rem;
  background: var(--bg-raised);
  color: var(--text-muted);
  padding: .1rem .35rem;
  border-radius: 3px;
  margin-right: .5rem;
}

/* ── Balance Sheet Layout ────────────────────────────────── */
.bs-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
}
.bs-column {}
.bs-subcategory {
  font-size: .7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  padding: .5rem 0 .25rem;
}

/* ── Balance Check ───────────────────────────────────────── */
.balance-check {
  padding: .5rem 1.5rem;
  font-size: .78rem;
  font-weight: 500;
}
.balance-check.ok   { color: var(--green); }
.balance-check.warn { color: var(--red); }

/* ── BU Mini Bar ─────────────────────────────────────────── */
.bu-mini-bar  { height: 4px; background: var(--bg-raised); border-radius: 2px; overflow: hidden; margin-bottom: 2px; }
.bu-mini-fill { height: 100%; border-radius: 2px; }

/* ── Aging Group Header ──────────────────────────────────── */
.aging-group-header td {
  background: var(--bg-raised);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  padding: .4rem .75rem !important;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .reports-layout { grid-template-columns: 1fr; }
  .reports-sidebar { position: static; display: flex; flex-wrap: wrap; gap: .25rem; }
  .report-menu-item { font-size: .75rem; padding: .4rem .6rem; }
  .bs-layout { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════════════
   MASTER DATA MODULE STYLES
   ══════════════════════════════════════════════════════════ */

/* ── Layout ──────────────────────────────────────────────── */
.masters-layout { display: flex; flex-direction: column; gap: 1rem; }

.masters-tabs {
  display: flex;
  gap: .35rem;
  flex-wrap: wrap;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .5rem;
}
.master-tab {
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .45rem .85rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
  user-select: none;
  white-space: nowrap;
}
.master-tab:hover  { background: var(--bg-hover); color: var(--text); }
.master-tab.active { background: var(--blue-dim); color: var(--blue); font-weight: 600; }

.masters-content {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

/* ── Master Header ───────────────────────────────────────── */
.master-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.master-title { font-size: .9rem; font-weight: 600; }

.master-filter-row {
  padding: .65rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
}

/* ── COA Grouped View ────────────────────────────────────── */
.coa-group { border-bottom: 1px solid var(--border); }
.coa-group:last-child { border-bottom: none; }
.coa-group-header {
  padding: .55rem 1.25rem;
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--blue);
  background: var(--bg-raised);
  display: flex;
  align-items: center;
  gap: .5rem;
}
.coa-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .55rem 1.25rem;
  border-bottom: 1px solid var(--border);
  font-size: .82rem;
}
.coa-row:last-child { border-bottom: none; }
.coa-row:hover { background: var(--bg-hover); }
.coa-row-code { font-family: "JetBrains Mono", monospace; font-size: .75rem; background: var(--bg-raised); color: var(--text-muted); padding: .15rem .4rem; border-radius: 3px; flex-shrink: 0; }
.coa-row-name { flex: 1; font-weight: 500; }
.coa-row-sub  { width: 130px; flex-shrink: 0; }
.coa-row-bal  { width: 60px; flex-shrink: 0; }

/* ── Counter Account Tag ─────────────────────────────────── */
.counter-acct-tag {
  display: inline-block;
  background: var(--purple-dim);
  color: var(--purple);
  font-size: .72rem;
  padding: .15rem .45rem;
  border-radius: 4px;
  font-weight: 500;
}
.text-faint { color: var(--text-faint); }

/* ══════════════════════════════════════════════════════════
   LIABILITY PAYMENT MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.lp-summary {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  gap: 1rem;
  margin-bottom: .75rem;
}
.lp-summary-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
}
.lp-summary-card.info { border-left: 3px solid var(--blue); }
.lp-summary-label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
.lp-summary-val   { font-family: "JetBrains Mono", monospace; font-size: 1.1rem; font-weight: 500; color: var(--red); }
.lp-summary-info  { font-size: .78rem; color: var(--text-muted); line-height: 1.6; }

.lp-accounting-box {
  background: var(--green-dim);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  padding: .85rem 1.1rem;
  margin-bottom: 1rem;
}
.lp-accounting-title { font-size: .78rem; font-weight: 600; color: var(--green); margin-bottom: .5rem; }
.lp-accounting-entry { display: flex; flex-direction: column; gap: .3rem; }
.entry-row { display: flex; align-items: center; gap: .6rem; font-size: .8rem; color: var(--text); }
.entry-dr  { font-weight: 700; color: var(--blue);   width: 50px; }
.entry-cr  { font-weight: 700; color: var(--red);    width: 50px; }

.lp-account-visual {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: center;
  margin-bottom: .5rem;
}
.lp-av-side  { display: flex; flex-direction: column; gap: .5rem; }
.lp-av-label { font-size: .72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.lp-av-arrow { text-align: center; font-size: 1.3rem; color: var(--red); line-height: 1; }
.lp-av-arrow small { display: block; font-size: .65rem; color: var(--text-muted); }

.lp-flow { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
.lp-account { font-size: .75rem; padding: .15rem .45rem; border-radius: 4px; }
.lp-account.liability { background: var(--red-dim);   color: var(--red); }
.lp-account.cash      { background: var(--blue-dim);  color: var(--blue); }
.lp-arrow { color: var(--text-muted); font-size: .85rem; }

@media (max-width: 700px) {
  .lp-summary      { grid-template-columns: 1fr; }
  .lp-account-visual { grid-template-columns: 1fr; }
  .lp-av-arrow     { transform: rotate(90deg); }
}

/* ══════════════════════════════════════════════════════════
   CASH FLOW REPORT STYLES
   ══════════════════════════════════════════════════════════ */

.cf-method-note {
  padding: .65rem 1rem;
  background: var(--bg-raised);
  border-radius: var(--radius);
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
.cf-subgroup {
  margin: .5rem 0 .75rem 1rem;
  border-left: 2px solid var(--border);
  padding-left: .85rem;
}
.cf-subgroup-label {
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);
  margin-bottom: .35rem;
  padding-bottom: .25rem;
  border-bottom: 1px dashed var(--border);
}
.cf-subgroup-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .35rem 0;
  font-size: .78rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: .25rem;
}

/* ══════════════════════════════════════════════════════════
   P&L COMPARATIVE TABLE STYLES
   ══════════════════════════════════════════════════════════ */

.compare-table { font-size: .8rem; }
.compare-table th { white-space: nowrap; }

/* Previous period column — slightly dimmed */
.cf-prev { opacity: .7; }

/* Sub-headers */
.compare-subhead td {
  background: var(--blue-dim);
  color: var(--blue);
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: .45rem .75rem !important;
}
.compare-subcathead td {
  background: var(--bg-raised);
  color: var(--text-muted);
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: .3rem .75rem .3rem 1.5rem !important;
}

/* Subtotal rows */
.compare-subtotal td {
  background: var(--bg-surface);
  border-top: 2px solid var(--border-light) !important;
  border-bottom: 2px solid var(--border-light) !important;
  padding: .55rem .75rem !important;
}

/* Net profit/loss row */
.compare-net td {
  padding: .75rem !important;
  font-size: .88rem;
}
.compare-net.net-positive td { background: var(--green-dim); color: var(--green); }
.compare-net.net-negative td { background: var(--red-dim);   color: var(--red); }

/* ══════════════════════════════════════════════════════════
   DATA INTEGRITY PANEL STYLES
   ══════════════════════════════════════════════════════════ */

.integrity-panel {
  border-radius: var(--radius-lg);
  margin-bottom: 1rem;
  overflow: hidden;
  border: 1px solid var(--border);
}
.integrity-panel.integrity-ok {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1.1rem;
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
  font-size: .82rem;
  font-weight: 500;
}
.integrity-panel.integrity-issues { background: var(--bg-surface); }

.integrity-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .65rem 1.1rem;
  background: var(--yellow-dim);
  border-bottom: 1px solid var(--border);
  color: var(--yellow);
  font-size: .82rem;
  font-weight: 600;
}
.integrity-icon { font-size: 1rem; flex-shrink: 0; }
.integrity-label { font-weight: 600; }

.integrity-list { padding: .5rem; display: flex; flex-direction: column; gap: .35rem; }

.integrity-item {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .65rem .85rem;
  border-radius: var(--radius);
  font-size: .8rem;
  transition: background var(--transition);
}
.integrity-item:hover { filter: brightness(1.1); }

.integrity-error   { background: var(--red-dim);    border-left: 3px solid var(--red); }
.integrity-warning { background: var(--yellow-dim); border-left: 3px solid var(--yellow); }
.integrity-info    { background: var(--blue-dim);   border-left: 3px solid var(--blue); }

.integrity-item-icon  { font-size: 1rem; flex-shrink: 0; margin-top: .1rem; }
.integrity-item-label { font-weight: 600; color: var(--text); margin-bottom: .2rem; }
.integrity-item-detail { color: var(--text-muted); line-height: 1.5; font-size: .76rem; }
.integrity-item-ids   { color: var(--text-faint); font-size: .7rem; font-family: "JetBrains Mono", monospace; margin-top: .2rem; }

/* ══════════════════════════════════════════════════════════
   BALANCE SHEET DIAGNOSTIC STYLES
   ══════════════════════════════════════════════════════════ */

.bs-diagnostic {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius-lg);
  margin: .75rem 1.5rem 0;
  overflow: hidden;
}
.bs-diag-title {
  padding: .65rem 1rem;
  font-size: .78rem;
  font-weight: 700;
  color: var(--red);
  border-bottom: 1px solid rgba(240,92,92,.2);
  background: rgba(240,92,92,.08);
}
.bs-diag-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-bottom: 1px solid rgba(240,92,92,.2);
}
.bs-diag-item {
  padding: .75rem 1rem;
  border-right: 1px solid rgba(240,92,92,.2);
}
.bs-diag-item:last-child { border-right: none; }
.bs-diag-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .25rem; }
.bs-diag-val   { font-family: "JetBrains Mono", monospace; font-size: .95rem; font-weight: 600; }
.bs-diag-desc  { font-size: .72rem; color: var(--text-muted); margin-top: .2rem; }

.bs-diag-causes { padding: .75rem 1rem; border-bottom: 1px solid rgba(240,92,92,.2); }
.bs-diag-causes-title { font-size: .75rem; font-weight: 600; color: var(--text-muted); margin-bottom: .4rem; }
.bs-diag-list { margin: 0; padding-left: 1.2rem; }
.bs-diag-list li { font-size: .78rem; color: var(--text-muted); margin-bottom: .25rem; line-height: 1.5; }
.bs-diag-list li strong { color: var(--red); }

.bs-diag-actions {
  display: flex;
  gap: .5rem;
  padding: .65rem 1rem;
  flex-wrap: wrap;
}

/* ══════════════════════════════════════════════════════════
   AUTO-DIRECTION FIELD STYLES
   ══════════════════════════════════════════════════════════ */

.dir-override-toggle {
  font-size: .68rem;
  font-weight: 400;
  color: var(--text-faint);
  cursor: pointer;
  margin-left: .5rem;
  padding: .1rem .35rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  transition: color var(--transition), border-color var(--transition);
  user-select: none;
}
.dir-override-toggle:hover { color: var(--yellow); border-color: var(--yellow); }

.dir-warning {
  margin-top: .4rem;
  padding: .45rem .65rem;
  background: var(--yellow-dim);
  border: 1px solid var(--yellow);
  border-radius: var(--radius);
  font-size: .74rem;
  color: var(--text);
  line-height: 1.5;
}

/* Direction select when auto-managed */
#f-direction:disabled {
  opacity: 1;
  cursor: default;
  background: var(--bg-raised);
}

/* ══════════════════════════════════════════════════════════
   INTEREST SPLIT BOX STYLES
   ══════════════════════════════════════════════════════════ */

.interest-split-box {
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-radius: var(--radius);
  padding: .85rem 1rem;
  margin-bottom: 1rem;
}
.interest-split-title {
  font-size: .76rem;
  font-weight: 600;
  color: var(--blue);
  margin-bottom: .75rem;
}
.interest-split-box .form-row { margin-bottom: 0; }

/* ══════════════════════════════════════════════════════════
   CC TRANSACTION STYLES
   ══════════════════════════════════════════════════════════ */

.cc-txn-info {
  background: var(--purple-dim);
  border: 1px solid var(--purple);
  border-radius: var(--radius);
  padding: .6rem .85rem;
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: .85rem;
  line-height: 1.6;
}
.cc-txn-info strong { color: var(--purple); }

/* ══════════════════════════════════════════════════════════
   SAK EMKM HIERARCHY STYLES
   ══════════════════════════════════════════════════════════ */

.bs-liquidity-head {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--blue);
  padding: .5rem 0 .25rem;
  margin-top: .5rem;
  border-bottom: 1px dashed var(--border);
  margin-bottom: .35rem;
}

/* ══════════════════════════════════════════════════════════
   IMPORT MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.import-page { max-width: 100%; }
.import-header { margin-bottom: 1rem; }
.import-header h2 { font-size: 1.15rem; font-weight: 600; }

.import-format-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .85rem 1.1rem;
  margin-bottom: 1.25rem;
}
.import-format-title { font-size: .75rem; font-weight: 600; color: var(--blue); margin-bottom: .6rem; }
.import-format-cols  { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.import-dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 1rem;
  text-align: center;
  background: var(--bg-surface);
  transition: border-color var(--transition), background var(--transition);
  margin-bottom: 1rem;
}
.import-dropzone.drag-over {
  border-color: var(--blue);
  background: var(--blue-dim);
}
.import-drop-icon  { font-size: 2.5rem; margin-bottom: .5rem; opacity: .5; }
.import-drop-label { font-size: .88rem; color: var(--text-muted); }
.import-drop-hint  { font-size: .72rem; color: var(--text-faint); margin-top: .75rem; }

.import-parsing {
  display: flex; align-items: center; gap: .6rem;
  padding: .65rem 1rem;
  background: var(--blue-dim);
  border-radius: var(--radius);
  font-size: .82rem;
  color: var(--blue);
}
.import-success {
  padding: .65rem 1rem;
  background: var(--green-dim);
  border-radius: var(--radius);
  font-size: .82rem;
  color: var(--green);
  margin-bottom: .75rem;
}

.import-summary-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .65rem 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  flex-wrap: wrap;
  gap: .5rem;
}
.import-summary-stats { display: flex; gap: 1.25rem; font-size: .82rem; }
.import-summary-actions { display: flex; gap: .35rem; flex-wrap: wrap; }

.import-table { font-size: .76rem; }
.import-table td, .import-table th { padding: .4rem .5rem !important; }
.import-row-review { background: rgba(230, 180, 0, 0.06) !important; }
.import-row-review:hover { background: rgba(230, 180, 0, 0.12) !important; }

.form-input-xs {
  padding: .2rem .4rem !important;
  font-size: .72rem !important;
  height: auto !important;
  min-height: unset !important;
}

.import-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: .75rem 0;
}

.import-action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 0 .5rem;
  border-top: 1px solid var(--border);
  margin-top: .75rem;
}

.import-result {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1.5rem;
  border-radius: var(--radius-lg);
  margin-top: 1rem;
}
.import-result-ok      { background: var(--green-dim); border: 1px solid var(--green); }
.import-result-partial { background: var(--yellow-dim); border: 1px solid var(--yellow); }
.import-result-icon    { font-size: 2rem; }
.import-result-title   { font-size: 1rem; font-weight: 600; margin-bottom: .35rem; }
.import-result-detail  { font-size: .85rem; color: var(--text-muted); margin-bottom: .75rem; }
.import-result-errors  { font-size: .75rem; color: var(--text-muted); margin-bottom: .75rem; }
.import-result-actions { display: flex; gap: .5rem; }

.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--blue);
  border-top-color: transparent;
  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════════════════════
   FASILITAS UTANG MODULE STYLES
   ══════════════════════════════════════════════════════════ */

.debt-page { max-width: 100%; }

.debt-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: .75rem;
  flex-wrap: wrap;
  gap: .5rem;
}
.debt-toolbar-left, .debt-toolbar-right { display: flex; gap: .5rem; align-items: center; }

.debt-breadcrumb {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: .75rem;
}

/* KPI Grid */
.debt-kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  margin-bottom: .75rem;
}
.debt-kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.1rem;
  position: relative;
  overflow: hidden;
}
.debt-kpi-card.kpi-red    { border-left: 3px solid var(--red); }
.debt-kpi-card.kpi-yellow { border-left: 3px solid var(--yellow); }
.debt-kpi-card.kpi-orange { border-left: 3px solid #e07b39; }
.debt-kpi-card.kpi-blue   { border-left: 3px solid var(--blue); }
.debt-kpi-icon  { font-size: 1.1rem; opacity: .4; margin-bottom: .25rem; }
.debt-kpi-label { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.debt-kpi-value { font-family: "JetBrains Mono", monospace; font-size: 1rem; font-weight: 600; }

/* Secondary Stats */
.debt-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .5rem;
  margin-bottom: .75rem;
}
.debt-stat-item {
  background: var(--bg-raised);
  border-radius: var(--radius);
  padding: .6rem .85rem;
  text-align: center;
}
.debt-stat-label { font-size: .68rem; color: var(--text-muted); margin-bottom: .2rem; }
.debt-stat-val   { font-size: .88rem; font-weight: 600; }

/* Main Grid */
.debt-main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .75rem;
  margin-bottom: .75rem;
}

/* Cards */
.debt-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem;
  overflow: hidden;
}
.debt-card-title {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: .75rem;
  padding-bottom: .5rem;
  border-bottom: 1px solid var(--border);
}
.debt-table { font-size: .78rem; }
.debt-table td, .debt-table th { padding: .4rem .5rem !important; }
.debt-empty { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: .82rem; }

/* Decision Support */
.debt-decision-item {
  padding: .65rem .85rem;
  border-radius: var(--radius);
  margin-bottom: .4rem;
  border-left: 3px solid var(--border);
}
.debt-decision-ok      { border-left-color: var(--green); background: var(--green-dim); }
.debt-decision-warn    { border-left-color: var(--yellow); background: var(--yellow-dim); }
.debt-decision-danger  { border-left-color: var(--red); background: var(--red-dim); }
.debt-decision-label   { font-size: .68rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
.debt-decision-val     { font-size: .88rem; font-weight: 600; }
.debt-decision-sub     { font-size: .72rem; color: var(--text-muted); margin-top: .15rem; line-height: 1.4; }

/* Debt Composition */
.debt-composition    { display: flex; flex-direction: column; gap: .5rem; }
.debt-comp-row       { display: grid; grid-template-columns: 1fr 2fr auto auto; gap: .5rem; align-items: center; font-size: .78rem; }
.debt-comp-label     { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.debt-comp-bar-wrap  { background: var(--bg-raised); border-radius: 4px; height: 8px; overflow: hidden; }
.debt-comp-bar       { height: 100%; background: var(--red); border-radius: 4px; transition: width .3s; min-width: 2px; }
.debt-comp-val       { font-family: "JetBrains Mono", monospace; font-size: .72rem; text-align: right; white-space: nowrap; }
.debt-comp-pct       { font-size: .68rem; text-align: right; min-width: 35px; }

@media (max-width: 900px) {
  .debt-kpi-grid    { grid-template-columns: repeat(2, 1fr); }
  .debt-stats-row   { grid-template-columns: repeat(2, 1fr); }
  .debt-main-grid   { grid-template-columns: 1fr; }
  .debt-comp-row    { grid-template-columns: 1fr 1fr auto; }
}
@media (max-width: 600px) {
  .debt-kpi-grid  { grid-template-columns: 1fr 1fr; }
  .debt-stats-row { grid-template-columns: 1fr 1fr; }
}

/* ── Debt Detail Page ──────────────────────────────────────── */
.debt-detail-header {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  margin-bottom: .75rem;
}
.debt-detail-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: .85rem;
  gap: 1rem;
}
.debt-detail-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .2rem; }
.debt-detail-meta  { font-size: .75rem; color: var(--text-muted); }
.debt-detail-actions { display: flex; gap: .5rem; flex-shrink: 0; }

.debt-detail-kpi {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  padding: .75rem 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: .75rem;
}
.debt-detail-kpi-item { }
.debt-detail-kpi-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
.debt-detail-kpi-val   { font-family: "JetBrains Mono", monospace; font-size: .9rem; font-weight: 600; }

.debt-detail-info {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  font-size: .78rem;
  align-items: center;
}

/* Tabs */
.debt-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: .75rem;
}
.debt-tab {
  padding: .55rem 1rem;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
}
.debt-tab:hover  { color: var(--text); }
.debt-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.debt-tab-content { }

/* Row states in schedule table */
.debt-row-paid    { opacity: .55; }
.debt-row-overdue { background: rgba(240,80,80,.06) !important; }

/* ── Debt Payment Form ─────────────────────────────────────── */
.debt-payment-summary {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .85rem 1.1rem;
  margin-bottom: .75rem;
}
.debt-pmt-info-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
.debt-pmt-info-val   { font-size: .88rem; font-weight: 600; }

.debt-allocation-box {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .85rem 1rem;
}
.debt-alloc-row {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: .75rem;
  align-items: center;
  margin-bottom: .5rem;
}
.debt-alloc-label { font-size: .8rem; font-weight: 500; }
.debt-alloc-input { max-width: 200px; }
.debt-alloc-coa   { font-size: .72rem; white-space: nowrap; }
.debt-alloc-divider { border-top: 1px solid var(--border); margin: .5rem 0; }
.debt-alloc-total .debt-alloc-label { font-weight: 700; }
.debt-alloc-total-val {
  background: var(--bg-surface);
  font-family: "JetBrains Mono", monospace;
  font-size: .85rem;
  display: flex;
  align-items: center;
  max-width: 200px;
}
.debt-alloc-check { font-size: .75rem; }

.debt-credit-update {
  background: var(--green-dim);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  padding: .75rem 1rem;
}
.debt-credit-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .82rem;
  padding: .3rem 0;
}
.debt-credit-after {
  border-top: 1px solid var(--green);
  margin-top: .35rem;
  padding-top: .5rem;
  font-size: .88rem;
}

/* ── Debt Dashboard Integration ────────────────────────────── */
.debt-dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  padding: .75rem 0 .5rem;
  border-top: 1px solid var(--border);
  margin-top: .5rem;
}
.debt-dash-stat  { }
.debt-dash-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
.debt-dash-val   { font-size: .9rem; font-weight: 600; font-family: "JetBrains Mono", monospace; }

@media (max-width: 700px) {
  .debt-dash-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Debt Reports ──────────────────────────────────────────── */
.debt-report-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem;
  margin-bottom: .5rem;
}
.debt-rep-card  { background: var(--bg-raised); border-radius: var(--radius); padding: .65rem .85rem; }
.debt-rep-label { font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }

// FINANCE OS — DATA LAYER (db.js)

const DB = (() => {

  const KEYS = {
    entities:          "fos_entities",
    business_units:    "fos_business_units",
    activities:        "fos_activities",
    coa:               "fos_coa",
    accounts:          "fos_accounts",
    counterparties:    "fos_counterparties",
    transaction_types: "fos_transaction_types",
    transactions:      "fos_transactions",
    receivables:       "fos_receivables",
    collections:       "fos_collections",
    payables:          "fos_payables",
    payments:          "fos_payments",
    treasury:          "fos_treasury",
    settings:          "fos_settings",
    // ── Debt Management ──────────────────────────────────────
    debt_register:     "fos_debt_register",
    debt_schedule:     "fos_debt_schedule",
    debt_payments:     "fos_debt_payments",
    // ── Sprint 1: Rule Engine ─────────────────────────────────
    event_catalog:     "fos_event_catalog",
    event_rules:       "fos_event_rules",
    // ── Sprint 2: Opening Balance ─────────────────────────────
    coa_balances:      "fos_coa_balances",
    // ── Sprint 5: Operational Classification ─────────────────
    op_classes:        "fos_op_classes",
    // ── Sprint 7: ERP Readiness ───────────────────────────────
    reconciliations:   "fos_reconciliations",
    fixed_assets:      "fos_fixed_assets",
    // ── Debt Obligation Model ────────────────────────────────
    debt_obligations:  "fos_debt_obligations"
  };

  function _get(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  }
  function _set(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
    // Sync to Supabase if available - only for transaction/financial data, not master
    if (typeof SupabaseSync !== 'undefined' && SupabaseSync.queueSync) {
      var syncKeys = ['fos_transactions','fos_receivables','fos_collections','fos_payables','fos_payments','fos_treasury','fos_debt_register','fos_debt_schedule','fos_debt_payments','fos_debt_obligations','fos_event_catalog','fos_event_rules','fos_coa_balances'];
      if (syncKeys.includes(key)) {
        // Queue the whole array - handled by pushAll inside sync queue processor
        SupabaseSync.queueBulkSync(key);
      }
    }
  }
  function _del(key, filterFn) {
    const list = _get(key);
    _set(key, list.filter(filterFn));
  }
  function _getObj(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) return {};
      return parsed || {};
    } catch { return {}; }
  }

  // ── Init ──────────────────────────────────────────────────
  function init() {
    if (_get(KEYS.entities).length === 0) {
      _set(KEYS.entities,          SEED_DATA.entities);
      _set(KEYS.business_units,    SEED_DATA.business_units);
      _set(KEYS.activities,        SEED_DATA.activities);
      _set(KEYS.coa,               SEED_DATA.coa);
      _set(KEYS.accounts,          SEED_DATA.accounts);
      _set(KEYS.counterparties,    SEED_DATA.counterparties);
      _set(KEYS.transaction_types, SEED_DATA.transaction_types);
    }
    // ── Seed Event Catalog (Sprint 1) ─────────────────────────
    if (typeof EVENT_CATALOG_SEED !== 'undefined' && _get(KEYS.event_catalog).length === 0) {
      _set(KEYS.event_catalog, EVENT_CATALOG_SEED.events);
      _set(KEYS.event_rules,   EVENT_CATALOG_SEED.rules);
    }
    // ── Seed Op Classifications (Sprint 5) ───────────────────
    if (typeof OP_CLASS_SEED !== 'undefined' && _get(KEYS.op_classes).length === 0) {
      _set(KEYS.op_classes, OP_CLASS_SEED);
    }
    if (!localStorage.getItem(KEYS.settings)) {
      localStorage.setItem(KEYS.settings, JSON.stringify({
        system_name: "Finance OS", base_currency: "IDR",
        fiscal_year_start: "01",
        go_live_date: new Date().toISOString().split("T")[0],
        default_entity: "ALL"
      }));
    }
  }

  // ── Settings ──────────────────────────────────────────────
  const Settings = {
    get: () => {
      try {
        const raw = localStorage.getItem(KEYS.settings);
        if (!raw) return { system_name:"Finance OS", base_currency:"IDR", go_live_date: new Date().toISOString().split("T")[0], default_entity:"ALL", locked_periods:[] };
        const p = JSON.parse(raw);
        return (p && !Array.isArray(p)) ? p : { system_name:"Finance OS", base_currency:"IDR", default_entity:"ALL", locked_periods:[] };
      } catch { return { system_name:"Finance OS", base_currency:"IDR", default_entity:"ALL", locked_periods:[] }; }
    },
    set: (data) => localStorage.setItem(KEYS.settings, JSON.stringify(data)),

    lockPeriod: function(period, reason) {
      var cfg = Settings.get();
      if (!cfg.locked_periods) cfg.locked_periods = [];
      if (!cfg.locked_periods.find(function(p){ return p.period === period; })) {
        cfg.locked_periods.push({ period: period, locked_at: new Date().toISOString(), reason: reason||'' });
        Settings.set(cfg);
      }
    },
    unlockPeriod: function(period) {
      var cfg = Settings.get();
      if (!cfg.locked_periods) return;
      cfg.locked_periods = cfg.locked_periods.filter(function(p){ return p.period !== period; });
      Settings.set(cfg);
    },
    isPeriodLocked: function(period) {
      var cfg = Settings.get();
      return !!(cfg.locked_periods && cfg.locked_periods.some(function(p){ return p.period === period; }));
    },
    lockedPeriods: function() {
      return Settings.get().locked_periods || [];
    }
  };

  // ── Master: Entities ──────────────────────────────────────
  const Entities = {
    all:    () => _get(KEYS.entities),
    active: () => _get(KEYS.entities).filter(e => e.status === "Active"),
    byId:   (id) => _get(KEYS.entities).find(e => e.entity_id === id),
    save: (record) => {
      const list = _get(KEYS.entities);
      const idx = list.findIndex(e => e.entity_id === record.entity_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.entities, list);
    },
    delete: (id) => {
      // Safety: check if any BU, Account, or Transaction references this entity
      const hasBU   = _get(KEYS.business_units).some(b => b.entity_id === id);
      const hasAcct = _get(KEYS.accounts).some(a => a.entity_id === id);
      const hasTxn  = _get(KEYS.transactions).some(t => t.entity_id === id);
      if (hasBU || hasAcct || hasTxn) return { error: 'Entity tidak dapat dihapus karena masih digunakan oleh BU, Akun, atau Transaksi.' };
      _del(KEYS.entities, e => e.entity_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Business Units ────────────────────────────────
  const BU = {
    all:      () => _get(KEYS.business_units),
    active:   () => _get(KEYS.business_units).filter(b => b.status === "Active"),
    byEntity: (entity_id) => _get(KEYS.business_units).filter(b => b.entity_id === entity_id && b.status === "Active"),
    byId:     (id) => _get(KEYS.business_units).find(b => b.bu_id === id),
    save: (record) => {
      const list = _get(KEYS.business_units);
      const idx = list.findIndex(b => b.bu_id === record.bu_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.business_units, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.bu_id === id);
      const hasAct = _get(KEYS.activities).some(a => a.bu_id === id);
      if (hasTxn || hasAct) return { error: 'BU tidak dapat dihapus karena masih digunakan oleh Activity atau Transaksi.' };
      _del(KEYS.business_units, b => b.bu_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Activities ────────────────────────────────────
  const Activities = {
    all:   () => _get(KEYS.activities),
    byBU:  (bu_id) => _get(KEYS.activities).filter(a => a.bu_id === bu_id && a.status === "Active"),
    byId:  (id) => _get(KEYS.activities).find(a => a.activity_id === id),
    save: (record) => {
      const list = _get(KEYS.activities);
      const idx = list.findIndex(a => a.activity_id === record.activity_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.activities, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.activity_id === id);
      if (hasTxn) return { error: 'Activity tidak dapat dihapus karena masih digunakan oleh Transaksi.' };
      _del(KEYS.activities, a => a.activity_id !== id);
      return { ok: true };
    }
  };

  // ── Master: COA ───────────────────────────────────────────
  const COA = {
    all:        () => _get(KEYS.coa),
    active:     () => _get(KEYS.coa).filter(c => c.status === "Active"),
    byCode:     (code) => _get(KEYS.coa).find(c => c.coa_code === code),
    byCategory: (cat) => _get(KEYS.coa).filter(c => c.coa_category === cat && c.status === "Active"),
    save: (record) => {
      const list = _get(KEYS.coa);
      const idx = list.findIndex(c => c.coa_code === record.coa_code);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.coa, list);
    },
    delete: (code) => {
      const hasTxn  = _get(KEYS.transactions).some(t => t.coa_code === code);
      const hasAcct = _get(KEYS.accounts).some(a => a.coa_code === code);
      if (hasTxn || hasAcct) return { error: 'COA tidak dapat dihapus karena masih digunakan oleh Akun atau Transaksi.' };
      _del(KEYS.coa, c => c.coa_code !== code);
      return { ok: true };
    }
  };

  // ── Master: Accounts ──────────────────────────────────────
  const Accounts = {
    all:          () => _get(KEYS.accounts),
    active:       () => _get(KEYS.accounts).filter(a => a.status === "Active"),
    byEntity:     (entity_id) => _get(KEYS.accounts).filter(a => a.entity_id === entity_id && a.status === "Active"),
    byId:         (id) => _get(KEYS.accounts).find(a => a.account_id === id),
    cashAccounts: () => _get(KEYS.accounts).filter(a => ["Bank","E-Wallet","Platform"].includes(a.account_type) && a.status === "Active"),
    save: (record) => {
      const list = _get(KEYS.accounts);
      const idx = list.findIndex(a => a.account_id === record.account_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.accounts, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.account_id === id);
      const hasTry = _get(KEYS.treasury).some(t => t.account_id === id);
      if (hasTxn || hasTry) return { error: 'Akun tidak dapat dihapus karena masih digunakan oleh Transaksi atau Treasury.' };
      _del(KEYS.accounts, a => a.account_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Counterparties ────────────────────────────────
  const Counterparties = {
    all:    () => _get(KEYS.counterparties),
    active: () => _get(KEYS.counterparties).filter(c => c.status === "Active"),
    byId:   (id) => _get(KEYS.counterparties).find(c => c.cp_id === id),
    save: (record) => {
      const list = _get(KEYS.counterparties);
      const idx = list.findIndex(c => c.cp_id === record.cp_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.counterparties, list);
    },
    delete: (id) => {
      const hasTxn = _get(KEYS.transactions).some(t => t.cp_id === id);
      const hasRcv = _get(KEYS.receivables).some(r => r.cp_id === id);
      const hasPay = _get(KEYS.payables).some(p => p.cp_id === id);
      if (hasTxn || hasRcv || hasPay) return { error: 'Counterparty tidak dapat dihapus karena masih digunakan oleh Transaksi, Piutang, atau Utang.' };
      _del(KEYS.counterparties, c => c.cp_id !== id);
      return { ok: true };
    }
  };

  // ── Master: Transaction Types ─────────────────────────────
  const TxnTypes = {
    all:  () => _get(KEYS.transaction_types),
    byId: (id) => _get(KEYS.transaction_types).find(t => t.type_id === id)
  };

  // ── T1: Transaction Ledger ────────────────────────────────
  const Transactions = {
    all:    () => _get(KEYS.transactions),
    posted: () => _get(KEYS.transactions).filter(t => t.status === "Posted"),
    byEntity: (entity_id) => _get(KEYS.transactions).filter(t => t.entity_id === entity_id && t.status === "Posted"),
    byPeriod: (period) => _get(KEYS.transactions).filter(t => t.period === period && t.status === "Posted"),
    byEntityPeriod: (entity_id, period) => {
      const txns = _get(KEYS.transactions).filter(t => t.status === "Posted");
      if (entity_id !== "ALL") return txns.filter(t => t.entity_id === entity_id && t.period === period);
      return txns.filter(t => t.period === period);
    },
    byId:   (id) => _get(KEYS.transactions).find(t => t.txn_id === id),
    recent: (n = 10) => {
      const posted = _get(KEYS.transactions).filter(t => t.status === "Posted");
      return posted.sort((a,b) => b.txn_date.localeCompare(a.txn_date)).slice(0, n);
    },
    save: (record) => {
      const list = _get(KEYS.transactions);
      const idx = list.findIndex(t => t.txn_id === record.txn_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.transactions, list);
    },
    void: (txn_id, reason) => {
      const list = _get(KEYS.transactions);
      const idx = list.findIndex(t => t.txn_id === txn_id);
      if (idx >= 0) { list[idx].status = "Voided"; list[idx].void_reason = reason; }
      _set(KEYS.transactions, list);
    },
    delete: (txn_id) => {
      const t = _get(KEYS.transactions).find(x => x.txn_id === txn_id);
      if (!t) return { error: 'Transaksi tidak ditemukan.' };
      if (t.status === 'Posted') return { error: 'Transaksi Posted tidak dapat dihapus. Gunakan Void terlebih dahulu.' };
      _del(KEYS.transactions, x => x.txn_id !== txn_id);
      return { ok: true };
    }
  };

  // ── T2: Receivable Headers ────────────────────────────────
  const Receivables = {
    all:  () => _get(KEYS.receivables),
    open: () => _get(KEYS.receivables).filter(r => ["Open","Partial","Overdue"].includes(r.status)),
    byId: (id) => _get(KEYS.receivables).find(r => r.rcv_id === id),
    save: (record) => {
      const list = _get(KEYS.receivables);
      const idx = list.findIndex(r => r.rcv_id === record.rcv_id);
      if (idx >= 0) list[idx] = record; else list.push(record);
      _set(KEYS.receivables, list);
      _refreshReceivableStatus(record.rcv_id);
    },
    delete: (rcv_id) => {
      const hasCols = _get(KEYS.collections).some(c => c.rcv_id === rcv_id);
      if (hasCols) return { error: 'Piutang tidak dapat dihapus karena sudah ada pembayaran yang tercatat. Gunakan Write Off.' };
      _del(KEYS.receivables, r => r.rcv_id !== rcv_id);
      // Also remove linked ledger entries
      _del(KEYS.transactions, t => t.reference_id !== rcv_id);
      return { ok: true };
    },
    computeOutstanding: (rcv_id) => {
      const rcv = _get(KEYS.receivables).find(r => r.rcv_id === rcv_id);
      if (!rcv) return 0;
      const cols = _get(KEYS.collections).filter(c => c.rcv_id === rcv_id);
      return rcv.original_amount - cols.reduce((s, c) => s + c.amount, 0);
    }
  };

  function _refreshReceivableStatus(rcv_id) {
    const list = _get(KEYS.receivables);
    const idx = list.findIndex(r => r.rcv_id === rcv_id);
    if (idx < 0) return;
    const cols = _get(KEYS.collections).filter(c => c.rcv_id === rcv_id);
    const collected = cols.reduce((s, c) => s + c.amount, 0);
    list[idx].collected_amount = collected;
    list[idx].outstanding_balance = list[idx].original_amount - collected;
    const today = new Date().toISOString().split("T")[0];
    if (collected >= list[idx].original_amount) list[idx].status = "Closed";
    else if (collected > 0) list[idx].status = list[idx].due_date < today ? "Overdue" : "Partial";
    else list[idx].status = list[idx].due_date < today ? "Overdue" : "Open";
    _set(KEYS.receivables, list);
  }

  function _refreshPayableStatus(pay_id) {
    const list = _get(KEYS.payables);
    const idx = list.findIndex(p => p.pay_id === pay_id);
    if (idx < 0) return;
    const pmts = _get(KEYS.payments).filter(p => p.pay_id === pay_id);
    const paid = pmts.reduce((s, p) => s + p.amount, 0);
    list[idx].paid_amount = paid;
    list[idx].outstanding_balance = list[idx].original_amount - paid;
    const today = new Date().toISOString().split("T")[0];
    if (paid >= list[idx].original_amount) list[idx].status = "Closed";
    else if (paid > 0) list[idx].status = list[idx].due_date < today ? "Overdue" : "Partial";
    else list[idx].status = list[idx].due_date < today ? "Overdue" : "Open";
    _set(KEYS.payables, list);
