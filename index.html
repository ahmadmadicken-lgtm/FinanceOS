  // ── Direction derivation rules ───────────────────────────
  // Priority: COA normal_balance overrides Type suggestion
  // Exception: Treasury always Debit on destination, Credit on source
  // User can override via toggle with warning

  var _directionOverride = false;

  function _deriveDirectionFromTypeAndCOA(typeId, coaCode) {
    // 1. COA-based derivation (most accurate)
    if (coaCode) {
      var coa = DB.COA.byCode(coaCode);
      if (coa) {
        // Standard accounting: use normal balance of COA
        // Revenue & Liability: Credit | Asset & Expense: Debit
        if (coa.coa_category === 'Revenue')   return { dir: 'Credit', source: 'COA: Revenue selalu Credit' };
        if (coa.coa_category === 'Expense')   return { dir: 'Debit',  source: 'COA: Expense selalu Debit' };
        if (coa.coa_category === 'Asset') {
          // Asset increases with Debit (cash in) or decreases with Credit (cash out)
          // For Treasury (TXN-06): direction depends on which leg this is
          // Do NOT auto-lock direction — let user choose Cash In or Cash Out
          if (typeId === 'TXN-06') return null; // unlock: user picks direction
          return { dir: 'Debit', source: 'COA: Asset naik dengan Debit' };
        }
        if (coa.coa_category === 'Liability') {
          // Liability increases with Credit (new debt)
          // but Liability Payment = Debit (debt goes down)
          if (typeId === 'TXN-08') return { dir: 'Debit', source: 'Liability Payment: utang berkurang (Debit)' };
          return { dir: 'Credit', source: 'COA: Liability naik dengan Credit' };
        }
        if (coa.coa_category === 'Equity') {
          if (coa.coa_subcategory === 'Owner Draw') return { dir: 'Debit', source: 'COA: Owner Draw mengurangi Ekuitas' };
          return { dir: 'Credit', source: 'COA: Equity naik dengan Credit' };
        }
      }
    }

    // 2. Fallback: Type-based derivation
    var typeMap = {
      'TXN-01': { dir: 'Credit', source: 'Tipe Revenue → Credit' },
      'TXN-02': { dir: 'Debit',  source: 'Tipe Expense → Debit' },
      'TXN-03': { dir: 'Debit',  source: 'Tipe Receivable → Debit' },
      'TXN-04': { dir: 'Credit', source: 'Tipe Payable → Credit' },
      'TXN-05': { dir: 'Debit',  source: 'Tipe CEO Advance → Debit' },
      'TXN-06': { dir: 'Credit', source: 'Tipe Treasury → Credit (dari akun sumber)' },
      'TXN-07': { dir: 'Credit', source: 'Tipe Equity → Credit' },
      'TXN-08': { dir: 'Debit',  source: 'Tipe Liability Payment → Debit' },
      'TXN-09': { dir: 'Debit',  source: 'CC Transaction: Expense Debit (CC Payable auto-Credit)' }
    };
    return typeMap[typeId] || null;
  }

  function deriveDirection() {
    if (_directionOverride) return; // User has taken manual control

    var typeId  = (document.getElementById('f-type-id')  || {}).value || '';
    var coaCode = (document.getElementById('f-coa-code') || {}).value || '';
    var dirSel  = document.getElementById('f-direction');
    var hint    = document.getElementById('dir-hint');
    var warning = document.getElementById('dir-warning');

    if (!dirSel) return;

    var result = _deriveDirectionFromTypeAndCOA(typeId, coaCode);

    if (result) {
      dirSel.value = result.dir;
      if (hint) hint.textContent = '&#9654; ' + result.source;
      if (warning) warning.style.display = 'none';
    }
  }

  function onCOAChange() {
    onAccountChange(); // existing: auto-fill COA from account (skip if COA already set by user)
    deriveDirection();

    // Check consistency warning
    var typeId  = (document.getElementById('f-type-id')  || {}).value || '';
    var coaCode = (document.getElementById('f-coa-code') || {}).value || '';
    var dirSel  = document.getElementById('f-direction');
    var warning = document.getElementById('dir-warning');
    if (!warning || !typeId || !coaCode || !dirSel) return;

    var result = _deriveDirectionFromTypeAndCOA(typeId, coaCode);
    if (result && dirSel.value && dirSel.value !== result.dir) {
      warning.style.display = 'block';
      warning.innerHTML = '&#9888; Direction yang dipilih (' + dirSel.value + ') tidak konsisten dengan COA yang dipilih. ' +
        'Sistem menyarankan <strong>' + result.dir + '</strong> karena: ' + result.source;
    }
  }

  function toggleDirectionOverride() {
    _directionOverride = !_directionOverride;
    var dirSel  = document.getElementById('f-direction');
    var toggle  = document.getElementById('dir-override-toggle');
    var hint    = document.getElementById('dir-hint');
    var warning = document.getElementById('dir-warning');

    if (!dirSel || !toggle) return;

    if (_directionOverride) {
      dirSel.disabled = false;
      dirSel.style.border = '1px solid var(--yellow)';
      if (toggle) toggle.style.color = 'var(--yellow)';
      if (hint) hint.textContent = '&#9998; Mode override aktif — Direction bisa diubah manual. Pastikan ini benar secara akuntansi.';
    } else {
      dirSel.disabled = false; // keep enabled but re-derive
      dirSel.style.border = '';
      if (toggle) toggle.style.color = '';
      if (hint) hint.textContent = 'Klik override jika perlu mengubah manual';
      if (warning) warning.style.display = 'none';
      deriveDirection();
      if (!_directionOverride) dirSel.disabled = true;
    }
  }

  // ── Business Event Selection ─────────────────────────────
  var _selectedEventId = null;

  function onEventSelect(eventId) {
    _selectedEventId = eventId;

    // Update pill UI
    document.querySelectorAll('.event-pill').forEach(function(btn) {
      btn.classList.toggle('selected', btn.getAttribute('data-event-id') === eventId);
    });

    // Get rules from Rule Engine
    var result = DB.RuleEngine.derive(eventId, {
      account_id: (document.getElementById('f-account-id') || {}).value
    });
    if (result.error) { Utils.toast(result.error, 'error'); return; }

    // Show selected event display
    var display = document.getElementById('event-selected-display');
    var hint    = document.getElementById('event-hint');
    if (display) {
      display.style.display = 'flex';
      display.innerHTML =
        '<span class="event-selected-name">' + result.event_name + '</span>' +
        '<span class="event-selected-meta">' +
          'COA: ' + result.coa_code + ' · ' +
          'Direction: ' + result.direction + ' · ' +
          'cf_class: ' + result.cf_class +
        '</span>' +
        '<button type="button" class="event-clear-btn" onclick="Transactions.clearEvent()">&#10005;</button>';
    }
    if (hint) hint.style.display = 'none';

    // Auto-fill internal type
    var typeEl = document.getElementById('f-type-id');
    if (typeEl) typeEl.value = result.internal_type_id;

    // Auto-fill COA if not already set
    var coaEl = document.getElementById('f-coa-code');
    if (coaEl && (!coaEl.value || coaEl.value === '')) {
      coaEl.value = result.coa_code;
    }

    // Store event fields for save
    document.getElementById('f-type-id').setAttribute('data-event-id', eventId);
    document.getElementById('f-type-id').setAttribute('data-cf-class', result.cf_class);
    document.getElementById('f-type-id').setAttribute('data-rule-snapshot', JSON.stringify(result.snapshot));

    // Show/hide CC section
    var ccSection = document.getElementById('cc-section');
    if (ccSection) ccSection.style.display = result.internal_type_id === 'TXN-09' ? 'block' : 'none';

    // Treasury domain: unlock direction, show clear prompt
    var dirSel   = document.getElementById('f-direction');
    var dirLabel = document.querySelector('label[for="f-direction"], .dir-label');
    var dirHint  = document.getElementById('dir-hint');
    var isTreasury = (result.internal_type_id === 'TXN-06' ||
                      (result.cf_class && result.cf_class === 'Treasury'));
    if (isTreasury && dirSel) {
      // Clear direction so user must choose
      dirSel.value    = '';
      dirSel.disabled = false;
      // Update options to show Treasury-specific language
      dirSel.innerHTML =
        '<option value="">— Pilih arah transfer —</option>' +
        '<option value="Credit">&#8600; Cash Out — uang KELUAR dari rekening ini</option>' +
        '<option value="Debit">&#8599; Cash In — uang MASUK ke rekening ini</option>';
      if (dirHint) dirHint.textContent = 'Treasury: pilih Cash Out jika ini rekening sumber, Cash In jika ini rekening tujuan';
    }

    // Override check
    _checkOverrideLevel(result);

    // Derive direction
    deriveDirection();
  }

  function clearEvent() {
    _selectedEventId = null;
    document.querySelectorAll('.event-pill').forEach(function(b){ b.classList.remove('selected'); });
    var display = document.getElementById('event-selected-display');
    var hint    = document.getElementById('event-hint');
    var typeEl  = document.getElementById('f-type-id');
    if (display) { display.style.display = 'none'; display.innerHTML = ''; }
    if (hint)    hint.style.display = 'block';
    if (typeEl)  { typeEl.value = ''; typeEl.removeAttribute('data-event-id'); typeEl.removeAttribute('data-cf-class'); }
    document.getElementById('override-section').style.display = 'none';
  }

  function _checkOverrideLevel(result) {
    var overrideSec = document.getElementById('override-section');
    var overrideWarn= document.getElementById('override-warning');
    if (!overrideSec) return;

    if (result.override_min >= 2) {
      overrideSec.style.display = 'block';
      if (overrideWarn) {
        var cls   = result.override_min === 3 ? 'override-forced' : 'override-guided';
        var label = result.override_min === 3 ? '&#9940; Forced Override' : '&#9888; Guided Override';
        overrideWarn.className = 'override-warning ' + cls;
        overrideWarn.innerHTML = label + ' — Event ini memerlukan konfirmasi tambahan. Isikan alasan di bawah.';
      }
    } else {
      overrideSec.style.display = 'none';
    }
  }

  // ── Save ─────────────────────────────────────────────────
  function saveTxn(status) {
    var _typeEl = document.getElementById('f-type-id');
    const form = {
      entity_id:          document.getElementById('f-entity-id').value,
      bu_id:              document.getElementById('f-bu-id').value,
      activity_id:        document.getElementById('f-activity-id').value,
      account_id:         document.getElementById('f-account-id').value,
      counter_account_id: document.getElementById('f-counter-account-id').value,
      coa_code:           document.getElementById('f-coa-code').value,
      type_id:            _typeEl ? _typeEl.value : '',
      txn_date:           document.getElementById('f-txn-date').value,
      amount:             parseFloat(document.getElementById('f-amount').value),
      direction:          document.getElementById('f-direction').value,
      cp_id:              document.getElementById('f-cp-id').value,
      reference_id:       document.getElementById('f-ref-id').value,
      description:        document.getElementById('f-description').value,
      cc_account_id:      (document.getElementById('f-cc-account') || {}).value || '',
      // Sprint 1 Rule Engine fields
      event_id:           _typeEl ? (_typeEl.getAttribute('data-event-id') || null) : null,
      cf_class:           _typeEl ? (_typeEl.getAttribute('data-cf-class') || null) : null,
      rule_snapshot:      _typeEl ? (_typeEl.getAttribute('data-rule-snapshot') || null) : null,
      override_level:     _selectedEventId ? 1 : 1,
      override_reason:    (document.getElementById('f-override-reason') || {}).value || null,
      op_classification:  (document.getElementById('f-op-class')||{}).value || null
    };

    // Extra validation for CC Transaction
    if (form.type_id === 'TXN-09' && !form.cc_account_id) {
      (document.getElementById('form-errors') || {}).style && (document.getElementById('form-errors').style.display = 'block');
      document.getElementById('form-errors').innerHTML = '<ul><li>Pilih Kartu Kredit yang digunakan untuk transaksi ini</li></ul>';
      return;
    }

    const errors = Utils.validateTxn(form);
    const errBox = document.getElementById('form-errors');

    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      errBox.scrollIntoView({ behavior: 'smooth' });
      return;
    }

    errBox.style.display = 'none';

    // Auto-assign cf_class from Rule Engine or legacy fallback
    var cfClass = form.cf_class || DB.RuleEngine.legacyCfClass(form.type_id);

    const txn = {
      txn_id:             Utils.newTxnId(form.txn_date),
      txn_date:           form.txn_date,
      entry_date:         Utils.today(),
      entity_id:          form.entity_id,
      bu_id:              form.bu_id,
      activity_id:        form.activity_id || null,
      account_id:         form.account_id,
      counter_account_id: form.counter_account_id || null,
      coa_code:           form.coa_code,
      type_id:            form.type_id,
      cp_id:              form.cp_id || null,
      amount:             form.amount,
      direction:          form.direction,
      description:        form.description,
      reference_id:       form.reference_id || null,
      status:             status,
      void_reason:        null,
      created_by:         'User',
      period:             Utils.toPeriod(form.txn_date),
      // Sprint 1 Rule Engine fields
      event_id:           form.event_id || null,
      cf_class:           cfClass,
      override_level:     form.override_level || 1,
      override_reason:    form.override_reason || null,
      rule_snapshot:      form.rule_snapshot ? JSON.parse(form.rule_snapshot) : null,
      op_classification:  form.op_classification || null
    };

    DB.Transactions.save(txn);
    Utils.toast(status === 'Posted' ? 'Transaksi berhasil diposting' : 'Draft disimpan');
    render();
  }

  // ── Delete Transaction (semua status) ────────────────────
  function deleteTxn(txnId) {
    const t = DB.Transactions.byId(txnId);
    if (!t) return;

    if (t.status === 'Posted') {
      _pendingDeleteId = txnId;
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'del-posted-modal';
      modal.innerHTML =
        '<div class="modal">' +
          '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem">' +
            '<span style="font-size:1.2rem;color:var(--red)">&#9888;</span>' +
            '<h3 style="font-size:.95rem;color:var(--red)">Hapus Transaksi Posted</h3>' +
          '</div>' +
          '<p class="text-muted text-sm" style="margin-bottom:.75rem;line-height:1.6">' +
            'Transaksi <strong>' + t.txn_id + '</strong> berstatus <strong>Posted</strong>. ' +
            'Penghapusan bersifat permanen dan tidak dapat dibatalkan.' +
          '</p>' +
          '<div class="form-group" style="margin-bottom:1rem">' +
            '<label>Alasan Penghapusan <span class="required">*</span></label>' +
            '<input class="form-input" id="del-reason" placeholder="Misal: Salah input, duplikat...">' +
          '</div>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-ghost" id="del-cancel-btn">Batal</button>' +
            '<button class="btn btn-danger" id="del-confirm-btn">Hapus Permanen</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(modal);
      document.getElementById('del-cancel-btn').onclick = function() { modal.remove(); _pendingDeleteId = null; };
      document.getElementById('del-confirm-btn').onclick = function() { doDeletePosted(); };
      return;
    }

    // Draft / Voided: konfirmasi singkat
    Utils.confirm('Hapus transaksi ini secara permanen? Tindakan tidak dapat dibatalkan.', function() {
      _execDelete(txnId);

  function doDeletePosted() {
    const reason = document.getElementById('del-reason').value.trim();
    if (!reason) { Utils.toast('Alasan penghapusan wajib diisi', 'error'); return; }
    var modal = document.getElementById('del-posted-modal');
    if (modal) modal.remove();
    if (_pendingDeleteId) { _execDelete(_pendingDeleteId); _pendingDeleteId = null; }
  }

  function _execDelete(txnId) {
    const all = DB.Transactions.all().filter(function(t){ return t.txn_id !== txnId; });
    localStorage.setItem('fos_transactions', JSON.stringify(all));
    Utils.toast('Transaksi berhasil dihapus');
    _refreshTable();
  }

                '<label>Akun <span class="required">*</span></label>' +
                '<select class="form-input" id="f-account-id" onchange="Transactions.onAccountChange()">' +
                  '<option value="">— Pilih Akun —</option>' +
                  opt(accounts, 'account_id', function(a){ return a.account_name + ' (' + a.account_type + ')'; }, t.account_id) +
                '</select>' +
              '</div>' +
              '<div class="form-group">' +
                '<label>Counter Account <span class="text-muted" style="font-weight:400;font-size:.72rem">(opsional)</span></label>' +
                '<select class="form-input" id="f-counter-account-id">' +
                  '<option value="">— Opsional —</option>' +
                  opt(accounts, 'account_id', function(a){ return a.account_name + ' (' + a.account_type + ')'; }, t.counter_account_id) +
                '</select>' +
              '</div>' +
              '<div class="form-group">' +
                '<label>COA <span class="required">*</span></label>' +
                '<select class="form-input" id="f-coa-code">' +
                  '<option value="">— Pilih COA —</option>' +
                  opt(coas, 'coa_code', function(c){ return c.coa_code + ' — ' + c.coa_name + ' (' + c.coa_category + ')'; }, t.coa_code) +
                '</select>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="form-section">' +
            '<div class="form-section-title">3 — Detail Transaksi</div>' +
            '<div class="form-row">' +
              '<div class="form-group">' +
                '<label>Tipe Transaksi <span class="required">*</span></label>' +
                '<select class="form-input" id="f-type-id" onchange="Transactions.onTypeChange(); Transactions.deriveDirection();" style="display:none">' +
                  '<option value="">— Pilih Tipe —</option>' +
                  opt(types, 'type_id', function(t){ return t.type_name; }, t.type_id) +
                '</select>' +
              '</div>' +
              '<div class="form-group">' +
                '<label>Tanggal <span class="required">*</span></label>' +
                '<input class="form-input" type="date" id="f-txn-date" value="' + t.txn_date + '">' +
              '</div>' +
            '</div>' +
            '<div class="form-row">' +
              '<div class="form-group">' +
                '<label>Jumlah (Rp) <span class="required">*</span></label>' +
                '<input class="form-input" type="number" id="f-amount" value="' + t.amount + '" min="1">' +
              '</div>' +
              '<div class="form-group">' +
                '<label>Arah <span class="required">*</span> <span class="text-muted text-xs">(auto dari Business Event)</span></label>' +
                (function() {
                  var coa = DB.COA.byCode(t.coa_code);
                  var cat = coa ? coa.coa_category : 'Asset';
                  var sub = coa ? (coa.coa_subcategory||'') : '';
                  // For Liability & Equity: Credit = increase (Cash In), Debit = decrease (Cash Out)
                  // For Asset (Cash/Bank) & Expense: Debit = Cash In, Credit = Cash Out
                  // Context-aware labels based on COA category AND subcategory
                  var isLiabilityOrEquity = (cat === 'Liability' || cat === 'Equity');
                  // Piutang/Receivable Asset: Credit = collect (Cash In), Debit = new receivable (Cash Out)
                  var isReceivable = (cat === 'Asset' && (sub === 'Piutang' || sub === 'Uang Muka Pemilik'));
                  // Kas & Bank: Debit = Cash In, Credit = Cash Out
                  var isCash = (cat === 'Asset' && sub === 'Kas & Bank');
                  var debitLabel, creditLabel, hint;
                  if (isLiabilityOrEquity) {
                    debitLabel  = '&#8600; Cash Out — bayar/kurangi kewajiban (Debit)';
                    creditLabel = '&#8599; Cash In — terima pinjaman/kewajiban bertambah (Credit)';
                    hint = 'COA Kewajiban: Credit = terima pinjaman (Cash In) · Debit = bayar (Cash Out)';
                  } else if (isReceivable) {
                    debitLabel  = '&#8600; Cash Out — catat piutang baru / beri pinjaman (Debit)';
                    creditLabel = '&#8599; Cash In — terima pembayaran piutang (Credit)';
                    hint = 'COA Piutang: Credit = terima pembayaran (Cash In) · Debit = catat piutang baru (Cash Out)';
                  } else if (cat === 'Expense') {
                    debitLabel  = '&#8600; Cash Out — catat beban (Debit)';
                    creditLabel = '&#8599; Cash In — refund/pembalikan beban (Credit)';
                    hint = 'COA Beban: Debit = bayar beban (Cash Out) · Credit = refund (Cash In)';
                  } else if (cat === 'Revenue') {
                    debitLabel  = '&#8600; Cash Out — refund/pembalikan pendapatan (Debit)';
                    creditLabel = '&#8599; Cash In — terima pendapatan (Credit)';
                    hint = 'COA Pendapatan: Credit = terima uang (Cash In) · Debit = refund (Cash Out)';
                  } else {
                    // Default: Kas & Bank
                    debitLabel  = '&#8599; Cash In — uang MASUK ke rekening (Debit)';
                    creditLabel = '&#8600; Cash Out — uang KELUAR dari rekening (Credit)';
                    hint = 'COA Kas: Debit = uang masuk (Cash In) · Credit = uang keluar (Cash Out)';
                  }
                  return '<select class="form-input" id="f-direction">' +
                    '<option value="">— Pilih —</option>' +
                    '<option value="Debit" '  + (t.direction === 'Debit'  ? 'selected' : '') + '>' + debitLabel  + '</option>' +
                    '<option value="Credit" ' + (t.direction === 'Credit' ? 'selected' : '') + '>' + creditLabel + '</option>' +
                  '</select>' +
                  '<small class="form-hint">' + hint + '</small>';
                })() +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="form-section">' +
            '<div class="form-section-title">4 — Counterparty</div>' +
            '<div class="form-row">' +
              '<div class="form-group">' +
                '<label>Counterparty</label>' +
                '<select class="form-input" id="f-cp-id">' +
                  '<option value="">— Opsional —</option>' +
                  opt(cps, 'cp_id', function(c){ return c.cp_name + ' (' + c.cp_type + ')'; }, t.cp_id) +
                '</select>' +
              '</div>' +
              '<div class="form-group">' +
                '<label>Reference ID</label>' +
                '<input class="form-input" id="f-ref-id" value="' + (t.reference_id || '') + '" placeholder="Misal: INV-001">' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="form-section">' +
            '<div class="form-section-title">5 — Deskripsi</div>' +
            '<div class="form-group">' +
              '<label>Deskripsi <span class="required">*</span></label>' +
              '<input class="form-input" id="f-description" value="' + (t.description || '') + '" placeholder="Deskripsi singkat">' +
            '</div>' +
          '</div>' +

          '<div id="form-errors" class="error-box" style="display:none"></div>' +

          '<div class="form-actions-bar">' +
            '<button class="btn btn-ghost" onclick="Transactions.render()">Batal</button>' +
            '<button class="btn btn-primary" onclick="Transactions.updateTxn(\'' + txnId + '\')">Simpan Perubahan</button>' +
          '</div>' +

        '</div>' +
      '</div>';
  }

  function updateTxn(txnId) {
    const t = DB.Transactions.byId(txnId);
    if (!t) return;

    const form = {
      entity_id:          document.getElementById('f-entity-id').value,
      bu_id:              document.getElementById('f-bu-id').value,
      activity_id:        document.getElementById('f-activity-id').value,
      account_id:         document.getElementById('f-account-id').value,
      counter_account_id: document.getElementById('f-counter-account-id').value,
      coa_code:           document.getElementById('f-coa-code').value,
      type_id:            document.getElementById('f-type-id').value,
      txn_date:           document.getElementById('f-txn-date').value,
      amount:             parseFloat(document.getElementById('f-amount').value),
      direction:          document.getElementById('f-direction').value,
      cp_id:              document.getElementById('f-cp-id').value,
      reference_id:       document.getElementById('f-ref-id').value,
      description:        document.getElementById('f-description').value
    };

    // Extra validation for CC Transaction
    if (form.type_id === 'TXN-09' && !form.cc_account_id) {
      (document.getElementById('form-errors') || {}).style && (document.getElementById('form-errors').style.display = 'block');
      document.getElementById('form-errors').innerHTML = '<ul><li>Pilih Kartu Kredit yang digunakan untuk transaksi ini</li></ul>';
      return;
    }

    const errors = Utils.validateTxn(form);
    const errBox = document.getElementById('form-errors');

    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      errBox.scrollIntoView({ behavior: 'smooth' });
      return;
    }

    errBox.style.display = 'none';

    // Preserve original txn_id, status, entry_date, created_by
    const updated = Object.assign({}, t, {
      txn_date:           form.txn_date,
      entity_id:          form.entity_id,
      bu_id:              form.bu_id,
      activity_id:        form.activity_id || null,
      account_id:         form.account_id,
      counter_account_id: form.counter_account_id || null,
      coa_code:           form.coa_code,
      type_id:            form.type_id,
      cp_id:              form.cp_id || null,
      amount:             form.amount,
      direction:          form.direction,
      description:        form.description,
      reference_id:       form.reference_id || null,
      period:             Utils.toPeriod(form.txn_date),
      edited_at:          Utils.today()
    });

    DB.Transactions.save(updated);
    Utils.toast('Transaksi berhasil diupdate — menyinkron ke Supabase...');
    // Immediately push to Supabase after edit (no delay)
    if (typeof SupabaseSync !== 'undefined' && SupabaseSync.pushNow) {
      SupabaseSync.pushNow('fos_transactions').then(function() {
        Utils.toast('Transaksi tersimpan dan tersinkron');
      }).catch(function() {
        Utils.toast('Tersimpan lokal — sync berikutnya akan mengirim ke Supabase', 'warning');
      });
    }
    render();
  }

  // ── Filter Actions ────────────────────────────────────────
  function applyFilter() {
    _filters.entity  = (document.getElementById('f-entity')  || {}).value || 'ALL';
    _filters.type    = (document.getElementById('f-type')    || {}).value || 'ALL';
    _filters.account = (document.getElementById('f-account') || {}).value || 'ALL';
    _filters.status  = (document.getElementById('f-status')  || {}).value || 'ALL';
    _filters.search  = (document.getElementById('f-search')  || {}).value || '';
    _filters.period  = (document.getElementById('f-period')  || {}).value || '';
    _filters.dateFrom= (document.getElementById('f-from')    || {}).value || '';
    _filters.dateTo  = (document.getElementById('f-to')      || {}).value || '';
    _refreshTable();
  }

  function clearFilters() {
    _filters = { entity:'ALL', bu:'ALL', type:'ALL', account:'ALL', status:'Posted', search:'', period:'', dateFrom:'', dateTo:'' };
    _renderList();
  }

  function _refreshTable() {
    const wrap = document.getElementById('txn-table-wrap');
    if (wrap) { wrap.innerHTML = _buildTable(); _bindTableEvents(); }
  }

  // ── Export CSV ────────────────────────────────────────────
  function exportCSV() {
    const txns = _getFiltered();
    const headers = ['ID','Tanggal','Entity','BU','Activity','Akun','Counter Akun','COA','Tipe','Counterparty','Jumlah','Direction','Deskripsi','Reference','Status','Periode'];
    const rows = txns.map(function(t) {
      const acct = DB.Accounts.byId(t.account_id);
      const coa  = DB.COA.byCode(t.coa_code);
      const bu   = DB.BU.byId(t.bu_id);
      const act  = t.activity_id ? DB.Activities.byId(t.activity_id) : null;
      const typ  = DB.TxnTypes.byId(t.type_id);
      const cp   = t.cp_id ? DB.Counterparties.byId(t.cp_id) : null;
      var ca = t.counter_account_id ? DB.Accounts.byId(t.counter_account_id) : null;
      return [
        t.txn_id, t.txn_date, t.entity_id,
        bu  ? bu.bu_name   : t.bu_id,
        act ? act.activity_name : '',
        acct? acct.account_name: t.account_id,
        ca  ? ca.account_name  : '',
        coa ? t.coa_code + ' ' + coa.coa_name : t.coa_code,
        typ ? typ.type_name : t.type_id,
        cp  ? cp.cp_name   : '',
        t.amount, t.direction, t.description,
        t.reference_id || '', t.status, t.period
      ];
    });
    Utils.exportCSV(headers, rows, 'transaksi-' + Utils.today() + '.csv');
    Utils.toast('Export berhasil');
  }

  return {
    render, showNew, showEdit, updateTxn, exportCSV,
    onEntityChange, onBUChange, onAccountChange, onTypeChange,
    onCOAChange, deriveDirection, toggleDirectionOverride,
    onEventSelect, clearEvent,
    saveTxn, viewDetail, postTxn,
    deleteTxn, doDeletePosted,
    applyFilter, clearFilters
  };

})();

const Receivables = (() => {

  const RCV_TYPES = [
    { id: 'RCV-01', name: 'Participant Installment', coa: '111' },
    { id: 'RCV-02', name: 'Corporate Invoice',        coa: '111' },
    { id: 'RCV-03', name: 'Friends Loan',             coa: '112' },
    { id: 'RCV-04', name: 'Intercompany Receivable',  coa: '113' },
    { id: 'RCV-05', name: 'CEO Advance',              coa: '121' }
  ];

  let _filters = { entity: 'ALL', status: 'ALL', type: 'ALL', search: '' };

  // ── Entry Point ───────────────────────────────────────────
  function render() {
    _renderList();
  }

  // ══════════════════════════════════════════════════════════
  // LIST VIEW
  // ══════════════════════════════════════════════════════════
  function _renderList() {
    const body = document.getElementById('page-body');
    const aging = DB.Reports.arAging('ALL');
    const agingE = App.getEntity() !== 'ALL' ? DB.Reports.arAging(App.getEntity()) : aging;

    body.innerHTML =
      // Aging summary bar
      '<div class="aging-summary-bar">' + _buildAgingSummary(agingE) + '</div>' +

      // Toolbar
      '<div class="module-toolbar" style="margin-top:.75rem">' +
        '<div class="toolbar-left">' +
          '<button class="btn btn-primary" onclick="Receivables.showNew()">+ Piutang Baru</button>' +
        '</div>' +
        '<div class="toolbar-right">' +
          '<button class="btn btn-ghost btn-sm" onclick="Receivables.exportCSV()">Export CSV</button>' +
        '</div>' +
      '</div>' +

      // Filters
      '<div class="filter-bar">' + _buildFilters() + '</div>' +

      // Table
      '<div class="card" style="margin-top:1rem" id="rcv-table-wrap">' +
        _buildTable() +
      '</div>';
  }

  function _buildAgingSummary(aging) {
    const total = (aging.current||0)+(aging.d1_30||0)+(aging.d31_60||0)+(aging.d61_90||0)+(aging.d90plus||0);
    const buckets = [
      { label: 'Current',    val: aging.current||0, cls: 'aging-current' },
      { label: '1–30 hari',  val: aging.d1_30||0,   cls: 'aging-30' },
      { label: '31–60 hari', val: aging.d31_60||0,  cls: 'aging-60' },
      { label: '61–90 hari', val: aging.d61_90||0,  cls: 'aging-90' },
      { label: '>90 hari',   val: aging.d90plus||0, cls: 'aging-90plus' }
    ];
    return '<div class="aging-summary">' +
      buckets.map(function(b) {
        return '<div class="aging-summary-item">' +
          '<div class="aging-summary-label">' + b.label + '</div>' +
          '<div class="aging-summary-bar-wrap">' +
            '<div class="aging-summary-fill ' + b.cls + '" style="width:' + (total>0?(b.val/total*100).toFixed(0):0) + '%"></div>' +
          '</div>' +
          '<div class="aging-summary-value">' + Utils.formatIDRCompact(b.val) + '</div>' +
        '</div>';
      }).join('') +
      '<div class="aging-summary-total"><span class="text-muted text-sm">Total Outstanding</span><strong>' + Utils.formatIDR(total) + '</strong></div>' +
    '</div>';
  }

  function _buildFilters() {
    const entities = DB.Entities.active();
    return '<select class="filter-select" id="rf-entity" onchange="Receivables.applyFilter()">' +
        '<option value="ALL">Semua Entity</option>' +
        entities.map(function(e){ return '<option value="' + e.entity_id + '" ' + (_filters.entity===e.entity_id?'selected':'') + '>' + e.entity_name + '</option>'; }).join('') +
      '</select>' +
      '<select class="filter-select" id="rf-type" onchange="Receivables.applyFilter()">' +
        '<option value="ALL">Semua Tipe</option>' +
        RCV_TYPES.map(function(t){ return '<option value="' + t.id + '" ' + (_filters.type===t.id?'selected':'') + '>' + t.name + '</option>'; }).join('') +
      '</select>' +
      '<select class="filter-select" id="rf-status" onchange="Receivables.applyFilter()">' +
        '<option value="ALL">Semua Status</option>' +
        ['Open','Partial','Overdue','Closed','Written Off'].map(function(s){ return '<option value="' + s + '" ' + (_filters.status===s?'selected':'') + '>' + s + '</option>'; }).join('') +
      '</select>' +
      '<input class="filter-input" id="rf-search" placeholder="Cari counterparty..." value="' + _filters.search + '" oninput="Receivables.applyFilter()">' +
      '<button class="btn btn-ghost btn-sm" onclick="Receivables.clearFilters()">Reset</button>';
  }

  function _buildTable() {
    const rcvs = _getFiltered();

    // CEO Advance banner
    var ceoRcvs = rcvs.filter(function(r){ return r.rcv_type === 'RCV-05'; });
    var ceoTotal = ceoRcvs.reduce(function(s,r){ return s + r.outstanding_balance; }, 0);

    if (rcvs.length === 0) {
      return '<div class="empty-state">' +
        '<div class="empty-icon">↓</div>' +
        '<p>Belum ada piutang yang cocok dengan filter ini.</p>' +
        '<button class="btn btn-primary" onclick="Receivables.showNew()">+ Piutang Baru</button>' +
      '</div>';
    }

    // CEO Advance banner
    var ceoBanner = '';
    if (ceoRcvs.length > 0) {
      ceoBanner = '<div class="ceo-advance-banner" style="margin-bottom:.5rem">' +
        '<span class="badge badge-yellow">CEO Advance</span>' +
        '<span class="text-sm text-muted">Piutang perusahaan kepada pemilik — dicatat sebagai Asset (COA 121), bukan beban.</span>' +
        '<span class="mono text-sm">Outstanding: ' + Utils.formatIDR(ceoTotal) + '</span>' +
      '</div>';
    }

    let totalOri = 0, totalOut = 0;
    const rows = rcvs.map(function(r) {
      const cp  = DB.Counterparties.byId(r.cp_id);
      const ent = DB.Entities.byId(r.entity_id);
      const bu  = DB.BU.byId(r.bu_id);
      const typ = RCV_TYPES.find(function(t){ return t.id === r.rcv_type; });
      const aging = Utils.agingBucket(r.due_date);
      totalOri += r.original_amount || 0;
      totalOut += r.outstanding_balance || 0;
      var isCEO = r.rcv_type === 'RCV-05';
      return '<tr' + (isCEO ? ' class="row-ceo"' : '') + '>' +
        '<td class="text-sm mono text-muted">' + r.rcv_id + '</td>' +
        '<td class="text-sm">' + (typ ? typ.name : r.rcv_type) + '</td>' +
        '<td>' + (cp ? cp.cp_name : r.cp_id) + '</td>' +
        '<td class="text-sm">' + (ent ? ent.entity_name : r.entity_id) + '</td>' +
        '<td class="text-sm">' + (bu ? bu.bu_name : r.bu_id) + '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(r.original_amount) + '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(r.outstanding_balance) + '</td>' +
        '<td class="text-sm">' + Utils.formatDate(r.due_date) + '</td>' +
        '<td><span class="aging-tag ' + _agingClass(r.due_date, r.status) + '">' + (r.status === 'Closed' ? '—' : aging) + '</span></td>' +
        '<td>' + Utils.statusBadge(r.status) + '</td>' +
        '<td class="text-center">' + _rowActions(r) + '</td>' +
      '</tr>';
    }).join('');

    return ceoBanner + '<div style="overflow-x:auto">' +
      '<table class="table">' +
        '<thead><tr>' +
          '<th>ID</th><th>Tipe</th><th>Counterparty</th><th>Entity</th><th>BU</th>' +
          '<th class="text-right">Jumlah Awal</th><th class="text-right">Outstanding</th>' +
          '<th>Jatuh Tempo</th><th>Aging</th><th>Status</th><th>Aksi</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div class="table-footer">' +
      '<span class="text-muted text-sm">' + rcvs.length + ' piutang</span>' +
      '<div class="footer-totals">' +
        '<span class="text-sm">Total Awal: <span class="mono">' + Utils.formatIDR(totalOri) + '</span></span>' +
        '<span class="text-sm">Total Outstanding: <span class="mono text-red">' + Utils.formatIDR(totalOut) + '</span></span>' +
      '</div>' +
    '</div>';
  }

  function _agingClass(dueDate, status) {
    if (status === 'Closed') return 'aging-tag-gray';
    const days = Utils.agingDays(dueDate);
    if (days <= 0)  return 'aging-tag-green';
    if (days <= 30) return 'aging-tag-yellow';
    if (days <= 60) return 'aging-tag-orange';
    return 'aging-tag-red';
  }

  function _rowActions(r) {
    let html = '<div class="row-actions">';
    html += '<button class="btn-action" onclick="Receivables.viewDetail(\'' + r.rcv_id + '\')" title="Detail">👁</button>';
    if (r.status !== 'Closed' && r.status !== 'Written Off') {
      html += '<button class="btn-action text-green" onclick="Receivables.showCollection(\'' + r.rcv_id + '\')" title="Catat Pembayaran">+</button>';
      html += '<button class="btn-action text-red" onclick="Receivables.writeOff(\'' + r.rcv_id + '\')" title="Write Off">✕</button>';
    }
    html += '</div>';
    return html;
  }

  function _getFiltered() {
    let rcvs = DB.Receivables.all();
    if (_filters.entity !== 'ALL') rcvs = rcvs.filter(function(r){ return r.entity_id === _filters.entity; });
    if (_filters.type   !== 'ALL') rcvs = rcvs.filter(function(r){ return r.rcv_type  === _filters.type; });
    if (_filters.status !== 'ALL') rcvs = rcvs.filter(function(r){ return r.status    === _filters.status; });
    if (_filters.search) {
      const q = _filters.search.toLowerCase();
      rcvs = rcvs.filter(function(r){
        const cp = DB.Counterparties.byId(r.cp_id);
        return (cp ? cp.cp_name.toLowerCase() : '').includes(q) || r.rcv_id.toLowerCase().includes(q);
      });
    }
    // Sort: overdue first, then by due date
    return rcvs.sort(function(a,b){ return a.due_date.localeCompare(b.due_date); });
  }

  // ══════════════════════════════════════════════════════════
  // NEW RECEIVABLE FORM
  // ══════════════════════════════════════════════════════════
  function showNew() {
    const body = document.getElementById('page-body');
    const entities = DB.Entities.active();
    const cps = DB.Counterparties.active();

  function onEntityChange() {
    const entityId = document.getElementById('nr-entity').value;
    const buSel = document.getElementById('nr-bu');

    if (!entityId) return;
    DB.BU.byEntity(entityId).forEach(function(b){
      const opt = document.createElement('option');
      opt.value = b.bu_id;
      opt.textContent = b.bu_name;
      buSel.appendChild(opt);

  function saveNew() {
    const type   = document.getElementById('nr-type').value;
    const entity = document.getElementById('nr-entity').value;
    const bu     = document.getElementById('nr-bu').value;
    const cp     = document.getElementById('nr-cp').value;
    const amount = parseFloat(document.getElementById('nr-amount').value);
    const issue  = document.getElementById('nr-issue').value;
    const due    = document.getElementById('nr-due').value;
    const notes  = document.getElementById('nr-notes').value;

    const errors = [];
    if (!type)          errors.push('Tipe Piutang wajib dipilih');
    if (!entity)        errors.push('Entity wajib dipilih');
    if (!bu)            errors.push('Business Unit wajib dipilih');
    if (!cp)            errors.push('Counterparty wajib dipilih');
    if (!amount || amount <= 0) errors.push('Jumlah harus lebih dari 0');
    if (!issue)         errors.push('Tanggal mulai wajib diisi');
    if (!due)           errors.push('Jatuh tempo wajib diisi');
    if (due && issue && due < issue) errors.push('Jatuh tempo tidak boleh sebelum tanggal mulai');

    const errBox = document.getElementById('nr-errors');
    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      return;
    }
    errBox.style.display = 'none';

    const rcv = {
      rcv_id:              Utils.newRcvId(),
      rcv_type:            type,
      entity_id:           entity,
      bu_id:               bu,
      cp_id:               cp,
      original_amount:     amount,
      issue_date:          issue,
      due_date:            due,
      collected_amount:    0,
      outstanding_balance: amount,
      status:              'Open',
      notes:               notes
    };

    DB.Receivables.save(rcv);

    // ── Auto-create CORRECT double-entry ledger ───────────────
    // Receivable COA mapping per type
    const coaMap = { 'RCV-01': '111', 'RCV-02': '111', 'RCV-03': '112', 'RCV-04': '113', 'RCV-05': '121' };
    const rcvCOA = coaMap[type] || '111';
    const typeName = (RCV_TYPES.find(function(t){ return t.id===type; })||{name:type}).name;

    // Revenue COA — user-selected for RCV-01/02, fixed for others
    var selectedRevCOA = (document.getElementById('nr-revenue-coa') || {}).value || '401';
    const creditCOAMap = {
      'RCV-01': selectedRevCOA, // User-selected Revenue COA
      'RCV-02': selectedRevCOA, // User-selected Revenue COA
      'RCV-03': '101', // Debit 112, Credit Cash (loan disbursement)
      'RCV-04': '211', // Debit 113, Credit 211 Intercompany Payable
      'RCV-05': '101'  // Debit 121, Credit Cash (CEO takes money)
    };
    const creditCOA = creditCOAMap[type] || '401';

    // For types that disburse cash (RCV-03, RCV-05), use actual cash account
    var cashAcct = null;
    var entityAccts = DB.Accounts.byEntity(entity);
    var bankAccts = entityAccts.filter(function(a){ return a.account_type === 'Bank'; });
    if (bankAccts.length > 0) cashAcct = bankAccts[0];
    else if (entityAccts.length > 0) cashAcct = entityAccts[0];

    // ── Entry 1: Debit Receivable COA ────────────────────────
    var txn1Id = Utils.newTxnId(issue);
    var needsCashCredit = ['RCV-03','RCV-05'].includes(type);

    DB.Transactions.save({
      txn_id:       txn1Id,
      txn_date:     issue,
      entry_date:   Utils.today(),
      entity_id:    entity,
      bu_id:        bu,
      activity_id:  null,
      // For revenue types: use virtual receivable account (no physical cash movement)
      // For cash-out types: use the cash account as counter
      account_id:   needsCashCredit && cashAcct ? cashAcct.account_id : (entityAccts[0] ? entityAccts[0].account_id : 'ACC-01'),
      coa_code:     rcvCOA,
      type_id:      'TXN-03',
      cp_id:        cp,
      amount:       amount,
      direction:    'Debit',
      description:  'Piutang — ' + typeName + ' [Debit ' + rcvCOA + ']',
      reference_id: rcv.rcv_id,
      status:       'Posted',
      void_reason:  null,
      created_by:   'User',
      period:       Utils.toPeriod(issue)
    });

    // ── Entry 2: Credit Revenue or Cash ──────────────────────
    // RCV-01, RCV-02: Credit Revenue (revenue recognized at billing)
    // RCV-03: Credit Cash (loan disbursed from company to friend)
    // RCV-04: Credit Intercompany Payable
    // RCV-05: Credit Cash (CEO takes money from company)
    var txn2Id = Utils.newTxnId(issue);
    DB.Transactions.save({
      txn_id:       txn2Id,
      txn_date:     issue,
      entry_date:   Utils.today(),
      entity_id:    entity,
      bu_id:        bu,
      activity_id:  null,
      account_id:   needsCashCredit && cashAcct ? cashAcct.account_id : (entityAccts[0] ? entityAccts[0].account_id : 'ACC-01'),
      coa_code:     creditCOA,
      type_id:      'TXN-03',
      cp_id:        cp,
      amount:       amount,
      direction:    'Credit',
      description:  'Piutang — ' + typeName + ' [Credit ' + creditCOA + ']',
      reference_id: rcv.rcv_id,
      status:       'Posted',
      void_reason:  null,
      created_by:   'User',
      period:       Utils.toPeriod(issue)
    });

    Utils.toast('Piutang berhasil disimpan — 2 ledger entry dibuat (Debit ' + rcvCOA + ' / Credit ' + creditCOA + ')');
    render();
  }

  function saveCollection(rcvId, btn) {
    const r       = DB.Receivables.byId(rcvId);
    const date    = document.getElementById('col-date').value;
    const amount  = parseFloat(document.getElementById('col-amount').value);
    const account = document.getElementById('col-account').value;
    const notes   = document.getElementById('col-notes').value;
    const errBox  = document.getElementById('col-errors');

    const errors = [];
    if (!date)                    errors.push('Tanggal wajib diisi');
    if (!amount || amount <= 0)   errors.push('Jumlah harus lebih dari 0');
    if (amount > r.outstanding_balance) errors.push('Jumlah melebihi saldo outstanding (' + Utils.formatIDR(r.outstanding_balance) + ')');
    if (!account)                 errors.push('Akun penerima wajib dipilih');

    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      return;
    }
    errBox.style.display = 'none';

    // Create ledger entry first
    const txnId = Utils.newTxnId(date);
    const txn = {
      txn_id:       txnId,
      txn_date:     date,
      entry_date:   Utils.today(),
      entity_id:    r.entity_id,
      bu_id:        r.bu_id,
      activity_id:  null,
      account_id:   account,
      coa_code:     DB.Accounts.byId(account).coa_code,
      type_id:      'TXN-03',
      cp_id:        r.cp_id,
      amount:       amount,
      direction:    'Debit',
      description:  'Collection — ' + rcvId,
      reference_id: rcvId,
      status:       'Posted',
      void_reason:  null,
      created_by:   'User',
      period:       Utils.toPeriod(date)
    };
    DB.Transactions.save(txn);

    // Create collection record
    const col = {
      col_id:     Utils.newColId(),
      rcv_id:     rcvId,
      col_date:   date,
      account_id: account,
      amount:     amount,
      txn_id:     txnId,
      notes:      notes
    };
    DB.Collections.save(col);

    btn.closest('.modal-overlay').remove();
    Utils.toast('Pembayaran berhasil dicatat');
    _renderList();
  }

    // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    const rcvs = _getFiltered();
    const headers = ['ID','Tipe','Counterparty','Entity','BU','Jumlah Awal','Terkumpul','Outstanding','Tgl Mulai','Jatuh Tempo','Aging','Status','Catatan'];
    const rows = rcvs.map(function(r){
      const cp  = DB.Counterparties.byId(r.cp_id);
      const ent = DB.Entities.byId(r.entity_id);
      const bu  = DB.BU.byId(r.bu_id);
      const typ = RCV_TYPES.find(function(t){ return t.id===r.rcv_type; });
      return [
        r.rcv_id, typ?typ.name:r.rcv_type, cp?cp.cp_name:'',
        ent?ent.entity_name:'', bu?bu.bu_name:'',
        r.original_amount, r.collected_amount, r.outstanding_balance,
        r.issue_date, r.due_date, Utils.agingBucket(r.due_date),
        r.status, r.notes||''
      ];
    });
    Utils.exportCSV(headers, rows, 'piutang-' + Utils.today() + '.csv');
    Utils.toast('Export berhasil');
  }

  return { render, showNew, onEntityChange, saveNew, viewDetail, showCollection, saveCollection, writeOff, deleteRcv, applyFilter, clearFilters, exportCSV };

const Payables = (() => {

  const PAY_TYPES = [
    { id: 'PAY-01', name: 'Credit Card',          coa: '201' },
    { id: 'PAY-02', name: 'Buy Now Pay Later',    coa: '202' },
    { id: 'PAY-03', name: 'Loan Payable',         coa: '203' },
    // PAY-04 CEO Advance REMOVED — dipindahkan ke modul Piutang (RCV-05)
    // CEO Advance adalah Aset (piutang perusahaan kpd pemilik), bukan Liability
    { id: 'PAY-05', name: 'Intercompany Payable', coa: '211' },
    { id: 'PAY-06', name: 'Vendor Payable',       coa: '212' }
  ];

  let _filters = { entity: 'ALL', status: 'ALL', type: 'ALL', search: '' };

  // ── Entry Point ───────────────────────────────────────────
  function render() {
    _renderList();
  }

  // ══════════════════════════════════════════════════════════
  // LIST VIEW
  // ══════════════════════════════════════════════════════════
  function _renderList() {
    const body   = document.getElementById('page-body');
    const entity = App.getEntity();
    const aging  = DB.Reports.apAging(entity === 'ALL' ? 'ALL' : entity);

    body.innerHTML =
      '<div class="aging-summary-bar">' + _buildAgingSummary(aging) + '</div>' +

      '<div class="module-toolbar" style="margin-top:.75rem">' +
        '<div class="toolbar-left">' +
          '<button class="btn btn-primary" onclick="Payables.showNew()">+ Utang Baru</button>' +
        '</div>' +
        '<div class="toolbar-right">' +
          '<button class="btn btn-ghost btn-sm" onclick="Payables.exportCSV()">Export CSV</button>' +
        '</div>' +
      '</div>' +

      '<div class="filter-bar">' + _buildFilters() + '</div>' +

      '<div class="card" style="margin-top:1rem" id="pay-table-wrap">' +
        _buildTable() +
      '</div>';
  }

  function _buildAgingSummary(aging) {
    const total = (aging.current||0)+(aging.d1_30||0)+(aging.d31_60||0)+(aging.d61_90||0)+(aging.d90plus||0);
    const buckets = [
      { label: 'Current',    val: aging.current||0, cls: 'aging-current' },
      { label: '1–30 hari',  val: aging.d1_30||0,   cls: 'aging-30' },
      { label: '31–60 hari', val: aging.d31_60||0,  cls: 'aging-60' },
      { label: '61–90 hari', val: aging.d61_90||0,  cls: 'aging-90' },
      { label: '>90 hari',   val: aging.d90plus||0, cls: 'aging-90plus' }
    ];
    return '<div class="aging-summary">' +
      buckets.map(function(b){
        return '<div class="aging-summary-item">' +
          '<div class="aging-summary-label">' + b.label + '</div>' +
          '<div class="aging-summary-bar-wrap">' +
            '<div class="aging-summary-fill ' + b.cls + '" style="width:' + (total>0?(b.val/total*100).toFixed(0):0) + '%"></div>' +
          '</div>' +
          '<div class="aging-summary-value">' + Utils.formatIDRCompact(b.val) + '</div>' +
        '</div>';
      }).join('') +
      '<div class="aging-summary-total">' +
        '<span class="text-muted text-sm">Total Utang</span>' +
        '<strong>' + Utils.formatIDR(total) + '</strong>' +
      '</div>' +
    '</div>';
  }

  function _buildFilters() {
    const entities = DB.Entities.active();
    return '<select class="filter-select" id="pf-entity" onchange="Payables.applyFilter()">' +
        '<option value="ALL">Semua Entity</option>' +
        entities.map(function(e){ return '<option value="' + e.entity_id + '" ' + (_filters.entity===e.entity_id?'selected':'') + '>' + e.entity_name + '</option>'; }).join('') +
      '</select>' +
      '<select class="filter-select" id="pf-type" onchange="Payables.applyFilter()">' +
        '<option value="ALL">Semua Tipe</option>' +
        PAY_TYPES.map(function(t){ return '<option value="' + t.id + '" ' + (_filters.type===t.id?'selected':'') + '>' + t.name + '</option>'; }).join('') +
      '</select>' +
      '<select class="filter-select" id="pf-status" onchange="Payables.applyFilter()">' +
        '<option value="ALL">Semua Status</option>' +
        ['Open','Partial','Overdue','Closed'].map(function(s){ return '<option value="' + s + '" ' + (_filters.status===s?'selected':'') + '>' + s + '</option>'; }).join('') +
      '</select>' +
      '<input class="filter-input" id="pf-search" placeholder="Cari kreditur..." value="' + _filters.search + '" oninput="Payables.applyFilter()">' +
      '<button class="btn btn-ghost btn-sm" onclick="Payables.clearFilters()">Reset</button>';
  }

  function _buildTable() {
    const pays = _getFiltered();

    // Legacy CEO Advance detection (should be migrated to Receivables)
    const ceoAdvance = pays.filter(function(p){ return p.pay_type === 'PAY-04'; });
    const regular    = pays.filter(function(p){ return p.pay_type !== 'PAY-04'; });

    let html = '';

    // CEO Advance moved to Receivables module (RCV-05)
    // Show migration notice if any legacy CEO Advance payables exist
    if (ceoAdvance.length > 0) {
      html += '<div class="info-box" style="margin-bottom:.5rem">' +
        '&#9432; <strong>' + ceoAdvance.length + ' CEO Advance</strong> ditemukan di modul Utang (data lama). ' +
        'CEO Advance seharusnya dicatat di modul <strong>Piutang</strong> (RCV-05) karena merupakan piutang perusahaan kepada pemilik, bukan utang. ' +
        'Silakan buat entri baru di modul Piutang dan hapus entri lama ini.' +
      '</div>';
    }

    if (pays.length === 0) {
      return '<div class="empty-state">' +
        '<div class="empty-icon">↑</div>' +
        '<p>Belum ada utang yang cocok dengan filter ini.</p>' +
        '<button class="btn btn-primary" onclick="Payables.showNew()">+ Utang Baru</button>' +
      '</div>';
    }

    let totalOri = 0, totalOut = 0;
    const rows = pays.map(function(p) {
      const cp  = DB.Counterparties.byId(p.cp_id);
      const ent = DB.Entities.byId(p.entity_id);
      const bu  = DB.BU.byId(p.bu_id);
      const typ = PAY_TYPES.find(function(t){ return t.id === p.pay_type; });
      totalOri += p.original_amount || 0;
      totalOut += p.outstanding_balance || 0;

      const isCEO = p.pay_type === 'PAY-04';
      return '<tr' + (isCEO ? ' class="row-ceo"' : '') + '>' +
        '<td class="text-sm mono text-muted">' + p.pay_id + '</td>' +
        '<td class="text-sm">' +
          (isCEO ? '<span class="badge badge-yellow" style="margin-right:.4rem">CEO</span>' : '') +
          (typ ? typ.name : p.pay_type) +
        '</td>' +
        '<td>' + (cp ? cp.cp_name : p.cp_id) + '</td>' +
        '<td class="text-sm">' + (ent ? ent.entity_name : p.entity_id) + '</td>' +
        '<td class="text-sm">' + (bu ? bu.bu_name : p.bu_id) + '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(p.original_amount) + '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(p.outstanding_balance) + '</td>' +
        '<td class="text-sm">' + Utils.formatDate(p.due_date) + '</td>' +
        '<td><span class="aging-tag ' + _agingClass(p.due_date, p.status) + '">' + (p.status==='Closed'?'—':Utils.agingBucket(p.due_date)) + '</span></td>' +
        '<td>' + Utils.statusBadge(p.status) + '</td>' +
        '<td class="text-center">' + _rowActions(p) + '</td>' +
      '</tr>';
    }).join('');

    html +=
      '<div style="overflow-x:auto">' +
        '<table class="table">' +
          '<thead><tr>' +
            '<th>ID</th><th>Tipe</th><th>Kreditur</th><th>Entity</th><th>BU</th>' +
            '<th class="text-right">Jumlah Awal</th><th class="text-right">Outstanding</th>' +
            '<th>Jatuh Tempo</th><th>Aging</th><th>Status</th><th>Aksi</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<div class="table-footer">' +
        '<span class="text-muted text-sm">' + pays.length + ' utang</span>' +
        '<div class="footer-totals">' +
          '<span class="text-sm">Total Awal: <span class="mono">' + Utils.formatIDR(totalOri) + '</span></span>' +
          '<span class="text-sm">Total Outstanding: <span class="mono text-red">' + Utils.formatIDR(totalOut) + '</span></span>' +
        '</div>' +
      '</div>';

    return html;
  }

  function _agingClass(dueDate, status) {
    if (status === 'Closed') return 'aging-tag-gray';
    const days = Utils.agingDays(dueDate);
    if (days <= 0)  return 'aging-tag-green';
    if (days <= 30) return 'aging-tag-yellow';
    if (days <= 60) return 'aging-tag-orange';
    return 'aging-tag-red';
  }

  function _rowActions(p) {
    let html = '<div class="row-actions">';
    html += '<button class="btn-action" onclick="Payables.viewDetail(\'' + p.pay_id + '\')" title="Detail">👁</button>';
    if (p.status !== 'Closed') {
      html += '<button class="btn-action text-green" onclick="Payables.showPayment(\'' + p.pay_id + '\')" title="Catat Pembayaran">+</button>';
    }
    html += '</div>';
    return html;
  }

  function _getFiltered() {
    let pays = DB.Payables.all();
    if (_filters.entity !== 'ALL') pays = pays.filter(function(p){ return p.entity_id === _filters.entity; });
    if (_filters.type   !== 'ALL') pays = pays.filter(function(p){ return p.pay_type  === _filters.type; });
    if (_filters.status !== 'ALL') pays = pays.filter(function(p){ return p.status    === _filters.status; });
    if (_filters.search) {
      const q = _filters.search.toLowerCase();
      pays = pays.filter(function(p){
        const cp = DB.Counterparties.byId(p.cp_id);
        return (cp ? cp.cp_name.toLowerCase() : '').includes(q) || p.pay_id.toLowerCase().includes(q);
      });
    }
    return pays.sort(function(a,b){ return a.due_date.localeCompare(b.due_date); });
  }

  function onTypeChange() {
    const typeId  = document.getElementById('np-type').value;
    const hintBox = document.getElementById('pay-type-hint');
    if (!hintBox) return;

    const hints = {
      // PAY-04 removed — CEO Advance now handled in Receivables (RCV-05)
      'PAY-05': 'ℹ️ Intercompany Payable akan menciptakan kewajiban antar entity. Pastikan entry yang sesuai dibuat di entity lain sebagai Intercompany Receivable.'
    };

    if (hints[typeId]) {
      hintBox.style.display = 'block';
      hintBox.innerHTML = hints[typeId];
    } else {
      hintBox.style.display = 'none';
    }
  }

  function onEntityChange() {
    const entityId = document.getElementById('np-entity').value;
    const buSel    = document.getElementById('np-bu');
    buSel.innerHTML = '<option value="">— Pilih BU —</option>';
    if (!entityId) return;
    DB.BU.byEntity(entityId).forEach(function(b){
      const opt = document.createElement('option');
      opt.value = b.bu_id;
      opt.textContent = b.bu_name;
      buSel.appendChild(opt);
    });
  }

  function saveNew() {
    const type   = document.getElementById('np-type').value;
    const entity = document.getElementById('np-entity').value;
    const bu     = document.getElementById('np-bu').value;
    const cp     = document.getElementById('np-cp').value;
    const amount = parseFloat(document.getElementById('np-amount').value);
    const issue  = document.getElementById('np-issue').value;
    const due    = document.getElementById('np-due').value;
    const notes  = document.getElementById('np-notes').value;

    const errors = [];
    if (!type)               errors.push('Tipe Utang wajib dipilih');
    if (!entity)             errors.push('Entity wajib dipilih');
    if (!bu)                 errors.push('Business Unit wajib dipilih');
    if (!cp)                 errors.push('Kreditur wajib dipilih');
    if (!amount || amount<=0)errors.push('Jumlah harus lebih dari 0');
    if (!issue)              errors.push('Tanggal transaksi wajib diisi');
    if (!due)                errors.push('Jatuh tempo wajib diisi');
    if (due && issue && due < issue) errors.push('Jatuh tempo tidak boleh sebelum tanggal transaksi');

    const errBox = document.getElementById('np-errors');
    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      return;
    }
    errBox.style.display = 'none';

    const pay = {
      pay_id:              Utils.newPayId(),
      pay_type:            type,
      entity_id:           entity,
      bu_id:               bu,
      cp_id:               cp,
      original_amount:     amount,
      issue_date:          issue,
      due_date:            due,
      paid_amount:         0,
      outstanding_balance: amount,
      status:              'Open',
      notes:               notes
    };

    var debitCOA = document.getElementById('np-debit-coa').value;

    const errBox2 = document.getElementById('np-errors');
    if (!debitCOA) {
      errBox2.style.display = 'block';
      errBox2.innerHTML = '<ul><li>COA Debit wajib dipilih — pilih beban atau aset yang diperoleh</li></ul>';
      return;
    }

    DB.Payables.save(pay);

    const typObj    = PAY_TYPES.find(function(t){ return t.id === type; });
    const liabCOA   = typObj ? typObj.coa : '231';
    const typeName  = typObj ? typObj.name : type;

    // Get a cash account for loan types (PAY-03 loan: cash comes IN)
    var entityAccts = DB.Accounts.byEntity(entity);
    var cashAccts   = entityAccts.filter(function(a){ return a.account_type === 'Bank'; });
    var defaultAcct = cashAccts.length > 0 ? cashAccts[0].account_id : (entityAccts[0] ? entityAccts[0].account_id : 'ACC-01');

    // For loan drawdown (PAY-03): Debit Cash → Credit Loan Payable
    // Override debitCOA to cash if user selected a cash COA for loan
    var isLoan = type === 'PAY-03';

    // ── Entry 1: Debit (what is received/consumed) ────────
    var txn1Id = Utils.newTxnId(issue);
    DB.Transactions.save({
      txn_id:       txn1Id,
      txn_date:     issue,
      entry_date:   Utils.today(),
      entity_id:    entity,
      bu_id:        bu,
      activity_id:  null,
      account_id:   defaultAcct,
      coa_code:     debitCOA,
      type_id:      'TXN-04',
      cp_id:        cp,
      amount:       amount,
      direction:    'Debit',
      description:  'Utang baru — ' + typeName + ' [Debit ' + debitCOA + ']',
      reference_id: pay.pay_id,
      status:       'Posted',
      void_reason:  null,
      created_by:   'User',
      period:       Utils.toPeriod(issue)
    });

    // ── Entry 2: Credit Liability COA (liability increases) ─
    var txn2Id = Utils.newTxnId(issue);
    DB.Transactions.save({
      txn_id:       txn2Id,
      txn_date:     issue,
      entry_date:   Utils.today(),
      entity_id:    entity,
      bu_id:        bu,
      activity_id:  null,
      account_id:   defaultAcct,
      coa_code:     liabCOA,
      type_id:      'TXN-04',
      cp_id:        cp,
      amount:       amount,
      direction:    'Credit',
      description:  'Utang baru — ' + typeName + ' [Credit ' + liabCOA + ']',
      reference_id: pay.pay_id,
      status:       'Posted',
      void_reason:  null,
      created_by:   'User',
      period:       Utils.toPeriod(issue)
    });

    Utils.toast('Utang berhasil disimpan — 2 ledger entry dibuat (Debit ' + debitCOA + ' / Credit ' + liabCOA + ')');
    render();
  }
