        '</div>' +

        // Payment history
        '<div class="detail-section-title">Riwayat Pembayaran</div>' +
        '<table class="table">' +
          '<thead><tr><th>Tanggal</th><th class="text-right">Jumlah</th><th>Akun</th><th>Catatan</th></tr></thead>' +
          '<tbody>' + pmtRows + '</tbody>' +
        '</table>' +

        (p.status !== 'Closed' ?
          '<div style="padding:1rem;border-top:1px solid var(--border)">' +
            '<button class="btn btn-primary" onclick="this.closest(\'.modal-overlay\').remove(); Payables.showPayment(\'' + payId + '\')">+ Catat Pembayaran</button>' +
          '</div>' : '') +

      '</div>';
    document.body.appendChild(modal);
    modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
  }

  function _detailItem(label, value) {
    return '<div class="detail-item"><div class="detail-item-label">' + label + '</div><div class="detail-item-value">' + value + '</div></div>';
  }

  // ══════════════════════════════════════════════════════════
  // PAYMENT FORM
  // ══════════════════════════════════════════════════════════
  function showPayment(payId) {
    const p  = DB.Payables.byId(payId);
    if (!p) return;
    const cp = DB.Counterparties.byId(p.cp_id);
    const typ = PAY_TYPES.find(function(t){ return t.id===p.pay_type; });
    const accounts = DB.Accounts.cashAccounts();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML =
      '<div class="modal modal-md">' +
        '<div class="modal-header">' +
          '<div>' +
            '<h3>Catat Pembayaran</h3>' +
            '<div class="text-muted text-sm">' + p.pay_id + ' — ' + (cp?cp.cp_name:'') + '</div>' +
          '</div>' +
          '<button class="btn btn-ghost btn-sm" onclick="this.closest(\'.modal-overlay\').remove()">✕</button>' +
        '</div>' +

        '<div class="collection-info">' +
          '<div class="col-info-item"><span class="text-muted text-sm">Jumlah Awal</span><span class="mono">' + Utils.formatIDR(p.original_amount) + '</span></div>' +
          '<div class="col-info-item"><span class="text-muted text-sm">Sudah Dibayar</span><span class="mono text-green">' + Utils.formatIDR(p.paid_amount) + '</span></div>' +
          '<div class="col-info-item"><span class="text-muted text-sm">Sisa Outstanding</span><span class="mono text-red">' + Utils.formatIDR(p.outstanding_balance) + '</span></div>' +
        '</div>' +

        '<div class="form-body" style="padding:1.25rem">' +
          '<div class="form-group">' +
            '<label>Tanggal Pembayaran <span class="required">*</span></label>' +
            '<input class="form-input" type="date" id="pmt-date" value="' + Utils.today() + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Jumlah Total Dibayar (Rp) <span class="required">*</span></label>' +
            '<input class="form-input" type="number" id="pmt-amount" placeholder="0" oninput="Payables.onPmtAmountChange()">' +
            '<small class="form-hint">Total kas yang keluar (pokok + bunga)</small>' +
          '</div>' +

          // Interest split — only shown for PAY-03 Loan
          (p.pay_type === 'PAY-03' ?
            '<div class="interest-split-box">' +
              '<div class="interest-split-title">&#9432; Pemisahan Pokok &amp; Bunga (Cicilan Pinjaman)</div>' +
              '<div class="form-row col-2">' +
                '<div class="form-group">' +
                  '<label>Pokok (Rp) <span class="required">*</span></label>' +
                  '<input class="form-input" type="number" id="pmt-principal" placeholder="0" oninput="Payables.onPrincipalChange()">' +
                  '<small class="form-hint">Mengurangi saldo utang</small>' +
                '</div>' +
                '<div class="form-group">' +
                  '<label>Bunga (Rp)</label>' +
                  '<input class="form-input" type="number" id="pmt-interest" placeholder="0" readonly>' +
                  '<small class="form-hint">Auto = Total &minus; Pokok</small>' +
                '</div>' +
              '</div>' +
              '<div class="info-box" style="margin-top:.5rem;font-size:.76rem">' +
                '<strong>Entry yang akan dibuat:</strong><br>' +
                'Debit 203 Utang Pinjaman (pokok) &#8594; Credit Kas<br>' +
                'Debit 541 Beban Bunga (bunga) &#8594; Credit Kas' +
              '</div>' +
            '</div>'
          : '') +

          '<div class="form-group">' +
            '<label>Dibayar dari Akun <span class="required">*</span></label>' +
            '<select class="form-input" id="pmt-account">' +
              '<option value="">— Pilih Akun —</option>' +
              accounts.map(function(a){ return '<option value="' + a.account_id + '">' + a.account_name + '</option>'; }).join('') +
            '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Catatan</label>' +
            '<input class="form-input" id="pmt-notes" placeholder="Nomor transfer, referensi...">' +
          '</div>' +
          '<div id="pmt-errors" class="error-box" style="display:none"></div>' +
        '</div>' +

        '<div class="modal-actions" style="padding:0 1.25rem 1.25rem">' +
          '<button class="btn btn-ghost" onclick="this.closest(\'.modal-overlay\').remove()">Batal</button>' +
          '<button class="btn btn-primary" onclick="Payables.savePayment(\'' + payId + '\', this)">Simpan Pembayaran</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);
    modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
    var saveBtn = document.getElementById('pmt-save-btn');
    if (saveBtn) saveBtn.onclick = function() { Payables.savePayment(payId); };
  }

  function onPmtAmountChange() {
    var total     = parseFloat(document.getElementById('pmt-amount').value) || 0;
    var principal = parseFloat((document.getElementById('pmt-principal') || {}).value) || 0;
    var intEl     = document.getElementById('pmt-interest');
    if (intEl) intEl.value = Math.max(0, total - principal);
  }

  function onPrincipalChange() {
    var total     = parseFloat(document.getElementById('pmt-amount').value) || 0;
    var principal = parseFloat(document.getElementById('pmt-principal').value) || 0;
    var intEl     = document.getElementById('pmt-interest');
    if (intEl) intEl.value = Math.max(0, total - principal);
  }

  function savePayment(payId) {
    const p         = DB.Payables.byId(payId);
    const date      = (document.getElementById('pmt-date')    || {}).value || '';
    const amount    = parseFloat((document.getElementById('pmt-amount')  || {}).value) || 0;
    const account   = (document.getElementById('pmt-account') || {}).value || '';
    const notes     = (document.getElementById('pmt-notes')   || {}).value || '';
    const errBox    = document.getElementById('pmt-errors');
    const isLoan    = p.pay_type === 'PAY-03';
    const principal = isLoan ? (parseFloat((document.getElementById('pmt-principal') || {}).value) || 0) : amount;
    const interest  = isLoan ? Math.max(0, amount - principal) : 0;

    const errors = [];
    if (!date)                  errors.push('Tanggal wajib diisi');
    if (!amount || amount <= 0) errors.push('Jumlah total harus lebih dari 0');
    if (isLoan && principal <= 0) errors.push('Jumlah pokok harus lebih dari 0');
    if (isLoan && principal > p.outstanding_balance) errors.push('Pokok melebihi outstanding (' + Utils.formatIDR(p.outstanding_balance) + ')');
    if (!isLoan && amount > p.outstanding_balance)   errors.push('Jumlah melebihi outstanding (' + Utils.formatIDR(p.outstanding_balance) + ')');
    if (!account) errors.push('Akun pembayaran wajib dipilih');

    if (errors.length > 0) {
      if (errBox) {
        errBox.style.display = 'block';
        errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      }
      return;
    }
    if (errBox) errBox.style.display = 'none';

    const acct   = DB.Accounts.byId(account);
    const typObj = PAY_TYPES.find(function(t){ return t.id === p.pay_type; });
    const liabCOA = typObj ? typObj.coa : '231';

    if (isLoan && interest > 0) {
      // ── Loan with interest: 3 entries ────────────────────
      // Entry 1: Debit Liability (principal reduces debt)
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: p.entity_id, bu_id: p.bu_id, activity_id: null,
        account_id: account, coa_code: liabCOA, type_id: 'TXN-08',
        cp_id: p.cp_id, amount: principal, direction: 'Debit',
        description: 'Cicilan pokok — ' + payId,
        reference_id: payId, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
      // Entry 2: Debit Interest Expense
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: p.entity_id, bu_id: p.bu_id, activity_id: null,
        account_id: account, coa_code: '541', type_id: 'TXN-02',
        cp_id: p.cp_id, amount: interest, direction: 'Debit',
        description: 'Cicilan bunga — ' + payId,
        reference_id: payId, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
      // Entry 3: Credit Cash (total payment out)
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: p.entity_id, bu_id: p.bu_id, activity_id: null,
        account_id: account, coa_code: acct ? acct.coa_code : '101', type_id: 'TXN-08',
        cp_id: p.cp_id, amount: amount, direction: 'Credit',
        description: 'Kas keluar cicilan — ' + payId + ' (Pokok ' + Utils.formatIDR(principal) + ' + Bunga ' + Utils.formatIDR(interest) + ')',
        reference_id: payId, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
      Utils.toast('Cicilan dicatat — Pokok ' + Utils.formatIDR(principal) + ' + Bunga ' + Utils.formatIDR(interest) + ' = ' + Utils.formatIDR(amount));
    } else {
      // ── Standard payment: 2 entries ──────────────────────
      // Entry 1: Debit Liability (reduces debt)
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: p.entity_id, bu_id: p.bu_id, activity_id: null,
        account_id: account, coa_code: liabCOA, type_id: 'TXN-08',
        cp_id: p.cp_id, amount: amount, direction: 'Debit',
        description: 'Pembayaran utang — ' + payId + ' [Debit ' + liabCOA + ']',
        reference_id: payId, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
      // Entry 2: Credit Cash
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: p.entity_id, bu_id: p.bu_id, activity_id: null,
        account_id: account, coa_code: acct ? acct.coa_code : '101', type_id: 'TXN-08',
        cp_id: p.cp_id, amount: amount, direction: 'Credit',
        description: 'Kas keluar — ' + payId + ' [Credit ' + (acct ? acct.coa_code : '101') + ']',
        reference_id: payId, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
    }

    // Create payment record
    const pmt = {
      pmt_id:       Utils.newPmtId(),
      pay_id:       payId,
      pmt_date:     date,
      principal:    isLoan ? principal : amount,
      interest:     isLoan ? interest  : 0,
      account_id: account,
      amount:     amount,
      txn_id:     txnId,
      notes:      notes
    };
    DB.Payments.save(pmt);

    btn.closest('.modal-overlay').remove();
    Utils.toast('Pembayaran berhasil dicatat');
    _renderList();
  }

  // ── Delete ───────────────────────────────────────────────
  function deletePay(payId) {
    Utils.confirm('Hapus utang ini? Jika sudah ada pembayaran, hapus pembayaran terlebih dahulu.', function() {
      const result = DB.Payables.delete(payId);
      if (result && result.error) { Utils.toast(result.error, 'error'); return; }
      Utils.toast('Utang dihapus');
      _renderList();
    });
  }

    // ── Filter Actions ────────────────────────────────────────
  function applyFilter() {
    _filters.entity = (document.getElementById('pf-entity')||{}).value || 'ALL';
    _filters.type   = (document.getElementById('pf-type')  ||{}).value || 'ALL';
    _filters.status = (document.getElementById('pf-status')||{}).value || 'ALL';
    _filters.search = (document.getElementById('pf-search')||{}).value || '';
    const wrap = document.getElementById('pay-table-wrap');
    if (wrap) wrap.innerHTML = _buildTable();
  }

  function clearFilters() {
    _filters = { entity:'ALL', status:'ALL', type:'ALL', search:'' };
    _renderList();
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    const pays = _getFiltered();
    const headers = ['ID','Tipe','Kreditur','Entity','BU','Jumlah Awal','Terbayar','Outstanding','Tgl Transaksi','Jatuh Tempo','Aging','Status','Catatan'];
    const rows = pays.map(function(p){
      const cp  = DB.Counterparties.byId(p.cp_id);
      const ent = DB.Entities.byId(p.entity_id);
      const bu  = DB.BU.byId(p.bu_id);
      const typ = PAY_TYPES.find(function(t){ return t.id===p.pay_type; });
      return [
        p.pay_id, typ?typ.name:p.pay_type, cp?cp.cp_name:'',
        ent?ent.entity_name:'', bu?bu.bu_name:'',
        p.original_amount, p.paid_amount, p.outstanding_balance,
        p.issue_date, p.due_date, Utils.agingBucket(p.due_date),
        p.status, p.notes||''
      ];
    });
    Utils.exportCSV(headers, rows, 'utang-' + Utils.today() + '.csv');
    Utils.toast('Export berhasil');
  }

  return { render, showNew, onTypeChange, onEntityChange, saveNew, viewDetail, showPayment, savePayment, deletePay, applyFilter, clearFilters, exportCSV };

})();

// ============================================================
// FINANCE OS — TREASURY MODULE
// Internal fund movements, zero P&L impact
// Every movement = 2 legs (Source + Destination)
// ============================================================

const Treasury = (() => {

  let _filters = { entity: 'ALL', account: 'ALL', dateFrom: '', dateTo: '' };

  // ── Entry Point ───────────────────────────────────────────
  function render() {
    _renderList();
  }

  // ══════════════════════════════════════════════════════════
  // LIST VIEW
  // ══════════════════════════════════════════════════════════
  function _renderList() {
    const body    = document.getElementById('page-body');
    const moves   = _getGrouped();
    const summary = _buildSummary();

    body.innerHTML =
      // Summary cards
      '<div class="treasury-summary">' + summary + '</div>' +

      // Toolbar
      '<div class="module-toolbar" style="margin-top:.75rem">' +
        '<div class="toolbar-left">' +
          '<button class="btn btn-primary" onclick="Treasury.showNew()">+ Transfer Baru</button>' +
        '</div>' +
        '<div class="toolbar-right">' +
          '<button class="btn btn-ghost btn-sm" onclick="Treasury.exportCSV()">Export CSV</button>' +
        '</div>' +
      '</div>' +

      // Filters
      '<div class="filter-bar">' + _buildFilters() + '</div>' +

      // Integrity alert
      '<div id="integrity-alert"></div>' +

      // Table
      '<div class="card" style="margin-top:1rem" id="try-table-wrap">' +
        _buildTable(moves) +
      '</div>';

    // Check integrity
    _checkIntegrity();
  }

  function _buildSummary() {
    const period   = App.getPeriod();
    const entity   = App.getEntity();
    const allMoves = _getGrouped();
    const period_moves = allMoves.filter(function(m){ return Utils.toPeriod(m.date) === period; });
    const total_moved  = period_moves.reduce(function(s,m){ return s + m.amount; }, 0);
    const accounts = DB.Accounts.cashAccounts().filter(function(a){ return entity==='ALL' || a.entity_id===entity; });

    const acctCards = accounts.map(function(a){
      const txns = DB.Transactions.all().filter(function(t){ return t.status==='Posted' && t.account_id===a.account_id; });
      let bal = a.opening_balance || 0;
      txns.forEach(function(t){
        const coa = DB.COA.byCode(t.coa_code);
        if (!coa || coa.coa_category !== 'Asset') return;
        bal += t.direction === 'Debit' ? t.amount : -t.amount;
      });
      return '<div class="treasury-acct-card">' +
        '<div class="treasury-acct-name">' + a.account_name + '</div>' +
        '<div class="treasury-acct-type">' + a.account_type + '</div>' +
        '<div class="treasury-acct-bal">' + Utils.formatIDR(bal) + '</div>' +
      '</div>';
    }).join('');

    return '<div class="treasury-acct-grid">' + (acctCards || '<div class="text-muted text-sm" style="padding:.5rem">Belum ada akun kas</div>') + '</div>' +
      '<div class="treasury-period-stat">' +
        '<div class="text-muted text-sm">Total Transfer — ' + Utils.periodLabel(period) + '</div>' +
        '<div class="treasury-stat-val">' + Utils.formatIDR(total_moved) + '</div>' +
        '<div class="text-muted text-sm">' + period_moves.length + ' pergerakan</div>' +
      '</div>';
  }

  function _buildFilters() {
    const entities = DB.Entities.active();
    const accounts = DB.Accounts.cashAccounts();
    return '<select class="filter-select" id="tf-entity" onchange="Treasury.applyFilter()">' +
        '<option value="ALL">Semua Entity</option>' +
        entities.map(function(e){ return '<option value="' + e.entity_id + '" ' + (_filters.entity===e.entity_id?'selected':'') + '>' + e.entity_name + '</option>'; }).join('') +
      '</select>' +
      '<select class="filter-select" id="tf-account" onchange="Treasury.applyFilter()">' +
        '<option value="ALL">Semua Akun</option>' +
        accounts.map(function(a){ return '<option value="' + a.account_id + '" ' + (_filters.account===a.account_id?'selected':'') + '>' + a.account_name + '</option>'; }).join('') +
      '</select>' +
      '<input class="filter-input" type="date" id="tf-from" value="' + _filters.dateFrom + '" onchange="Treasury.applyFilter()" title="Dari tanggal">' +
      '<input class="filter-input" type="date" id="tf-to" value="' + _filters.dateTo + '" onchange="Treasury.applyFilter()" title="Sampai tanggal">' +
      '<button class="btn btn-ghost btn-sm" onclick="Treasury.clearFilters()">Reset</button>';
  }

  function _buildTable(moves) {
    if (!moves || moves.length === 0) {
      return '<div class="empty-state">' +
        '<div class="empty-icon">⟳</div>' +
        '<p>Belum ada pergerakan dana internal.</p>' +
        '<p class="text-muted text-sm">Transfer antar akun tidak mempengaruhi P&L.</p>' +
        '<button class="btn btn-primary" onclick="Treasury.showNew()">+ Transfer Baru</button>' +
      '</div>';
    }

    let totalMoved = 0;
    const rows = moves.map(function(m) {
      const srcAcct  = DB.Accounts.byId(m.source_account);
      const dstAcct  = DB.Accounts.byId(m.dest_account);
      const srcEnt   = srcAcct ? DB.Entities.byId(srcAcct.entity_id) : null;
      const dstEnt   = dstAcct ? DB.Entities.byId(dstAcct.entity_id) : null;
      const isInterco = srcAcct && dstAcct && srcAcct.entity_id !== dstAcct.entity_id;
      totalMoved += m.amount;

      return '<tr>' +
        '<td class="text-sm mono text-muted">' + m.try_ref + '</td>' +
        '<td class="text-sm">' + Utils.formatDate(m.date) + '</td>' +
        '<td>' +
          '<div class="transfer-flow">' +
            '<span class="transfer-acct src">' + (srcAcct ? srcAcct.account_name : m.source_account) + '</span>' +
            '<span class="transfer-arrow">→</span>' +
            '<span class="transfer-acct dst">' + (dstAcct ? dstAcct.account_name : m.dest_account) + '</span>' +
          '</div>' +
          (isInterco ? '<span class="badge badge-purple" style="margin-top:.25rem;font-size:.65rem">Intercompany</span>' : '') +
        '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(m.amount) + '</td>' +
        '<td class="text-sm text-muted">' + (m.notes || '—') + '</td>' +
        '<td>' + (m.paired ? '<span class="badge badge-green">✓ Paired</span>' : '<span class="badge badge-red">! Unpaired</span>') + '</td>' +
        '<td class="text-center">' +
          '<button class="btn-action" onclick="Treasury.viewDetail(\'' + m.try_ref + '\')" title="Detail">👁</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    return '<div style="overflow-x:auto">' +
      '<table class="table">' +
        '<thead><tr>' +
          '<th>Referensi</th><th>Tanggal</th><th>Transfer</th>' +
          '<th class="text-right">Jumlah</th><th>Catatan</th><th>Status</th><th>Aksi</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div class="table-footer">' +
      '<span class="text-muted text-sm">' + moves.length + ' pergerakan</span>' +
      '<span class="text-sm">Total: <span class="mono">' + Utils.formatIDR(totalMoved) + '</span></span>' +
    '</div>';
  }

  // Group treasury legs into paired movements
  function _getGrouped() {
    const legs = DB.Treasury.all();

    // Apply filters
    let filtered = legs;
    if (_filters.dateFrom) filtered = filtered.filter(function(l){ return l.try_date >= _filters.dateFrom; });
    if (_filters.dateTo)   filtered = filtered.filter(function(l){ return l.try_date <= _filters.dateTo; });
    if (_filters.account !== 'ALL') {
      const refs = filtered.filter(function(l){ return l.account_id === _filters.account; }).map(function(l){ return l.try_ref; });
      filtered = filtered.filter(function(l){ return refs.includes(l.try_ref); });
    }
    if (_filters.entity !== 'ALL') {
      const accts = DB.Accounts.byEntity(_filters.entity).map(function(a){ return a.account_id; });
      const refs  = filtered.filter(function(l){ return accts.includes(l.account_id); }).map(function(l){ return l.try_ref; });
      filtered = filtered.filter(function(l){ return refs.includes(l.try_ref); });
    }

    // Group by try_ref
    const groups = {};
    filtered.forEach(function(l){
      if (!groups[l.try_ref]) groups[l.try_ref] = { try_ref: l.try_ref, legs: [] };
      groups[l.try_ref].legs.push(l);
    });

    return Object.values(groups).map(function(g){
      const src = g.legs.find(function(l){ return l.leg === 'Source'; });
      const dst = g.legs.find(function(l){ return l.leg === 'Destination'; });
      return {
        try_ref:        g.try_ref,
        date:           src ? src.try_date : (dst ? dst.try_date : ''),
        source_account: src ? src.account_id : null,
        dest_account:   dst ? dst.account_id : null,
        amount:         src ? src.amount : (dst ? dst.amount : 0),
        notes:          src ? src.notes : '',
        paired:         !!(src && dst)
      };
    }).sort(function(a,b){ return b.date.localeCompare(a.date); });
  }

  // ── Integrity Check ───────────────────────────────────────
  function _checkIntegrity() {
    const moves   = _getGrouped();
    const unpaired = moves.filter(function(m){ return !m.paired; });
    const alertDiv = document.getElementById('integrity-alert');
    if (!alertDiv) return;
    if (unpaired.length > 0) {
      alertDiv.innerHTML = '<div class="integrity-alert">' +
        '<span>⚠️ ' + unpaired.length + ' pergerakan treasury tidak lengkap (missing leg). ' +
        'Data mungkin corrupt. Periksa referensi: ' +
        unpaired.map(function(m){ return m.try_ref; }).join(', ') + '</span>' +
      '</div>';
    }
  }

  function onAccountChange() {
    const srcSel = document.getElementById('try-src');
    const dstSel = document.getElementById('try-dst');
    const notice = document.getElementById('interco-notice');
    const lpWarn = document.getElementById('lp-warning');
    if (!srcSel || !dstSel || !notice) return;

    const srcOpt = srcSel.options[srcSel.selectedIndex];
    const dstOpt = dstSel.options[dstSel.selectedIndex];
    const srcEnt = srcOpt ? srcOpt.getAttribute('data-entity') : '';
    const dstEnt = dstOpt ? dstOpt.getAttribute('data-entity') : '';
    const srcId  = srcSel.value;
    const dstId  = dstSel.value;

    // Intercompany notice
    if (srcEnt && dstEnt && srcEnt !== dstEnt) {
      notice.style.display = 'block';
    } else {
      notice.style.display = 'none';
    }

    // Liability Payment warning
    if (lpWarn) {
      const srcAcct = srcId ? DB.Accounts.byId(srcId) : null;
      const dstAcct = dstId ? DB.Accounts.byId(dstId) : null;
      const srcIsLiab = srcAcct && ['Credit','Loan'].includes(srcAcct.account_type);
      const dstIsLiab = dstAcct && ['Credit','Loan'].includes(dstAcct.account_type);
      if (srcIsLiab || dstIsLiab) {
        lpWarn.style.display = 'block';
      } else {
        lpWarn.style.display = 'none';
      }
    }
  }

  function saveNew() {
    const srcId  = document.getElementById('try-src').value;
    const dstId  = document.getElementById('try-dst').value;
    const date   = document.getElementById('try-date').value;
    const amount = parseFloat(document.getElementById('try-amount').value);
    const notes  = document.getElementById('try-notes').value;
    const errBox = document.getElementById('try-errors');

    const errors = [];
    if (!srcId)              errors.push('Akun sumber wajib dipilih');
    if (!dstId)              errors.push('Akun tujuan wajib dipilih');
    if (srcId && srcId === dstId) errors.push('Akun sumber dan tujuan tidak boleh sama');
    if (!date)               errors.push('Tanggal wajib diisi');
    if (!amount || amount<=0)errors.push('Jumlah harus lebih dari 0');

    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>';
      return;
    }
    errBox.style.display = 'none';

    const srcAcct = DB.Accounts.byId(srcId);
    const dstAcct = DB.Accounts.byId(dstId);
    const tryRef  = Utils.newTryRef();
    const isInterco = srcAcct && dstAcct && srcAcct.entity_id !== dstAcct.entity_id;

    // ── Create Source Leg ─────────────────────────────────
    const srcTxnId = Utils.newTxnId(date);
    DB.Transactions.save({
      txn_id: srcTxnId, txn_date: date, entry_date: Utils.today(),
      entity_id: srcAcct.entity_id, bu_id: _defaultBU(srcAcct.entity_id),
      activity_id: null, account_id: srcId, coa_code: srcAcct.coa_code,
      type_id: 'TXN-06', cp_id: null, amount: amount, direction: 'Credit',
      description: 'Treasury — ' + tryRef + ' (keluar)', reference_id: tryRef,
      status: 'Posted', void_reason: null, created_by: 'User', period: Utils.toPeriod(date)
    });
    DB.Treasury.save({
      try_leg_id: tryRef + '-A', try_ref: tryRef, try_date: date,
      leg: 'Source', account_id: srcId, entity_id: srcAcct.entity_id,
      amount: amount, txn_id: srcTxnId, notes: notes
    });

    // ── Create Destination Leg ────────────────────────────
    const dstTxnId = Utils.newTxnId(date);
    DB.Transactions.save({
      txn_id: dstTxnId, txn_date: date, entry_date: Utils.today(),
      entity_id: dstAcct.entity_id, bu_id: _defaultBU(dstAcct.entity_id),
      activity_id: null, account_id: dstId, coa_code: dstAcct.coa_code,
      type_id: 'TXN-06', cp_id: null, amount: amount, direction: 'Debit',
      description: 'Treasury — ' + tryRef + ' (masuk)', reference_id: tryRef,
      status: 'Posted', void_reason: null, created_by: 'User', period: Utils.toPeriod(date)
    });
    DB.Treasury.save({
      try_leg_id: tryRef + '-B', try_ref: tryRef, try_date: date,
      leg: 'Destination', account_id: dstId, entity_id: dstAcct.entity_id,
      amount: amount, txn_id: dstTxnId, notes: notes
    });

    // ── Intercompany Entries ──────────────────────────────
    if (isInterco) {
      // Receivable in source entity (COA 113)
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: srcAcct.entity_id, bu_id: _defaultBU(srcAcct.entity_id),
        activity_id: null, account_id: srcId, coa_code: '113',
        type_id: 'TXN-03', cp_id: null, amount: amount, direction: 'Debit',
        description: 'Intercompany Receivable — ' + tryRef,
        reference_id: tryRef, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
      // Payable in destination entity (COA 211)
      DB.Transactions.save({
        txn_id: Utils.newTxnId(date), txn_date: date, entry_date: Utils.today(),
        entity_id: dstAcct.entity_id, bu_id: _defaultBU(dstAcct.entity_id),
        activity_id: null, account_id: dstId, coa_code: '211',
        type_id: 'TXN-04', cp_id: null, amount: amount, direction: 'Credit',
        description: 'Intercompany Payable — ' + tryRef,
        reference_id: tryRef, status: 'Posted', void_reason: null,
        created_by: 'User', period: Utils.toPeriod(date)
      });
    }

    Utils.toast('Transfer berhasil disimpan' + (isInterco ? ' + entri intercompany dibuat' : ''));
    render();
  }

  function _defaultBU(entityId) {
    const bus = DB.BU.byEntity(entityId);
    const general = bus.find(function(b){ return b.bu_type === 'General'; });
    return general ? general.bu_id : (bus[0] ? bus[0].bu_id : '');
  }

            '</div>' +
          '</div>' +

          (isInterco ? '<div class="info-box" style="margin:.75rem 0">🔄 Intercompany transfer. Entri COA 113 dan COA 211 telah dibuat otomatis.</div>' : '') +

          '<table class="detail-table" style="margin-top:.75rem">' +

            '<tr><td class="detail-label">Source Txn</td><td class="detail-value mono text-sm">' + (src ? src.txn_id : '—') + '</td></tr>' +
            '<tr><td class="detail-label">Dest Txn</td><td class="detail-value mono text-sm">' + (dst ? dst.txn_id : '—') + '</td></tr>' +
            '<tr><td class="detail-label">Status</td><td class="detail-value">' + (src && dst ? '<span class="badge badge-green">Paired</span>' : '<span class="badge badge-red">Unpaired</span>') + '</td></tr>' +
          '</table>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);
    modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
  }

  // ── Delete ───────────────────────────────────────────────
  function deleteMove(tryRef) {
    Utils.confirm('Hapus treasury movement ini? Kedua leg dan entri ledger terkait akan ikut terhapus.', function() {
      const result = DB.Treasury.delete(tryRef);
      if (result && result.error) { Utils.toast(result.error, 'error'); return; }
      Utils.toast('Treasury movement dihapus');
      _renderList();
    });
  }

    // ── Filter Actions ────────────────────────────────────────
  function applyFilter() {
    _filters.entity   = (document.getElementById('tf-entity') ||{}).value || 'ALL';
    _filters.account  = (document.getElementById('tf-account')||{}).value || 'ALL';
    _filters.dateFrom = (document.getElementById('tf-from')   ||{}).value || '';
    _filters.dateTo   = (document.getElementById('tf-to')     ||{}).value || '';
    const wrap = document.getElementById('try-table-wrap');
    if (wrap) wrap.innerHTML = _buildTable(_getGrouped());
    _checkIntegrity();
  }

  function clearFilters() {
    _filters = { entity:'ALL', account:'ALL', dateFrom:'', dateTo:'' };
    _renderList();
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    const moves = _getGrouped();
    const headers = ['Referensi','Tanggal','Dari Akun','Ke Akun','Jumlah','Catatan','Status'];
    const rows = moves.map(function(m){
      const src = DB.Accounts.byId(m.source_account);
      const dst = DB.Accounts.byId(m.dest_account);
      return [
        m.try_ref, m.date,
        src ? src.account_name : m.source_account,
        dst ? dst.account_name : m.dest_account,
        m.amount, m.notes || '',
        m.paired ? 'Paired' : 'Unpaired'
      ];
    });
    Utils.exportCSV(headers, rows, 'treasury-' + Utils.today() + '.csv');
    Utils.toast('Export berhasil');
  }

  return { render, showNew, onAccountChange, saveNew, viewDetail, deleteMove, applyFilter, clearFilters, exportCSV };

})();

// ============================================================
// FINANCE OS — LIABILITY PAYMENT MODULE
// Mandatory separation from Treasury Movement.
// Purpose: Record payment of Credit Card, Loan, or any
// Liability using a Cash/Bank account.
// Accounting entry:
//   Debit  → Liability COA (reduces debt)
//   Credit → Asset/Cash COA (reduces cash)
// ============================================================

const LiabilityPayment = (() => {

  let _filters = { entity: 'ALL', status: 'ALL', search: '' };

  // ── Entry Point ───────────────────────────────────────────
  function render() {
    _renderList();
  }

  // ══════════════════════════════════════════════════════════
  // LIST VIEW
  // ══════════════════════════════════════════════════════════
  function _renderList() {
    const body = document.getElementById('page-body');

    // Get all liability payment transactions
    const txns = DB.Transactions.all().filter(function(t) {
      return t.type_id === 'TXN-08' && t.status !== 'Voided';
    });

    // Summary cards
    const totalPaid = txns.reduce(function(s, t) { return s + t.amount; }, 0);
    const thisMonth = DB.Transactions.all().filter(function(t) {
      return t.type_id === 'TXN-08' && t.status === 'Posted' && t.period === App.getPeriod();
    }).reduce(function(s, t) { return s + t.amount; }, 0);

    body.innerHTML =
      // Summary
      '<div class="lp-summary">' +
        '<div class="lp-summary-card">' +
          '<div class="lp-summary-label">Total Pembayaran Utang</div>' +
          '<div class="lp-summary-val">' + Utils.formatIDR(totalPaid) + '</div>' +
        '</div>' +
        '<div class="lp-summary-card">' +
          '<div class="lp-summary-label">Bulan Ini — ' + Utils.periodLabel(App.getPeriod()) + '</div>' +
          '<div class="lp-summary-val">' + Utils.formatIDR(thisMonth) + '</div>' +
        '</div>' +
        '<div class="lp-summary-card info">' +
          '<div class="lp-summary-label">Panduan</div>' +
          '<div class="lp-summary-info">Liability Payment mengurangi utang <strong>dan</strong> mengurangi kas secara bersamaan. Berbeda dari Treasury yang hanya memindahkan kas.</div>' +
        '</div>' +
      '</div>' +

      // Toolbar
      '<div class="module-toolbar" style="margin-top:.75rem">' +
        '<div class="toolbar-left">' +
          '<button class="btn btn-primary" onclick="LiabilityPayment.showNew()">+ Pembayaran Utang Baru</button>' +
        '</div>' +
        '<div class="toolbar-right">' +
          '<button class="btn btn-ghost btn-sm" onclick="LiabilityPayment.exportCSV()">Export CSV</button>' +
        '</div>' +

      '<div class="filter-bar">' + _buildFilters() + '</div>' +

      // Table
      '<div class="card" style="margin-top:1rem" id="lp-table-wrap">' +
        _buildTable(txns) +
      '</div>';

    _bindEvents();

  function _buildFilters() {
    const entities = DB.Entities.active();
    return '<select class="filter-select" id="lpf-entity" onchange="LiabilityPayment.applyFilter()">' +
        '<option value="ALL">Semua Entity</option>' +
        entities.map(function(e) {
          return '<option value="' + e.entity_id + '" ' + (_filters.entity === e.entity_id ? 'selected' : '') + '>' + e.entity_name + '</option>';
        }).join('') +
      '</select>' +
      '<select class="filter-select" id="lpf-status" onchange="LiabilityPayment.applyFilter()">' +
        '<option value="ALL">Semua Status</option>' +
        ['Posted', 'Draft'].map(function(s) {
          return '<option value="' + s + '" ' + (_filters.status === s ? 'selected' : '') + '>' + s + '</option>';
        }).join('') +
      '</select>' +
      '<input class="filter-input" id="lpf-search" placeholder="Cari deskripsi..." value="' + _filters.search + '" oninput="LiabilityPayment.applyFilter()">' +
      '<button class="btn btn-ghost btn-sm" onclick="LiabilityPayment.clearFilters()">Reset</button>';
  }

  function _buildTable(txns) {
    // Apply filters
    var filtered = txns;
    if (_filters.entity !== 'ALL') filtered = filtered.filter(function(t) { return t.entity_id === _filters.entity; });
    if (_filters.status !== 'ALL') filtered = filtered.filter(function(t) { return t.status === _filters.status; });
    if (_filters.search) {
      var q = _filters.search.toLowerCase();
      filtered = filtered.filter(function(t) { return (t.description || '').toLowerCase().includes(q); });
    }
    filtered = filtered.sort(function(a, b) { return b.txn_date.localeCompare(a.txn_date); });

    if (filtered.length === 0) {
      return '<div class="empty-state">' +
        '<div class="empty-icon">&#8679;</div>' +
        '<p>Belum ada pembayaran utang yang tercatat.</p>' +
        '<p class="text-muted text-sm">Gunakan modul ini untuk mencatat pembayaran kartu kredit, cicilan pinjaman, atau pelunasan utang lainnya.</p>' +
        '<button class="btn btn-primary" onclick="LiabilityPayment.showNew()">+ Pembayaran Utang Baru</button>' +
      '</div>';
    }

    var totalAmount = filtered.reduce(function(s, t) { return s + t.amount; }, 0);

    var rows = filtered.map(function(t) {
      var acct  = DB.Accounts.byId(t.account_id);
      var ca    = t.counter_account_id ? DB.Accounts.byId(t.counter_account_id) : null;
      var coa   = DB.COA.byCode(t.coa_code);
      var ent   = DB.Entities.byId(t.entity_id);
      var cp    = t.cp_id ? DB.Counterparties.byId(t.cp_id) : null;
      return '<tr>' +
        '<td class="text-sm mono text-muted">' + t.txn_id + '</td>' +
        '<td class="text-sm">' + Utils.formatDate(t.txn_date) + '</td>' +
        '<td>' + (t.description || '—') + '</td>' +
        '<td class="text-sm">' + (ent ? ent.entity_name : t.entity_id) + '</td>' +
        // Liability account (what debt is being paid)
        '<td class="text-sm">' +
          '<div class="lp-flow">' +
            '<span class="lp-account liability">' + (ca ? ca.account_name : '—') + '</span>' +
            '<span class="lp-arrow">&#8594;</span>' +
            '<span class="lp-account cash">' + (acct ? acct.account_name : t.account_id) + '</span>' +
          '</div>' +
        '</td>' +
        '<td class="text-sm text-muted">' + (coa ? coa.coa_code + ' ' + coa.coa_name : t.coa_code) + '</td>' +
        '<td class="text-sm">' + (cp ? cp.cp_name : '—') + '</td>' +
        '<td class="text-right mono">' + Utils.formatIDR(t.amount) + '</td>' +
        '<td>' + Utils.statusBadge(t.status) + '</td>' +

  function save(status) {
    var entity      = document.getElementById('lp-entity').value;
    var bu          = document.getElementById('lp-bu').value;
    var cp          = document.getElementById('lp-cp').value;
    var liabAcct    = document.getElementById('lp-liab-account').value;
    var cashAcct    = document.getElementById('lp-cash-account').value;
    var liabCOA     = document.getElementById('lp-liab-coa').value;
    var date        = document.getElementById('lp-date').value;
    var amount      = parseFloat(document.getElementById('lp-amount').value);
    var ref         = document.getElementById('lp-ref').value;
    var desc        = document.getElementById('lp-desc').value;
    var errBox      = document.getElementById('lp-errors');

    var errors = [];
    if (!entity)   errors.push('Entity wajib dipilih');
    if (!bu)       errors.push('Business Unit wajib dipilih');
    if (!liabAcct) errors.push('Rekening Utang wajib dipilih');
    if (!cashAcct) errors.push('Rekening Kas wajib dipilih');
    if (liabAcct === cashAcct) errors.push('Rekening Utang dan Rekening Kas tidak boleh sama');
    if (!liabCOA)  errors.push('COA Liability wajib dipilih');
    if (!date)     errors.push('Tanggal wajib diisi');
    if (!amount || amount <= 0) errors.push('Jumlah harus lebih dari 0');
    if (!desc)     errors.push('Deskripsi wajib diisi');

    if (errors.length > 0) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<ul>' + errors.map(function(e) { return '<li>' + e + '</li>'; }).join('') + '</ul>';
      errBox.scrollIntoView({ behavior: 'smooth' });
      return;
    }
    errBox.style.display = 'none';

    var cashAcctObj = DB.Accounts.byId(cashAcct);
    var defaultBU   = _defaultBU(entity);

    // ── Entry 1: Debit Liability COA (utang berkurang) ───────
    // This is recorded against the Liability Account
    var txn1Id = Utils.newTxnId(date);
    DB.Transactions.save({
      txn_id:             txn1Id,
      txn_date:           date,
      entry_date:         Utils.today(),
      entity_id:          entity,
      bu_id:              bu || defaultBU,
      activity_id:        null,
      account_id:         liabAcct,
      counter_account_id: cashAcct,
      coa_code:           liabCOA,
      type_id:            'TXN-08',
      cp_id:              cp || null,
      amount:             amount,
      direction:          'Debit',
      description:        desc + ' [Debit Liability]',
      reference_id:       ref || null,
      status:             status,
      void_reason:        null,
      created_by:         'User',
      period:             Utils.toPeriod(date)
    });

    // ── Entry 2: Credit Cash/Asset (kas berkurang) ───────────
    var txn2Id = Utils.newTxnId(date);
    DB.Transactions.save({
      txn_id:             txn2Id,
      txn_date:           date,
      entry_date:         Utils.today(),
      entity_id:          entity,
      bu_id:              bu || defaultBU,
      activity_id:        null,
      account_id:         cashAcct,
      counter_account_id: liabAcct,
      coa_code:           cashAcctObj ? cashAcctObj.coa_code : '101',
      type_id:            'TXN-08',
      cp_id:              cp || null,
      amount:             amount,
      direction:          'Credit',
      description:        desc + ' [Credit Cash]',
      reference_id:       ref || null,
      status:             status,
      void_reason:        null,
      created_by:         'User',
      period:             Utils.toPeriod(date)
    });

    Utils.toast(status === 'Posted'
      ? 'Pembayaran utang berhasil diposting — 2 ledger entry dibuat'
      : 'Draft pembayaran disimpan');
    render();
  }

  function _defaultBU(entityId) {
    var bus = DB.BU.byEntity(entityId);
    var gen = bus.find(function(b) { return b.bu_type === 'General'; });
    return gen ? gen.bu_id : (bus[0] ? bus[0].bu_id : '');
  }

  function _deleteLP(txnId) {
    var t = DB.Transactions.byId(txnId);
    if (!t) return;

    if (t.status === 'Posted') {
      var _pendingId = txnId;
      var modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'lp-del-modal';
      modal.innerHTML =
        '<div class="modal">' +
          '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem">' +
            '<span style="font-size:1.2rem;color:var(--red)">&#9888;</span>' +

            'Transaksi <strong>' + txnId + '</strong> akan dihapus permanen beserta pasangan entry-nya.' +
          '</p>' +
          '<div class="form-group" style="margin-bottom:1rem">' +
            '<label>Alasan <span class="required">*</span></label>' +

          '</div>' +

            '<button class="btn btn-danger" id="lp-del-confirm">Hapus Permanen</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(modal);
      document.getElementById('lp-del-cancel').onclick = function() { modal.remove(); };
      document.getElementById('lp-del-confirm').onclick = function() {
        var reason = document.getElementById('lp-del-reason').value.trim();
        if (!reason) { Utils.toast('Alasan wajib diisi', 'error'); return; }
        modal.remove();
        _execDelete(_pendingId);
      };
      return;
    }
    Utils.confirm('Hapus pembayaran ini?', function() { _execDelete(txnId); });
  }

  function _execDelete(txnId) {
    // Find and delete the paired entry too (same description prefix, same date, same amount)
    var t = DB.Transactions.byId(txnId);
    if (!t) return;
    var all = DB.Transactions.all();
    // Find paired entry: same date, same amount, same type, different direction
    var paired = all.filter(function(x) {
      return x.txn_id !== txnId &&
        x.type_id === 'TXN-08' &&
        x.txn_date === t.txn_date &&
        x.amount === t.amount &&
        x.direction !== t.direction &&
        x.entity_id === t.entity_id;
    });
    var toDelete = [txnId];
    if (paired.length > 0) toDelete.push(paired[0].txn_id);
    var remaining = all.filter(function(x) { return !toDelete.includes(x.txn_id); });
    localStorage.setItem('fos_transactions', JSON.stringify(remaining));
    Utils.toast('Pembayaran dihapus (' + toDelete.length + ' entry)');
    _renderList();
  }

  // ── Filters ───────────────────────────────────────────────
  function applyFilter() {
    _filters.entity = (document.getElementById('lpf-entity') || {}).value || 'ALL';
    _filters.status = (document.getElementById('lpf-status') || {}).value || 'ALL';
    _filters.search = (document.getElementById('lpf-search') || {}).value || '';
    var txns = DB.Transactions.all().filter(function(t) { return t.type_id === 'TXN-08'; });
    var wrap = document.getElementById('lp-table-wrap');
    if (wrap) { wrap.innerHTML = _buildTable(txns); _bindEvents(); }
  }

  function clearFilters() {
    _filters = { entity: 'ALL', status: 'ALL', search: '' };
    _renderList();
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    var txns = DB.Transactions.all().filter(function(t) { return t.type_id === 'TXN-08' && t.status === 'Posted'; });
    var headers = ['ID', 'Tanggal', 'Entity', 'Rekening Utang', 'Rekening Kas', 'COA', 'Kreditur', 'Jumlah', 'Direction', 'Deskripsi', 'Reference', 'Status'];
    var rows = txns.map(function(t) {
      var acct = DB.Accounts.byId(t.account_id);
      var ca   = t.counter_account_id ? DB.Accounts.byId(t.counter_account_id) : null;
      var coa  = DB.COA.byCode(t.coa_code);
      var cp   = t.cp_id ? DB.Counterparties.byId(t.cp_id) : null;
      return [
        t.txn_id, t.txn_date, t.entity_id,
        ca   ? ca.account_name   : '',
        acct ? acct.account_name : t.account_id,
        coa  ? t.coa_code + ' ' + coa.coa_name : t.coa_code,
        cp   ? cp.cp_name        : '',
        t.amount, t.direction, t.description,
        t.reference_id || '', t.status
      ];
    });
    Utils.exportCSV(headers, rows, 'liability-payment-' + Utils.today() + '.csv');
    Utils.toast('Export berhasil');
  }

  return { render, showNew, onEntityChange, save, applyFilter, clearFilters, exportCSV };

})();

  // ── File Selection ─────────────────────────────────────────
  function onFileSelect(event) {

  function _processFile(file) {
    var status = document.getElementById('import-status');
    status.innerHTML = '<div class="import-parsing"><span class="spinner"></span> Membaca file...</div>';

    // Check size
    if (file.size > 5 * 1024 * 1024) {
      status.innerHTML = '<div class="error-box">File terlalu besar. Maks 5MB.</div>';
      return;
    }

    var ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'csv') {
      _parseCSV(file);
    } else if (ext === 'xlsx') {
      _parseXLSX(file);
    } else {
      status.innerHTML = '<div class="error-box">Format tidak didukung. Gunakan .xlsx atau .csv.</div>';
    }
  }

  // ── Parse XLSX (using SheetJS via CDN) ────────────────────
  function _parseXLSX(file) {
    // Load SheetJS dynamically if not available
    if (typeof XLSX === 'undefined') {
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = function() { _readXLSX(file); };
      script.onerror = function() {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Gagal memuat library Excel. Periksa koneksi internet.</div>';
      };
      document.head.appendChild(script);
    } else {
      _readXLSX(file);
    }
  }

  function _readXLSX(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data    = new Uint8Array(e.target.result);
        var wb      = XLSX.read(data, { type: 'array', cellDates: true });

        // Try sheet "Transaksi" first, then first sheet
        var sheetName = wb.SheetNames.includes('Transaksi') ? 'Transaksi' : wb.SheetNames[0];
        var ws        = wb.Sheets[sheetName];
        var json      = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (json.length === 0) {
          document.getElementById('import-status').innerHTML =
            '<div class="error-box">Sheet "' + sheetName + '" kosong atau tidak ada data.</div>';
          return;
        }

        _rows = json;
        document.getElementById('import-status').innerHTML =
          '<div class="import-success">&#10003; File dibaca: <strong>' + json.length + ' baris</strong> dari sheet "' + sheetName + '"</div>';

        _mapRows();
      } catch(err) {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Error membaca Excel: ' + err.message + '</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ── Parse CSV ─────────────────────────────────────────────
  function _parseCSV(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var lines   = e.target.result.split('\n').filter(function(l){ return l.trim(); });
        var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,''); });
        var json    = lines.slice(1).map(function(line) {
          var vals = line.split(',');
          var obj  = {};
          headers.forEach(function(h, i) { obj[h] = (vals[i] || '').trim().replace(/"/g,''); });
          return obj;
        });

        _rows = json;
        document.getElementById('import-status').innerHTML =
          '<div class="import-success">&#10003; CSV dibaca: <strong>' + json.length + ' baris</strong></div>';
        _mapRows();
      } catch(err) {
        document.getElementById('import-status').innerHTML =
          '<div class="error-box">Error membaca CSV: ' + err.message + '</div>';
      }
    };
    reader.readAsText(file);
  }

  // ── Map Rows ───────────────────────────────────────────────
  function _mapRows() {
    // Get activities from DB for matching
    var allActs = DB.Activities.all();
    var allBUs  = DB.BU.all();
    var entity  = DB.Entities.byId('E01'); // JO

    function _findActivity(categoryStr) {
      if (!categoryStr) return null;
      var hint = CAT_ACTIVITY[categoryStr] || categoryStr;
      // Try exact match by name
      var found = allActs.find(function(a){
        return a.activity_name.toLowerCase() === hint.toLowerCase();
      });
      if (!found) {
        // Partial match
        found = allActs.find(function(a){
          return hint.toLowerCase().includes(a.activity_name.toLowerCase()) ||
                 a.activity_name.toLowerCase().includes(hint.toLowerCase());
        });
      }
      return found ? found.activity_id : null;
    }

    function _findBU(activityId) {
      if (!activityId) {
        // Default to JO Operational BU
        var bu = allBUs.find(function(b){ return b.entity_id === 'E01'; });
        return bu ? bu.bu_id : null;
      }
      var act = DB.Activities.byId(activityId);
      return act ? act.bu_id : null;
    }

    function _parseDate(val) {
      if (!val) return Utils.today();
      // SheetJS returns Date objects when cellDates: true
      if (val instanceof Date) {
        var y = val.getFullYear();
        var m = String(val.getMonth()+1).padStart(2,'0');
        var d = String(val.getDate()).padStart(2,'0');
        return y + '-' + m + '-' + d;
      }
      // String date
      var str = String(val).trim();
      if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
      // Try parse
      var dt = new Date(str);
      if (!isNaN(dt)) {
        return dt.getFullYear() + '-' +
          String(dt.getMonth()+1).padStart(2,'0') + '-' +
          String(dt.getDate()).padStart(2,'0');
      }
      return Utils.today();
    }

    function _getMapping(row) {
      var subcat = String(row['SubCategory'] || '').trim();
      var cat    = String(row['Category']    || '').trim();
      var entity = String(row['Entity']      || '').trim();
      var cashIn  = parseFloat(row['Cash In']  || 0) || 0;
      var cashOut = parseFloat(row['Cash Out'] || 0) || 0;

      // Amount and direction
      var amount    = cashIn > 0 ? cashIn : cashOut;
      var direction = cashIn > 0 ? 'Debit' : 'Credit';

      // Account
      var accountId = ENTITY_MAP[entity] || 'ACC-01';

      // COA and Type from SubCategory
      var mapping = SUBCAT_COA[subcat] || null;
      var coa     = mapping ? mapping.coa : (direction === 'Debit' ? '401' : '531');
      var typeId  = mapping ? mapping.type : (direction === 'Debit' ? 'TXN-01' : 'TXN-02');

      // Activity
      var activityId = _findActivity(cat);
      var buId       = _findBU(activityId);

      // Flag for review if uncertain
      var needsReview = !mapping || !activityId;

      return {
        txn_date:    _parseDate(row['Date']),
        description: String(row['Description'] || '').trim(),
        amount:      amount,
        direction:   direction,
        account_id:  accountId,
        coa_code:    coa,
        type_id:     typeId,
        activity_id: activityId,
        bu_id:       buId || (allBUs.find(function(b){ return b.entity_id==='E01'; }) || {}).bu_id || '',
        entity_id:   'E01',
        // Original values for display
        _orig_entity:  entity,
        _orig_subcat:  subcat,
        _orig_cat:     cat,
        _orig_cashin:  cashIn,
        _orig_cashout: cashOut,
        _needs_review: needsReview,
        _selected:     true
      };
    }

    _mapped = _rows.map(function(row, i) {
      var m = _getMapping(row);
      m._idx = i;
      return m;
    });

    // Filter out empty rows
    _mapped = _mapped.filter(function(m){ return m.amount > 0 && m.description; });

    _page = 0;
    _renderPreview();
  }

        // COA
        '<td><select class="form-input form-input-xs imp-coa" data-idx="' + i + '">' + _optsCOA(m.coa_code) + '</select></td>' +

        '<td><select class="form-input form-input-xs imp-type" data-idx="' + i + '">' + _optsType(m.type_id) + '</select></td>' +

    area.innerHTML =

      '<div class="import-summary-bar">' +

          '<span><strong>' + total + '</strong> baris total</span>' +
          '<span><strong class="text-green">' + selected + '</strong> akan diimport</span>' +
          (needsRev > 0 ? '<span><strong class="text-yellow">' + needsRev + '</strong> perlu review</span>' : '') +
        '</div>' +
        '<div class="import-summary-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectAll(true)">Pilih Semua</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectAll(false)">Hapus Semua</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.selectReview()">Pilih yang Perlu Review</button>' +
        '</div>' +
      '</div>' +

      // Table
      '<div style="overflow-x:auto;margin-top:.5rem">' +
        '<table class="table import-table">' +
          '<thead><tr>' +
            '<th style="width:30px"><input type="checkbox" id="imp-chk-all" onchange="ImportModule.toggleAll(this.checked)"></th>' +
            '<th>Tanggal</th><th>Deskripsi</th><th class="text-right">Jumlah</th><th>Dir</th>' +
            '<th>Akun</th><th>COA</th><th>Tipe</th><th>Activity</th>' +
            '<th>SubCat Asli</th><th>Category Asli</th><th>Status</th>' +
          '</tr></thead>' +
          '<tbody id="import-tbody">' + rows + '</tbody>' +
        '</table>' +
      '</div>' +

      // Pagination
      (pageCount > 1 ?
        '<div class="import-pagination">' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.prevPage()" ' + (_page===0?'disabled':'') + '>&#8592; Prev</button>' +
          '<span class="text-sm text-muted">Halaman ' + (_page+1) + ' / ' + pageCount + '</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="ImportModule.nextPage()" ' + (_page>=pageCount-1?'disabled':'') + '>Next &#8594;</button>' +
        '</div>'
      : '') +

      // Import button
      '<div class="import-action-bar">' +

        '</button>' +

    _bindPreviewEvents();

  function _bindPreviewEvents() {
    var tbody = document.getElementById('import-tbody');
    if (!tbody) return;

    // Checkbox changes
    tbody.querySelectorAll('.imp-chk').forEach(function(chk) {
      chk.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row._selected = this.checked;
        _updateSummaryBar();
      };
    });

    // COA changes
    tbody.querySelectorAll('.imp-coa').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) { row.coa_code = this.value; row._needs_review = false; }
      };
    });

    // Type changes
    tbody.querySelectorAll('.imp-type').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.type_id = this.value;
      };
    });

    // Activity changes
    tbody.querySelectorAll('.imp-act').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.activity_id = this.value || null;
      };
    });

    // Account changes
    tbody.querySelectorAll('.imp-acct').forEach(function(sel) {
      sel.onchange = function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var row = _mapped.find(function(m){ return m._idx === idx; });
        if (row) row.account_id = this.value;
      };
    });
  }

  function _updateSummaryBar() {
    var selected = _mapped.filter(function(m){ return m._selected; }).length;
    var btn = document.querySelector('.import-action-bar .btn-primary');
    if (btn) btn.textContent = '✓ Import ' + selected + ' Transaksi';
    var statEl = document.querySelector('.import-summary-stats span:nth-child(2)');
    if (statEl) statEl.innerHTML = '<strong class="text-green">' + selected + '</strong> akan diimport';
  }

  // ── Select Helpers ─────────────────────────────────────────
  function selectAll(val) {
    _mapped.forEach(function(m){ m._selected = val; });
    _renderPreview();
  }

  function selectReview() {
    _mapped.forEach(function(m){ m._selected = m._needs_review; });
    _renderPreview();
  }

  function toggleAll(checked) {
    var pageRows = _mapped.slice(_page*PAGE_SIZE, _page*PAGE_SIZE+PAGE_SIZE);
    pageRows.forEach(function(m){ m._selected = checked; });
    _updateSummaryBar();
  }

  // ── Pagination ────────────────────────────────────────────
  function prevPage() {
    if (_page > 0) { _page--; _renderPreview(); }
  }
  function nextPage() {
    if ((_page+1)*PAGE_SIZE < _mapped.length) { _page++; _renderPreview(); }
  }

  function confirmImport() {
    var toImport = _mapped.filter(function(m){ return m._selected; });
    if (toImport.length === 0) {
      Utils.toast('Tidak ada baris yang dipilih', 'error');
      return;

    modal.innerHTML =

        '<h3 style="margin-bottom:.75rem">Konfirmasi Import</h3>' +
        '<p class="text-muted text-sm" style="margin-bottom:1rem;line-height:1.6">' +
          'Akan mengimport <strong>' + toImport.length + ' transaksi</strong> ke ledger. ' +
          'Transaksi akan langsung berstatus <strong>Posted</strong>. ' +
          'Tindakan ini tidak dapat di-undo secara massal (hanya bisa hapus satu per satu).' +
        '</p>' +
        '<div class="info-box" style="margin-bottom:1rem">' +
          '&#9432; Pastikan sudah me-review semua baris yang berwarna kuning (perlu review).' +
        '</div>' +

          '<button class="btn btn-ghost" onclick="this.closest(\'.modal-overlay\').remove()">Batal</button>' +
          '<button class="btn btn-primary" id="do-import-btn">Import ' + toImport.length + ' Transaksi</button>' +

      _doImport(toImport);

  function _doImport(rows) {
    var success = 0, failed = 0, errors = [];

    rows.forEach(function(m) {
      try {
        var txnId = Utils.newTxnId(m.txn_date);
        DB.Transactions.save({
          txn_id:             txnId,
          txn_date:           m.txn_date,
          entry_date:         Utils.today(),
          entity_id:          m.entity_id || 'E01',
          bu_id:              m.bu_id     || '',
          activity_id:        m.activity_id || null,
          account_id:         m.account_id,
          counter_account_id: null,
          coa_code:           m.coa_code,
          type_id:            m.type_id,
          cp_id:              null,
          amount:             m.amount,
          direction:          m.direction,
          description:        m.description,
          reference_id:       'IMPORT-' + Utils.today(),
          status:             'Posted',
          void_reason:        null,
          created_by:         'Import',
          period:             Utils.toPeriod(m.txn_date)
        });
        success++;
      } catch(e) {
        failed++;
        errors.push(m.description + ': ' + e.message);
      }
    });

    // Show result
    var area = document.getElementById('import-preview-area');
    area.innerHTML =
      '<div class="import-result ' + (failed===0?'import-result-ok':'import-result-partial') + '">' +
        '<div class="import-result-icon">' + (failed===0?'&#10003;':'&#9888;') + '</div>' +
        '<div class="import-result-body">' +
          '<div class="import-result-title">' +
            (failed===0 ? 'Import Berhasil!' : 'Import Selesai dengan ' + failed + ' Error') +
          '</div>' +
          '<div class="import-result-detail">' +
            '<strong>' + success + '</strong> transaksi berhasil diimport' +
            (failed > 0 ? ', <strong>' + failed + '</strong> gagal' : '') +
          '</div>' +
          (errors.length > 0 ?
            '<div class="import-result-errors"><strong>Error:</strong><br>' + errors.slice(0,5).join('<br>') + '</div>'
          : '') +
          '<div class="import-result-actions">' +
            '<button class="btn btn-ghost" onclick="ImportModule.render()">Import File Lain</button>' +
            '<button class="btn btn-primary" onclick="App.navigate(\'transactions\')">Lihat Transaksi</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('import-status').innerHTML = '';
    Utils.toast('Import selesai: ' + success + ' transaksi');
  }

  // ── Download Template CSV ─────────────────────────────────
  function downloadTemplate() {
    var headers = ['date','description','cash_in','cash_out','entity','subcategory','category'];
    var sample  = [
      ['2026-01-01','Contoh penerimaan WFA','1100000','','BCA JO','Participant Loan','WFA2025'],
      ['2026-01-02','Contoh biaya operasional','','183148','Petty Cash','Utilities','2. Operational']
    ];
    Utils.exportCSV(headers, sample, 'template-import-finance-os.csv');
    Utils.toast('Template CSV didownload');
  }

  return {
    render, onFileSelect,
    selectAll, selectReview, toggleAll,
    prevPage, nextPage,
    confirmImport, downloadTemplate
  };

})();

// ============================================================
// FINANCE OS — REPORTS MODULE
// P&L, Balance Sheet, Cash Flow, AR/AP Aging,

// ============================================================

const Reports = (() => {

  let _activeReport = 'pl';

  const REPORT_MENU = [
    { id: 'pl',         label: 'Laba Rugi (P&L)',         icon: '≡' },
    { id: 'pl_compare', label: 'P&L Komparatif',          icon: '⇌' },
    { id: 'bs',         label: 'Neraca (Balance Sheet)',   icon: '⊟' },
    { id: 'cf',         label: 'Arus Kas (Cash Flow)',     icon: '⇅' },
    { id: 'ar_aging',   label: 'Aging Piutang',            icon: '↓' },
    { id: 'ap_aging',   label: 'Aging Utang',              icon: '↑' },
    { id: 'bu_profit',  label: 'Profitabilitas BU',        icon: '◈' },
    { id: 'act_profit', label: 'Profitabilitas Activity',  icon: '⬡' },
    { id: 'treasury',   label: 'Ringkasan Treasury',       icon: '⟳' }
  ];

  // ── Entry Point ───────────────────────────────────────────
  function render() {

    body.innerHTML =
      '<div class="reports-layout">' +
        '<div class="reports-sidebar">' +
          REPORT_MENU.map(function(r){

        '</div>' +

        '</div>' +
      '</div>';
  }

  function switchReport(id) {

      el.classList.toggle('active', el.textContent.trim().includes(REPORT_MENU.find(function(r){ return r.id===id; }).label));
    });
    document.getElementById('report-content').innerHTML = _renderReport(id);
  }

  function _renderReport(id) {
